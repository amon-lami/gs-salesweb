                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            ):(
              <div style={{padding:16,textAlign:"center",color:T.muted,fontSize:11}}>アクション履歴なし</div>
            )}
          </div>
        </div>
      </div>

      {/* Edit Modal - uses LeadFormModal */}
      {showEditModal&&<LeadFormModal client={client} user={user} lead={lead} categories={categories} currentBiz={currentBiz} onClose={()=>setShowEditModal(false)} onSaved={()=>{setShowEditModal(false);onUpdated()}}/>}

      {/* Delete Confirmation */}
      {showDeleteConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowDeleteConfirm(false)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:360,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:20}}>⚠️</span>
              <div style={{fontSize:13,fontWeight:700,color:T.primary}}>リードの削除</div>
            </div>
            <div style={{fontSize:11.5,color:T.sub,lineHeight:1.6,marginBottom:14}}>
              <span style={{fontWeight:700,color:T.primary}}>「{lead.company_name}」</span>を本当に削除しますか？
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowDeleteConfirm(false)} disabled={deleting} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={deleteLead} disabled={deleting} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit",opacity:deleting?0.5:1}}>{deleting?"削除中...":"削除する"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Convert Confirmation */}
      {showConvertConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget&&!converting)setShowConvertConfirm(false)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:12}}>商談化の確認</div>
            <div style={{fontSize:12,color:T.sub,lineHeight:1.6,marginBottom:14}}>
              <span style={{fontWeight:700,color:T.primary}}>「{lead.company_name}」</span>を商談化しますか？
            </div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11,color:T.sub,lineHeight:1.8}}>
              以下が自動作成されます：<br/>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ 取引先 <span style={{fontWeight:600,color:T.primary}}>{stripCorp(lead.company_name)}</span></span><br/>
              {(lead.contact_name||lead.contact_email||lead.phone)?(<><span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ コンタクト <span style={{fontWeight:600,color:T.primary}}>{lead.contact_name||lead.company_name}</span></span><br/></>):(<><span style={{display:"inline-flex",alignItems:"center",gap:4,color:T.muted}}>— コンタクト（担当者情報なし）</span><br/></>)}
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ 商談 <span style={{fontWeight:600,color:T.primary}}>{stripCorp(lead.company_name)} - 新規商談</span></span>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowConvertConfirm(false)} disabled={converting} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={executeConvertFromDetail} disabled={converting} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.green,color:"#fff",fontFamily:"inherit",opacity:converting?0.5:1}}>{converting?"変換中...":"商談化する"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Convert Result */}
      {convertResult&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget){setConvertResult(null);onBack()}}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:convertResult.errors?.length>0?T.orange:T.green,marginBottom:12}}>{convertResult.errors?.length>0?"⚠️ 商談化完了（一部エラー）":"✅ 商談化完了"}</div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11.5,color:T.sub,lineHeight:2}}>
              <div>{convertResult.acct?"✅":"❌"} <span style={{fontWeight:600,color:T.primary}}>取引先:</span> {convertResult.acct?.name||"作成失敗"}</div>
              <div>{convertResult.contact?"✅":"➖"} <span style={{fontWeight:600,color:T.primary}}>コンタクト:</span> {convertResult.contact?convertResult.contact.name:"担当者情報なし"}</div>
              <div>{convertResult.deal?"✅":"❌"} <span style={{fontWeight:600,color:T.primary}}>商談:</span> {convertResult.deal?convertResult.deal.name:"作成失敗"}</div>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <button onClick={()=>{setConvertResult(null);onBack()}} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>OK</button>
            </div>
          </div>
        </div>
      )}

      {/* Lost Modal */}
      {showLostModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowLostModal(false)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:T.red,marginBottom:12}}>見送りにする</div>
            <div style={{fontSize:12,color:T.sub,lineHeight:1.6,marginBottom:14}}>
              <span style={{fontWeight:700,color:T.primary}}>「{lead.company_name}」</span>を見送りにしますか？<br/>フォローアップアラートの対象から外れます。
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:10,fontWeight:600,color:T.sub,marginBottom:4,display:"block"}}>見送り理由</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                {LOST_REASONS.map(rr=>(
                  <button key={rr} onClick={()=>setLostReason(rr)} style={{padding:"4px 10px",borderRadius:5,border:lostReason===rr?"1px solid "+T.red:"1px solid "+T.border,fontSize:10.5,fontWeight:lostReason===rr?700:400,cursor:"pointer",background:lostReason===rr?T.red+"12":"#fff",color:lostReason===rr?T.red:T.sub,fontFamily:"inherit"}}>{rr}</button>
                ))}
              </div>
              <input value={lostMemo} onChange={e=>setLostMemo(e.target.value)} style={{width:"100%",border:"1px solid "+T.border,borderRadius:5,padding:"6px 8px",fontSize:11,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}} placeholder="詳細メモ（任意）"/>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowLostModal(false)} disabled={savingLost} style={{padding:"6px 14px",borderRadius:6,border:"1px solid "+T.border,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={markLost} disabled={savingLost} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit",opacity:savingLost?0.5:1}}>{savingLost?"保存中...":"見送りにする"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Lead Page ──
function LeadPage({leads,leadActions,categories,allUsers,client,user,onReload,onOpenLead,onOpenDeal,currentBiz}){
  const defaultOwner=(()=>{try{return localStorage.getItem("gs_default_owner_filter")==="me"}catch(e){return false}})();
  const[statusFilter,setStatusFilter]=useState("all");
  const[sourceFilter,setSourceFilter]=useState("all");
  const[categoryFilter,setCategoryFilter]=useState("all");
  const[leadOwnerFilter,setLeadOwnerFilter]=useState(defaultOwner?user.id:"all");
  const[search,setSearch]=useState("");
  const[showForm,setShowForm]=useState(false);
  const[editLead,setEditLead]=useState(null);
  const filtered=leads.filter(l=>{
    if(statusFilter==="stale"){
      if(l.status==="converted"||l.status==="lost")return false;
      const acts=(leadActions||[]).filter(a=>a.lead_id===l.id);
      const lastDate=acts.length>0?new Date(acts[0].action_date).getTime():new Date(l.created_at).getTime();
      if(Math.floor((Date.now()-lastDate)/(1000*60*60*24))<7)return false;
    }else if(statusFilter!=="all"&&l.status!==statusFilter)return false;
    if(sourceFilter!=="all"&&l.source!==sourceFilter)return false;
    if(categoryFilter!=="all"&&!(l.category_ids||[]).includes(categoryFilter))return false;
    if(leadOwnerFilter!=="all"&&l.owner_id!==leadOwnerFilter)return false;
    if(search){const q=search.toLowerCase();if(!(l.company_name||"").toLowerCase().includes(q)&&!(l.contact_name||"").toLowerCase().includes(q)&&!(l.contact_email||"").toLowerCase().includes(q))return false}
    return true;
  });
  const[convertTarget,setConvertTarget]=useState(null);
  const[convertResult,setConvertResult]=useState(null);
  const[converting,setConverting]=useState(false);

  const handleConvert=(lead)=>{setConvertTarget(lead)};

  const executeConvert=async()=>{
    const lead=convertTarget;
    if(!lead)return;
    setConverting(true);
    const errors=[];
    try{
      // 1. Account
      const acctRow={name:stripCorp(lead.company_name),country:lead.country||null,website:lead.website||null,lead_source:lead.source||null,owner_id:lead.owner_id||user.id,notes:lead.notes||null,category_ids:lead.category_ids||null,created_by:user.id,business_id:lead.business_id||currentBiz||"jbeauty"};
      const{data:newAcct,error:ae}=await client.from("sales_accounts").insert(acctRow).select().single();
      if(ae)throw ae;
      // 2. Contact
      let newContact=null;
      if(lead.contact_name||lead.contact_email||lead.phone){
        const baseCt={name:lead.contact_name||lead.company_name,email:lead.contact_email||null,phone:lead.phone||null,whatsapp:lead.whatsapp||lead.phone||null,account_id:newAcct.id,business_id:lead.business_id||currentBiz||"jbeauty"};
        let{data:ctData,error:ce}=await client.from("sales_contacts").insert(baseCt).select().single();
        if(ce){errors.push("Contact: "+ce.message)}else{newContact=ctData}
      }
      // 3. Deal
      const _now2=new Date();const _ym2=`${String(_now2.getFullYear()).slice(2)}${String(_now2.getMonth()+1).padStart(2,'0')}`;
      const _existing2=deals?.filter(d=>d.account_id===newAcct.id&&d.name?.includes(_ym2)).length||0;
      const _seq2=String(_existing2+1).padStart(2,'0');
      const _dealName2=`${stripCorp(lead.company_name)} ${_ym2}-${_seq2}`;
      const dealRow={name:_dealName2,account_id:newAcct.id,deal_number:0,stage:"negotiation",amount:0,confidence:50,owner_id:lead.owner_id||user.id,notes:lead.notes||null,created_by:user.id,deal_date:_now2.toISOString().split('T')[0],created_at:_now2.toISOString(),updated_at:_now2.toISOString(),lead_id:lead.id,business_id:lead.business_id||currentBiz||"jbeauty"};
      let{data:newDeal,error:de}=await client.from("sales_deals").insert(dealRow).select().single();
      if(de){
        errors.push("Deal(1): "+de.message);
        const minDeal={name:_dealName2,account_id:newAcct.id,stage:"negotiation",owner_id:lead.owner_id||user.id,deal_date:_now2.toISOString().split('T')[0],business_id:lead.business_id||currentBiz||"jbeauty"};
        const r2=await client.from("sales_deals").insert(minDeal).select().single();
        if(r2.error){errors.push("Deal(2): "+r2.error.message)}else{newDeal=r2.data}
      }
      // 4. Mark converted
      await client.from("sales_leads").update({status:"converted",updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",lead.id);
      if(errors.length>0)console.warn("Convert warnings:",errors);
      setConvertTarget(null);setConverting(false);
      setConvertResult({acct:newAcct,contact:newContact,deal:newDeal,errors});
      onReload();
      if(newDeal&&onOpenDeal)onOpenDeal(newDeal);
    }catch(e){setConverting(false);setConvertTarget(null);toast("変換エラー: "+e.message,"error")}
  };
  const FS={padding:"4px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:10.5,fontWeight:500,cursor:"pointer",background:T.card,color:T.sub,fontFamily:"inherit",outline:"none"};
  return(
    <>
      <div style={{padding:"7px 14px",borderBottom:`1px solid ${T.border}`,background:T.card,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="検索..." style={{...FS,width:140,fontWeight:400}}/>
          <select value={categoryFilter} onChange={e=>setCategoryFilter(e.target.value)} style={FS}><option value="all">カテゴリ</option>{categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={FS}><option value="all">ステータス</option>{LEAD_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select>
          <select value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)} style={FS}><option value="all">ソース</option>{LEAD_SOURCES.map(s=><option key={s} value={s}>{s}</option>)}</select>
          <select value={leadOwnerFilter} onChange={e=>setLeadOwnerFilter(e.target.value)} style={FS}><option value="all">責任者</option>{(allUsers||[]).map(u=><option key={u.id} value={u.id}>{shortName(u)}</option>)}</select>
          <button onClick={()=>{setStatusFilter(statusFilter==="stale"?"all":"stale")}} style={{padding:"4px 10px",borderRadius:5,border:statusFilter==="stale"?"1px solid "+T.orange:"1px solid "+T.border,fontSize:10.5,fontWeight:statusFilter==="stale"?700:500,cursor:"pointer",background:statusFilter==="stale"?T.orange+"15":T.card,color:statusFilter==="stale"?T.orange:T.sub,fontFamily:"inherit"}}>⚠️ 要フォロー</button>
          <span style={{fontSize:11,fontWeight:600,color:T.sub,marginLeft:4}}>{filtered.length}件</span>
        </div>
        <button onClick={()=>{setEditLead(null);setShowForm(true)}} style={{padding:"4px 12px",borderRadius:5,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>+ 新規リード</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"8px 12px"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,display:IS_MOBILE?"block":"table",overflowX:IS_MOBILE?"auto":"visible"}}>
          <thead><tr style={{borderBottom:`2px solid ${T.border}`}}>{["ステータス","会社名","担当者","ソース","最終アクション","GS担当","登録日",""].map(h=><th key={h} style={{padding:"6px 8px",textAlign:"left",fontSize:10.5,fontWeight:700,color:T.muted}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map(l=>{
              const st=LEAD_STATUSES.find(s=>s.id===l.status);
              const catNames=(l.category_ids||[]).map(cid=>categories.find(c=>c.id===cid)?.name).filter(Boolean).join(", ");
              return(
                <tr key={l.id} onClick={()=>onOpenLead&&onOpenLead(l)} style={{cursor:"pointer",borderBottom:`1px solid ${T.borderLight}`}} onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{padding:"6px 8px"}}><span style={{fontSize:10,fontWeight:700,color:st?.color||T.muted,background:(st?.color||"#999")+"15",padding:"2px 8px",borderRadius:10}}>{st?.label||l.status}</span></td>
                  <td style={{padding:"6px 8px",fontWeight:600,color:T.primary}}>{countryToFlag(l.country)} {l.company_name}</td>
                  <td style={{padding:"6px 8px",color:T.sub}}>{l.contact_name||"-"}</td>
                  <td style={{padding:"6px 8px",color:T.sub,fontSize:11}}>{l.source}</td>
                  {(()=>{
                    const acts=leadActions.filter(a=>a.lead_id===l.id);
                    const lastAct=acts.length>0?acts[0]:null;
                    const daysAgo=lastAct?Math.floor((Date.now()-new Date(lastAct.action_date).getTime())/(1000*60*60*24)):null;
                    const stale=daysAgo!==null&&daysAgo>=7&&l.status!=="converted"&&l.status!=="lost";
                    const noAction=acts.length===0&&l.status!=="converted"&&l.status!=="lost";
                    return(
                      <td style={{padding:"6px 8px",fontSize:10}}>
                        {lastAct?(
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            {stale&&<span style={{width:6,height:6,borderRadius:3,background:T.red,flexShrink:0}}/>}
                            <span style={{color:stale?T.red:T.sub,fontWeight:stale?600:400}}>{lastAct.action_type}</span>
                            <span style={{color:T.muted,fontSize:9}}>{daysAgo===0?"今日":daysAgo+"日前"}</span>
                          </div>
                        ):noAction?(
                          <span style={{color:T.orange,fontWeight:600}}>未対応</span>
                        ):(
                          <span style={{color:T.muted}}>-</span>
                        )}
                      </td>
                    );
                  })()}
                  <td style={{padding:"6px 8px",color:T.sub,fontSize:11}}>{shortName(allUsers.find(u=>u.id===l.owner_id))}</td>
                  <td style={{padding:"6px 8px",color:T.muted,fontSize:11}}>{fmt(l.created_at)}</td>
                  <td style={{padding:"6px 8px"}}><div style={{display:"flex",gap:4}}>
                    <button onClick={e=>{e.stopPropagation();setEditLead(l);setShowForm(true)}} style={{padding:"2px 8px",borderRadius:3,border:`1px solid ${T.border}`,fontSize:10,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>編集</button>
                    {l.status!=="converted"&&l.status!=="lost"&&<button onClick={e=>{e.stopPropagation();handleConvert(l)}} style={{padding:"2px 8px",borderRadius:3,border:"none",fontSize:10,fontWeight:700,cursor:"pointer",background:T.green,color:"#fff",fontFamily:"inherit"}}>商談化</button>}
                  </div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:"#ccc",fontSize:12}}>リードがありません。「+ 新規リード」で追加してください。</div>}
      </div>
      {showForm&&<LeadFormModal client={client} user={user} lead={editLead} categories={categories} currentBiz={currentBiz} onClose={()=>{setShowForm(false);setEditLead(null)}} onSaved={onReload}/>}

      {convertTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget&&!converting)setConvertTarget(null)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:12}}>商談化の確認</div>
            <div style={{fontSize:12,color:T.sub,lineHeight:1.6,marginBottom:14}}>
              <span style={{fontWeight:700,color:T.primary}}>「{convertTarget.company_name}」</span>を商談化しますか？
            </div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11,color:T.sub,lineHeight:1.8}}>
              以下が自動作成されます：<br/>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ 取引先 <span style={{fontWeight:600,color:T.primary}}>{stripCorp(convertTarget.company_name)}</span></span><br/>
              {(convertTarget.contact_name||convertTarget.contact_email||convertTarget.phone)?(<><span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ コンタクト <span style={{fontWeight:600,color:T.primary}}>{convertTarget.contact_name||convertTarget.company_name}</span></span><br/></>):(<><span style={{display:"inline-flex",alignItems:"center",gap:4,color:T.muted}}>— コンタクト（担当者情報なし）</span><br/></>)}
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ 商談 <span style={{fontWeight:600,color:T.primary}}>{stripCorp(convertTarget.company_name)} - 新規商談</span></span>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setConvertTarget(null)} disabled={converting} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={executeConvert} disabled={converting} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.green,color:"#fff",fontFamily:"inherit",opacity:converting?0.5:1}}>{converting?"変換中...":"商談化する"}</button>
            </div>
          </div>
        </div>
      )}

      {convertResult&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget)setConvertResult(null)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:convertResult.errors?.length>0?T.orange:T.green,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>{convertResult.errors?.length>0?"⚠️ 商談化完了（一部エラー）":"✅ 商談化完了"}</div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11.5,color:T.sub,lineHeight:2}}>
              <div>{convertResult.acct?"✅":"❌"} <span style={{fontWeight:600,color:T.primary}}>取引先:</span> {convertResult.acct?.name||"作成失敗"}</div>
              <div>{convertResult.contact?"✅":convertResult.errors?.some(e=>e.startsWith("Contact"))?"❌":"➖"} <span style={{fontWeight:600,color:T.primary}}>コンタクト:</span> {convertResult.contact?convertResult.contact.name:convertResult.errors?.some(e=>e.startsWith("Contact"))?"作成失敗":"担当者情報なし"}</div>

  const dealSeqLabels=useMemo(()=>{
    const CIRCLED='①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳';
    const labels={};
    const byAcct={};
    filtered.forEach(d=>{if(d.account_id){if(!byAcct[d.account_id])byAcct[d.account_id]=[];byAcct[d.account_id].push(d)}});
    Object.values(byAcct).forEach(ds=>{
      if(ds.length<2)return;
      const byMonth={};
      ds.forEach(d=>{
        const m=d.name?.match(/(\d{4})-(\d+)\s*$/);
        const ym=m?m[1]:'0000';
        const seq=m?parseInt(m[2]):1;
        if(!byMonth[ym])byMonth[ym]=[];
        byMonth[ym].push({d,seq});
      });
      const months=Object.keys(byMonth);
      const multiMonth=months.length>1;
      const hasMultiInAnyMonth=Object.values(byMonth).some(arr=>arr.length>=2);
      if(!hasMultiInAnyMonth&&!multiMonth)return;
      months.forEach(ym=>{
        const items=byMonth[ym];
        items.sort((a,b)=>a.seq-b.seq);
        const mon=parseInt(ym.slice(2))||0;
        if(items.length>=2){
          // Multiple deals in same month: show ①②③ (with month prefix if multi-month)
          items.forEach(({d,seq})=>{
            const c=seq>=1&&seq<=20?CIRCLED[seq-1]:'('+seq+')';
            labels[d.id]=multiMonth?mon+'月'+c:c;
          });
        }else if(multiMonth){
          // Single deal in this month but account spans multiple months: show just month
          items.forEach(({d})=>{labels[d.id]=mon+'月'});
        }
      });
    });
    return labels;
  },[filtered]);

      )}
      {pendingDrop&&<InvoiceUploadModal deal={pendingDrop.deal} client={client} user={user} onClose={()=>setPendingDrop(null)} onSaved={async()=>{
        const currentPhase=STAGES.find(s=>s.id===pendingDrop.deal.stage)?.phase||"pre";
        const targetPhase=STAGES.find(s=>s.id===pendingDrop.newStage)?.phase;
        const now=new Date().toISOString();
        const updateData={stage:pendingDrop.newStage,updated_at:now,updated_by:user.id};
        if(currentPhase==="pre"&&(targetPhase==="post"||targetPhase==="done")&&!pendingDrop.deal.payment_confirmed_date){
          updateData.payment_confirmed_date=now.split('T')[0];
        }
        // Optimistic update
        setDeals(prev=>prev.map(d=>d.id===pendingDrop.deal.id?{...d,...updateData}:d));
        await client.from("sales_deals").update(updateData).eq("id",pendingDrop.deal.id);
        const oldStage=STAGES.find(s=>s.id===pendingDrop.deal.stage);const newStageObj=STAGES.find(s=>s.id===pendingDrop.newStage);
        await client.from("sales_activities").insert({deal_id:pendingDrop.deal.id,account_id:pendingDrop.deal.account_id,user_id:user.id,type:"stage_change",content:`${oldStage?.ja} → ${newStageObj?.ja}`});
        setPendingDrop(null);
      }}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><ToastProvider><App/></ToastProvider></ErrorBoundary>);
</script>
</body>
</html>
