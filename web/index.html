  // Smart text parser - handles JAN codes, product names, flexible formats
  const parseTextInput=async()=>{
    if(!textInput.trim()||!client){setParseErr("テキストを入力してください");return}
    setParseErr("");setParsing(true);setParseLog([]);
    const log=[];
    try{
      const lines=textInput.split("\n").filter(l=>l.trim());
      const parsedItems=[];

      for(const line of lines){
        const trimmed=line.trim();
        if(!trimmed||/^[-=#*]+$/.test(trimmed))continue; // skip separators

        // Try to extract JAN (8 or 13 digit barcode)
        const janMatch=trimmed.match(/\b(\d{13}|\d{8})\b/);

        // Try to extract quantity - various patterns
        const qtyPatterns=[
          /[x×X]\s*(\d+)/,           // x10, ×10
          /(\d+)\s*(?:個|pcs|ケース|cs|箱|set|sets|本|枚)/i,
          /(?:qty|数量|QTY)[:\s]*(\d+)/i,
          /\b(\d{1,5})\s*$/,          // number at end of line
          /^\s*(\d{1,5})\s+/,         // number at start of line
        ];
        let qty=1;
        for(const pat of qtyPatterns){
          const m=trimmed.match(pat);
          if(m){
            const n=parseInt(m[1]);
            if(n>0&&n<100000){qty=n;break}
          }
        }

        if(janMatch){
          // JAN found - lookup directly
          const jan=janMatch[1];
          const{data}=await client.from("product_master").select("*").eq("jan",jan).limit(1);
          if(data&&data.length>0){
            let p=data[0];
            // Check for discontinued with successor
            if(p.is_discontinued&&p.successor_jan){
              const succ=await resolveSuccessor(p);
              if(succ){
                log.push({ok:true,text:`🔄 ${p.name_en||p.name_ja} (${jan}) は廃盤 → 後継品 ${succ.name_en||succ.name_ja} (${succ.jan}) に置換`});
                p=succ;
              }else{
                log.push({ok:true,text:`⚠ ${p.name_en||p.name_ja} (${jan}) は廃盤（後継品見つからず）`});
              }
            }
            parsedItems.push({product_id:p.id,jan:p.jan,name_en:p.name_en||p.name_ja||"",name_ja:p.name_ja||p.name_en||"",quantity:qty,cost_price:p.cost_price||0,selling_price:p.selling_price||0,weight_g:p.weight_g||0,case_quantity:p.case_quantity||0,supplier:p.supplier||"",price_break_qty:p.price_break_qty||0});
            if(!p.is_discontinued)log.push({ok:true,text:`✓ ${p.name_en||p.name_ja} (${p.jan}) × ${qty}`});
          }else{
            log.push({ok:false,text:`✗ JAN ${jan} が見つかりません`});
          }
        }else{
          // No JAN - try product name search
          // Remove quantity patterns to get cleaner search term
          let searchText=trimmed.replace(/[x×X]\s*\d+/g,"").replace(/\d+\s*(?:個|pcs|ケース|cs|箱|set|sets|本|枚)/gi,"").replace(/(?:qty|数量)[:\s]*\d+/gi,"").replace(/^\d+\s+/,"").replace(/\s+\d+$/,"").trim();
          if(searchText.length<2){log.push({ok:false,text:`✗ "${trimmed}" → 検索キーワード不足`});continue}
          const q=`%${searchText}%`;
          const{data}=await client.from("product_master").select("*").or(`name_ja.ilike.${q},name_en.ilike.${q},brand.ilike.${q}`).limit(1);
          if(data&&data.length>0){
            const p=data[0];
            parsedItems.push({product_id:p.id,jan:p.jan,name_en:p.name_en||p.name_ja||"",name_ja:p.name_ja||p.name_en||"",quantity:qty,cost_price:p.cost_price||0,selling_price:p.selling_price||0,weight_g:p.weight_g||0,case_quantity:p.case_quantity||0,supplier:p.supplier||"",price_break_qty:p.price_break_qty||0});
            log.push({ok:true,text:`✓ "${searchText}" → ${p.name_en||p.name_ja} × ${qty}`});
          }else{
            log.push({ok:false,text:`✗ "${searchText}" → 該当商品なし`});
          }
        }
      }

      if(parsedItems.length>0){
        setDocItems(prev=>[...prev,...parsedItems]);
        log.push({ok:true,text:`── ${parsedItems.length}件追加しました ──`});
      }else if(log.length===0){
        setParseErr("商品が見つかりませんでした");
      }
      setParseLog(log);
    }catch(e){
      setParseErr(e.message);
    }finally{
      setParsing(false);
    }
  };

  // File upload handler (Excel/CSV)
  const handleFileUpload=async(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    setParseErr("");setParsing(true);setParseLog([]);
    const log=[];
    try{
      const ext=file.name.split(".").pop().toLowerCase();
      let rows=[];

      if(ext==="csv"||ext==="tsv"){
        const text=await file.text();
        const sep=ext==="tsv"?"\t":",";
        const lines=text.split("\n").filter(l=>l.trim());
        const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,""));
        for(let i=1;i<lines.length;i++){
          const vals=lines[i].split(sep).map(v=>v.trim().replace(/^"|"$/g,""));
          const row={};headers.forEach((h,j)=>{row[h]=vals[j]||""});
          rows.push(row);
        }
      }else if(ext==="xlsx"||ext==="xls"){
        // Load SheetJS dynamically
        if(!window.XLSX){
          const s=document.createElement("script");
          s.src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
          document.head.appendChild(s);
          await new Promise((res,rej)=>{s.onload=res;s.onerror=()=>rej(new Error("SheetJS読み込み失敗"))});
        }
        const buf=await file.arrayBuffer();
        const wb=window.XLSX.read(buf,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=window.XLSX.utils.sheet_to_json(ws,{defval:""});
      }else{
        setParseErr(`未対応のファイル形式: .${ext} (xlsx, csv, tsv に対応)`);return;
      }

      log.push({ok:true,text:`ファイル読み込み: ${rows.length}行`});

      // Find JAN/barcode and quantity columns
      if(rows.length===0){setParseErr("データが空です");return}
      const cols=Object.keys(rows[0]);
      const janCol=cols.find(c=>/jan|barcode|バーコード|JAN|EAN|UPC|code|コード|品番/i.test(c));
      const qtyCol=cols.find(c=>/qty|quantity|数量|個数|QTY|注文数|order/i.test(c));
      const nameCol=cols.find(c=>/product|name|商品名|品名|商品|item|品目/i.test(c));

      log.push({ok:true,text:`カラム検出: JAN=${janCol||"?"}, 数量=${qtyCol||"?"}, 商品名=${nameCol||"?"}`});

      const parsedItems=[];
      for(const row of rows){
        const rawJan=String(janCol?row[janCol]:"").trim();
        const rawQty=qtyCol?row[qtyCol]:"1";
        const rawName=nameCol?String(row[nameCol]).trim():"";
        const qty=parseInt(String(rawQty).replace(/[^\d]/g,""))||1;

        // Try JAN match
        const janNum=rawJan.replace(/[^\d]/g,"");
        if(janNum.length>=8){
          const{data}=await client.from("product_master").select("*").eq("jan",janNum).limit(1);
          if(data&&data.length>0){
            let p=data[0];
            if(p.is_discontinued&&p.successor_jan){
              const succ=await resolveSuccessor(p);
              if(succ){
                log.push({ok:true,text:`🔄 ${p.name_en||p.name_ja} (${janNum}) 廃盤 → 後継品 ${succ.name_en||succ.name_ja} (${succ.jan})`});
                p=succ;
              }else{
                log.push({ok:true,text:`⚠ ${p.name_en||p.name_ja} (${janNum}) 廃盤（後継品見つからず）`});
              }
            }
            parsedItems.push({product_id:p.id,jan:p.jan,name_en:p.name_en||p.name_ja||"",name_ja:p.name_ja||p.name_en||"",quantity:qty,cost_price:p.cost_price||0,selling_price:p.selling_price||0,weight_g:p.weight_g||0,case_quantity:p.case_quantity||0,supplier:p.supplier||"",price_break_qty:p.price_break_qty||0});
            if(!p.is_discontinued)log.push({ok:true,text:`✓ ${p.name_en||p.name_ja} × ${qty}`});
            continue;
          }
        }

        // Fallback to name search
        if(rawName&&rawName.length>=2){
          const q=`%${rawName}%`;
          const{data}=await client.from("product_master").select("*").or(`name_ja.ilike.${q},name_en.ilike.${q}`).limit(1);
          if(data&&data.length>0){
            const p=data[0];
            parsedItems.push({product_id:p.id,jan:p.jan,name_en:p.name_en||p.name_ja||"",name_ja:p.name_ja||p.name_en||"",quantity:qty,cost_price:p.cost_price||0,selling_price:p.selling_price||0,weight_g:p.weight_g||0,case_quantity:p.case_quantity||0,supplier:p.supplier||"",price_break_qty:p.price_break_qty||0});
            log.push({ok:true,text:`✓ "${rawName}" → ${p.name_en||p.name_ja} × ${qty}`});
            continue;
          }
        }
        log.push({ok:false,text:`✗ ${rawJan||rawName||"不明"} → 該当なし`});
      }

      if(parsedItems.length>0){
        setDocItems(prev=>[...prev,...parsedItems]);
        log.push({ok:true,text:`── ${parsedItems.length}/${rows.length}件 追加完了 ──`});
      }
      setParseLog(log);
    }catch(e){
      setParseErr(e.message);
    }finally{
      setParsing(false);
      if(fileInputRef.current)fileInputRef.current.value="";

  // Auto-calculate selling_price at target margin (default 25%)
  const autoCalcPrices=(targetMargin=25)=>{
    setDocItems(prev=>prev.map(item=>{
      const costTaxIncl=Math.round((item.cost_price||0)*1.1);
      const costUsd=costTaxIncl/jpy_rate;
      const sp=costUsd>0?parseFloat((costUsd/(1-targetMargin/100)).toFixed(2)):item.selling_price;
      return{...item,selling_price:sp};

  // Update selling_price from margin input
  const updateMargin=(idx,newMarginPct)=>{
    setDocItems(prev=>{
      const newItems=[...prev];
      const item=newItems[idx];
      const costTaxIncl=Math.round((item.cost_price||0)*1.1);
      const costUsd=costTaxIncl/jpy_rate;

  // Calculate totals
  const{subtotal,totalCostJpy,totalProfit,overallMarginPct,totalWeight}=useMemo(()=>{
    let sub=0,costJpy=0,profit=0;
    let weight=0;

    docItems.forEach(item=>{
      const amount=item.selling_price*item.quantity;
      sub+=amount;
      const costUsd=(item.cost_price||0)/jpy_rate;
      const itemProfit=(item.selling_price-costUsd)*item.quantity;
      profit+=itemProfit;
      costJpy+=(item.cost_price||0)*item.quantity;
      weight+=(item.weight_g||0)*item.quantity;
    });

    const margin=sub>0?(profit/sub)*100:0;
    return{subtotal:sub,totalCostJpy:costJpy,totalProfit:profit,overallMarginPct:margin,totalWeight:weight/1000};
  },[docItems,jpy_rate]);

  // Calculate shipping (DAP mode)
  const calculateDapShipping=useCallback(async()=>{
    if(incoterm!=="DAP"||!shippingCountry)return;

    try{
      // Fetch shipping rates
      const{data:rates,error:rateErr}=await client.from("shipping_rates").select("*").eq("carrier",carrier).eq("service",service);
      if(rateErr)throw rateErr;

      // Find matching zone
      const{data:zones,error:zoneErr}=await client.from("shipping_zones").select("*").eq("carrier",carrier).eq("service",service).eq("country",shippingCountry);
      if(zoneErr)throw zoneErr;

      if(!zones||zones.length===0){
        setShippingBreakdown(null);
        return;
      }

      const zone=zones[0];
      const rate=rates.find(r=>r.zone_code===zone.zone_code&&r.weight_kg>=totalWeight);

      if(!rate){
        setShippingBreakdown(null);
        return;
      }

      // Fetch settings
      const{data:settings,error:settingsErr}=await client.from("shipping_settings").select("*").limit(1);
      if(settingsErr)throw settingsErr;

      const fuel=settings?.[0]?.fuel_surcharge_rate||0.05;
      const markup=settings?.[0]?.dap_markup_rate||0.15;

      const baseJpy=rate.rate_jpy;
      const withFuel=baseJpy*(1+fuel);
      const withMarkup=withFuel*(1+markup);

      // Convert to USD
      const costUsd=withMarkup/jpy_rate;

      setShippingCost(costUsd);
      setShippingBreakdown({baseJpy,fuel:baseJpy*fuel,markup:withFuel*markup,totalJpy:withMarkup,totalUsd:costUsd});
    }catch(e){
      setSaveErr(`配送料金計算エラー: ${e.message}`);
    }
  },[incoterm,carrier,service,shippingCountry,totalWeight,jpy_rate,client]);

        account_id:selectedAccount?.id||null,

        deal_id:selectedDeal?.id||null,
        created_by:user?.id||null,
        client_info:{...clientInfo,doc_date:docDate,due_date:dueDate,shipping_country:shippingCountry,exchange_rate:currencyRate,shipping_breakdown:shippingBreakdown},
        items:docItems,
        subtotal:subtotal,
        shipping:shippingCost,
        total:grandTotal,
        incoterm:incoterm,
        currency:mode==="invoice"?currency:"USD",
        carrier:carrier,
        service:service,
        notes,
      };

      const{data:docResult,error}=await client.from("generated_documents").insert([docData]).select("id");
      if(error)throw error;
      const savedDocId=docResult?.[0]?.id||null;

      // Auto-create order items if linked to a deal
      if(selectedDeal&&docItems.length>0){
        try{
          const orderItems=docItems.map(item=>({
            deal_id:selectedDeal.id,
            document_id:savedDocId,
            account_id:selectedAccount?.id||selectedDeal.account_id||null,
            product_id:item.product_id||null,
            jan:item.jan||null,
            name_en:item.name_en||"",
            name_ja:item.name_ja||"",
            quantity:item.quantity||0,
            case_quantity:item.case_quantity||null,
            cost_price:item.cost_price||null,
            selling_price:item.selling_price||null,
            weight_g:item.weight_g||null,
            supplier:item.supplier||null,
            status:"pending",
            created_by:user?.id||null,
          }));
          await client.from("order_items").insert(orderItems);
        }catch(orderErr){console.error("Order items creation failed:",orderErr)}
      }

      setSaveErr("");
      // Auto-download Excel + attach to deal if linked
      try{
        const xlsxBlob=await generateExcel();
        if(xlsxBlob&&selectedDeal){
          await attachExcelToDeal(xlsxBlob);
        }
      }catch(ex){console.error("Excel generation/attach failed:",ex)}
      onBack?.();
    }catch(e){
      setSaveErr(e.message);
    }finally{
      setSaving(false);
    }
  };

  // ── Excel Export (matching exact template layout) ──
  const generateExcel=async()=>{
    // Load ExcelJS (supports styles, unlike free SheetJS)
    if(!window.ExcelJS){
      const s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js";
      document.head.appendChild(s);
      await new Promise((res,rej)=>{s.onload=res;s.onerror=()=>rej(new Error("ExcelJS読み込み失敗"))});
    }

    const fmtDate=(dateStr)=>{
      const d=new Date(dateStr);
      const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const day=d.getDate();
      const suffix=day===1||day===21||day===31?"st":day===2||day===22?"nd":day===3||day===23?"rd":"th";
      return `${day}${suffix}, ${months[d.getMonth()]}, ${d.getFullYear()}`;
    };

    const isInvoice=mode==="invoice";
    const title=isInvoice?"I N V O I C E":"Q U O T A T I O N";
    const dueLine=isInvoice?`Payment Due By: ${fmtDate(dueDate)}`:`Quote Valid Until: ${fmtDate(dueDate)}`;
    const docLabel=isInvoice?"Invoice Number:":"Quotation Number:";
    const toLabel=isInvoice?"B I L L  T O":"S H I P  T O";
    const fromCompany="Global Stride Inc.";
    const toCompany=clientInfo.companyName||"";
    const toAddr=clientInfo.address||"";
    const toCityCountry=[clientInfo.city,clientInfo.country].filter(Boolean).join(" ");
    const toPhone=clientInfo.phone||"";

    const wb=new window.ExcelJS.Workbook();
    const ws=wb.addWorksheet("Invoice");

    // Column widths
    ws.columns=[{width:5},{width:22},{width:18},{width:14},{width:16},{width:12},{width:14},{width:12}];

    // Styles
    const fontB={name:"Arial",size:10,bold:true,color:{argb:"FF000000"}};
    const fontN={name:"Arial",size:10,color:{argb:"FF000000"}};
    const fontGray={name:"Arial",size:10,bold:true,color:{argb:"FF888888"}};
    const fontWhite={name:"Arial",size:10,bold:true,color:{argb:"FFFFFFFF"}};
    const thinBorder={top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};
    const blackFill={type:"pattern",pattern:"solid",fgColor:{argb:"FF000000"}};
    const grayFill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF2F2F2"}};
    const whiteFill={type:"pattern",pattern:"solid",fgColor:{argb:"FFFFFFFF"}};
    const bankFill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF8F8F8"}};

    // Helper: merge and style
    const mergeSet=(r,c1,c2,val,font,align,fill,border)=>{
      if(c1!==c2)ws.mergeCells(r,c1,r,c2);
      const cell=ws.getCell(r,c1);
      cell.value=val;cell.font=font||fontN;
      cell.alignment={horizontal:align||"left",vertical:"center"};
      if(fill)cell.fill=fill;
      if(border)cell.border=border;
    };

    // Row heights
    ws.getRow(1).height=36;
    [2,3].forEach(r=>ws.getRow(r).height=18);
    ws.getRow(4).height=6;ws.getRow(5).height=12;
    ws.getRow(6).height=19.5;
    [7,8,9,10,11].forEach(r=>ws.getRow(r).height=18);
    ws.getRow(12).height=15.75;

    // Row 1: Title
    mergeSet(1,1,3,title,{name:"Arial",size:24,bold:true,color:{argb:"FF000000"}},"left");
    mergeSet(1,6,8,`Date: ${fmtDate(docDate)}`,fontB,"right");

    // Row 2-3
    mergeSet(2,6,8,dueLine,fontB,"right");
    mergeSet(3,6,8,`${docLabel} ${docNumber}`,fontB,"right");

    // Row 6: FROM / TO
    mergeSet(6,1,4,"F R O M",fontGray);
    mergeSet(6,5,8,toLabel,fontGray);

    // Row 7-11: Company info
    mergeSet(7,1,4,`Company Name: ${fromCompany}`,fontB);
    mergeSet(7,5,8,`Company Name: ${toCompany}`,fontB);
    mergeSet(8,1,4,`Street Address: 6A 4-5-11 Ueshio Tennoji-ku,`,fontB);
    mergeSet(8,5,8,`Street Address: ${toAddr}`,fontB);
    mergeSet(9,1,4,"                    Osaka-shi, Osaka-fu 543-0002",fontN);
    mergeSet(9,5,8,`                    ${toCityCountry}`,fontN);
    mergeSet(10,1,4,"                    Japan",fontN);
    mergeSet(10,5,8,toPhone?`Phone: ${toPhone}`:"",fontB);
    mergeSet(11,1,4,"Phone: +81 50-1808-6320",fontB);

    // Row 13: Table header (black bg, white text)
    const hRow=13;
    ws.getRow(hRow).height=27.75;
    [[1,3,"Description"],[4,4,"JAN"],[5,5,"Quantity"],[6,7,"Unit Price"],[8,8,"Amount"]].forEach(([c1,c2,val])=>{
      mergeSet(hRow,c1,c2,val,fontWhite,"center",blackFill,thinBorder);
    });

    // Rows 14+: Items (alternating gray/white)
    const dataStart=14;
    docItems.forEach((item,i)=>{
      const r=dataStart+i;
      const bg=i%2===0?grayFill:whiteFill;
      ws.getRow(r).height=31.5;
      mergeSet(r,1,3,item.name_en||item.name_ja||"",fontN,"left",bg,thinBorder);
      const janCell=ws.getCell(r,4);janCell.value=item.jan||"";janCell.font=fontN;janCell.alignment={horizontal:"center",vertical:"center"};janCell.fill=bg;janCell.border=thinBorder;
      const qtyCell=ws.getCell(r,5);qtyCell.value=item.quantity;qtyCell.font=fontN;qtyCell.alignment={horizontal:"center",vertical:"center"};qtyCell.fill=bg;qtyCell.border=thinBorder;
      mergeSet(r,6,7,item.selling_price,fontN,"center",bg,thinBorder);
      const amtCell=ws.getCell(r,8);amtCell.value={formula:`E${r}*F${r}`};amtCell.font=fontB;amtCell.alignment={horizontal:"right",vertical:"center"};amtCell.fill=bg;amtCell.border=thinBorder;
    });

    const lastItem=dataStart+docItems.length-1;
    const gapRow=lastItem+2;

    // Spacer row
    ws.getRow(lastItem+1).height=9.75;

    // Sub Total
    ws.getRow(gapRow).height=24;
    ws.mergeCells(gapRow,4,gapRow,6);ws.getCell(gapRow,4).value="Sub Total";ws.getCell(gapRow,4).font=fontN;ws.getCell(gapRow,4).alignment={horizontal:"right",vertical:"center"};
    ws.mergeCells(gapRow,7,gapRow,8);ws.getCell(gapRow,7).value={formula:`SUM(H${dataStart}:H${lastItem})`};ws.getCell(gapRow,7).font=fontB;ws.getCell(gapRow,7).alignment={horizontal:"right",vertical:"center"};

    // Shipping
    ws.getRow(gapRow+1).height=24;
    ws.mergeCells(gapRow+1,4,gapRow+1,6);ws.getCell(gapRow+1,4).value="Shipping Cost";ws.getCell(gapRow+1,4).font=fontN;ws.getCell(gapRow+1,4).alignment={horizontal:"right",vertical:"center"};
    ws.mergeCells(gapRow+1,7,gapRow+1,8);ws.getCell(gapRow+1,7).value=shippingCost;ws.getCell(gapRow+1,7).font=fontB;ws.getCell(gapRow+1,7).alignment={horizontal:"right",vertical:"center"};

    // Total Amount (black bg)
    ws.getRow(gapRow+2).height=30;
    ws.mergeCells(gapRow+2,4,gapRow+2,6);const totalLabel=ws.getCell(gapRow+2,4);totalLabel.value="Total Amount";totalLabel.font=fontWhite;totalLabel.alignment={horizontal:"right",vertical:"center"};totalLabel.fill=blackFill;totalLabel.border=thinBorder;
    ws.mergeCells(gapRow+2,7,gapRow+2,8);const totalVal=ws.getCell(gapRow+2,7);totalVal.value={formula:`G${gapRow}+G${gapRow+1}`};totalVal.font={name:"Arial",size:12,bold:true,color:{argb:"FF000000"}};totalVal.alignment={horizontal:"right",vertical:"center"};totalVal.border=thinBorder;

    let curRow=gapRow+4;

    // Bank details (Invoice only)
    if(isInvoice){
      const bi=bankDetails||{};
      const bankRows=[
        `Bank Name: ${bi.bank_name||"Wise"}`,
        `Account Holder's Name: ${bi.account_holder||fromCompany}`,
        `Bank Account Number: ${bi.account_number||""}`,
        `Routing Number: ${bi.routing_number||bi.swift_code||""}`,
        `Bank Address: ${bi.bank_address||""}`
      ];
      bankRows.forEach((txt,i)=>{
        const r=curRow+i;
        ws.getRow(r).height=19.5;
        ws.mergeCells(r,1,r,8);
        const c=ws.getCell(r,1);c.value=txt;c.font=i===0?fontB:fontN;c.alignment={horizontal:"left",vertical:"center"};c.fill=bankFill;c.border=thinBorder;
      });
      curRow+=6;
    }

    // Delivery Terms
    const incoLabels={DAP:"DAP (Delivered At Place)",FOB:"FOB (Free On Board)",CIF:"CIF (Cost Insurance Freight)",EXW:"EXW (Ex Works)",DDP:"DDP (Delivered Duty Paid)"};
    const incoDesc={
      DAP:"The seller (Global Stride Inc.) will arrange and pay for transportation to the buyer's specified address. However, any import duties, taxes, and customs clearance procedures that occur upon importation are the responsibility of the buyer.",
      FOB:"The seller (Global Stride Inc.) is responsible for delivering the goods to the port of shipment and loading them onto the vessel. Risk transfers to the buyer once the goods are on board.",
      CIF:"The seller (Global Stride Inc.) pays for cost, insurance, and freight to bring goods to the port of destination. Risk transfers to the buyer once the goods are on board at the port of shipment.",
      EXW:"The buyer is responsible for all transportation costs and risks from the seller's premises.",
      DDP:"The seller (Global Stride Inc.) is responsible for delivering the goods to the buyer's premises, including all import duties, taxes, and customs clearance."
    };
    ws.getRow(curRow).height=21.75;
    ws.mergeCells(curRow,1,curRow,8);ws.getCell(curRow,1).value=`Delivery Terms: ${incoLabels[incoterm]||incoterm}`;ws.getCell(curRow,1).font=fontB;
    curRow++;
    ws.getRow(curRow).height=36;
    ws.mergeCells(curRow,1,curRow,8);const descCell=ws.getCell(curRow,1);descCell.value=incoDesc[incoterm]||"";descCell.font={name:"Arial",size:9,color:{argb:"FF000000"}};descCell.alignment={horizontal:"left",vertical:"top",wrapText:true};
    curRow+=2;

    // Remarks
    ws.getRow(curRow).height=18;
    ws.mergeCells(curRow,1,curRow,8);ws.getCell(curRow,1).value="Remarks";ws.getCell(curRow,1).font=fontB;
    curRow++;
    ws.getRow(curRow).height=18;
    ws.mergeCells(curRow,1,curRow,8);ws.getCell(curRow,1).value=notes||"";ws.getCell(curRow,1).font=fontB;

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`${docNumber}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    return blob;
  };

    const fileName=`${docNumber}.xlsx`;
    const safeName=Date.now()+"_"+Math.random().toString(36).slice(2,8)+".xlsx";

      // 見積書 → 商談ファイル (sales_deal_files)

      if(ue){console.error("Upload error:",ue);return}

    }else{

            <div>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>住所</div>
              <input value={clientInfo.address} onChange={e=>setClientInfo(prev=>({...prev,address:e.target.value}))} placeholder="Street address" style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>都市/国</div>
              <input value={clientInfo.city} onChange={e=>setClientInfo(prev=>({...prev,city:e.target.value}))} placeholder="City, Country" style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>電話</div>
              <input value={clientInfo.phone} onChange={e=>setClientInfo(prev=>({...prev,phone:e.target.value}))} placeholder="Phone" style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>メール</div>
              <input value={clientInfo.email} onChange={e=>setClientInfo(prev=>({...prev,email:e.target.value}))} placeholder="Email" type="email" style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
            </div>
          </div>

          <div style={{gridColumn:IS_MOBILE?"auto":"span 2",display:"flex",gap:8}}>
            <button onClick={()=>{if(mode==="invoice"&&!selectedDeal){alert("請求書作成には商談リンクが必須です。");return}setStep(2)}} style={{flex:1,padding:10,background:T.accent||"#2d8cf0",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>次へ →</button>
          </div>
        </div>
      )}

      {/* Step 2: Add Products */}
      {step===2&&(
        <div style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:8,borderBottom:`1px solid ${T.border}`}}>
            <div style={{width:28,height:28,borderRadius:8,background:(T.green||"#22c55e")+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke={T.green||"#22c55e"} strokeWidth="1.3"/><path d="M5 8h6M8 5v6" stroke={T.green||"#22c55e"} strokeWidth="1.3" strokeLinecap="round"/></svg></div>
            <span style={{fontSize:12,fontWeight:700,color:T.text}}>商品入力</span>
          </div>
          <div style={{display:"flex",gap:6}}>
            {[{k:"ai",l:"GS-AI",icon:"🤖"},{k:"search",l:"手動検索",icon:"🔍"}].map(t=>(
              <button key={t.k} onClick={()=>setTextInputMode(t.k)} style={{flex:1,padding:8,background:textInputMode===t.k?(T.accent||"#2d8cf0")+"12":"transparent",color:textInputMode===t.k?T.accent||"#2d8cf0":T.muted,border:`1px solid ${textInputMode===t.k?T.accent||"#2d8cf0":T.border}`,borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{t.icon} {t.l}</button>
            ))}
          </div>

          {textInputMode==="ai"?(
            <div
              onDragOver={e=>{e.preventDefault();setDragOver(true)}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)handleAiFile(f)}}
              style={{display:"flex",flexDirection:"column",gap:0,border:dragOver?`2px dashed ${T.primary}`:`2px dashed transparent`,borderRadius:8,transition:"border 0.2s"}}
            >
              {/* AI Chat Messages */}
              <div style={{maxHeight:280,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,padding:8,background:T.bg,borderRadius:8}}>
                {aiMessages.map((msg,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
                    <div style={{
                      maxWidth:"85%",padding:"8px 12px",borderRadius:msg.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",
                      background:msg.role==="user"?T.primary:(T.card),
                      color:msg.role==="user"?"#fff":T.text,
                      fontSize:11,lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word"
                    }}>
                      {msg.role==="ai"&&<div style={{fontSize:9,fontWeight:700,color:T.accent||T.blue||"#3b82f6",marginBottom:3}}>GS-AI</div>}
                      {msg.text}
                    </div>
                  </div>
                ))}
                {aiProcessing&&(
                  <div style={{display:"flex",justifyContent:"flex-start"}}>
                    <div style={{padding:"8px 12px",borderRadius:"12px 12px 12px 2px",background:T.card,fontSize:11,color:T.muted}}>
                      <div style={{fontSize:9,fontWeight:700,color:T.accent||T.blue||"#3b82f6",marginBottom:3}}>GS-AI</div>
                      解析中...
                    </div>
                  </div>
                )}
                <div ref={aiChatEndRef}/>
              </div>

              {/* Confirm/Reject buttons */}
              {aiPendingItems&&(
                <div style={{display:"flex",gap:8,padding:"8px 0"}}>
                  <button onClick={confirmAiItems} style={{flex:1,padding:10,background:T.green,color:"#fff",border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer"}}>追加する ({aiPendingItems.length}件)</button>
                  <button onClick={rejectAiItems} style={{flex:1,padding:10,background:"#fff",color:T.red,border:`1px solid ${T.red}`,borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer"}}>やり直す</button>
                </div>
              )}

              {/* Input area */}
              <div style={{display:"flex",gap:6,padding:"8px 0 0"}}>
                <input ref={aiFileRef} type="file" accept=".xlsx,.xls,.csv,.tsv,.pdf,.png,.jpg,.jpeg" onChange={e=>{const f=e.target.files?.[0];if(f)handleAiFile(f);e.target.value=""}} style={{display:"none"}}/>
                <button onClick={()=>aiFileRef.current?.click()} disabled={aiProcessing} style={{padding:"8px 12px",background:T.borderLight,border:"none",borderRadius:6,fontSize:14,cursor:"pointer"}} title="ファイルアップロード">📎</button>
                <input value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.nativeEvent.isComposing&&aiInput.trim()&&!aiProcessing){handleAiSubmit(aiInput)}}} placeholder="発注テキストを貼り付け、またはファイルをD&D..." disabled={aiProcessing} style={{flex:1,padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
                <button onClick={()=>{if(aiInput.trim())handleAiSubmit(aiInput)}} disabled={aiProcessing||!aiInput.trim()} style={{padding:"8px 16px",background:aiProcessing||!aiInput.trim()?"#ccc":T.primary,color:"#fff",border:"none",borderRadius:6,fontSize:12,fontWeight:600,cursor:aiProcessing?"default":"pointer"}}>送信</button>
              </div>
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:IS_MOBILE?"1fr":"1fr 1fr 1fr",gap:8}}>
              <input value={searchInput} onChange={e=>setSearchInput(e.target.value)} placeholder="商品名/JAN/ブランドで検索" style={{padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
              <input type="number" value={addQty} onChange={e=>setAddQty(parseInt(e.target.value)||1)} placeholder="数量" min="1" style={{padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
              <div>{searching?"検索中...":"検索結果: "+searchResults.length+"件"}</div>
              {searchResults.length>0&&(
                <div style={{gridColumn:IS_MOBILE?"auto":"span 3",display:"grid",gridTemplateColumns:"1fr",gap:4,maxHeight:200,overflowY:"auto"}}>
                  {searchResults.map(p=>(
                    <div key={p.id} onClick={()=>addProductFromSearch(p)} style={{padding:8,background:p.is_discontinued?"#fff7ed":T.borderLight,borderRadius:6,cursor:"pointer",fontSize:11,display:"flex",justifyContent:"space-between",alignItems:"center",border:p.is_discontinued?"1px solid #fed7aa":"none"}}>
                      <div><strong>{p.name_en||p.name_ja}</strong> · {p.jan}{p.is_discontinued&&<span style={{marginLeft:4,fontSize:9,padding:"1px 4px",background:"#dc2626",color:"#fff",borderRadius:3,fontWeight:600}}>廃盤</span>}{p.is_discontinued&&p.successor_jan&&<span style={{marginLeft:3,fontSize:9,color:"#c2410c"}}>→後継品あり</span>}</div>
                      <button style={{background:T.green,color:"#fff",border:"none",borderRadius:4,padding:"4px 8px",fontSize:10,fontWeight:600,cursor:"pointer"}}>+追加</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Product Table */}
          {docItems.length>0&&(
            <div style={{overflowX:"auto",marginTop:12}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr style={{background:T.borderLight,borderBottom:`1px solid ${T.border}`}}>
                    <th style={{padding:8,textAlign:"left",fontWeight:700,color:T.text}}>商品名</th>
                    <th style={{padding:8,textAlign:"center",fontWeight:700,color:T.text,fontSize:10}}>JAN</th>
                    <th style={{padding:8,textAlign:"center",fontWeight:700,color:T.text}}>数量</th>
                    <th style={{padding:8,textAlign:"right",fontWeight:700,color:T.text,fontSize:10}}>仕入原価</th>
                    <th style={{padding:8,textAlign:"center",fontWeight:700,color:T.text,width:40}}></th>
                  </tr>
                </thead>
                <tbody>
                  {docItems.map((item,idx)=>(
                      <tr key={idx} style={{borderBottom:`1px solid ${T.borderLight}`}}>
                        <td style={{padding:8,textAlign:"left"}}>{item.name_en||item.name_ja}</td>
                        <td style={{padding:8,textAlign:"center",fontSize:10,color:T.muted}}>{item.jan}</td>
                        <td style={{padding:8,textAlign:"center"}}>
                          <input type="number" value={item.quantity} onChange={e=>updateItem(idx,"quantity",e.target.value)} min="1" style={{width:50,padding:"4px 6px",border:`1px solid ${T.border}`,borderRadius:4,fontSize:11,textAlign:"center"}}/>
                        </td>
                        <td style={{padding:8,textAlign:"right",fontSize:10,color:T.sub}}>¥{(item.cost_price||0).toLocaleString()}</td>
                        <td style={{padding:8,textAlign:"center"}}>
                          <button onClick={()=>removeItem(idx)} style={{background:"none",border:"none",fontSize:12,cursor:"pointer",color:T.muted}}>✕</button>
                        </td>
                      </tr>
                  ))}
                </tbody>
              </table>
              <div style={{padding:10,background:T.bg,borderRadius:6,marginTop:8,display:"flex",gap:16,fontSize:11,color:T.sub}}>
                <span>商品数: <strong style={{color:T.text}}>{docItems.length}種 / {docItems.reduce((s,i)=>s+i.quantity,0)}個</strong></span>
                <span>仕入原価合計: <strong style={{color:T.text}}>¥{totalCostJpy.toLocaleString()}</strong></span>
                <span style={{fontSize:10,color:T.muted}}>※ 提示価格は次の確認画面で自動計算されます</span>
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>window.history.back()} style={{flex:1,padding:10,background:T.bg,color:T.sub,border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← 戻る</button>
            <button onClick={()=>setStep(3)} disabled={docItems.length===0} style={{flex:1,padding:10,background:docItems.length===0?"#ccc":T.accent||"#2d8cf0",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:docItems.length===0?"default":"pointer",opacity:docItems.length===0?0.6:1}}>次へ →</button>
          </div>
        </div>
      )}

      {/* Step 3: Shipping & Incoterms */}
      {step===3&&(
        <div style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:8,borderBottom:`1px solid ${T.border}`,marginBottom:4}}>
            <div style={{width:28,height:28,borderRadius:8,background:(T.orange||"#f59e0b")+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1 10l3-8h8l3 8" stroke={T.orange||"#f59e0b"} strokeWidth="1.3"/><path d="M1 10h14v3H1z" stroke={T.orange||"#f59e0b"} strokeWidth="1.3"/></svg></div>
            <span style={{fontSize:12,fontWeight:700,color:T.text}}>配送条件</span>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.sub,marginBottom:8}}>インコタームズ</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["DAP","FOB","EXW","CIF"].map(inc=>(
                <button key={inc} onClick={()=>setIncoterm(inc)} style={{padding:"8px 14px",background:incoterm===inc?T.accent||"#2d8cf0":"transparent",color:incoterm===inc?"#fff":T.sub,border:`1px solid ${incoterm===inc?T.accent||"#2d8cf0":T.border}`,borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  {inc}
                </button>
              ))}
            </div>
          </div>

          {incoterm==="DAP"&&(
            <div style={{display:"grid",gridTemplateColumns:IS_MOBILE?"1fr":"1fr 1fr",gap:12,padding:12,background:T.borderLight,borderRadius:8}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>配送業者</div>
                <select value={carrier} onChange={e=>setCarrier(e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}>
                  <option value="UPS">UPS</option>
                  <option value="FedEx">FedEx</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>サービス</div>
                <select value={service} onChange={e=>setService(e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}>
                  {servicesByCarrier[carrier].map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div style={{gridColumn:IS_MOBILE?"auto":"span 2"}}>
                <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>配送先国</div>
                <div ref={countryRef} style={{position:"relative"}}>
                  <input value={showCountryDropdown?countrySearch:shippingCountry} onChange={e=>{setCountrySearch(e.target.value);setShowCountryDropdown(true)}} onFocus={()=>{setCountrySearch("");setShowCountryDropdown(true)}} placeholder="国名を検索..." style={{width:"100%",padding:"8px 10px",border:`1px solid ${showCountryDropdown?T.primary:T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit",boxSizing:"border-box"}}/>
                  {shippingCountry&&!showCountryDropdown&&<button onClick={()=>{setShippingCountry("");setCountrySearch("")}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:14,cursor:"pointer",color:T.muted,padding:0}}>✕</button>}
                  {showCountryDropdown&&<div style={{position:"absolute",top:"100%",left:0,right:0,maxHeight:200,overflowY:"auto",background:T.card,border:`1px solid ${T.border}`,borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,.1)",zIndex:50,marginTop:2}}>
                    {filteredCountries.length===0&&<div style={{padding:10,fontSize:11,color:T.muted,textAlign:"center"}}>該当する国がありません</div>}
                    {filteredCountries.map(c=>(
                      <div key={c} onClick={()=>{setShippingCountry(c);setCountrySearch("");setShowCountryDropdown(false)}} style={{padding:"8px 12px",fontSize:11,cursor:"pointer",background:shippingCountry===c?T.primary+"15":"transparent",fontWeight:shippingCountry===c?600:400,borderBottom:`1px solid ${T.borderLight||"#f0f0f0"}`}} onMouseEnter={e=>e.currentTarget.style.background=T.primary+"10"} onMouseLeave={e=>e.currentTarget.style.background=shippingCountry===c?T.primary+"15":"transparent"}>
                        {c}
                      </div>
                    ))}
                  </div>}
                </div>
              </div>
              {shippingBreakdown&&(
                <div style={{gridColumn:IS_MOBILE?"auto":"span 2",padding:10,background:T.card,borderRadius:6,fontSize:10,display:"grid",gridTemplateColumns:"1fr 1fr"}}>
                  <div>基本料金: ¥{shippingBreakdown.baseJpy.toLocaleString()}</div>
                  <div>燃油サーチャージ: ¥{shippingBreakdown.fuel.toLocaleString()}</div>
                  <div>マークアップ: ¥{shippingBreakdown.markup.toLocaleString()}</div>
                  <div style={{fontWeight:700}}>合計: ${shippingBreakdown.totalUsd.toFixed(2)}</div>
                </div>
              )}
              <div style={{gridColumn:IS_MOBILE?"auto":"span 2",fontSize:9,color:T.muted}}>総重量: {totalWeight.toFixed(2)} kg</div>
            </div>
          )}

          {incoterm==="FOB"&&(
            <div style={{padding:12,background:T.borderLight,borderRadius:8}}>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>FOB料率</div>
              <input type="number" value={fobRate} onChange={e=>setFobRate(parseFloat(e.target.value)||0)} step="0.01" placeholder="0.08" style={{width:"100%",maxWidth:120,padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
              <div style={{fontSize:10,color:T.muted,marginTop:4}}>配送料: ${(subtotal*fobRate).toFixed(2)}</div>
            </div>
          )}

          {(incoterm==="EXW"||incoterm==="CIF")&&(
            <div style={{padding:12,background:T.borderLight,borderRadius:8}}>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>配送料金（USD）</div>
              <input type="number" value={manualShippingCost} onChange={e=>setManualShippingCost(e.target.value)} placeholder="0.00" step="0.01" style={{width:"100%",maxWidth:120,padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
            </div>
          )}

          <div style={{padding:12,background:T.borderLight,borderRadius:8}}>
            <div style={{fontSize:11,fontWeight:700,color:T.primary,marginBottom:8}}>為替レート</div>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>USD/JPY</div>
              <input type="number" value={jpy_rate} onChange={e=>setJpyRate(parseFloat(e.target.value)||150)} step="0.1" style={{width:"100%",maxWidth:120,padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
            </div>
          </div>

          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>window.history.back()} style={{flex:1,padding:10,background:T.bg,color:T.sub,border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← 戻る</button>
            <button onClick={()=>setStep(mode==="invoice"?4:4)} style={{flex:1,padding:10,background:T.accent||"#2d8cf0",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>次へ →</button>
          </div>
        </div>
      )}

      {/* Step 4: Invoice Currency (Invoice only) */}
      {mode==="invoice"&&step===4&&(
        <div style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:8,borderBottom:`1px solid ${T.border}`,marginBottom:4}}>
            <div style={{width:28,height:28,borderRadius:8,background:"#a855f715",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#a855f7" strokeWidth="1.3"/><text x="8" y="11" textAnchor="middle" fill="#a855f7" fontSize="8" fontWeight="700">$</text></svg></div>
            <span style={{fontSize:12,fontWeight:700,color:T.text}}>通貨設定</span>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.primary,marginBottom:8}}>通貨</div>
            <select value={currency} onChange={e=>setCurrency(e.target.value)} style={{width:"100%",maxWidth:300,padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}>
              <option value="USD">USD</option>
              <option value="JPY">JPY</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
              <option value="CAD">CAD</option>
              <option value="AUD">AUD</option>
            </select>
          </div>

          {currency!=="USD"&&(
            <div style={{padding:12,background:T.borderLight,borderRadius:8}}>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>JPY → {currency} 為替レート</div>
              <input type="number" value={currencyRateEditable} onChange={e=>{setCurrencyRateEditable(e.target.value);setCurrencyRate(parseFloat(e.target.value)||1)}} step="0.001" style={{width:"100%",maxWidth:150,padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/>
              <div style={{fontSize:9,color:T.muted,marginTop:4}}>現在: 1 JPY = {currencyRate.toFixed(6)} {currency}</div>
            </div>
          )}

          {bankDetails&&(
            <div style={{padding:12,background:T.borderLight,borderRadius:8,fontSize:10}}>
              <div style={{fontWeight:700,marginBottom:6}}>銀行情報 ({currency})</div>
              <div style={{color:T.muted,lineHeight:1.6}}>
                {bankDetails.bank_name}<br/>
                {bankDetails.account_number}<br/>
                {bankDetails.swift_code}
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>window.history.back()} style={{flex:1,padding:10,background:T.bg,color:T.sub,border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← 戻る</button>
            <button onClick={()=>setStep(5)} style={{flex:1,padding:10,background:T.accent||"#2d8cf0",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>次へ →</button>
          </div>
        </div>
      )}

      {/* Step 5: Summary & Output */}
      {step===(mode==="invoice"?5:4)&&(

                  ))}

              </thead>
              <tbody>
                {docItems.map((item,i)=>{
                  const amt=item.selling_price*item.quantity;
                  const costUsd=(item.cost_price||0)/jpy_rate;
                  const profit=(item.selling_price-costUsd)*item.quantity;
                  const margin=amt>0?(profit/amt)*100:0;
                  const costTaxIncl=Math.round((item.cost_price||0)*1.1);
                  const priceJpy=Math.round(item.selling_price*jpy_rate);
                  const salesTotal=Math.round(item.selling_price*item.quantity*jpy_rate);
                  const profitJpy=Math.round(profit*jpy_rate);
                  const csWarn=item.case_quantity>0&&item.quantity%item.case_quantity!==0;
                  const marginColor=margin>=20?"#16a34a":margin>=10?"#f59e0b":"#dc2626";
                  return(
                    <tr key={i} style={{borderBottom:`1px solid ${T.border}`,background:i%2===0?"transparent":T.bg}}>

                      <td style={{padding:"6px 4px",textAlign:"center",fontSize:10,color:T.sub}}>{item.case_quantity>0?item.case_quantity+"pcs":"-"}{csWarn?<span title={"数量がCS入数("+item.case_quantity+")の倍数ではありません"} style={{color:"#f59e0b",marginLeft:2,cursor:"help"}}>⚠</span>:null}</td>

                      <td style={{padding:"6px 4px",textAlign:"center",fontSize:10,color:T.sub}}>{item.price_break_qty>0?item.price_break_qty:"-"}</td>
                      <td style={{padding:"6px 4px",textAlign:"center",fontSize:10,color:T.text}}>¥{costTaxIncl.toLocaleString()}</td>
                      <td style={{padding:"3px 2px",textAlign:"center"}}><input type="number" value={parseFloat(margin.toFixed(1))} onChange={e=>{const v=parseFloat(e.target.value);if(!isNaN(v)&&v<100)updateMargin(i,v)}} step="0.1" style={{width:52,padding:"4px",border:`1px solid ${marginColor}40`,borderRadius:4,fontSize:11,textAlign:"center",fontFamily:"inherit",background:marginColor+"08",color:marginColor,fontWeight:700}}/></td>
                      <td style={{padding:"3px 2px",textAlign:"center"}}><input type="number" value={item.quantity} onChange={e=>updateItem(i,"quantity",e.target.value)} min="1" style={{width:48,padding:"4px",border:`1px solid ${T.border}`,borderRadius:4,fontSize:11,textAlign:"center",fontFamily:"inherit",background:T.bg}}/></td>
                      <td style={{padding:"6px 4px",textAlign:"center",fontSize:10,color:T.text}}>¥{priceJpy.toLocaleString()}</td>
                      <td style={{padding:"3px 2px",textAlign:"center"}}><input type="number" value={item.selling_price} onChange={e=>updateItem(i,"selling_price",e.target.value)} step="0.01" style={{width:64,padding:"4px",border:`1px solid ${T.border}`,borderRadius:4,fontSize:11,textAlign:"center",fontFamily:"inherit",background:T.bg}}/></td>
                      <td style={{padding:"6px 4px",textAlign:"right",fontSize:10,fontWeight:600,color:T.text}}>¥{salesTotal.toLocaleString()}</td>
                      <td style={{padding:"6px 4px",textAlign:"right",fontSize:10,fontWeight:600,color:profitJpy>=0?"#16a34a":"#dc2626"}}>¥{profitJpy.toLocaleString()}</td>
                      <td style={{padding:"3px 2px",textAlign:"center"}}><button onClick={()=>removeItem(i)} style={{background:"none",border:"none",fontSize:11,cursor:"pointer",color:T.muted,padding:2}} title="削除">✕</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Totals Summary */}
          <div style={{padding:14,background:T.bg,border:`1px solid ${T.border}`,borderRadius:8}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,fontSize:12}}>
              <div style={{color:T.sub,fontWeight:600}}>小計(USD): <span style={{color:T.text}}>${subtotal.toFixed(2)}</span></div>
              <div style={{color:T.sub,fontWeight:600}}>配送料(USD): <span style={{color:T.text}}>${shippingCost.toFixed(2)}</span></div>
              <div style={{fontSize:14,fontWeight:700,color:T.text}}>合計({currency}): {currency==="USD"?"$":currency==="JPY"?"¥":""}{grand.toFixed(currency==="JPY"?0:2)}</div>
              <div style={{color:T.sub,fontWeight:600}}>売上合計(JPY): <span style={{color:T.text}}>¥{Math.round(subtotal*jpy_rate).toLocaleString()}</span></div>
              <div style={{fontWeight:700,color:overallMarginPct>=20?"#16a34a":overallMarginPct>=10?"#f59e0b":"#dc2626"}}>利益合計(USD): ${totalProfit.toFixed(2)} ({overallMarginPct.toFixed(1)}%)</div>
              <div style={{fontWeight:700,color:overallMarginPct>=20?"#16a34a":overallMarginPct>=10?"#f59e0b":"#dc2626"}}>利益合計(JPY): ¥{Math.round(totalProfit*jpy_rate).toLocaleString()}</div>
              <div style={{fontSize:10,color:T.muted}}>総重量: {totalWeight.toFixed(2)} kg</div>
              <div style={{fontSize:10,color:T.muted}}>商品数: {docItems.length}種 / {docItems.reduce((s,i)=>s+i.quantity,0)}個</div>
              <div style={{fontSize:10,color:T.muted}}>原価合計(JPY): ¥{totalCostJpy.toLocaleString()}</div>
            </div>
          </div>

          <div>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>備考</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="特記事項、配送条件など" style={{width:"100%",padding:10,border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit",minHeight:80,resize:"none"}}/>
          </div>

          {saveErr&&<div style={{padding:10,background:T.red+"15",color:T.red,borderRadius:6,fontSize:11,fontWeight:600}}>{saveErr}</div>}

          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>window.history.back()} style={{flex:1,padding:10,background:T.bg,color:T.sub,border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← 戻る</button>
            <button onClick={generateExcel} style={{flex:1,padding:10,background:T.accent||"#2d8cf0",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>📥 Excel</button>
            <button onClick={saveDocument} disabled={saving} style={{flex:1,padding:10,background:saving?"#ccc":T.green||"#22c55e",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:saving?"default":"pointer",fontFamily:"inherit"}}>
              {saving?"保存中...":"✓ 保存+Excel"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function OrderManagementPage({client,user,accounts,deals}){
const IS_MOBILE=window.innerWidth<768;
const[items,setItems]=useState([]);
const[statuses,setStatuses]=useState([]);
const[loading,setLoading]=useState(true);
const[filterStatus,setFilterStatus]=useState("all");
const[filterSupplier,setFilterSupplier]=useState("all");
const[filterAccount,setFilterAccount]=useState("all");
const[searchText,setSearchText]=useState("");
const[showStatusEditor,setShowStatusEditor]=useState(false);
const[newStatusLabel,setNewStatusLabel]=useState("");
const[newStatusColor,setNewStatusColor]=useState("#999999");

const STATUS_COLORS={pending:"#9ca3af",ordered:"#22c55e",paid:"#a855f7",shipping:"#3b82f6",gs_arrived:"#f59e0b",ub_arrived:"#f59e0b",sg_arrived:"#ec4899",packed:"#06b6d4",shipped:"#f97316",koike:"#f43f5e",delivered:"#14b8a6"};

const loadData=useCallback(async()=>{
  if(!client)return;
  const[{data:orderData},{data:statusData}]=await Promise.all([
    client.from("order_items").select("*").order("created_at",{ascending:false}),
    client.from("order_statuses").select("*").order("sort_order")
  ]);
  setItems(orderData||[]);
  setStatuses(statusData||[]);
  setLoading(false);
},[client]);

useEffect(()=>{loadData()},[loadData]);

const updateField=async(id,field,value)=>{
  const update={[field]:value};
  await client.from("order_items").update(update).eq("id",id);
  setItems(prev=>prev.map(it=>it.id===id?{...it,[field]:value}:it));
};

const addCustomStatus=async()=>{
  if(!newStatusLabel.trim())return;
  const id=newStatusLabel.trim().toLowerCase().replace(/[^a-z0-9]/g,"_");
  const maxSort=statuses.reduce((m,s)=>Math.max(m,s.sort_order),0);
  const{error}=await client.from("order_statuses").insert([{id,label:newStatusLabel.trim(),color:newStatusColor,sort_order:maxSort+1,created_by:user?.id}]);
  if(!error){
    setStatuses(prev=>[...prev,{id,label:newStatusLabel.trim(),color:newStatusColor,sort_order:maxSort+1}]);
    setNewStatusLabel("");setNewStatusColor("#999999");
  }
};

const deleteItem=async(id)=>{
  await client.from("order_items").delete().eq("id",id);
  setItems(prev=>prev.filter(it=>it.id!==id));
};

const statusMap=useMemo(()=>{
  const m={};statuses.forEach(s=>{m[s.id]=s});return m;
},[statuses]);

const suppliers=useMemo(()=>[...new Set(items.map(i=>i.supplier).filter(Boolean))].sort(),[items]);
const accountIds=useMemo(()=>[...new Set(items.map(i=>i.account_id).filter(Boolean))],[items]);
const accountMap=useMemo(()=>{const m={};(accounts||[]).forEach(a=>{m[a.id]=a.name});return m},[accounts]);

const filtered=useMemo(()=>{
  let f=items;
  if(filterStatus!=="all")f=f.filter(i=>i.status===filterStatus);
  if(filterSupplier!=="all")f=f.filter(i=>i.supplier===filterSupplier);
  if(filterAccount!=="all")f=f.filter(i=>i.account_id===filterAccount);
  if(searchText.trim()){
    const q=searchText.toLowerCase();
    f=f.filter(i=>(i.name_en||"").toLowerCase().includes(q)||(i.jan||"").includes(q)||(i.notes||"").toLowerCase().includes(q));
  }
  return f;
},[items,filterStatus,filterSupplier,filterAccount,searchText]);

const statusCounts=useMemo(()=>{
  const c={};statuses.forEach(s=>{c[s.id]=0});
  items.forEach(i=>{if(c[i.status]!==undefined)c[i.status]++;});
  return c;
},[items,statuses]);

const totalCost=useMemo(()=>filtered.reduce((s,i)=>{
  const cp=i.cost_price||0;return s+Math.round(cp*1.1*i.quantity);
},0),[filtered]);

if(loading)return React.createElement("div",{style:{padding:40,textAlign:"center",color:T.muted}},"読み込み中...");

  // Header

    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
      React.createElement("div",{style:{width:32,height:32,borderRadius:8,background:(T.accent||"#2d8cf0")+"15",display:"flex",alignItems:"center",justifyContent:"center"}},
        React.createElement("svg",{width:16,height:16,viewBox:"0 0 16 16",fill:"none"},
          React.createElement("path",{d:"M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4z",stroke:T.accent||"#2d8cf0",strokeWidth:"1.3"}),
          React.createElement("path",{d:"M2 4l2-2h8l2 2",stroke:T.accent||"#2d8cf0",strokeWidth:"1.2"}),
          React.createElement("path",{d:"M6 7h4",stroke:T.accent||"#2d8cf0",strokeWidth:"1.2",strokeLinecap:"round"})
        )

            ),

            ),

            // 下代(税込)

        filtered.length===0&&React.createElement("tr",null,React.createElement("td",{colSpan:15,style:{padding:20,textAlign:"center",color:T.muted,fontSize:12}},"発注アイテムがありません"))
      )
    )
  )
);
}


// ── Delivery Note Builder (納品書作成) ──
function DeliveryNoteBuilder({client,user,accounts,contacts,deals,onBack}){
const IS_MOBILE=window.innerWidth<768;
const[step,_setStep]=useState(1);
const setStep=(s)=>{_setStep(s);window.history.pushState({_gs:true,view:"deliveryBuilder",step:s},"")};
useEffect(()=>{
  window.history.pushState({_gs:true,view:"deliveryBuilder",step:1},"");
  const h=(e)=>{const st=e.state;if(st&&st._gs&&st.view==="deliveryBuilder")_setStep(st.step);else if(st&&st._gs&&st.view==="docPage")onBack?.()};
  window.addEventListener("popstate",h);return()=>window.removeEventListener("popstate",h);
},[]);

// Client state
const[selectedAccount,setSelectedAccount]=useState(null);
const[selectedContact,setSelectedContact]=useState(null);
const[clientInfo,setClientInfo]=useState({companyName:"",address:"",contactPerson:"",email:"",phone:""});
const[acctSearch,setAcctSearch]=useState("");
const[acctDropOpen,setAcctDropOpen]=useState(false);
const acctDropRef=useRef(null);

// Items state
const[items,setItems]=useState([]);
const[inputMode,setInputMode]=useState("search"); // "search"|"text"|"ai"
const[searchInput,setSearchInput]=useState("");
const[searchResults,setSearchResults]=useState([]);
const[searching,setSearching]=useState(false);
const[textInput,setTextInput]=useState("");
const[parsing,setParsing]=useState(false);
const[parseLog,setParseLog]=useState([]);

// AI state
const[aiMessages,setAiMessages]=useState([{role:"ai",text:"発注書ファイル（Excel/PDF）をアップロードするか、テキストを貼り付けてください。商品と数量を自動解析します。"}]);
const[aiInput,setAiInput]=useState("");
const[aiProcessing,setAiProcessing]=useState(false);
const[aiPendingItems,setAiPendingItems]=useState(null);
const[dragOver,setDragOver]=useState(false);
const aiFileRef=useRef(null);
const aiChatEndRef=useRef(null);

// BOX state
const[boxes,setBoxes]=useState([{id:1,name:"BOX 1",itemIndices:[]}]);
const[nextBoxId,setNextBoxId]=useState(2);

// Output state
const[outputLang,setOutputLang]=useState("en"); // "en"|"ja"
const[outputFormat,setOutputFormat]=useState("excel"); // "excel"|"pdf"
const[generating,setGenerating]=useState(false);

const searchTimer=useRef(null);

// Dropdown close
useEffect(()=>{
  const h=(e)=>{if(acctDropRef.current&&!acctDropRef.current.contains(e.target))setAcctDropOpen(false)};
  document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
},[]);

const filteredAccounts=useMemo(()=>{
  if(!acctSearch)return(accounts||[]).slice(0,20);
  const q=acctSearch.toLowerCase();
  return(accounts||[]).filter(a=>a.name?.toLowerCase().includes(q)).slice(0,20);
},[accounts,acctSearch]);

const handleSelectAccount=(acc)=>{
  setSelectedAccount(acc);
  setClientInfo({companyName:acc.name||"",address:acc.address||"",contactPerson:"",email:"",phone:acc.phone||""});
  setSelectedContact(null);
};

// Product search
const handleSearch=useCallback(async()=>{
  if(!searchInput.trim()||!client){setSearchResults([]);return}
  setSearching(true);
  try{
    const q=`%${searchInput}%`;
    const{data}=await client.from("product_master").select("*").or(`name_ja.ilike.${q},name_en.ilike.${q},jan.ilike.${q},brand.ilike.${q}`).limit(10);
    setSearchResults(data||[]);
  }catch(e){console.error(e)}
  setSearching(false);
},[searchInput,client]);

useEffect(()=>{
  if(searchTimer.current)clearTimeout(searchTimer.current);
  if(searchInput.trim())searchTimer.current=setTimeout(handleSearch,400);
  else setSearchResults([]);
  return()=>{if(searchTimer.current)clearTimeout(searchTimer.current)};
},[searchInput]);

const addProduct=(p,qty)=>{
  setItems(prev=>[...prev,{product_id:p.id,jan:p.jan,name_en:p.name_en||p.name_ja||"",name_ja:p.name_ja||"",quantity:qty||1,ingredients_en:p.ingredients_en||"",weight_g:p.weight_g||0,case_quantity:p.case_quantity||0,brand:p.brand||""}]);
  setSearchInput("");setSearchResults([]);
};

// Text parse (JAN + qty)
const parseText=async()=>{
  if(!textInput.trim()||!client)return;
  setParsing(true);setParseLog([]);
  const log=[];const lines=textInput.trim().split(/\n/).filter(l=>l.trim());
  const newItems=[];
  for(const line of lines){
    const parts=line.trim().split(/[\s\t,;×x]+/i).filter(Boolean);
    if(parts.length===0)continue;
    let jan=parts[0].replace(/\.0$/,"").replace(/[^\d]/g,"");
    let qty=parts.length>1?parseInt(parts[parts.length-1])||1:1;
    if(jan.length>=8){
      const{data}=await client.from("product_master").select("*").eq("jan",jan).limit(1);
      if(data&&data[0]){
        newItems.push({product_id:data[0].id,jan:data[0].jan,name_en:data[0].name_en||data[0].name_ja||"",name_ja:data[0].name_ja||"",quantity:qty,ingredients_en:data[0].ingredients_en||"",weight_g:data[0].weight_g||0,case_quantity:data[0].case_quantity||0,brand:data[0].brand||""});
        log.push({text:`✓ ${jan} → ${data[0].name_en||data[0].name_ja} × ${qty}`,ok:true});
      }else{
        log.push({text:`✗ ${jan} — 商品が見つかりません`,ok:false});
      }
    }else{
      // Try name search
      const{data}=await client.from("product_master").select("*").or(`name_en.ilike.%${parts[0]}%,name_ja.ilike.%${parts[0]}%`).limit(1);
      if(data&&data[0]){
        newItems.push({product_id:data[0].id,jan:data[0].jan,name_en:data[0].name_en||data[0].name_ja||"",name_ja:data[0].name_ja||"",quantity:qty,ingredients_en:data[0].ingredients_en||"",weight_g:data[0].weight_g||0,case_quantity:data[0].case_quantity||0,brand:data[0].brand||""});
        log.push({text:`✓ ${parts[0]} → ${data[0].name_en||data[0].name_ja} × ${qty}`,ok:true});
      }else{
        log.push({text:`✗ ${line.trim()} — 見つかりません`,ok:false});
      }
    }
  }
  if(newItems.length>0)setItems(prev=>[...prev,...newItems]);
  setParseLog(log);setParsing(false);
};

// GS-AI file handling (reuse same pattern as QuotationInvoiceBuilder)
const handleAiFile=async(file)=>{
  if(!file)return;
  if(file.size>10*1024*1024){setAiMessages(prev=>[...prev,{role:"ai",text:"⚠️ ファイルサイズが10MBを超えています。"}]);return}
  const ext=file.name.split(".").pop().toLowerCase();
  setAiMessages(prev=>[...prev,{role:"user",text:`📎 ${file.name}`}]);
  if(ext==="csv"||ext==="tsv"){
    const text=await file.text();
    await handleAiSubmit(text,null,null);
  }else if(ext==="xlsx"||ext==="xls"){
    if(!window.XLSX){const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";document.head.appendChild(s);await new Promise(r=>s.onload=r)}
    const buf=await file.arrayBuffer();const wb=window.XLSX.read(buf,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];const csvText=window.XLSX.utils.sheet_to_csv(ws);
    await handleAiSubmit(`ファイル名: ${file.name}\n\n${csvText}`,null,null);
  }else if(["pdf","png","jpg","jpeg"].includes(ext)){
    const buf=await file.arrayBuffer();const b64=btoa(new Uint8Array(buf).reduce((d,b)=>d+String.fromCharCode(b),""));
    const mimeMap={pdf:"application/pdf",png:"image/png",jpg:"image/jpeg",jpeg:"image/jpeg"};
    await handleAiSubmit(null,b64,mimeMap[ext]);
  }else{setAiMessages(prev=>[...prev,{role:"ai",text:`⚠️ 未対応の形式: .${ext}\n対応: xlsx, csv, tsv, pdf, png, jpg`}])}
};

const handleAiSubmit=async(text,fileBase64,fileType)=>{
  if(!text&&!fileBase64)return;
  if(text&&!fileBase64)setAiMessages(prev=>[...prev,{role:"user",text:text.substring(0,200)+(text.length>200?"...":"")}]);
  setAiProcessing(true);
  try{
    const{data:cfg}=await client.from("company_settings").select("value").eq("key","receipt_ocr_config").single();
    const apiKey=cfg?.value?.api_key;
    if(!apiKey)throw new Error("APIキー未設定");
    const{data:prods}=await client.from("product_master").select("jan,name_en,brand").limit(200);
    const hints=(prods||[]).map(p=>`${p.jan} | ${p.name_en} | ${p.brand}`).join("\n");
    const res=await fetch("https://yzwrumeukjidsguixqxr.supabase.co/functions/v1/order-parse",{
      method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${(await client.auth.getSession()).data.session.access_token}`},
      body:JSON.stringify({text,file_base64:fileBase64,file_type:fileType,api_key:apiKey,product_hints:hints})
    });
    const result=await res.json();
    if(result.error)throw new Error(result.error);
    if(result.items&&result.items.length>0){
      // Resolve items
      const resolved=[];
      for(const ri of result.items){
        const jan=(ri.jan||"").replace(/\.0$/,"").replace(/[^\d]/g,"");
        if(jan.length>=8){
          const{data}=await client.from("product_master").select("*").eq("jan",jan).limit(1);
          if(data&&data[0]){resolved.push({product_id:data[0].id,jan:data[0].jan,name_en:data[0].name_en||"",name_ja:data[0].name_ja||"",quantity:ri.quantity||1,ingredients_en:data[0].ingredients_en||"",weight_g:data[0].weight_g||0,case_quantity:data[0].case_quantity||0,brand:data[0].brand||""});continue}
        }
        if(ri.name){
          const{data}=await client.from("product_master").select("*").or(`name_en.ilike.%${ri.name}%,name_ja.ilike.%${ri.name}%`).limit(1);
          if(data&&data[0]){resolved.push({product_id:data[0].id,jan:data[0].jan,name_en:data[0].name_en||"",name_ja:data[0].name_ja||"",quantity:ri.quantity||1,ingredients_en:data[0].ingredients_en||"",weight_g:data[0].weight_g||0,case_quantity:data[0].case_quantity||0,brand:data[0].brand||""});continue}
        }
        resolved.push({product_id:null,jan:ri.jan||"",name_en:ri.name||"",name_ja:"",quantity:ri.quantity||1,ingredients_en:"",weight_g:0,case_quantity:0,brand:""});
      }
      setAiPendingItems(resolved);
      setAiMessages(prev=>[...prev,{role:"ai",text:`${resolved.length}件の商品を解析しました。追加しますか？`}]);
    }else{
      setAiMessages(prev=>[...prev,{role:"ai",text:"商品を検出できませんでした。別のフォーマットで試してください。"}]);
    }
  }catch(err){setAiMessages(prev=>[...prev,{role:"ai",text:`エラー: ${err.message}`}])}
  setAiProcessing(false);
};

useEffect(()=>{aiChatEndRef.current?.scrollIntoView({behavior:"smooth"})},[aiMessages]);

// BOX management
const addBox=()=>{setBoxes(prev=>[...prev,{id:nextBoxId,name:`BOX ${nextBoxId}`,itemIndices:[]}]);setNextBoxId(p=>p+1)};
const removeBox=(boxId)=>{if(boxes.length<=1)return;setBoxes(prev=>{const box=prev.find(b=>b.id===boxId);const freed=box?box.itemIndices:[];return prev.filter(b=>b.id!==boxId)})};
const assignToBox=(boxId,itemIdx)=>{
  setBoxes(prev=>prev.map(b=>({...b,itemIndices:b.id===boxId?[...new Set([...b.itemIndices,itemIdx])]:b.itemIndices.filter(i=>i!==itemIdx)})));
};
const removeFromBox=(boxId,itemIdx)=>{
  setBoxes(prev=>prev.map(b=>b.id===boxId?{...b,itemIndices:b.itemIndices.filter(i=>i!==itemIdx)}:b));
};
const unassignedIndices=useMemo(()=>{
  const assigned=new Set(boxes.flatMap(b=>b.itemIndices));
  return items.map((_,i)=>i).filter(i=>!assigned.has(i));
},[items,boxes]);

const autoAssign=()=>{
  if(items.length===0)return;
  const perBox=Math.ceil(items.length/boxes.length);
  setBoxes(prev=>prev.map((b,bi)=>({...b,itemIndices:items.map((_,i)=>i).slice(bi*perBox,Math.min((bi+1)*perBox,items.length))})));
};

// Generate Delivery Note
const generateDeliveryNote=async()=>{
  if(items.length===0){alert("商品を追加してください。");return}
  setGenerating(true);
  try{
    if(!window.ExcelJS){const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js";document.head.appendChild(s);await new Promise(r=>s.onload=r)}
    const wb=new window.ExcelJS.Workbook();
    const isEn=outputLang==="en";
    const borderThin={top:{style:"thin"},left:{style:"thin"},bottom:{style:"thin"},right:{style:"thin"}};
    const hdrFill={type:"pattern",pattern:"solid",fgColor:{argb:"FF1a1a1a"}};
    const hdrFont={color:{argb:"FFFFFFFF"},bold:true,size:9,name:"Arial"};

    // For each BOX, create a packing list sheet + ingredient sheet
    const sortedBoxes=boxes.filter(b=>b.itemIndices.length>0);
    const allInOneBox=sortedBoxes.length===0;
    const effectiveBoxes=allInOneBox?[{id:0,name:"BOX 1",itemIndices:items.map((_,i)=>i)}]:sortedBoxes;

    effectiveBoxes.forEach((box,bi)=>{
      // Packing List sheet
      const sheetName=isEn?`Packing List ${box.name}`:`納品書 ${box.name}`;
      const ws=wb.addWorksheet(sheetName);
      ws.columns=[{width:5},{width:18},{width:28},{width:10},{width:10},{width:12}];

      // Header
      const titleRow=ws.addRow([isEn?"PACKING LIST":"納品書"]);
      titleRow.getCell(1).font={size:18,bold:true,name:"Arial"};
      ws.mergeCells(ws.rowCount,1,ws.rowCount,6);
      ws.addRow([box.name]);
      ws.getRow(ws.rowCount).getCell(1).font={size:12,bold:true,color:{argb:"FF666666"},name:"Arial"};
      ws.addRow([]);

      // Client info
      if(clientInfo.companyName){
        ws.addRow([isEn?"To:":"宛先:",clientInfo.companyName]);
        ws.getRow(ws.rowCount).getCell(1).font={bold:true,size:10,name:"Arial"};
        ws.getRow(ws.rowCount).getCell(2).font={size:10,name:"Arial"};
      }
      if(clientInfo.contactPerson){ws.addRow(["",clientInfo.contactPerson]);ws.getRow(ws.rowCount).getCell(2).font={size:10,name:"Arial"}}
      if(clientInfo.address){ws.addRow(["",clientInfo.address]);ws.getRow(ws.rowCount).getCell(2).font={size:10,name:"Arial"}}
      ws.addRow([]);
      ws.addRow([isEn?"Date:":"日付:",new Date().toLocaleDateString(isEn?"en-US":"ja-JP")]);
      ws.getRow(ws.rowCount).getCell(1).font={bold:true,size:10,name:"Arial"};
      ws.addRow([]);

      // Table header
      const headers=[isEn?"No.":"No.",isEn?"JAN":"JAN",isEn?"Product Name":"商品名",isEn?"Qty":"数量",isEn?"Weight(g)":"重量(g)",isEn?"Brand":"ブランド"];
      const hRow=ws.addRow(headers);
      hRow.eachCell(c=>{c.fill=hdrFill;c.font=hdrFont;c.border=borderThin;c.alignment={horizontal:"center",vertical:"middle"}});

      // Items
      const boxItems=box.itemIndices.map(i=>items[i]).filter(Boolean);
      let totalQty=0,totalWeight=0;
      boxItems.forEach((item,idx)=>{
        const r=ws.addRow([idx+1,item.jan||"",isEn?(item.name_en||item.name_ja):(item.name_ja||item.name_en),item.quantity,item.weight_g||0,item.brand||""]);
        r.eachCell(c=>{c.border=borderThin;c.font={size:10,name:"Arial"};c.alignment={vertical:"middle"}});
        r.getCell(1).alignment={horizontal:"center"};
        r.getCell(4).alignment={horizontal:"center"};
        r.getCell(5).alignment={horizontal:"center"};
        if(idx%2===0){r.eachCell(c=>{c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF5F5F5"}}})}
        totalQty+=item.quantity;totalWeight+=(item.weight_g||0)*item.quantity;
      });

      // Total row
      ws.addRow([]);
      const totRow=ws.addRow(["","",(isEn?"Total":"合計"),totalQty,(totalWeight/1000).toFixed(2)+"kg",""]);
      totRow.eachCell(c=>{c.font={size:10,bold:true,name:"Arial"};c.border={top:{style:"double"}}});

      // Ingredients sheet for this box
      const ingredientItems=boxItems.filter(it=>it.ingredients_en&&it.ingredients_en.trim());
      if(ingredientItems.length>0){
        const iSheetName=isEn?`Ingredients ${box.name}`:`成分表 ${box.name}`;
        const iws=wb.addWorksheet(iSheetName);
        iws.columns=[{width:5},{width:22},{width:60}];
        const iTitleRow=iws.addRow([isEn?"INGREDIENT LIST":"成分表"]);
        iTitleRow.getCell(1).font={size:16,bold:true,name:"Arial"};
        iws.mergeCells(1,1,1,3);
        iws.addRow([box.name]);
        iws.getRow(iws.rowCount).getCell(1).font={size:11,bold:true,color:{argb:"FF666666"},name:"Arial"};
        iws.addRow([]);
        const iHRow=iws.addRow([isEn?"No.":"No.",isEn?"Product":"商品名",isEn?"Ingredients":"成分"]);
        iHRow.eachCell(c=>{c.fill=hdrFill;c.font=hdrFont;c.border=borderThin;c.alignment={horizontal:"center",vertical:"middle"}});
        ingredientItems.forEach((item,idx)=>{
          const r=iws.addRow([idx+1,isEn?(item.name_en||item.name_ja):(item.name_ja||item.name_en),item.ingredients_en]);
          r.eachCell(c=>{c.border=borderThin;c.font={size:9,name:"Arial"};c.alignment={vertical:"top",wrapText:true}});
          r.getCell(1).alignment={horizontal:"center",vertical:"top"};
          if(idx%2===0)r.eachCell(c=>{c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF9F9F9"}}});
          r.height=Math.max(20,Math.ceil((item.ingredients_en||"").length/80)*14);
        });
      }
    });

    // Download
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`PackingList_${clientInfo.companyName||"delivery"}_${new Date().toISOString().split("T")[0]}.xlsx`;
    a.click();URL.revokeObjectURL(url);
  }catch(err){alert("生成エラー: "+err.message)}
  setGenerating(false);
};

const stepLabels=["取引先","商品入力","BOX分け","出力"];

return(
<div style={{padding:IS_MOBILE?8:16,background:T.bg,minHeight:"100%",display:"flex",flexDirection:"column",gap:12}}>
