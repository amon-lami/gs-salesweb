          <div style={{display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>
            <div style={{width:20,height:20,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,background:done?T.accent||"#2d8cf0":active?T.accent||"#2d8cf0":"transparent",color:done||active?"#fff":T.muted,border:`2px solid ${done||active?T.accent||"#2d8cf0":T.border}`}}>{done?"✓":s}</div>
            {!IS_MOBILE&&<span style={{fontSize:10,fontWeight:active?700:500,color:active?T.accent||"#2d8cf0":done?T.text:T.muted}}>{l}</span>}
          </div>
        </React.Fragment>
      )})}
    </div>
  </div>

  {/* Step 1: Client Info */}
  {step===1&&(
    <div style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:8,borderBottom:`1px solid ${T.border}`,marginBottom:4}}>
        <div style={{width:28,height:28,borderRadius:8,background:(T.accent||"#2d8cf0")+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke={T.accent||"#2d8cf0"} strokeWidth="1.3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke={T.accent||"#2d8cf0"} strokeWidth="1.3" strokeLinecap="round"/></svg></div>
        <span style={{fontSize:12,fontWeight:700,color:T.text}}>取引先情報</span>
      </div>
      <div ref={acctDropRef} style={{position:"relative"}}>
        <div style={{fontSize:10,fontWeight:700,color:T.sub,marginBottom:4}}>取引先</div>
        <input value={acctDropOpen?acctSearch:(selectedAccount?.name||"")} onChange={e=>{setAcctSearch(e.target.value);setAcctDropOpen(true)}} onFocus={()=>{setAcctSearch("");setAcctDropOpen(true)}} placeholder="取引先名を検索..." style={{width:"100%",padding:"8px 10px",border:`1px solid ${acctDropOpen?T.primary:T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit",boxSizing:"border-box"}}/>
        {selectedAccount&&!acctDropOpen&&<button onClick={()=>{setSelectedAccount(null);setClientInfo({companyName:"",address:"",contactPerson:"",email:"",phone:""})}} style={{position:"absolute",right:8,top:22,background:"none",border:"none",fontSize:14,cursor:"pointer",color:T.muted}}>✕</button>}
        {acctDropOpen&&<div style={{position:"absolute",top:"100%",left:0,right:0,maxHeight:200,overflowY:"auto",background:T.card,border:`1px solid ${T.border}`,borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,.1)",zIndex:50,marginTop:2}}>
          {filteredAccounts.length===0&&<div style={{padding:10,fontSize:11,color:T.muted,textAlign:"center"}}>該当なし</div>}
          {filteredAccounts.map(a=><div key={a.id} onClick={()=>{handleSelectAccount(a);setAcctDropOpen(false);setAcctSearch("")}} style={{padding:"8px 12px",fontSize:11,cursor:"pointer",borderBottom:`1px solid ${T.border}22`}} onMouseEnter={e=>e.currentTarget.style.background=T.primary+"10"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{a.name}</div>)}
        </div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:IS_MOBILE?"1fr":"1fr 1fr",gap:8}}>
        <div><div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>会社名</div><input value={clientInfo.companyName} onChange={e=>setClientInfo(p=>({...p,companyName:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/></div>
        <div><div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>担当者</div><input value={clientInfo.contactPerson} onChange={e=>setClientInfo(p=>({...p,contactPerson:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/></div>
        <div><div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>住所</div><input value={clientInfo.address} onChange={e=>setClientInfo(p=>({...p,address:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/></div>
        <div><div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:4}}>メール</div><input value={clientInfo.email} onChange={e=>setClientInfo(p=>({...p,email:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit"}}/></div>
      </div>
      <button onClick={()=>setStep(2)} style={{padding:10,background:T.accent||"#2d8cf0",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>次へ →</button>
    </div>
  )}

  {/* Step 2: Product Input */}
  {step===2&&(
    <div style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:8,borderBottom:`1px solid ${T.border}`,marginBottom:4}}>
        <div style={{width:28,height:28,borderRadius:8,background:(T.green||"#22c55e")+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke={T.green||"#22c55e"} strokeWidth="1.3"/><path d="M5 8h6M8 5v6" stroke={T.green||"#22c55e"} strokeWidth="1.3" strokeLinecap="round"/></svg></div>
        <span style={{fontSize:12,fontWeight:700,color:T.text}}>商品入力</span>
      </div>
      {/* Mode tabs */}
      <div style={{display:"flex",gap:4}}>
        {[{id:"search",label:"🔍 商品検索"},{id:"text",label:"📝 テキスト"},{id:"ai",label:"🤖 GS-AI"}].map(m=>(
          <button key={m.id} onClick={()=>setInputMode(m.id)} style={{flex:1,padding:"6px 8px",borderRadius:8,border:`1px solid ${inputMode===m.id?T.accent||"#2d8cf0":T.border}`,background:inputMode===m.id?(T.accent||"#2d8cf0")+"12":"transparent",color:inputMode===m.id?T.accent||"#2d8cf0":T.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{m.label}</button>
        ))}
      </div>

      {/* Search mode */}
      {inputMode==="search"&&<div>
        <input value={searchInput} onChange={e=>setSearchInput(e.target.value)} placeholder="商品名 / JAN / ブランドで検索..." style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit",marginBottom:8,boxSizing:"border-box"}}/>
        {searching&&<div style={{fontSize:10,color:T.muted}}>検索中...</div>}
        {searchResults.map(p=>(
          <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 8px",borderBottom:`1px solid ${T.border}`,fontSize:11}}>
            <div><span style={{fontWeight:600,color:T.text}}>{p.name_en||p.name_ja}</span><span style={{color:T.muted,marginLeft:6,fontSize:10}}>{p.jan}</span></div>
            <button onClick={()=>addProduct(p,1)} style={{padding:"3px 10px",borderRadius:4,border:"none",background:T.primary,color:"#fff",fontSize:10,fontWeight:600,cursor:"pointer"}}>+追加</button>
          </div>
        ))}
      </div>}

      {/* Text mode */}
      {inputMode==="text"&&<div>
        <textarea value={textInput} onChange={e=>setTextInput(e.target.value)} placeholder={"JAN 数量（1行ずつ）\n例:\n4550516493583 5\n4550516279623 3"} style={{width:"100%",minHeight:120,padding:10,border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={parseText} disabled={parsing} style={{flex:1,padding:8,background:T.primary,color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>{parsing?"解析中...":"解析して追加"}</button>
        </div>
        {parseLog.length>0&&<div style={{marginTop:8,padding:8,background:T.bg,borderRadius:6,maxHeight:150,overflowY:"auto"}}>{parseLog.map((l,i)=><div key={i} style={{fontSize:10,color:l.ok?"#16a34a":"#dc2626",marginBottom:2}}>{l.text}</div>)}</div>}
      </div>}

      {/* AI mode */}
      {inputMode==="ai"&&<div>
        <div style={{border:`2px dashed ${dragOver?T.primary:T.border}`,borderRadius:8,padding:12,minHeight:200,maxHeight:300,overflowY:"auto",background:dragOver?T.primary+"08":T.bg,transition:"all .2s"}}
          onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)handleAiFile(f)}}>
          {aiMessages.map((m,i)=><div key={i} style={{marginBottom:6,padding:"6px 10px",borderRadius:8,background:m.role==="user"?T.primary+"12":T.card,fontSize:11,color:m.role==="user"?T.primary:T.text,maxWidth:"85%",marginLeft:m.role==="user"?"auto":0,wordBreak:"break-word",whiteSpace:"pre-wrap"}}>{m.text}</div>)}
          {aiProcessing&&<div style={{fontSize:10,color:T.muted,padding:6}}>解析中...</div>}
          <div ref={aiChatEndRef}/>
        </div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey&&aiInput.trim()){e.preventDefault();handleAiSubmit(aiInput,null,null);setAiInput("")}}} placeholder="テキストを貼り付け..." style={{flex:1,padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:11,fontFamily:"inherit"}}/>
          <button onClick={()=>{if(aiInput.trim()){handleAiSubmit(aiInput,null,null);setAiInput("")}}} disabled={aiProcessing} style={{padding:"6px 12px",borderRadius:6,border:"none",background:T.primary,color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>送信</button>
          <button onClick={()=>aiFileRef.current?.click()} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${T.border}`,background:T.card,fontSize:13,cursor:"pointer"}}>📎</button>
          <input ref={aiFileRef} type="file" accept=".xlsx,.xls,.csv,.tsv,.pdf,.png,.jpg,.jpeg" onChange={e=>{const f=e.target.files?.[0];if(f)handleAiFile(f);e.target.value=""}} style={{display:"none"}}/>
        </div>
        {aiPendingItems&&<div style={{marginTop:8,display:"flex",gap:6}}>
          <button onClick={()=>{setItems(prev=>[...prev,...aiPendingItems]);setAiPendingItems(null);setAiMessages(prev=>[...prev,{role:"ai",text:`${aiPendingItems.length}件を追加しました。`}])}} style={{flex:1,padding:8,background:T.green||"#22c55e",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>追加する ({aiPendingItems.length}件)</button>
          <button onClick={()=>{setAiPendingItems(null);setAiMessages(prev=>[...prev,{role:"ai",text:"キャンセルしました。"}])}} style={{padding:8,background:T.border,color:T.sub,border:"none",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>やり直す</button>
        </div>}
      </div>}

      {/* Current items list */}
      {items.length>0&&<div>
        <div style={{fontSize:11,fontWeight:700,color:T.sub,marginBottom:6}}>追加済み商品 ({items.length}件)</div>
        <div style={{border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden"}}>
          {items.map((item,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderBottom:`1px solid ${T.border}`,fontSize:11,background:i%2===0?"transparent":T.bg}}>
              <span style={{color:T.muted,fontSize:10,minWidth:30}}>{item.jan}</span>
              <span style={{flex:1,color:T.text,fontWeight:500}}>{item.name_en||item.name_ja}</span>
              <input type="number" value={item.quantity} onChange={e=>{const v=parseInt(e.target.value)||1;setItems(prev=>prev.map((it,idx)=>idx===i?{...it,quantity:v}:it))}} min="1" style={{width:48,padding:"2px 4px",border:`1px solid ${T.border}`,borderRadius:4,fontSize:11,textAlign:"center",fontFamily:"inherit"}}/>
              {item.ingredients_en?<span style={{fontSize:9,color:T.green||"#22c55e"}} title="成分データあり">✓成分</span>:<span style={{fontSize:9,color:T.muted}}>—</span>}
              <button onClick={()=>setItems(prev=>prev.filter((_,idx)=>idx!==i))} style={{background:"none",border:"none",fontSize:12,cursor:"pointer",color:T.muted,padding:0}}>✕</button>
            </div>
          ))}
        </div>
      </div>}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>window.history.back()} style={{flex:1,padding:10,background:T.bg,color:T.sub,border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← 戻る</button>
        <button onClick={()=>{if(items.length===0){alert("商品を追加してください。");return}setStep(3)}} style={{flex:1,padding:10,background:T.accent||"#2d8cf0",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>次へ → BOX分け</button>
      </div>
    </div>
  )}

  {/* Step 3: BOX Grouping */}
  {step===3&&(
    <div style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:8,borderBottom:`1px solid ${T.border}`,marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:(T.orange||"#f59e0b")+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4z" stroke={T.orange||"#f59e0b"} strokeWidth="1.3"/><path d="M2 4l2-2h8l2 2" stroke={T.orange||"#f59e0b"} strokeWidth="1.2"/></svg></div>
          <span style={{fontSize:12,fontWeight:700,color:T.text}}>BOXグルーピング</span>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={autoAssign} style={{padding:"4px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:T.bg,fontSize:10,fontWeight:600,cursor:"pointer",color:T.sub,fontFamily:"inherit"}}>自動振り分け</button>
          <button onClick={addBox} style={{padding:"4px 12px",borderRadius:8,border:"none",background:T.accent||"#2d8cf0",color:"#fff",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ BOX追加</button>
        </div>
      </div>

      {/* Unassigned items */}
      {unassignedIndices.length>0&&<div style={{padding:10,background:T.bg,borderRadius:8,border:`1px dashed ${T.border}`}}>
        <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:6}}>未割当 ({unassignedIndices.length}件)</div>
        {unassignedIndices.map(idx=>{
          const item=items[idx];
          return <div key={idx} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",fontSize:11}}>
            <span style={{flex:1,color:T.text}}>{item.name_en||item.name_ja} ×{item.quantity}</span>
            <select onChange={e=>{if(e.target.value)assignToBox(parseInt(e.target.value),idx);e.target.value=""}} defaultValue="" style={{padding:"2px 6px",border:`1px solid ${T.border}`,borderRadius:4,fontSize:10,fontFamily:"inherit"}}>
              <option value="">→ BOX選択</option>
              {boxes.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
            </select>
          </div>;
        })}
      </div>}

      {/* BOX cards */}
      {boxes.map(box=>(
        <div key={box.id} style={{border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:T.bg}}>
            <input value={box.name} onChange={e=>setBoxes(prev=>prev.map(b=>b.id===box.id?{...b,name:e.target.value}:b))} style={{border:"none",background:"transparent",fontSize:12,fontWeight:700,color:T.text,fontFamily:"inherit"}}/>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:10,color:T.muted}}>{box.itemIndices.length}件</span>
              {boxes.length>1&&<button onClick={()=>removeBox(box.id)} style={{background:"none",border:"none",fontSize:12,cursor:"pointer",color:T.muted}}>✕</button>}
            </div>
          </div>
          {box.itemIndices.length===0&&<div style={{padding:12,textAlign:"center",fontSize:10,color:T.muted}}>商品をここに割り当ててください</div>}
          {box.itemIndices.map(idx=>{
            const item=items[idx];if(!item)return null;
            return <div key={idx} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderTop:`1px solid ${T.border}`,fontSize:11}}>
              <span style={{color:T.muted,fontSize:10,minWidth:30}}>{item.jan}</span>
              <span style={{flex:1,color:T.text}}>{item.name_en||item.name_ja}</span>
              <span style={{color:T.sub,fontSize:10}}>×{item.quantity}</span>
              {item.ingredients_en?<span style={{fontSize:8,color:T.green||"#22c55e",background:(T.green||"#22c55e")+"15",padding:"1px 5px",borderRadius:8}}>成分✓</span>:null}
              <button onClick={()=>removeFromBox(box.id,idx)} style={{background:"none",border:"none",fontSize:10,cursor:"pointer",color:T.muted}}>✕</button>
            </div>;
          })}
        </div>
      ))}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>window.history.back()} style={{flex:1,padding:10,background:T.bg,color:T.sub,border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← 戻る</button>
        <button onClick={()=>setStep(4)} style={{flex:1,padding:10,background:T.accent||"#2d8cf0",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>次へ → 出力</button>
      </div>
    </div>
  )}

  {/* Step 4: Output */}
  {step===4&&(
    <div style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:8,borderBottom:`1px solid ${T.border}`,marginBottom:4}}>
        <div style={{width:28,height:28,borderRadius:8,background:(T.green||"#22c55e")+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-5" stroke={T.green||"#22c55e"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
        <span style={{fontSize:12,fontWeight:700,color:T.text}}>出力設定</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:T.sub,marginBottom:6}}>言語</div>
          <div style={{display:"flex",gap:6}}>
            {[{id:"en",label:"🇺🇸 English"},{id:"ja",label:"🇯🇵 日本語"}].map(l=>(
              <button key={l.id} onClick={()=>setOutputLang(l.id)} style={{flex:1,padding:"8px 12px",borderRadius:8,border:`1px solid ${outputLang===l.id?T.accent||"#2d8cf0":T.border}`,background:outputLang===l.id?(T.accent||"#2d8cf0")+"12":"transparent",color:outputLang===l.id?T.accent||"#2d8cf0":T.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{l.label}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:T.sub,marginBottom:6}}>形式</div>
          <div style={{display:"flex",gap:6}}>
            {[{id:"excel",label:"📊 Excel"},{id:"pdf",label:"📄 PDF"}].map(f=>(
              <button key={f.id} onClick={()=>setOutputFormat(f.id)} style={{flex:1,padding:"8px 12px",borderRadius:8,border:`1px solid ${outputFormat===f.id?T.accent||"#2d8cf0":T.border}`,background:outputFormat===f.id?(T.accent||"#2d8cf0")+"12":"transparent",color:outputFormat===f.id?T.accent||"#2d8cf0":T.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{f.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Preview */}
      <div style={{border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden"}}>
        <div style={{padding:"8px 12px",background:T.bg,fontSize:11,fontWeight:700,color:T.sub}}>プレビュー</div>
        {(boxes.filter(b=>b.itemIndices.length>0).length>0?boxes.filter(b=>b.itemIndices.length>0):[{id:0,name:"BOX 1",itemIndices:items.map((_,i)=>i)}]).map(box=>(
          <div key={box.id} style={{padding:10,borderTop:`1px solid ${T.border}`}}>
            <div style={{fontSize:11,fontWeight:700,color:T.primary,marginBottom:6}}>{box.name} — {box.itemIndices.length}件</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr style={{borderBottom:`1px solid ${T.border}`}}>
                <th style={{textAlign:"left",padding:"4px 6px",color:T.muted,fontWeight:600}}>JAN</th>

                <th style={{textAlign:"center",padding:"4px 6px",color:T.muted,fontWeight:600}}>{outputLang==="en"?"Qty":"数量"}</th>
                <th style={{textAlign:"center",padding:"4px 6px",color:T.muted,fontWeight:600}}>{outputLang==="en"?"Ingredients":"成分"}</th>
              </tr></thead>
              <tbody>{box.itemIndices.map(idx=>{const it=items[idx];if(!it)return null;return(
                <tr key={idx} style={{borderBottom:`1px solid ${T.border}22`}}>
                  <td style={{padding:"4px 6px",color:T.muted}}>{it.jan}</td>

function DocumentListView({client,user,accounts,deals,onBack,onCreateInvoice}){
const IS_MOBILE=window.innerWidth<768;
const[docs,setDocs]=useState([]);
const[loading,setLoading]=useState(true);
const[filterType,setFilterType]=useState("all");
const[searchText,setSearchText]=useState("");
const[syncing,setSyncing]=useState({});

useEffect(()=>{loadDocs()},[]);
const loadDocs=async()=>{
  setLoading(true);
  const{data,error}=await client.from("generated_documents").select("*").order("created_at",{ascending:false}).limit(500);
  if(!error&&data)setDocs(data);
  setLoading(false);
};

const accountMap=useMemo(()=>{
  const m={};(accounts||[]).forEach(a=>m[a.id]=a.name);return m;
},[accounts]);
const dealMap=useMemo(()=>{
  const m={};(deals||[]).forEach(d=>m[d.id]=d);return m;
},[deals]);

const filtered=useMemo(()=>{
  let list=docs;
  if(filterType!=="all")list=list.filter(d=>d.doc_type===filterType);
  if(searchText){const q=searchText.toLowerCase();list=list.filter(d=>{
    const acctName=d.account_id?accountMap[d.account_id]||"":"";
    const dealName=d.deal_id?dealMap[d.deal_id]?.name||"":"";
    return (d.doc_number||"").toLowerCase().includes(q)||acctName.toLowerCase().includes(q)||dealName.toLowerCase().includes(q)||(d.client_info?.companyName||"").toLowerCase().includes(q);
  })}
  return list;
},[docs,filterType,searchText,accountMap,dealMap]);

const syncToOrders=async(doc)=>{
  if(!doc.deal_id){alert("この書類は案件にリンクされていないため、発注に反映できません。");return}
  if(!doc.items||doc.items.length===0){alert("この書類には商品がありません。");return}
  setSyncing(p=>({...p,[doc.id]:true}));
  try{
    // Check existing order items for this document
    const{data:existing}=await client.from("order_items").select("id").eq("document_id",doc.id);
    if(existing&&existing.length>0){
      if(!confirm(`この書類から既に${existing.length}件の発注アイテムが作成されています。追加で作成しますか？`))return setSyncing(p=>({...p,[doc.id]:false}));
    }
    const deal=dealMap[doc.deal_id];
    const orderItems=doc.items.map(item=>({
      deal_id:doc.deal_id,
      document_id:doc.id,
      account_id:doc.account_id||deal?.account_id||null,
      product_id:item.product_id||null,
      jan:item.jan||null,
      name_en:item.name_en||"",
      name_ja:item.name_ja||"",
      quantity:item.quantity||0,
      case_quantity:item.case_quantity||null,
      cost_price:item.cost_price||null,
      selling_price:item.selling_price||null,
      weight_g:item.weight_g||null,
      supplier:item.supplier||null,
      status:"pending",
      created_by:user?.id||null,
    }));
    const{error}=await client.from("order_items").insert(orderItems);
    if(error)throw error;
    alert(`${orderItems.length}件の発注アイテムを作成しました。`);
  }catch(err){alert("発注反映エラー: "+err.message)}
  finally{setSyncing(p=>({...p,[doc.id]:false}))}
};

const typeLabel=(t)=>t==="quotation"?"見積書":t==="invoice"?"請求書":t==="delivery"?"納品書":t;
const typeColor=(t)=>t==="quotation"?T.primary:t==="invoice"?T.accent:T.blue||"#3b82f6";

if(loading)return <div style={{padding:40,textAlign:"center",color:T.muted,fontSize:12}}>読み込み中...</div>;

return(
<div style={{padding:IS_MOBILE?10:16,background:T.bg,minHeight:"100%"}}>

    ))}
    <input value={searchText} onChange={e=>setSearchText(e.target.value)} placeholder="書類番号・取引先・案件で検索..." style={{marginLeft:"auto",padding:"6px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:11,fontFamily:"inherit",width:IS_MOBILE?"100%":220}}/>
  </div>

  {/* Document Cards */}
  <div style={{display:"flex",flexDirection:"column",gap:8}}>
    {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:T.muted,fontSize:12}}>書類がありません</div>}
    {filtered.map(doc=>{
      const dealObj=doc.deal_id?dealMap[doc.deal_id]:null;
      const acctName=doc.account_id?accountMap[doc.account_id]:doc.client_info?.companyName||"—";
      const itemCount=doc.items?.length||0;
      const isSyncing=syncing[doc.id];
      return(
      <div key={doc.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:IS_MOBILE?"10px":"12px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        {/* Type badge */}
        <div style={{minWidth:60,textAlign:"center"}}>
          <span style={{display:"inline-block",padding:"3px 10px",borderRadius:12,background:typeColor(doc.doc_type)+"18",color:typeColor(doc.doc_type),fontSize:10,fontWeight:700}}>{typeLabel(doc.doc_type)}</span>
        </div>
        {/* Main info */}
        <div style={{flex:1,minWidth:150}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text}}>{doc.doc_number||"番号なし"}</div>
          <div style={{fontSize:11,color:T.sub,marginTop:2}}>{acctName}</div>
          {dealObj&&<div style={{fontSize:10,color:T.primary,marginTop:1}}>案件: {dealObj.name}</div>}
        </div>
        {/* Details */}
        <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:T.muted}}>商品数</div>
            <div style={{fontSize:12,fontWeight:700,color:T.text}}>{itemCount}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:T.muted}}>合計</div>
            <div style={{fontSize:12,fontWeight:700,color:T.text}}>{doc.currency||"USD"} {(doc.total||0).toLocaleString()}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:T.muted}}>作成日</div>
            <div style={{fontSize:11,color:T.sub}}>{doc.created_at?new Date(doc.created_at).toLocaleDateString("ja-JP"):""}</div>
          </div>
        </div>
        {/* Action buttons */}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {doc.doc_type==="quotation"&&<button onClick={()=>onCreateInvoice&&onCreateInvoice(doc)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:T.accent||"#f59e0b",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>
            請求書を作成
          </button>}
          {doc.doc_type==="invoice"&&<button onClick={()=>syncToOrders(doc)} disabled={isSyncing} style={{padding:"6px 14px",borderRadius:8,border:"none",background:doc.deal_id?(T.green||"#22c55e"):T.border,color:doc.deal_id?"#fff":T.muted,fontSize:11,fontWeight:700,cursor:doc.deal_id?"pointer":"not-allowed",opacity:isSyncing?.5:1,whiteSpace:"nowrap",fontFamily:"inherit"}}>
            {isSyncing?"反映中...":"発注に反映"}
          </button>}
        </div>
      </div>
      );
    })}
  </div>
</div>
);
}

useEffect(()=>{clearTimeout(searchTimer.current);searchTimer.current=setTimeout(()=>{setDebouncedSearch(searchTerm);setCurrentPage(0)},300);return()=>clearTimeout(searchTimer.current)},[searchTerm]);

const fetchProducts=useCallback(async()=>{
  if(!client)return;setLoading(true);setError("");
  try{
    let q=client.from("product_master").select("*",{count:"exact"});
    if(debouncedSearch){const s=`%${debouncedSearch}%`;q=q.or(`name_ja.ilike.${s},name_en.ilike.${s},jan.ilike.${s},brand.ilike.${s}`);}
    if(filterBrand)q=q.eq("brand",filterBrand);
    if(filterStatus)q=q.eq("status",filterStatus);

    if(e)throw e;setProducts(data||[]);setTotalCount(count||0);
  }catch(e){setError(e.message);setProducts([])}finally{setLoading(false)}
},[client,debouncedSearch,filterBrand,filterStatus,currentPage]);

useEffect(()=>{if(docPage==="master")fetchProducts()},[fetchProducts,docPage]);

useEffect(()=>{

  load("brand",setBrands);load("supplier",setSuppliers);load("sub_brand",setSubBrands);
},[client,docPage]);

const[successorPreview,setSuccessorPreview]=useState(null);
const openEdit=(p)=>{const obj=p?{...p}:{name_ja:"",name_en:"",jan:"",brand:"",sub_brand:"",supplier:"",image_url:"",cost_price:null,list_price:null,selling_price:null,case_quantity:null,weight_g:null,price_break_qty:null,status:"active",ingredients_en:"",is_discontinued:false,successor_jan:""};setEditProduct(obj);setOrigProduct(p?{...p}:null);setSaveErr("");setSuccessorPreview(null);setShowEdit(true);if(p?.successor_jan){client.from("product_master").select("jan,name_en,name_ja,brand").eq("jan",p.successor_jan).limit(1).then(({data})=>{if(data&&data[0])setSuccessorPreview(data[0])})};};
const closeEdit=()=>{setShowEdit(false);setEditProduct(null);setOrigProduct(null)};

const saveProduct=async()=>{
  setSaveErr("");
  if(!editProduct.name_ja&&!editProduct.name_en){setSaveErr("商品名(日本語または英語)は必須です");return}
  if(!editProduct.jan){setSaveErr("JANコードは必須です");return}
  try{
    if(editProduct.id){
      const updates={};const auditEntries=[];
      const fields=["name_ja","name_en","jan","brand","sub_brand","supplier","image_url","cost_price","list_price","selling_price","case_quantity","weight_g","price_break_qty","status","ingredients_en","is_discontinued","successor_jan"];
      fields.forEach(f=>{if(JSON.stringify(editProduct[f])!==JSON.stringify(origProduct[f])){updates[f]=editProduct[f];auditEntries.push({product_id:editProduct.id,changed_by:user.id,field_name:f,old_value:String(origProduct[f]??""),new_value:String(editProduct[f]??""),changed_at:new Date().toISOString()})}});
      if(Object.keys(updates).length>0){
        updates.updated_at=new Date().toISOString();
        const{error:e}=await client.from("product_master").update(updates).eq("id",editProduct.id);if(e)throw e;
        if(auditEntries.length>0)await client.from("product_master_audit").insert(auditEntries);
      }
    }else{
      const ins={...editProduct};delete ins.id;
      const{error:e}=await client.from("product_master").insert([ins]);if(e)throw e;
    }
    closeEdit();fetchProducts();
  }catch(e){setSaveErr(e.message)}
};

const openAudit=async(pid)=>{
  const{data}=await client.from("product_master_audit").select("*").eq("product_id",pid).order("changed_at",{ascending:false});
  setAuditLog(data||[]);setShowAudit(true);
};

const handleCsvFile=async(file)=>{
  const text=await file.text();
  const lines=text.split("\n").filter(l=>l.trim());
  if(lines.length<2){setSaveErr("CSVが空です");return}
  const headers=lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
  const rows=lines.slice(1).map(line=>{
    const vals=line.split(",").map(v=>v.trim().replace(/^"|"$/g,""));
    const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||""});return obj;
  }).filter(r=>r.jan||r.JAN);
  setCsvData({headers,rows});setShowCsvImport(true);
};

const importCsv=async()=>{
  if(!csvData?.rows?.length)return;setCsvImporting(true);
  try{
    const fieldMap={jan:"jan",JAN:"jan","商品名":"name_ja",name_ja:"name_ja",name_en:"name_en","英語名":"name_en","ブランド":"brand",brand:"brand","仕入先":"supplier",supplier:"supplier","定価":"list_price",list_price:"list_price","下代":"cost_price",cost_price:"cost_price","重量":"weight_g",weight_g:"weight_g","ケース入数":"case_quantity",case_quantity:"case_quantity","販売価格USD":"selling_price",selling_price:"selling_price","成分":"ingredients_en",ingredients_en:"ingredients_en","ステータス":"status",status:"status","サブブランド":"sub_brand",sub_brand:"sub_brand"};
    const inserts=csvData.rows.map(row=>{
      const obj={};Object.entries(row).forEach(([k,v])=>{const mapped=fieldMap[k];if(mapped&&v){if(["list_price","cost_price","selling_price","weight_g","case_quantity","price_break_qty"].includes(mapped)){obj[mapped]=Number(v)||null}else{obj[mapped]=v}}});return obj;
    }).filter(o=>o.jan);
    const batch=50;
    for(let i=0;i<inserts.length;i+=batch){
      const chunk=inserts.slice(i,i+batch);
      await client.from("product_master").upsert(chunk,{onConflict:"jan"});
    }
    setShowCsvImport(false);setCsvData(null);fetchProducts();
  }catch(e){setSaveErr(e.message)}finally{setCsvImporting(false)}
};

const topBrands=useMemo(()=>{const counts={};products.forEach(p=>{if(p.brand)counts[p.brand]=(counts[p.brand]||0)+1});return brands.slice(0,6)},[brands,products]);

const sn=(uid)=>{const u=(allUsers||[]).find(x=>x.id===uid);return u?u.display_name||u.email?.split("@")[0]||"不明":"不明"};

if(docPage==="menu"){return(

    ].map(b=>(

        onMouseEnter={e=>{e.currentTarget.style.borderColor=b.color;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.08)"}}

        {editProduct.successor_jan&&editProduct.successor_jan.length>=8&&!successorPreview&&<div style={{marginTop:5,fontSize:10,color:"#dc2626"}}>⚠ このJANコードの商品がマスタに見つかりません</div>}

  {/* CSV Import Modal */}
  {showCsvImport&&csvData&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100,padding:12}} onClick={()=>{setShowCsvImport(false);setCsvData(null)}}>
    <div style={{background:T.card,borderRadius:12,padding:18,width:"100%",maxWidth:500,maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

        {csvData.rows.length>5&&<div style={{padding:6,fontSize:10,color:T.muted,textAlign:"center"}}>他 {csvData.rows.length-5}件...</div>}
      </div>

        <button onClick={importCsv} disabled={csvImporting} style={{flex:1,padding:10,background:T.green,color:"#fff",border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",opacity:csvImporting?.5:1}}>{csvImporting?"インポート中...":"インポート実行"}</button>
        <button onClick={()=>{setShowCsvImport(false);setCsvData(null)}} style={{flex:1,padding:10,background:T.borderLight||"#eee",color:T.muted,border:"none",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer"}}>キャンセル</button>

    </div>
  </div>}
</div>
)}

// ── Todo Overview Page ──
function TodoOverviewPage({deals,accounts,client,user,allUsers,onOpenDeal}){
  const[todos,setTodos]=useState([]);
  const[loadingTodos,setLoadingTodos]=useState(true);
  const[filterOwner,setFilterOwner]=useState("all");
  const[showAddForm,setShowAddForm]=useState(false);
  const[newContent,setNewContent]=useState("");
  const[newAssignee,setNewAssignee]=useState(user?.id||"");
  const[newDueDate,setNewDueDate]=useState("");
  const[adding,setAdding]=useState(false);
  const newInputRef=useRef(null);
  const[notionTasks,setNotionTasks]=useState([]);
  const[notionLoading,setNotionLoading]=useState(false);
  const[showNotion,setShowNotion]=useState(true);
  const notionConfigRef=useRef(null);

  useEffect(()=>{loadTodos();loadNotionConfig()},[]);
  const loadTodos=async()=>{
    setLoadingTodos(true);
    const{data}=await client.from("sales_activities").select("*").eq("is_todo",true).is("deleted_at",null).order("created_at",{ascending:false});
    if(data)setTodos(data);
    setLoadingTodos(false);
  };
  const loadNotionConfig=async()=>{
    try{
      const{data}=await client.from("company_settings").select("*").eq("key","notion_config").limit(1);
      if(data&&data[0]){const cfg=JSON.parse(data[0].value);notionConfigRef.current=cfg;if(cfg.token&&cfg.database_id)loadNotionTasks(cfg)}
    }catch(e){console.error("Notion config load error:",e)}
  };
  const loadNotionTasks=async(cfg)=>{
    if(!cfg?.token||!cfg?.database_id)return;
    setNotionLoading(true);
    try{
      const edgeFnUrl="https://yzwrumeukjidsguixqxr.supabase.co/functions/v1/notion-tasks";
      const ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6d3J1bWV1a2ppZHNndWl4cXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTcyMzAsImV4cCI6MjA4OTYzMzIzMH0.8KxvbsRnTXJsfB81PSfvszF6RMS5_S_9GoWkV10_41g";
      const resp=await fetch(edgeFnUrl,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON_KEY,"apikey":ANON_KEY},body:JSON.stringify({notion_token:cfg.token,database_id:cfg.database_id})});
      if(resp.ok){const r=await resp.json();setNotionTasks(r.tasks||[])}
    }catch(e){console.error("Notion tasks error:",e)}
    setNotionLoading(false);
  };
  const notionApi=async(payload)=>{
    const cfg=notionConfigRef.current;if(!cfg?.token)return null;
    const edgeFnUrl="https://yzwrumeukjidsguixqxr.supabase.co/functions/v1/notion-tasks";
    const ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6d3J1bWV1a2ppZHNndWl4cXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTcyMzAsImV4cCI6MjA4OTYzMzIzMH0.8KxvbsRnTXJsfB81PSfvszF6RMS5_S_9GoWkV10_41g";
    const resp=await fetch(edgeFnUrl,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON_KEY,"apikey":ANON_KEY},body:JSON.stringify({notion_token:cfg.token,database_id:cfg.database_id,...payload})});
    return resp.ok?await resp.json():null;
  };
  const notionToggle=async(pageId)=>{
    const task=notionTasks.find(t=>t.id===pageId);
    if(!task)return;
    const newDone=!task.done;
    setNotionTasks(prev=>prev.map(t=>t.id===pageId?{...t,done:newDone}:t));
    await notionApi({action:"toggle",page_id:pageId,done:newDone});
    if(newDone){
      setTimeout(()=>{setNotionTasks(prev=>prev.filter(t=>!(t.id===pageId&&t.done)))},8000);
    }
  };
  const notionAddTask=async(title,assignee)=>{
    if(!title.trim())return;
    const cfg=notionConfigRef.current;if(!cfg?.token)return;
    await notionApi({action:"add",title:title.trim(),assignee});
    loadNotionTasks(cfg);
  };
  const notionUpdateTitle=async(pageId,newTitle)=>{
    if(!newTitle.trim())return;
    await notionApi({action:"update",page_id:pageId,title:newTitle.trim()});
    setNotionTasks(prev=>prev.map(t=>t.id===pageId?{...t,title:newTitle.trim()}:t));
  };
  const[notionNewTask,setNotionNewTask]=useState("");
  const[notionNewAssignee,setNotionNewAssignee]=useState("Amon");
  const[notionAdding,setNotionAdding]=useState(false);
  const[editingNotionId,setEditingNotionId]=useState(null);
  const[editingNotionTitle,setEditingNotionTitle]=useState("");
  const NOTION_MEMBERS=["Amon","Tsumura","Nakagawa","Chikaki","Yuta","Mark","Joseph","Sarah"];

  const toggleComplete=async(id,cur)=>{
    await client.from("sales_activities").update({is_completed:!cur}).eq("id",id);
    loadTodos();
  };
  const[deleteConfirmTodo,setDeleteConfirmTodo]=useState(null);
  const deleteTodo=async(id)=>{
    await client.from("sales_activities").update({deleted_at:new Date().toISOString()}).eq("id",id);
    setDeleteConfirmTodo(null);
    loadTodos();
  };
  const addTodo=async()=>{
    if(!newContent.trim()||adding)return;
    setAdding(true);
    try{
      await client.from("sales_activities").insert({
        user_id:user.id,type:"todo",content:newContent.trim(),
        is_todo:true,
        due_date:newDueDate||null,
        assigned_to:newAssignee||user.id,
        deal_id:null,account_id:null
      });
      setNewContent("");setNewDueDate("");setNewAssignee(user?.id||"");
      loadTodos();
    }catch(e){console.error(e)}
    setAdding(false);
  };

  const today=new Date().toISOString().slice(0,10);

  // Filter: overdue or due today, incomplete, no due date
  const overdueTodos=todos.filter(t=>!t.is_completed&&t.due_date&&t.due_date<=today);
  const upcomingTodos=todos.filter(t=>!t.is_completed&&(!t.due_date||t.due_date>today));
  const completedTodos=todos.filter(t=>t.is_completed);

  // Group by assigned_to (or owner)
  const groupByOwner=(list)=>{
    const map={};
    list.forEach(t=>{
      const ownerId=t.assigned_to||t.user_id;
      if(!map[ownerId])map[ownerId]=[];
      map[ownerId].push(t);
    });
    return Object.entries(map).sort((a,b)=>{
      const na=shortName(allUsers.find(u=>u.id===a[0]));
      const nb=shortName(allUsers.find(u=>u.id===b[0]));
      return na.localeCompare(nb);
    });
  };

  const filteredOverdue=filterOwner==="all"?overdueTodos:overdueTodos.filter(t=>(t.assigned_to||t.user_id)===filterOwner);
  const filteredUpcoming=filterOwner==="all"?upcomingTodos:upcomingTodos.filter(t=>(t.assigned_to||t.user_id)===filterOwner);
  const filteredCompleted=filterOwner==="all"?completedTodos:completedTodos.filter(t=>(t.assigned_to||t.user_id)===filterOwner);

  const renderTodoRow=(t,showDelete)=>{
    const deal=deals.find(d=>d.id===t.deal_id);
    const acct=deal?accounts.find(a=>a.id===deal.account_id):null;
    const assignee=allUsers.find(u=>u.id===(t.assigned_to||t.user_id));
    const isOverdue=!t.is_completed&&t.due_date&&t.due_date<=today;
    const daysLeft=t.due_date?Math.ceil((new Date(t.due_date)-new Date(today))/(1000*60*60*24)):null;
    return(
      <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:`1px solid ${T.borderLight}`,fontSize:12,background:t.is_completed?"#fafafa":"#fff"}}>
        <button onClick={()=>toggleComplete(t.id,t.is_completed)} style={{width:18,height:18,borderRadius:4,border:t.is_completed?`2px solid ${T.green}`:`2px solid ${T.border}`,background:t.is_completed?T.green+"15":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:T.green,flexShrink:0}}>{t.is_completed?"✓":""}</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:500,color:t.is_completed?T.muted:T.primary,textDecoration:t.is_completed?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.content}</div>
          {deal&&<div style={{fontSize:10,color:T.muted,marginTop:1,cursor:"pointer"}} onClick={()=>onOpenDeal&&onOpenDeal(deal)}>📋 {deal.name}{acct?" · "+acct.name:""}</div>}
        </div>
        <span style={{fontSize:9,fontWeight:600,color:"#fff",background:T.muted,borderRadius:3,padding:"1px 5px",whiteSpace:"nowrap"}}>{shortName(assignee)}</span>
        {t.due_date&&<span style={{fontSize:10,fontWeight:600,color:isOverdue?T.red:daysLeft!==null&&daysLeft<=3?T.orange:T.muted,whiteSpace:"nowrap"}}>{t.due_date.slice(5).replace("-","/")}{isOverdue?" ⚠":""}</span>}
        {showDelete&&<button onClick={e=>{e.stopPropagation();setDeleteConfirmTodo(t)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:T.muted,padding:"2px 4px",borderRadius:4,flexShrink:0}} onMouseEnter={e=>{e.currentTarget.style.color=T.red}} onMouseLeave={e=>{e.currentTarget.style.color=T.muted}} title="削除">✕</button>}
      </div>
    );
  };

  const SectionHeader=({title,count,color})=>(
    <div style={{padding:"10px 12px 6px",display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:color}}/>
      <span style={{fontSize:12,fontWeight:700,color:T.primary}}>{title}</span>
      <span style={{fontSize:10,color:T.muted}}>({count})</span>
    </div>
  );

  if(loadingTodos)return <div style={{padding:40,textAlign:"center",color:T.muted,fontSize:12}}>読み込み中...</div>;

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 14px",borderBottom:`1px solid ${T.border}`,background:T.card}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:showAddForm?8:0}}>
        <span style={{fontSize:14,fontWeight:700,color:T.primary}}>ToDo一覧</span>
        <select value={filterOwner} onChange={e=>setFilterOwner(e.target.value)} style={{padding:"4px 8px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontWeight:500,cursor:"pointer",background:T.card,color:T.sub,fontFamily:"inherit",outline:"none"}}>
          <option value="all">全メンバー</option>
          {(allUsers||[]).map(u=><option key={u.id} value={u.id}>{shortName(u)}</option>)}
        </select>
        <div style={{flex:1}}/>
        <span style={{fontSize:11,color:T.red,fontWeight:700}}>期限切れ: {filteredOverdue.length}件</span>
        <button onClick={()=>{setShowAddForm(v=>!v);setTimeout(()=>newInputRef.current?.focus(),100)}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:T.accent,color:"#fff",fontFamily:"inherit"}}>＋ 追加</button>
        </div>
        {showAddForm&&(
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",padding:"2px 0"}}>
            <input ref={newInputRef} value={newContent} onChange={e=>setNewContent(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.nativeEvent.isComposing)addTodo()}} placeholder="タスク内容..." style={{flex:1,minWidth:140,padding:"6px 10px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
            <select value={newAssignee} onChange={e=>setNewAssignee(e.target.value)} style={{padding:"5px 6px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit",outline:"none",cursor:"pointer"}}>
              {(allUsers||[]).map(u=><option key={u.id} value={u.id}>{shortName(u)}</option>)}
            </select>
            <input type="date" value={newDueDate} onChange={e=>setNewDueDate(e.target.value)} style={{padding:"5px 6px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit",outline:"none"}}/>
            <button onClick={addTodo} disabled={adding||!newContent.trim()} style={{padding:"5px 14px",borderRadius:6,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:adding||!newContent.trim()?"#ccc":T.primary,color:"#fff",fontFamily:"inherit"}}>追加</button>
          </div>
        )}
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {filteredOverdue.length>0&&<>
          <SectionHeader title="期限切れ・本日期限" count={filteredOverdue.length} color={T.red}/>
          {filterOwner==="all"?groupByOwner(filteredOverdue).map(([ownerId,items])=>(
            <div key={ownerId}>
              <div style={{padding:"4px 12px",fontSize:10,fontWeight:700,color:T.sub,background:"#fef2f2"}}>{shortName(allUsers.find(u=>u.id===ownerId))}</div>
              {items.map(renderTodoRow)}
            </div>
          )):filteredOverdue.map(renderTodoRow)}
        </>}
        {filteredUpcoming.length>0&&<>
          <SectionHeader title="今後の予定" count={filteredUpcoming.length} color={T.accent}/>
          {filterOwner==="all"?groupByOwner(filteredUpcoming).map(([ownerId,items])=>(
            <div key={ownerId}>
              <div style={{padding:"4px 12px",fontSize:10,fontWeight:700,color:T.sub,background:"#f0f7ff"}}>{shortName(allUsers.find(u=>u.id===ownerId))}</div>
              {items.map(renderTodoRow)}
            </div>
          )):filteredUpcoming.map(renderTodoRow)}
        </>}
        {filteredCompleted.length>0&&<>
          <SectionHeader title="完了済み" count={filteredCompleted.length} color={T.green}/>
          {filteredCompleted.slice(0,20).map(t=>renderTodoRow(t,true))}
          {filteredCompleted.length>20&&<div style={{padding:"8px 12px",fontSize:11,color:T.muted,textAlign:"center"}}>他 {filteredCompleted.length-20}件...</div>}
        </>}
        {filteredOverdue.length===0&&filteredUpcoming.length===0&&filteredCompleted.length===0&&(
          <div style={{padding:40,textAlign:"center",color:T.muted,fontSize:12}}>ToDoがありません</div>
        )}
        {/* Notion Tasks Section */}
        {notionConfigRef.current?.token&&(
          <div style={{marginTop:8,borderTop:`2px solid ${T.border}`}}>
            <div onClick={()=>setShowNotion(v=>!v)} style={{padding:"10px 12px",display:"flex",alignItems:"center",gap:6,cursor:"pointer",background:"#f8f8f8"}}>
              <span style={{fontSize:10,color:T.muted}}>{showNotion?"▼":"▶"}</span>
              <span style={{fontSize:12,fontWeight:700,color:T.sub}}>GS Task App（Notion）</span>
              <span style={{fontSize:10,color:T.muted}}>未完了 {notionTasks.length}件</span>
              <div style={{flex:1}}/>
              <button onClick={e=>{e.stopPropagation();loadNotionTasks(notionConfigRef.current)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:T.accent,fontFamily:"inherit",fontWeight:600}}>↻ 更新</button>
            </div>
            {showNotion&&<>
              {/* Add task form */}
              <div style={{display:"flex",gap:4,padding:"6px 12px",background:"#fafafa",borderBottom:`1px solid ${T.borderLight}`}}>
                <input value={notionNewTask} onChange={e=>setNotionNewTask(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.nativeEvent.isComposing&&notionNewTask.trim()){setNotionAdding(true);notionAddTask(notionNewTask,notionNewAssignee).then(()=>{setNotionNewTask("");setNotionAdding(false)})}}} placeholder="Notionタスクを追加..." style={{flex:1,minWidth:80,padding:"5px 8px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit",outline:"none"}}/>
                <select value={notionNewAssignee} onChange={e=>setNotionNewAssignee(e.target.value)} style={{padding:"4px 4px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:10,fontFamily:"inherit",cursor:"pointer"}}>
                  {NOTION_MEMBERS.map(m=><option key={m} value={m}>{m}</option>)}
                </select>
                <button onClick={async()=>{if(!notionNewTask.trim()||notionAdding)return;setNotionAdding(true);await notionAddTask(notionNewTask,notionNewAssignee);setNotionNewTask("");setNotionAdding(false)}} disabled={notionAdding||!notionNewTask.trim()} style={{padding:"4px 10px",borderRadius:5,border:"none",fontSize:10,fontWeight:700,cursor:"pointer",background:notionAdding||!notionNewTask.trim()?"#ccc":T.accent,color:"#fff",fontFamily:"inherit"}}>追加</button>
              </div>
              {notionLoading?<div style={{padding:16,textAlign:"center",fontSize:11,color:T.muted}}>読み込み中...</div>:
              notionTasks.length===0?<div style={{padding:16,textAlign:"center",fontSize:11,color:T.muted}}>未完了タスクなし</div>:
              (()=>{
                const grouped={};
                notionTasks.forEach(t=>{const a=t.assignee||"None";if(!grouped[a])grouped[a]=[];grouped[a].push(t)});
                const memberOrder=["Amon","Tsumura","Nakagawa","Chikaki","Yuta","Mark","Joseph","Sarah","None"];
                return Object.entries(grouped).sort((a,b)=>memberOrder.indexOf(a[0])-memberOrder.indexOf(b[0])).map(([name,tasks])=>(
                  <div key={name}>
                    <div style={{padding:"4px 12px",fontSize:10,fontWeight:700,color:T.sub,background:"#f3f3f3"}}>{name} ({tasks.length})</div>
                    {tasks.map(t=>(
                      <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderBottom:`1px solid ${T.borderLight}`,fontSize:11.5,background:t.done?"#f9f9f9":"#fff",opacity:t.done?0.55:1,transition:"opacity 0.3s"}}>
                        <button onClick={()=>notionToggle(t.id)} style={{width:16,height:16,borderRadius:3,border:`2px solid ${t.done?T.green:T.border}`,background:t.done?T.green:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",flexShrink:0}} title={t.done?"完了を取消":"完了にする"}>{t.done?"✓":""}</button>
                        {editingNotionId===t.id?
                          <input value={editingNotionTitle} onChange={e=>setEditingNotionTitle(e.target.value)} onBlur={()=>{if(editingNotionTitle.trim()&&editingNotionTitle!==t.title)notionUpdateTitle(t.id,editingNotionTitle);setEditingNotionId(null)}} onKeyDown={e=>{if(e.key==="Enter"){e.target.blur()}if(e.key==="Escape"){setEditingNotionId(null)}}} autoFocus style={{flex:1,minWidth:0,padding:"2px 4px",border:`1px solid ${T.accent}`,borderRadius:3,fontSize:11.5,fontFamily:"inherit",outline:"none"}}/>
                          :<div onClick={()=>{if(!t.done){setEditingNotionId(t.id);setEditingNotionTitle(t.title)}}} style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:t.done?T.muted:T.sub,cursor:t.done?"default":"text",textDecoration:t.done?"line-through":"none"}} title={t.done?"完了済み":"クリックで編集"}>{t.title}</div>
                        }
                        <span style={{fontSize:9,fontWeight:600,color:"#fff",background:T.muted,borderRadius:3,padding:"1px 5px",whiteSpace:"nowrap"}}>{name}</span>
                      </div>
                    ))}
                  </div>
                ));
              })()}
            </>}
          </div>
        )}
      </div>
      {deleteConfirmTodo&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100}} onClick={()=>setDeleteConfirmTodo(null)}>
        <div style={{background:"#fff",borderRadius:12,padding:"22px 26px",maxWidth:360,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:15,fontWeight:700,color:T.primary,marginBottom:8}}>ToDoを削除</div>
          <div style={{fontSize:13,color:T.sub,marginBottom:6,lineHeight:1.6}}>このToDoを削除しますか？</div>
          <div style={{padding:"8px 12px",background:"#f9f9f9",borderRadius:6,fontSize:12,color:T.sub,marginBottom:16,maxHeight:40,overflow:"hidden",lineHeight:1.5}}>{deleteConfirmTodo.content}</div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setDeleteConfirmTodo(null)} style={{padding:"7px 16px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>キャンセル</button>
            <button onClick={()=>deleteTodo(deleteConfirmTodo.id)} style={{padding:"7px 16px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit"}}>削除する</button>
          </div>
        </div>
      </div>}
    </div>
  );
}


// ── Business Manager ──
function BusinessManager({client,businesses,onUpdated}){
  const toast=useToast();
  const[newLabel,setNewLabel]=useState("");
  const[newColor,setNewColor]=useState("#666");
  const[saving,setSaving]=useState(false);
  const[editId,setEditId]=useState(null);
  const[editLabel,setEditLabel]=useState("");
  const[editColor,setEditColor]=useState("");
  const[confirmDeleteId,setConfirmDeleteId]=useState(null);
  const I={border:`1px solid ${T.border}`,borderRadius:5,padding:"5px 8px",fontSize:11.5,outline:"none",fontFamily:"inherit"};

  const addBiz=async()=>{
    if(!newLabel.trim())return;
    setSaving(true);
    const id=newLabel.trim().toLowerCase().replace(/[^a-z0-9]/g,"_").replace(/_+/g,"_");
    const sortOrder=(businesses||[]).length;
    const{error}=await client.from("businesses").insert({id,label:newLabel.trim(),color:newColor,sort_order:sortOrder});
    if(error){toast("追加エラー: "+error.message,"error")}
    else{setNewLabel("");setNewColor("#666");onUpdated()}
    setSaving(false);
  };

  const saveBizEdit=async()=>{
    if(!editLabel.trim()||!editId)return;
    const{error}=await client.from("businesses").update({label:editLabel.trim(),color:editColor}).eq("id",editId);
    if(error)toast("更新エラー: "+error.message,"error");
    else{setEditId(null);onUpdated()}
  };

  const deleteBiz=async(id)=>{
    if(confirmDeleteId===id){
      const{error}=await client.from("businesses").update({deleted_at:new Date().toISOString()}).eq("id",id);
      if(error)toast("削除エラー: "+error.message,"error");
      else{setConfirmDeleteId(null);onUpdated()}
    }else{setConfirmDeleteId(id);setTimeout(()=>setConfirmDeleteId(p=>p===id?null:p),3000)}
  };

  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:10}}>
        <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addBiz()}} placeholder="新規事業名" style={{...I,flex:1}}/>
        <input type="color" value={newColor} onChange={e=>setNewColor(e.target.value)} style={{width:32,height:28,border:`1px solid ${T.border}`,borderRadius:4,cursor:"pointer",padding:1}}/>
        <button onClick={addBiz} disabled={saving||!newLabel.trim()} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving||!newLabel.trim()?0.5:1}}>追加</button>
      </div>
      <div style={{maxHeight:200,overflowY:"auto"}}>
        {(businesses||[]).map(b=>(
          <div key={b.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 4px",borderBottom:`1px solid ${T.borderLight}`}}>
            {editId===b.id?(
              <div style={{display:"flex",alignItems:"center",gap:4,flex:1}}>
                <input type="color" value={editColor} onChange={e=>setEditColor(e.target.value)} style={{width:24,height:22,border:`1px solid ${T.border}`,borderRadius:3,cursor:"pointer",padding:0}}/>
                <input value={editLabel} onChange={e=>setEditLabel(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveBizEdit()}} style={{...I,flex:1}}/>
                <button onClick={saveBizEdit} style={{padding:"3px 8px",borderRadius:4,border:"none",fontSize:10,fontWeight:600,cursor:"pointer",background:T.accent,color:"#fff",fontFamily:"inherit"}}>保存</button>
                <button onClick={()=>setEditId(null)} style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:10,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>取消</button>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                <div style={{width:12,height:12,borderRadius:3,background:b.color||"#666",flexShrink:0}}/>
                <span style={{fontSize:12,color:T.primary,fontWeight:500,flex:1}}>{b.label}</span>
                <span style={{fontSize:9,color:T.muted,fontFamily:"monospace"}}>{b.id}</span>
                <button onClick={()=>{setEditId(b.id);setEditLabel(b.label);setEditColor(b.color||"#666")}} style={{padding:"2px 6px",borderRadius:3,border:`1px solid ${T.border}`,fontSize:9,cursor:"pointer",background:"#fff",color:T.muted,fontFamily:"inherit"}}>編集</button>
                <button onClick={()=>deleteBiz(b.id)} style={{padding:"2px 6px",borderRadius:3,border:"none",fontSize:9,fontWeight:600,cursor:"pointer",background:confirmDeleteId===b.id?T.red:T.red+"15",color:confirmDeleteId===b.id?"#fff":T.red,fontFamily:"inherit"}}>{confirmDeleteId===b.id?"削除する":"削除"}</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function SettingsManager({categories,client,user,allUsers,accounts,onClose,onUpdated,onOpenSupabaseSettings,businesses,onBusinessUpdated,currentBiz}){
  const[newCat,setNewCat]=useState("");

  const[expenseCategories,setExpenseCategories]=useState([]);
  const[newExpCat,setNewExpCat]=useState("");
  const[showExpCatAdd,setShowExpCatAdd]=useState(false);

  // OCR設定
  const[ocrApiKey,setOcrApiKey]=useState("");
  const[ocrEnabled,setOcrEnabled]=useState(false);
  const[ocrSaving,setOcrSaving]=useState(false);
  const[ocrMsg,setOcrMsg]=useState("");

  useEffect(()=>{(async()=>{
    try{
      const{data:cs}=await client.from("company_settings").select("*").eq("key","expense_categories");
      if(cs&&cs.length>0){try{setExpenseCategories(JSON.parse(cs[0].value))}catch(e){}}
      else{setExpenseCategories(["BtoB","Amazon","Shopee","KG","雑費","会議費・交際費","交通費","送料・物流費","その他"])}
      // OCR設定を読み込み
      const{data:ocrData}=await client.from("company_settings").select("*").eq("key","receipt_ocr_config");
      if(ocrData&&ocrData[0]){try{const cfg=JSON.parse(ocrData[0].value);setOcrApiKey(cfg.api_key||"");setOcrEnabled(!!cfg.enabled)}catch(e){}}
    }catch(ex){console.error("SettingsManager init error:",ex)}
  })()},[]);
  const saveExpCat=async(cats)=>{
    const val=JSON.stringify(cats);
    const{data:existing}=await client.from("company_settings").select("id").eq("key","expense_categories").limit(1);
    if(existing&&existing.length>0){await client.from("company_settings").update({value:val}).eq("id",existing[0].id)}
    else{await client.from("company_settings").insert({key:"expense_categories",value:val})}
  };

  const saveOcrConfig=async()=>{
    setOcrSaving(true);setOcrMsg("");
    try{
      const val=JSON.stringify({api_key:ocrApiKey.trim(),enabled:ocrEnabled});
      const{data:existing}=await client.from("company_settings").select("id").eq("key","receipt_ocr_config").limit(1);
      if(existing&&existing.length>0){await client.from("company_settings").update({value:val}).eq("id",existing[0].id)}
      else{await client.from("company_settings").insert({key:"receipt_ocr_config",value:val})}
      setOcrMsg("保存しました");setTimeout(()=>setOcrMsg(""),2000);
    }catch(e){setOcrMsg("保存エラー: "+e.message)}finally{setOcrSaving(false)}
  };

  // Notion連携設定
  const[notionToken,setNotionToken]=useState("");
  const[notionDbId,setNotionDbId]=useState("1c754070-f94f-440a-99b8-7e26ebc0560f");
  const[notionSaving,setNotionSaving]=useState(false);
  const[notionMsg,setNotionMsg]=useState("");
  useEffect(()=>{
    (async()=>{
      const{data}=await client.from("company_settings").select("*").eq("key","notion_config").limit(1);
      if(data&&data[0]){try{const cfg=JSON.parse(data[0].value);setNotionToken(cfg.token||"");setNotionDbId(cfg.database_id||"1c754070-f94f-440a-99b8-7e26ebc0560f")}catch(e){}}
    })();
  },[]);
  const saveNotionConfig=async()=>{
    setNotionSaving(true);setNotionMsg("");
    try{
      const val=JSON.stringify({token:notionToken.trim(),database_id:notionDbId.trim()});
      const{data:existing}=await client.from("company_settings").select("id").eq("key","notion_config").limit(1);

// ── Lead Form Modal ──
function LeadFormModal({client,user,lead,categories,onClose,onSaved,currentBiz}){
  const[form,setForm]=useState({company_name:lead?.company_name||"",contact_name:lead?.contact_name||"",contact_email:lead?.contact_email||"",source:lead?.source||"その他",phone:lead?.phone||"",whatsapp:lead?.whatsapp||"",country:lead?.country||"",website:lead?.website||"",notes:lead?.notes||"",status:lead?.status||"new",owner_id:lead?.owner_id||user.id,linkedin_url:lead?.linkedin_url||""});
  const[categoryIds,setCategoryIds]=useState(lead?.category_ids||[]);
  const[saving,setSaving]=useState(false);
  const[firstActionType,setFirstActionType]=useState("メール");
  const[firstAction,setFirstAction]=useState("");
  const[phoneCountry,setPhoneCountry]=useState(lead?.country||"");
  const syncedOnceRef=useRef(false);
  const I={width:"100%",padding:"6px 10px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:12,fontFamily:"inherit",outline:"none",background:"#fff"};
  const save=async()=>{
    if(!form.company_name.trim()){toast("会社名は必須です","error");return}
    if(form.phone){const{valid,error}=validatePhoneDigits(form.phone);if(!valid){toast(error,'error');return}}
    setSaving(true);
    try{
      if(lead){
        const{error}=await client.from("sales_leads").update({...form,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",lead.id);
        if(error)throw error;
        const changedLead=diffFields(lead,form,["company_name","contact_name","email","phone","whatsapp","country","source","status","priority","notes"]);
        if(changedLead.length>0){try{await client.from("sales_activities").insert({lead_id:lead.id,user_id:user.id,type:"note",content:"リードを編集: "+changedLead.join(", ")})}catch(e){}}
      }else{
        const{data:newLead,error}=await client.from("sales_leads").insert({business_id:currentBiz||"jbeauty",...form,created_by:user.id,owner_id:form.owner_id||user.id}).select().single();
        if(error)throw error;
        if(newLead&&firstAction.trim()){
          try{await client.from("lead_actions").insert({lead_id:newLead.id,action_type:firstActionType,memo:firstAction.trim(),created_by:user.id,action_date:new Date().toISOString()})}catch(e){console.warn("lead_actions insert failed:",e)}
        }
      }
      onSaved();onClose();
    }catch(e){toast("エラー: "+e.message,"error")}
    setSaving(false);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",borderRadius:12,padding:"20px 24px",width:420,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.15)"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:T.primary}}>{lead?"リード編集":"新規リード"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>会社名 *</label><input value={form.company_name} onChange={e=>setForm(f=>({...f,company_name:e.target.value}))} style={I} placeholder="会社名"/></div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>担当者名</label><input value={form.contact_name} onChange={e=>setForm(f=>({...f,contact_name:e.target.value}))} style={I} placeholder="担当者名"/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>メール</label><input value={form.contact_email} onChange={e=>setForm(f=>({...f,contact_email:e.target.value}))} style={I} placeholder="メール"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>ソース</label><select value={form.source} onChange={e=>setForm(f=>({...f,source:e.target.value}))} style={I}>{LEAD_SOURCES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>ステータス</label><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={I}>{LEAD_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
          </div>
          {form.source==="LinkedIn"&&(<div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>LinkedIn URL</label><input value={form.linkedin_url} onChange={e=>setForm(f=>({...f,linkedin_url:e.target.value}))} style={I} placeholder="https://linkedin.com/in/..."/></div>)}
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>電話</label><PhoneInput value={form.phone} onChange={e=>{const v=e.target.value;setForm(f=>({...f,phone:v,whatsapp:v}))}} onDialChange={code=>{setPhoneCountry(DIAL_TO_COUNTRY[code]||"");if(!syncedOnceRef.current){const cn=DIAL_TO_COUNTRY[code];if(cn)setForm(f=>({...f,country:cn}));syncedOnceRef.current=true}}} country={phoneCountry} style={I} placeholder="電話番号（数字のみ）"/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>WhatsApp</label><PhoneInput value={form.whatsapp} onChange={e=>setForm(f=>({...f,whatsapp:e.target.value}))} country={form.country} style={I} placeholder="WhatsApp番号"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>国</label><CountryInput value={form.country} onChange={v=>{setForm(f=>({...f,country:v}));if(!syncedOnceRef.current){setPhoneCountry(v);syncedOnceRef.current=true}}} style={I}/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>Webサイト</label><input value={form.website} onChange={e=>setForm(f=>({...f,website:e.target.value}))} style={I} placeholder="https://"/></div>
          </div>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>メモ</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{...I,minHeight:50,resize:"vertical"}} placeholder="メモ（任意）"/></div>
          {!lead&&(<div style={{background:"#f0f7ff",borderRadius:6,padding:"10px 12px",border:"1px solid #d0e4f7"}}>
            <label style={{fontSize:10,fontWeight:700,color:T.accent}}>初回アクション（任意）</label>
            <div style={{display:"flex",gap:6,marginTop:6}}>
              <select value={firstActionType} onChange={e=>setFirstActionType(e.target.value)} style={{...I,width:"auto",flex:"0 0 auto"}}>{ACTION_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select>
              <input value={firstAction} onChange={e=>setFirstAction(e.target.value)} style={{...I,flex:1}} placeholder="例: 初回メール送付済み"/>
            </div>
          </div>)}
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
          <button onClick={onClose} style={{padding:"6px 16px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:12,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
          <button onClick={save} disabled={saving} style={{padding:"6px 16px",borderRadius:6,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving?0.5:1}}>{saving?"保存中...":"保存"}</button>
        </div>
      </div>
    </div>
  );
}
