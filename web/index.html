  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",borderRadius:10,padding:"18px 20px",width:"90%",maxWidth:340,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(0,0,0,.12)"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.primary}}>カテゴリ管理</div>
        <div style={{display:"flex",gap:4,marginBottom:12}}>
          <input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyPress={e=>{if(e.key==="Enter")addCategory()}} placeholder="新規カテゴリ名" style={{...I,flex:1}}/>
          <button onClick={addCategory} disabled={saving} style={{padding:"6px 10px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>追加</button>
        </div>
        {err&&<div style={{fontSize:11,color:T.red,marginBottom:8}}>{err}</div>}
        <div style={{maxHeight:300,overflowY:"auto"}}>
          {categories.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px",borderBottom:`1px solid ${T.borderLight}`}}>
            <span style={{fontSize:12,color:T.primary}}>{c.name}</span>
            <button onClick={()=>deleteCategory(c.id)} style={{padding:"2px 6px",borderRadius:3,border:"none",fontSize:10,fontWeight:600,cursor:"pointer",background:T.red+"15",color:T.red,fontFamily:"inherit"}}>削除</button>
          </div>))}
        </div>
        <div style={{display:"flex",gap:6,marginTop:12,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

// ── Deal Form Modal (Create / Edit) ──

// ── Expense Page (独立経費タブ) ──
const EXPENSE_CATEGORIES_DEFAULT=["BtoB","Amazon","Shopee","KG","雑費","会議費・交際費","交通費","送料・物流費","その他"];
const AMAZON_REGIONS=["USA","Canada","Australia"];
function ExpensePage({client,user,allUsers,accounts}){
  const[expenses,setExpenses]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[filterUser,setFilterUser]=useState("all");
  const[filterCategory,setFilterCategory]=useState("all");
  const[filterMonth,setFilterMonth]=useState(()=>{const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")});
  const[categories,setCategories]=useState(EXPENSE_CATEGORIES_DEFAULT);
  const[deleteTarget,setDeleteTarget]=useState(null);
  const[editTarget,setEditTarget]=useState(null);

  // Form state
  const[fCategory,setFCategory]=useState("BtoB");
  const[fProduct,setFProduct]=useState("");
  const[fMethod,setFMethod]=useState("Amex");
  const[fCustomMethod,setFCustomMethod]=useState("");
  const[fCustomCategory,setFCustomCategory]=useState("");
  const[fAmount,setFAmount]=useState("");
  const[fAmountDisplay,setFAmountDisplay]=useState("");
  const[fReceipt,setFReceipt]=useState(null);
  const[fReceiptPreview,setFReceiptPreview]=useState(null);
  const[fMemo,setFMemo]=useState("");
  const[fPurchaseLocation,setFPurchaseLocation]=useState("");
  const[fExpenseDate,setFExpenseDate]=useState(()=>{const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0")});
  const[fTaxCategory,setFTaxCategory]=useState("課税10%");
  const[fErr,setFErr]=useState("");
  const[saving,setSaving]=useState(false);
  const[dragOver,setDragOver]=useState(false);
  // BtoB splits: [{accountId,accountName,amount,amountDisplay,search}]
  const[fSplits,setFSplits]=useState([{accountId:"",accountName:"",amount:"",amountDisplay:"",search:""}]);
  // Amazon splits: [{region,amount,amountDisplay}]
  const[fAmazonSplits,setFAmazonSplits]=useState([{region:"USA",amount:"",amountDisplay:""}]);
  const receiptRef=useRef(null);

  const METHODS=["Amex","マネフォ","JCB","現金","現金建て替え","その他"];

  // ── レシートOCR ──
  const[ocrLoading,setOcrLoading]=useState(false);
  const[ocrStatus,setOcrStatus]=useState("");
  const ocrConfigRef=useRef(null);

  useEffect(()=>{
    if(!client)return;
    (async()=>{
      const{data}=await client.from("company_settings").select("*").eq("key","receipt_ocr_config").limit(1);
      if(data&&data[0]){try{ocrConfigRef.current=JSON.parse(data[0].value)}catch(e){}}
    })();
  },[client]);

  const runReceiptOCR=async(file)=>{
    const cfg=ocrConfigRef.current;
    if(!cfg||!cfg.enabled||!cfg.api_key)return;
    const isImage=file.type?.startsWith("image/");
    const isPdf=file.type==="application/pdf";
    if(!isImage&&!isPdf)return; // 画像またはPDFのみ
    setOcrLoading(true);setOcrStatus("AI読取中...");
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file)});
      const mediaType=file.type||"image/jpeg";
      // Supabase Edge Function経由でClaude APIを呼び出し（CORS回避）
      const edgeFnUrl="https://yzwrumeukjidsguixqxr.supabase.co/functions/v1/receipt-ocr";
      const ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6d3J1bWV1a2ppZHNndWl4cXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTcyMzAsImV4cCI6MjA4OTYzMzIzMH0.8KxvbsRnTXJsfB81PSfvszF6RMS5_S_9GoWkV10_41g";
      const resp=await fetch(edgeFnUrl,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON_KEY,"apikey":ANON_KEY},
        body:JSON.stringify({image_base64:b64,media_type:mediaType,api_key:cfg.api_key,categories:categories})
      });
      if(!resp.ok){const e=await resp.json();throw new Error(e.error||"API error "+resp.status)}
      const result=await resp.json();
      const text=(result.content||[]).find(c=>c.type==="text")?.text||"";
      // JSONを抽出（コードブロック対応）
      const jsonStr=text.replace(/```json?\n?/g,"").replace(/```/g,"").trim();
      const parsed=JSON.parse(jsonStr);
      // 自動入力（BtoBの取引先は自動入力しない）
      if(parsed.category&&categories.includes(parsed.category)){setFCategory(parsed.category);setFSplits([{accountId:"",accountName:"",amount:"",amountDisplay:"",search:""}]);setFAmazonSplits([{region:"USA",amount:"",amountDisplay:""}])}
      if(parsed.purchase_location)setFPurchaseLocation(parsed.purchase_location);
      if(parsed.product)setFProduct(parsed.product);
      if(parsed.amount){const a=String(Math.round(Number(parsed.amount)));setFAmount(a);setFAmountDisplay(Number(a).toLocaleString())}
      if(parsed.expense_date)setFExpenseDate(parsed.expense_date);
      if(parsed.tax_category)setFTaxCategory(parsed.tax_category);
      setOcrStatus("読取完了！ 内容を確認してください");
    }catch(e){
      console.error("OCR error:",e);
      setOcrStatus("読取エラー: "+e.message);
    }finally{
      setOcrLoading(false);
      setTimeout(()=>setOcrStatus(""),5000);
    }
  };

  const formatAmt=(val)=>{const num=val.replace(/[^0-9]/g,"");setFAmount(num);setFAmountDisplay(num?Number(num).toLocaleString():"")};
  const formatSplitAmt=(val)=>{const num=val.replace(/[^0-9]/g,"");return{amount:num,amountDisplay:num?Number(num).toLocaleString():""}};

  const loadExpenses=useCallback(async()=>{
    if(!client)return;
    const{data}=await client.from("expenses").select("*").order("created_at",{ascending:false});
    if(data)setExpenses(data);
    const{data:cs}=await client.from("company_settings").select("*").eq("key","expense_categories");
    if(cs&&cs[0]&&cs[0].value){try{const arr=JSON.parse(cs[0].value);if(Array.isArray(arr))setCategories(arr)}catch(e){}}
    setLoading(false);
  },[client]);
  useEffect(()=>{loadExpenses()},[loadExpenses]);

  const saveCategories=async(cats)=>{
    setCategories(cats);
    const val=JSON.stringify(cats);
    const{data:existing}=await client.from("company_settings").select("id").eq("key","expense_categories").limit(1);
    if(existing&&existing.length>0){await client.from("company_settings").update({value:val}).eq("id",existing[0].id)}
    else{await client.from("company_settings").insert({key:"expense_categories",value:val})}
  };

  const handleReceipt=(file)=>{
    if(!file)return;setFReceipt(file);
    if(file.type?.startsWith("image/")){const r=new FileReader();r.onload=e=>setFReceiptPreview(e.target.result);r.readAsDataURL(file)}
    else if(file.type==="application/pdf"){setFReceiptPreview("pdf")}
    else{setFReceiptPreview(null)}
    // OCR自動読取
    runReceiptOCR(file);
  };

  const TAX_CATEGORIES=["課税10%","課税8%（軽減）","非課税","不課税","免税","対象外"];

  const resetForm=()=>{
    setFCategory("BtoB");setFProduct("");setFMethod("Amex");setFCustomMethod("");setFCustomCategory("");
    setFAmount("");setFAmountDisplay("");setFReceipt(null);setFReceiptPreview(null);
    setFMemo("");setFPurchaseLocation("");setFTaxCategory("課税10%");setFErr("");setEditTarget(null);
    const n=new Date();setFExpenseDate(n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0"));
    setFSplits([{accountId:"",accountName:"",amount:"",amountDisplay:"",search:""}]);
    setFAmazonSplits([{region:"USA",amount:"",amountDisplay:""}]);
  };

  const openForm=(expense)=>{
    resetForm();
    if(expense){
      setEditTarget(expense);
      if(categories.includes(expense.category)){setFCategory(expense.category)}else{setFCategory("その他");setFCustomCategory(expense.category||"")}
      setFProduct(expense.product||"");
      setFMethod(METHODS.includes(expense.method)?expense.method:"その他");
      if(!METHODS.includes(expense.method))setFCustomMethod(expense.method||"");
      setFAmount(String(expense.amount||""));
      setFAmountDisplay(expense.amount?Number(expense.amount).toLocaleString():"");
      setFMemo(expense.memo||"");
      setFPurchaseLocation(expense.purchase_location||"");
      setFExpenseDate(expense.expense_date||"");
      setFTaxCategory(expense.tax_category||"課税10%");
      // Load splits
      (async()=>{
        const{data:items}=await client.from("expense_items").select("*").eq("expense_id",expense.id).order("sort_order");
        if(items&&items.length>0){
          if(expense.category==="BtoB"){
            setFSplits(items.map(it=>({accountId:it.account_id||"",accountName:it.vendor||"",amount:String(it.amount||""),amountDisplay:it.amount?Number(it.amount).toLocaleString():"",search:it.vendor||""})));
          } else if(expense.category==="Amazon"){
            setFAmazonSplits(items.map(it=>({region:it.vendor||"USA",amount:String(it.amount||""),amountDisplay:it.amount?Number(it.amount).toLocaleString():""})));
          }
        }
      })();
    }
    setShowForm(true);
  };

  const submit=async()=>{
    if(!fExpenseDate){setFErr("発生日を入力してください");return}
    if(!fPurchaseLocation.trim()){setFErr("購入先を入力してください");return}
    if(!fProduct.trim()){setFErr("商品を入力してください");return}
    if(!fAmount||Number(fAmount)<=0){setFErr("金額を正しく入力してください");return}
    // Validate BtoB splits
    if(fCategory==="BtoB"){
      for(let i=0;i<fSplits.length;i++){
        if(!fSplits[i].accountId&&!fSplits[i].accountName){setFErr("取引先"+(i+1)+"を選択してください");return}
      }
      if(fSplits.length>1){
        const splitTotal=fSplits.reduce((s,sp)=>s+(Number(sp.amount)||0),0);
        if(splitTotal!==Number(fAmount)){setFErr("内訳の合計（¥"+splitTotal.toLocaleString()+"）が合計金額（¥"+Number(fAmount).toLocaleString()+"）と一致しません");return}
      }
    }
    // Validate Amazon splits
    if(fCategory==="Amazon"&&fAmazonSplits.length>1){
      const splitTotal=fAmazonSplits.reduce((s,sp)=>s+(Number(sp.amount)||0),0);
      if(splitTotal!==Number(fAmount)){setFErr("内訳の合計（¥"+splitTotal.toLocaleString()+"）が合計金額（¥"+Number(fAmount).toLocaleString()+"）と一致しません");return}
    }
    setSaving(true);setFErr("");
    try{
      let receiptUrl=null,receiptName=null;
      if(fReceipt){
        const ext=fReceipt.name.split(".").pop();
        const fp="receipts/expenses/"+Date.now()+"_"+Math.random().toString(36).slice(2)+"."+ext;
        const{error:upErr}=await client.storage.from("chat-files").upload(fp,fReceipt);
        if(!upErr){const{data:u}=client.storage.from("chat-files").getPublicUrl(fp);receiptUrl=u?.publicUrl||null;receiptName=fReceipt.name}
      }
      const finalMethod=fMethod==="その他"?(fCustomMethod.trim()||"その他"):fMethod;
      const finalCategory=fCategory==="その他"?(fCustomCategory.trim()||"その他"):fCategory;
      // Build vendor string
      let vendorStr="";
      if(fCategory==="BtoB"){
        vendorStr=fSplits.map(sp=>sp.accountName||"").filter(Boolean).join(", ");
      } else if(fCategory==="Amazon"){
        vendorStr=fAmazonSplits.length>1?fAmazonSplits.map(sp=>"Amazon "+sp.region).join(", "):"Amazon";
      } else {
        vendorStr=finalCategory;
      }

      if(editTarget){
        const updates={category:finalCategory,vendor:vendorStr,product:fProduct.trim(),method:finalMethod,amount:Number(fAmount),memo:fMemo.trim()||null,purchase_location:fPurchaseLocation.trim()||null,expense_date:fExpenseDate||null,tax_category:fTaxCategory||null};
        if(receiptUrl){updates.receipt_url=receiptUrl;updates.receipt_name=receiptName}
        const{error:e1}=await client.from("expenses").update(updates).eq("id",editTarget.id);
        if(e1)throw e1;
        // Replace items
        const{error:e2}=await client.from("expense_items").delete().eq("expense_id",editTarget.id);
        if(e2)throw e2;
        const itemRows=buildItemRows(editTarget.id);
        if(itemRows.length>0){
          const{error:e3}=await client.from("expense_items").insert(itemRows);
          if(e3)throw e3;
        }
      } else {
        const expRow={user_id:user.id,category:finalCategory,vendor:vendorStr,product:fProduct.trim(),method:finalMethod,amount:Number(fAmount),memo:fMemo.trim()||null,receipt_url:receiptUrl,receipt_name:receiptName,purchase_location:fPurchaseLocation.trim()||null,expense_date:fExpenseDate||null,tax_category:fTaxCategory||null};
        const{data:inserted}=await client.from("expenses").insert(expRow).select().single();
        if(inserted){
          const itemRows=buildItemRows(inserted.id);
          if(itemRows.length>0)await client.from("expense_items").insert(itemRows);
        }
      }
      setShowForm(false);resetForm();loadExpenses();
    }catch(e){setFErr(e.message)}finally{setSaving(false)}
  };

  const buildItemRows=(expenseId)=>{
    if(fCategory==="BtoB"&&fSplits.length>=1){
      return fSplits.map((sp,i)=>({
        expense_id:expenseId,category:"BtoB",vendor:sp.accountName,account_id:sp.accountId||null,
        product:fProduct.trim(),amount:fSplits.length===1?Number(fAmount):Number(sp.amount),sort_order:i
      }));
    }
    if(fCategory==="Amazon"&&fAmazonSplits.length>1){
      return fAmazonSplits.map((sp,i)=>({
        expense_id:expenseId,category:"Amazon",vendor:"Amazon "+sp.region,account_id:null,
        product:fProduct.trim(),amount:Number(sp.amount),sort_order:i
      }));
    }
    return[];
  };

  const deleteExpense=async(id)=>{
    await client.from("expenses").update({deleted_at:new Date().toISOString()}).eq("id",id);
    setDeleteTarget(null);loadExpenses();
  };

  const filtered=useMemo(()=>{
    return expenses.filter(e=>{
      if(e.deleted_at)return false;
      if(filterUser!=="all"&&e.user_id!==filterUser)return false;
      if(filterCategory!=="all"&&e.category!==filterCategory)return false;
      if(filterMonth){const d=new Date(e.created_at);const ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");if(ym!==filterMonth)return false}
      return true;
    });
  },[expenses,filterUser,filterCategory,filterMonth]);

  const listTotal=filtered.reduce((s,e)=>s+(e.amount||0),0);
  const getUserName=(uid)=>{const u=allUsers.find(x=>x.id===uid);return shortName(u)};
  const getUserInitial=(uid)=>{const n=getUserName(uid);return(n||"?").charAt(0).toUpperCase()};

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:6,padding:"8px 10px",fontSize:IS_MOBILE?16:13,outline:"none",fontFamily:"inherit",background:"#fff",boxSizing:"border-box"};
  const L={display:"block",fontSize:10.5,fontWeight:600,color:T.muted,marginBottom:3,marginTop:10};

  // ── BtoB Account Search ──
  const AcctSearch=({split,idx})=>{
    const[q,setQ]=useState(split.search||split.accountName||"");
    const[open,setOpen]=useState(false);
    const ref=useRef(null);
    const accts=(accounts||[]).filter(a=>!a.deleted_at);
    const matches=q.trim()?accts.filter(a=>(a.name||"").toLowerCase().includes(q.toLowerCase())).slice(0,8):accts.slice(0,8);
    useEffect(()=>{
      const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
      document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
    },[]);
    const select=(a)=>{
      setFSplits(prev=>{const n=[...prev];n[idx]={...n[idx],accountId:a.id,accountName:a.name,search:a.name};return n});
      setQ(a.name);setOpen(false);
    };
    return(
      <div ref={ref} style={{position:"relative",flex:1}}>
        <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);if(!e.target.value){setFSplits(prev=>{const n=[...prev];n[idx]={...n[idx],accountId:"",accountName:"",search:""};return n})}}}
          onFocus={()=>setOpen(true)} placeholder="取引先を検索..." style={{...I,paddingRight:24}}/>
        {split.accountId&&<button onClick={()=>{setQ("");setFSplits(prev=>{const n=[...prev];n[idx]={...n[idx],accountId:"",accountName:"",search:""};return n})}} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14}}>×</button>}
        {open&&matches.length>0&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:`1px solid ${T.border}`,borderRadius:6,boxShadow:"0 4px 16px rgba(0,0,0,.1)",zIndex:50,maxHeight:180,overflowY:"auto",marginTop:2}}>
            {matches.map(a=>(
              <div key={a.id} onClick={()=>select(a)}
                style={{padding:"7px 10px",fontSize:12,cursor:"pointer",borderBottom:`1px solid ${T.borderLight}`}}
                onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{fontWeight:600,color:T.primary}}>{a.name}</span>
                {a.country&&<span style={{fontSize:10,color:T.muted,marginLeft:6}}>{a.country}</span>}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  // ── Split row for BtoB ──
  const renderBtoBSplit=(sp,idx)=>(
    <div key={idx} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
      <AcctSearch split={sp} idx={idx}/>
      {fSplits.length>1&&<input value={sp.amountDisplay} onChange={e=>{const{amount,amountDisplay}=formatSplitAmt(e.target.value);setFSplits(prev=>{const n=[...prev];n[idx]={...n[idx],amount,amountDisplay};return n})}} placeholder="¥" style={{...I,width:100,flex:"none",fontWeight:700,textAlign:"right"}} inputMode="numeric"/>}
      {fSplits.length>1&&<button onClick={()=>setFSplits(prev=>prev.filter((_,i)=>i!==idx))} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14,padding:"0 2px",flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color=T.red} onMouseLeave={e=>e.currentTarget.style.color=T.muted}>×</button>}
    </div>
  );

  // ── Split row for Amazon ──
  const renderAmazonSplit=(sp,idx)=>(
    <div key={idx} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
      <select value={sp.region} onChange={e=>{setFAmazonSplits(prev=>{const n=[...prev];n[idx]={...n[idx],region:e.target.value};return n})}} style={{...I,flex:1}}>
        {AMAZON_REGIONS.map(r=>(<option key={r} value={r}>{r}</option>))}
      </select>
      {fAmazonSplits.length>1&&<input value={sp.amountDisplay} onChange={e=>{const{amount,amountDisplay}=formatSplitAmt(e.target.value);setFAmazonSplits(prev=>{const n=[...prev];n[idx]={...n[idx],amount,amountDisplay};return n})}} placeholder="¥" style={{...I,width:100,flex:"none",fontWeight:700,textAlign:"right"}} inputMode="numeric"/>}
      {fAmazonSplits.length>1&&<button onClick={()=>setFAmazonSplits(prev=>prev.filter((_,i)=>i!==idx))} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14,padding:"0 2px",flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color=T.red} onMouseLeave={e=>e.currentTarget.style.color=T.muted}>×</button>}
    </div>
  );

  return(<div style={{flex:1,display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    {/* Header */}
    <div style={{padding:"10px 16px",borderBottom:`1px solid ${T.border}`,background:T.card,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:14,fontWeight:700,color:T.primary}}>経費管理</span>
        <span style={{fontSize:11,color:T.muted}}>{filtered.length}件</span>
        <span style={{fontSize:12,fontWeight:700,color:T.primary}}>¥{listTotal.toLocaleString()}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit"}}/>
        <select value={filterUser} onChange={e=>setFilterUser(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit",background:"#fff"}}>
          <option value="all">全員</option>
          {allUsers.map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
        </select>
        <select value={filterCategory} onChange={e=>setFilterCategory(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit",background:"#fff"}}>
          <option value="all">全カテゴリ</option>
          {categories.map(c=>(<option key={c} value={c}>{c}</option>))}
        </select>
        <button onClick={()=>{
          const hdrs=["発生日","報告日","カテゴリ","購入先","取引先","摘要（商品）","税区分","支払方法","金額（税込）","メモ","報告者","レシート"];
          const rows=filtered.map(e=>{const d=new Date(e.created_at);const expDate=e.expense_date?new Date(e.expense_date+"T00:00:00").toLocaleDateString("ja-JP"):d.toLocaleDateString("ja-JP");return[expDate,d.toLocaleDateString("ja-JP"),e.category||"",e.purchase_location||"",e.vendor||"",e.product||"",e.tax_category||"課税10%",e.method||"",e.amount||0,e.memo||"",getUserName(e.user_id),e.receipt_url?"あり":""]});
          exportCSV("経費精算_"+filterMonth+".csv",hdrs,rows);
        }} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:10,fontWeight:600,cursor:"pointer",background:T.card,color:T.sub,fontFamily:"inherit"}}>CSV</button>
        <button onClick={()=>openForm(null)} style={{padding:"5px 12px",borderRadius:6,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>+ 経費報告</button>
      </div>
    </div>

    {/* Expense List */}
    <div style={{flex:1,overflowY:"auto",padding:"8px 16px"}}>
      {loading&&<div style={{padding:40,textAlign:"center",color:T.muted}}>読み込み中...</div>}
      {!loading&&filtered.length===0&&<div style={{padding:40,textAlign:"center",color:T.muted,fontSize:12}}>経費報告がありません</div>}
      {filtered.map(e=>{
        const d=new Date(e.created_at);
        const dateStr=(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
        const isOwn=e.user_id===user.id;
        return(<div key={e.id} onClick={()=>{if(isOwn)openForm(e)}} style={{padding:"12px 14px",marginBottom:6,background:T.card,borderRadius:8,border:`1px solid ${T.borderLight}`,display:"flex",gap:10,alignItems:"flex-start",cursor:isOwn?"pointer":"default"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:T.primary,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{getUserInitial(e.user_id)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
              <span style={{fontSize:12,fontWeight:600,color:T.primary}}>{getUserName(e.user_id)}</span>
              <span style={{fontSize:10,color:T.muted}}>{e.expense_date?new Date(e.expense_date+"T00:00:00").toLocaleDateString("ja-JP"):dateStr}</span>
              <span style={{padding:"1px 6px",borderRadius:8,fontSize:9.5,fontWeight:600,background:"#f3f3f3",color:T.sub}}>{e.category||"その他"}</span>
              {e.tax_category&&<span style={{padding:"1px 6px",borderRadius:8,fontSize:9,fontWeight:500,background:"#eef2ff",color:"#4f46e5"}}>{e.tax_category}</span>}
            </div>
            {e.purchase_location&&<div style={{fontSize:12,color:T.primary,marginBottom:2,fontWeight:600}}>🏪 {e.purchase_location}</div>}
            {e.vendor&&e.vendor!==e.category&&<div style={{fontSize:11,color:T.sub,marginBottom:2}}>{e.vendor}</div>}
            <div style={{fontSize:12,color:T.sub,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%"}} title={e.product}>{e.product&&e.product.length>40?e.product.slice(0,40)+"…":e.product}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:15,fontWeight:700,color:T.primary}}>¥{(e.amount||0).toLocaleString()}</span>
              <span style={{fontSize:10,color:T.muted,background:"#f3f3f3",padding:"1px 6px",borderRadius:4}}>{e.method}</span>
              {e.receipt_url&&<a href={e.receipt_url} target="_blank" rel="noopener noreferrer" onClick={ev=>ev.stopPropagation()} style={{fontSize:10,color:T.accent,textDecoration:"none"}}>レシート</a>}
            </div>
            {e.memo&&<div style={{fontSize:11,color:T.muted,marginTop:3}}>{e.memo}</div>}
          </div>
          {isOwn&&<button onClick={ev=>{ev.stopPropagation();setDeleteTarget(e)}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:11,fontFamily:"inherit",padding:"2px 6px",borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color=T.red} onMouseLeave={e=>e.currentTarget.style.color=T.muted}>削除</button>}
        </div>);
      })}
    </div>

    {/* Form Modal */}
    {showForm&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:IS_MOBILE?"flex-end":"center",justifyContent:"center",zIndex:200}} onMouseDown={e=>{if(e.target===e.currentTarget){setShowForm(false);resetForm()}}}>
      <div style={{background:"#fff",borderRadius:IS_MOBILE?"16px 16px 0 0":10,padding:IS_MOBILE?"20px 20px 28px":"20px 24px",width:IS_MOBILE?"100%":"90%",maxWidth:IS_MOBILE?"none":440,maxHeight:IS_MOBILE?"90vh":"85vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(0,0,0,.12)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:14,fontWeight:700,color:T.primary}}>経費報告{editTarget?" (編集)":""}</span>
          <button onClick={()=>{setShowForm(false);resetForm()}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:T.muted}}>×</button>
        </div>

        {/* Receipt */}
        <label style={{...L,marginTop:0}}>レシート添付（任意）</label>
        <input type="file" ref={receiptRef} accept="image/*,.pdf" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(f)handleReceipt(f);e.target.value=""}}/>
        {!fReceipt&&!editTarget?.receipt_url?<div style={{border:`2px dashed ${dragOver?"#f59e0b":T.border}`,borderRadius:8,padding:IS_MOBILE?"14px":"10px",textAlign:"center",cursor:"pointer",background:dragOver?"#fffbeb":"#fafafa"}}
          onClick={()=>receiptRef.current?.click()}
          onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files?.[0];if(f)handleReceipt(f)}}>
          <div style={{fontSize:IS_MOBILE?13:11,color:T.muted}}>{IS_MOBILE?"タップして撮影 or 選択":"クリック or ドラッグ&ドロップ"}</div>
        </div>
        :<div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:8}}>
          {fReceiptPreview==="pdf"?<div style={{width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",background:"#ef4444",borderRadius:4,color:"#fff",fontSize:10,fontWeight:700}}>PDF</div>
           :fReceiptPreview?<img src={fReceiptPreview} style={{width:36,height:36,objectFit:"cover",borderRadius:4}}/>
           :editTarget?.receipt_url&&editTarget.receipt_url.match(/\.(jpg|jpeg|png|gif|webp)$/i)?<img src={editTarget.receipt_url} style={{width:36,height:36,objectFit:"cover",borderRadius:4}}/>:null}
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:600,color:T.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fReceipt?fReceipt.name:editTarget?.receipt_name||"レシート"}</div>{fReceipt&&<div style={{fontSize:10,color:T.muted}}>{(fReceipt.size/1024).toFixed(0)} KB</div>}</div>
          <button onClick={()=>{setFReceipt(null);setFReceiptPreview(null)}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14}}>×</button>
        </div>}

        {/* OCR Status */}
        {(ocrLoading||ocrStatus)&&(
          <div style={{marginTop:6,padding:"6px 10px",borderRadius:6,fontSize:11,fontWeight:600,background:ocrLoading?"#eef2ff":ocrStatus.includes("エラー")?"#fef2f2":"#ecfdf5",color:ocrLoading?"#4f46e5":ocrStatus.includes("エラー")?"#dc2626":"#059669",display:"flex",alignItems:"center",gap:6}}>
            {ocrLoading&&<span style={{display:"inline-block",width:12,height:12,border:"2px solid #4f46e5",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}
            <span>{ocrStatus}</span>
          </div>
        )}

        {/* Category */}
        <label style={L}>カテゴリ *</label>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {categories.map(c=>(<button key={c} onClick={()=>{setFCategory(c);if(c!=="その他")setFCustomCategory("");setFSplits([{accountId:"",accountName:"",amount:"",amountDisplay:"",search:""}]);setFAmazonSplits([{region:"USA",amount:"",amountDisplay:""}])}} style={{padding:"4px 10px",borderRadius:12,border:fCategory===c?`1.5px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:fCategory===c?600:400,cursor:"pointer",background:fCategory===c?T.primary:"#fff",color:fCategory===c?"#fff":T.sub,fontFamily:"inherit"}}>{c}</button>))}
        </div>
        {fCategory==="その他"&&(<input value={fCustomCategory} onChange={e=>setFCustomCategory(e.target.value)} placeholder="カテゴリ名を入力..." style={{...I,marginTop:4}}/>)}

        {/* BtoB: vendor search + splits */}
        {fCategory==="BtoB"&&(<>
          <label style={L}>取引先 *</label>
          {fSplits.map((sp,i)=>renderBtoBSplit(sp,i))}
          <button onClick={()=>setFSplits(prev=>[...prev,{accountId:"",accountName:"",amount:"",amountDisplay:"",search:""}])} style={{fontSize:10.5,color:T.accent,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:600,padding:"2px 0",marginTop:2}}>+ 取引先を追加（複数社の場合）</button>
          {fSplits.length>1&&<div style={{fontSize:10,color:T.muted,marginTop:2}}>※ 各取引先の金額内訳を入力してください（合計と一致させる必要があります）</div>}
        </>)}

        {/* Amazon: region splits */}
        {fCategory==="Amazon"&&(<>
          <label style={L}>地域</label>
          {fAmazonSplits.map((sp,i)=>renderAmazonSplit(sp,i))}
          <button onClick={()=>setFAmazonSplits(prev=>[...prev,{region:"USA",amount:"",amountDisplay:""}])} style={{fontSize:10.5,color:T.accent,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:600,padding:"2px 0",marginTop:2}}>+ 地域を追加（複数地域の場合）</button>
          {fAmazonSplits.length>1&&<div style={{fontSize:10,color:T.muted,marginTop:2}}>※ 各地域の金額内訳を入力してください（合計と一致させる必要があります）</div>}
        </>)}

        {/* Expense Date */}
        <label style={L}>発生日 *</label>
        <input type="date" value={fExpenseDate} onChange={e=>setFExpenseDate(e.target.value)} style={I}/>

        {/* Purchase Location */}
        <label style={L}>購入先（店名・サイト名） *</label>
        <input value={fPurchaseLocation} onChange={e=>setFPurchaseLocation(e.target.value)} placeholder="例: ビックカメラ梅田店、Amazon.co.jp、セブンイレブン" style={I}/>

        {/* Product */}
        <label style={L}>商品 *</label>
        <input value={fProduct} onChange={e=>setFProduct(e.target.value)} placeholder="備品、交通費 etc." style={I}/>

        {/* Payment Method */}
        <label style={L}>支払方法</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {METHODS.map(m=>(<button key={m} onClick={()=>setFMethod(m)} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:fMethod===m?600:400,border:fMethod===m?`1.5px solid ${T.primary}`:`1px solid ${T.border}`,background:fMethod===m?T.primary+"10":"#fff",color:fMethod===m?T.primary:T.sub,cursor:"pointer",fontFamily:"inherit"}}>{m}</button>))}
        </div>
        {fMethod==="その他"&&<input value={fCustomMethod} onChange={e=>setFCustomMethod(e.target.value)} placeholder="支払方法を入力..." style={{...I,marginTop:4}}/>}

        {/* Amount */}
        <label style={L}>金額 (円) *</label>
        <input value={fAmountDisplay} onChange={e=>formatAmt(e.target.value)} placeholder="1,000" style={{...I,fontSize:IS_MOBILE?18:15,fontWeight:700}} inputMode="numeric"/>

        {/* Tax Category */}
        <label style={L}>税区分</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {TAX_CATEGORIES.map(tc=>(<button key={tc} onClick={()=>setFTaxCategory(tc)} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:fTaxCategory===tc?600:400,border:fTaxCategory===tc?`1.5px solid ${T.primary}`:`1px solid ${T.border}`,background:fTaxCategory===tc?T.primary+"10":"#fff",color:fTaxCategory===tc?T.primary:T.sub,cursor:"pointer",fontFamily:"inherit"}}>{tc}</button>))}
        </div>

        {/* Memo */}
        <label style={L}>メモ（任意）</label>
        <input value={fMemo} onChange={e=>setFMemo(e.target.value)} placeholder="補足メモ..." style={I}/>

        {fErr&&<div style={{fontSize:11,color:T.red,marginTop:6}}>{fErr}</div>}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={()=>{setShowForm(false);resetForm()}} style={{flex:1,padding:IS_MOBILE?"12px":"8px",border:"none",borderRadius:6,fontSize:IS_MOBILE?14:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:"#f3f3f3",color:T.sub}}>キャンセル</button>
          <button onClick={submit} disabled={saving} style={{flex:1,padding:IS_MOBILE?"12px":"8px",border:"none",borderRadius:6,fontSize:IS_MOBILE?14:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:T.primary,color:"#fff",opacity:saving?0.5:1}}>{saving?"送信中...":(editTarget?"更新する":"報告する")}</button>
        </div>
      </div>
    </div>)}

    {/* Delete confirm */}
    {deleteTarget&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
      <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:340,boxShadow:"0 12px 40px rgba(0,0,0,.12)"}}>
        <div style={{fontSize:13,fontWeight:700,color:T.primary,marginBottom:8}}>経費報告を削除しますか？</div>
        <div style={{fontSize:12,color:T.sub,marginBottom:4}}>{deleteTarget.vendor} — {deleteTarget.product}</div>
        <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:12}}>¥{(deleteTarget.amount||0).toLocaleString()}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setDeleteTarget(null)} style={{flex:1,padding:"7px",border:"none",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:"#f3f3f3",color:T.sub}}>キャンセル</button>
          <button onClick={()=>deleteExpense(deleteTarget.id)} style={{flex:1,padding:"7px",border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:T.red,color:"#fff"}}>削除</button>
        </div>
      </div>
    </div>)}
  </div>);
}

function DealForm({client,user,accounts,deal,allUsers,deals,categories,onClose,onSaved,currentBiz}){
  const toast=useToast();
  const isEdit=!!deal?.id;
  const[accountId,setAccountId]=useState(deal?.account_id||"");
  const[amount,setAmount]=useState(deal?.amount||"");
  const[amountDisplay,setAmountDisplay]=useState(deal?.amount?Number(deal.amount).toLocaleString():"");
  const[confidence,setConfidence]=useState(deal?.confidence||50);
  const[shipping,setShipping]=useState(deal?.shipping_type||"");
  const[incoterms,setIncoterms]=useState(deal?.incoterms||"");
  const[incotermsOther,setIncotermsOther]=useState("");
  const[paymentStatus,setPaymentStatus]=useState(deal?.payment_status||"none");
  // supplier_paid is managed only in deal detail view
  const[notes,setNotes]=useState(deal?.notes||"");
  const[shippingDate,setShippingDate]=useState(deal?.shipping_date||"");
  const[stage,setStage]=useState(deal?.stage||"negotiation");
  const[ownerId,setOwnerId]=useState(deal?.owner_id||user.id);
  const[prepaymentPercent,setPrepaymentPercent]=useState(deal?.prepayment_percent||0);
  const[paymentConfirmedDate,setPaymentConfirmedDate]=useState(deal?.payment_confirmed_date||"");
  const[spreadsheetUrl,setSpreadsheetUrl]=useState(deal?.spreadsheet_url||"");
  const[paymentTerms,setPaymentTerms]=useState(deal?.payment_terms||"");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");

  const[acctSearch,setAcctSearch]=useState(deal?.account_id?accounts.find(a=>a.id===deal.account_id)?.name||"":"");
  const[showAcctDropdown,setShowAcctDropdown]=useState(false);
  const acctDropdownRef=useRef(null);
  const filteredAccts=accounts.filter(a=>!acctSearch||a.name.toLowerCase().includes(acctSearch.toLowerCase()));
  const[showInlineAcct,setShowInlineAcct]=useState(false);
  const[newAcctName,setNewAcctName]=useState("");
  const[newAcctCountry,setNewAcctCountry]=useState("");
  const[newAcctCategoryIds,setNewAcctCategoryIds]=useState([]);
  const[newAcctWebsite,setNewAcctWebsite]=useState("");
  const[newCtName,setNewCtName]=useState("");
  const[newCtEmail,setNewCtEmail]=useState("");
  const[newCtPhone,setNewCtPhone]=useState("");
  const[newCtRole,setNewCtRole]=useState("");
  const[savingAcct,setSavingAcct]=useState(false);
  const[acctErr,setAcctErr]=useState("");
  const saveNewAcct=async()=>{
    if(!newAcctName.trim()){setAcctErr("会社名を入力してください");return}
    setSavingAcct(true);setAcctErr("");
    try{
        const row={name:stripCorp(newAcctName.trim()),business_id:currentBiz||"jbeauty",country:newAcctCountry||null,website:newAcctWebsite||null,owner_id:user.id,created_by:user.id,updated_at:new Date().toISOString()};
      const{data:ins,error:ie}=await client.from("sales_accounts").insert(row).select();
      if(ie)throw ie;
      if(ins&&ins[0]){setAccountId(ins[0].id);setAcctSearch(ins[0].name);accounts.push(ins[0]);
        if(newCtName.trim()){try{await client.from("sales_contacts").insert({account_id:ins[0].id,name:newCtName.trim(),email:newCtEmail.trim()||null,phone:newCtPhone.trim()||null,role:newCtRole.trim()||null,business_id:currentBiz||"jbeauty",owner_id:user.id,created_by:user.id,updated_at:new Date().toISOString()})}catch(ce){console.warn("contact create err",ce);toast("コンタクト登録に失敗しました")}}}
      setShowInlineAcct(false);setNewAcctName("");setNewAcctCountry("");setNewAcctCategoryIds([]);setNewAcctWebsite("");setNewCtName("");setNewCtEmail("");setNewCtPhone("");setNewCtRole("");
    }catch(e){setAcctErr(e.message)}
    setSavingAcct(false);
  };
  useEffect(()=>{
    const handler=(e)=>{if(acctDropdownRef.current&&!acctDropdownRef.current.contains(e.target))setShowAcctDropdown(false)};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};
  const L={display:"block",fontSize:10.5,fontWeight:600,color:"#999",marginBottom:3,marginTop:8};

  const handleAmountChange=(val)=>{
    const num=val.replace(/[^0-9]/g,"");
    setAmount(num);
    setAmountDisplay(num?Number(num).toLocaleString():"");
  };

  const save=async()=>{
    if(!accountId){setErr("取引先を選択してください");return}
    setSaving(true);setErr("");
    try{
      const acct=accounts.find(a=>a.id===accountId);
      const shipLabel=SHIPPING[shipping]?.label||"";
      const finalIncoterms=incoterms==="Other"?incotermsOther:incoterms;

      if(isEdit){
        const{error:ue}=await client.from("sales_deals").update({
          account_id:accountId,amount:Number(amount)||0,confidence:Number(confidence)||50,
          shipping_type:shipping||null,incoterms:finalIncoterms||null,payment_status:Number(prepaymentPercent)>=100?"full":Number(prepaymentPercent)>0?"partial":"none",
          notes,shipping_date:shippingDate||null,stage,owner_id:ownerId,prepayment_percent:Number(prepaymentPercent)||0,
          payment_confirmed_date:paymentConfirmedDate||null,spreadsheet_url:spreadsheetUrl,payment_terms:paymentTerms||null,
          updated_at:new Date().toISOString(),updated_by:user.id
        }).eq("id",deal.id);
        if(ue)throw ue;
        // 変更フィールド記録
        const newDeal={account_id:accountId,amount:Number(amount)||0,confidence:Number(confidence)||50,shipping_type:shipping||null,incoterms:finalIncoterms||null,notes,shipping_date:shippingDate||null,stage,owner_id:ownerId,prepayment_percent:Number(prepaymentPercent)||0,payment_confirmed_date:paymentConfirmedDate||null,spreadsheet_url:spreadsheetUrl,payment_terms:paymentTerms||null};
        const changedDeal=diffFields(deal,newDeal,["amount","stage","confidence","shipping_type","incoterms","notes","shipping_date","owner_id","prepayment_percent","payment_confirmed_date","spreadsheet_url","payment_terms"]);
        if(changedDeal.length>0){try{await client.from("sales_activities").insert({deal_id:deal.id,account_id:deal.account_id,user_id:user.id,type:"note",content:"商談を編集: "+changedDeal.join(", ")})}catch(e){}}
        // 責任者変更時: 紐づくコンタクトのowner_idも自動更新
        if(deal.owner_id!==ownerId&&accountId){
          await client.from("sales_contacts").update({owner_id:ownerId,updated_by:user.id}).eq("account_id",accountId);
          // 取引先のowner_idも更新
          await client.from("sales_accounts").update({owner_id:ownerId,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",accountId);
        }
      }else{
        // Duplicate check
        const _similar=(deals||[]).find(d=>d.account_id===accountId&&Math.abs((Number(d.amount)||0)-(Number(amount)||0))<1000&&!d.deleted_at);
        if(_similar&&!confirm("同じ取引先に似た金額の商談が既にあります（¥"+(_similar.amount||0).toLocaleString()+"）。それでも作成しますか？")){setSaving(false);return}
        const now=new Date();
        const ym=`${String(now.getFullYear()).slice(2)}${String(now.getMonth()+1).padStart(2,'0')}`;
        const existingCount=deals?.filter(d=>d.account_id===accountId&&d.name?.includes(ym)).length||0;
        const seq=String(existingCount+1).padStart(2,'0');
        const dealName=`${stripCorp(acct?.name||"")} ${ym}-${seq}`;
        const today=new Date().toISOString().split('T')[0];
        const{error:ie}=await client.from("sales_deals").insert({
          deal_number:0,account_id:accountId,name:dealName,amount:Number(amount)||0,confidence:Number(confidence)||50,
          shipping_type:shipping||null,incoterms:finalIncoterms||null,stage:"negotiation",owner_id:user.id,created_by:user.id,
          deal_date:today,prepayment_percent:Number(prepaymentPercent)||0,
          business_id:currentBiz||"jbeauty",
          created_at:new Date().toISOString(),updated_at:new Date().toISOString()
        });
        if(ie)throw ie;
      }
      toast(isEdit?"商談を更新しました！":"商談を追加しました！👍");onSaved();onClose();
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",...getModalContainerStyle(),padding:"18px 20px",boxShadow:"0 12px 40px rgba(0,0,0,.12)",overflowY:"auto"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:4,color:T.primary}}>{isEdit?"商談を編集":"新規商談"}</div>
        {!isEdit&&<div style={{fontSize:10.5,color:T.muted,marginBottom:8}}>取引先を選ぶだけで基本情報が自動入力されます</div>}

        <label style={L}>取引先 *</label>
        <div style={{display:"flex",gap:6,alignItems:"flex-start"}}><div ref={acctDropdownRef} style={{position:"relative",flex:1}}>
          <input type="text" value={acctSearch} 
            onChange={e=>{setAcctSearch(e.target.value);setShowAcctDropdown(true);if(!e.target.value)setAccountId("")}}

            placeholder="取引先名を検索..." style={I}/>
          {showAcctDropdown&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,maxHeight:220,overflowY:"auto",background:"#fff",border:`1px solid ${T.border}`,borderRadius:5,boxShadow:"0 4px 12px rgba(0,0,0,.1)",zIndex:10,marginTop:2}}>
              {filteredAccts.map(a=>(
                <div key={a.id} onClick={()=>{setAccountId(a.id);setAcctSearch(a.name);setShowAcctDropdown(false);if(!isEdit&&a.owner_id)setOwnerId(a.owner_id)}}

                  <span>{countryToFlag(a.country)}</span>
                  <span style={{fontWeight:accountId===a.id?700:400,color:T.primary}}>{a.name}</span>
                </div>

              {!isEdit&&<div onClick={()=>{setShowAcctDropdown(false);setShowInlineAcct(true);setNewAcctName(acctSearch)}}
                style={{padding:"8px 10px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6,color:T.accent,fontWeight:600,borderTop:`1px solid ${T.border}`,background:"#fafafa",position:"sticky",bottom:0}}
                onMouseEnter={e=>e.currentTarget.style.background="#f0f7ff"} onMouseLeave={e=>e.currentTarget.style.background="#fafafa"}>
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" strokeWidth="1.3"/><path d="M8 5v6M5 8h6" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
                <span>新規取引先を作成</span>
              </div>}
            </div>
          )}
        </div>
        {!isEdit&&!showInlineAcct&&<button onClick={()=>{setShowAcctDropdown(false);setShowInlineAcct(true);setNewAcctName("")}} style={{padding:"6px 10px",borderRadius:5,border:`1px solid ${T.accent}`,fontSize:11,fontWeight:700,cursor:"pointer",background:"#fff",color:T.accent,fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>+ 新規</button>}
        </div>
        {showInlineAcct&&!isEdit&&(
          <div style={{marginTop:8,padding:12,background:"#f8f9fa",borderRadius:8,border:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:11.5,fontWeight:700,color:T.primary}}>新規取引先</span>
              <button onClick={()=>setShowInlineAcct(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:T.muted,fontFamily:"inherit"}}>×</button>
            </div>
            <label style={{...L,marginTop:0}}>会社名 *</label>
            <input value={newAcctName} onChange={e=>setNewAcctName(e.target.value)} placeholder="会社名を入力" style={I}/>
            <label style={L}>国</label>
            <CountryInput value={newAcctCountry} onChange={v=>setNewAcctCountry(v)} style={I}/>
            <label style={L}>Webサイト</label>
            <input value={newAcctWebsite} onChange={e=>setNewAcctWebsite(e.target.value)} placeholder="https://..." style={I}/>
            <div style={{marginTop:10,paddingTop:10,borderTop:`1px dashed ${T.border}`}}>
              <span style={{fontSize:11,fontWeight:700,color:T.sub}}>担当者（任意）</span>
              <input value={newCtName} onChange={e=>setNewCtName(e.target.value)} placeholder="担当者名" style={{...I,marginTop:6}}/>
              <input value={newCtRole} onChange={e=>setNewCtRole(e.target.value)} placeholder="役職" style={I}/>
              <input value={newCtEmail} onChange={e=>setNewCtEmail(e.target.value)} placeholder="メールアドレス" style={I}/>
              <PhoneInput value={newCtPhone} onChange={e=>setNewCtPhone(e.target.value)} country={newAcctCountry} style={I} placeholder="電話番号"/>
            </div>
            {acctErr&&<div style={{fontSize:10.5,color:T.red,marginTop:4}}>{acctErr}</div>}
            <button onClick={saveNewAcct} disabled={savingAcct} style={{marginTop:10,width:"100%",padding:"7px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:savingAcct?0.5:1}}>{savingAcct?"作成中...":"取引先を作成"}</button>
          </div>
        )}

        <label style={L}>予想取引金額</label>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:T.muted}}>¥</span>
          <input type="text" value={amountDisplay} onChange={e=>handleAmountChange(e.target.value)} placeholder="0" style={{...I,fontSize:13,fontWeight:600,paddingLeft:20}}/>
        </div>

        {(()=>{const sp=STAGES.find(s=>s.id===stage)?.phase;const isPost=sp==="post"||sp==="done";
          if(isPost){return(<>
            <label style={L}>入金状況</label>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <input type="range" min="0" max="100" step="10" value={prepaymentPercent} onChange={e=>setPrepaymentPercent(Number(e.target.value))} style={{flex:1,cursor:"pointer"}}/>
              <span style={{fontSize:12,fontWeight:700,color:T.primary,minWidth:30}}>{prepaymentPercent}%</span>
            </div>
            <div style={{width:"100%",height:4,background:"#e5e5e5",borderRadius:2,overflow:"hidden",marginBottom:8}}>
              <div style={{width:prepaymentPercent+"%",height:"100%",background:T.primary,transition:"width .3s"}}/>
            </div>
          </>)}
          return(<>
            <label style={L}>確度</label>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <input type="range" min="0" max="100" step="10" value={confidence} onChange={e=>setConfidence(Number(e.target.value))} style={{flex:1,cursor:"pointer"}}/>
              <span style={{fontSize:12,fontWeight:700,color:T.primary,minWidth:30}}>{confidence}%</span>
            </div>
            <div style={{width:"100%",height:4,background:"#e5e5e5",borderRadius:2,overflow:"hidden",marginBottom:8}}>
              <div style={{width:confidence+"%",height:"100%",background:T.primary,transition:"width .3s"}}/>
            </div>
          </>)
        })()}

        {isEdit&&(<>
        <label style={L}>配送種別（オプション）</label>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setShipping("")} style={{flex:1,padding:"6px",borderRadius:6,border:!shipping?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:!shipping?700:400,cursor:"pointer",background:!shipping?T.primary+"10":"#fff",color:!shipping?T.primary:T.sub,fontFamily:"inherit",textAlign:"center"}}>なし</button>
          {Object.entries(SHIPPING).map(([k,v])=>(<button key={k} onClick={()=>setShipping(k)} style={{flex:1,padding:"6px",borderRadius:6,border:shipping===k?`2px solid ${v.color}`:`1px solid ${T.border}`,fontSize:11,fontWeight:shipping===k?700:400,cursor:"pointer",background:shipping===k?v.color+"10":"#fff",color:shipping===k?v.color:T.sub,fontFamily:"inherit",textAlign:"center"}}>{v.label}</button>))}
        </div>

        <label style={L}>インコタームズ（オプション）</label>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={()=>{setIncoterms("");setIncotermsOther("")}} style={{padding:"5px 10px",borderRadius:5,border:!incoterms?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:!incoterms?700:400,cursor:"pointer",background:!incoterms?T.primary:"#fff",color:!incoterms?"#fff":T.sub,fontFamily:"inherit"}}>なし</button>
          {INCOTERMS_OPTIONS.map(opt=>(<button key={opt} onClick={()=>{setIncoterms(opt);if(opt!=="Other")setIncotermsOther("")}} style={{padding:"5px 10px",borderRadius:5,border:incoterms===opt?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:incoterms===opt?700:400,cursor:"pointer",background:incoterms===opt?T.primary:"#fff",color:incoterms===opt?"#fff":T.sub,fontFamily:"inherit"}}>{opt}</button>))}
        </div>
        {incoterms==="Other"&&<input type="text" value={incotermsOther} onChange={e=>setIncotermsOther(e.target.value)} placeholder="カスタムインコタームズ" style={{...I,marginTop:4}}/>}
          <label style={L}>入金日</label>
          <input type="date" value={paymentConfirmedDate} onChange={e=>setPaymentConfirmedDate(e.target.value)} style={I}/>

          <label style={L}>配送日</label>
          <input type="date" value={shippingDate} onChange={e=>setShippingDate(e.target.value)} style={I}/>

          <label style={L}>ステージ</label>
          <select value={stage} onChange={e=>setStage(e.target.value)} style={{...I,background:"#fff"}}>
            {STAGES.map(s=>(<option key={s.id} value={s.id}>{s.ja}</option>))}
          </select>

          <label style={L}>商談担当者</label>
          <select value={ownerId} onChange={e=>setOwnerId(e.target.value)} style={{...I,background:"#fff"}}>
            {(allUsers||[]).map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
          </select>

          <label style={L}>スプレッドシートURL</label>
          <input type="text" value={spreadsheetUrl} onChange={e=>setSpreadsheetUrl(e.target.value)} placeholder="https://docs.google.com/spreadsheets/..." style={I}/>

          <label style={L}>支払い条件</label>
          <input type="text" value={paymentTerms} onChange={e=>setPaymentTerms(e.target.value)} placeholder="例: 納品前に写真を提供して振り込み" style={I}/>

          <label style={L}>メモ</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} placeholder="特記事項..." style={{...I,lineHeight:1.4}}/>
        </>)}

        {err&&<div style={{fontSize:11,color:T.red,marginTop:6}}>{err}</div>}
        <div style={{display:"flex",gap:6,marginTop:14,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>キャンセル</button>
          <button onClick={save} disabled={saving} style={{padding:"5px 14px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving?0.5:1}}>{saving?"保存中...":isEdit?"更新":"作成"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Account Form Modal ──
function AccountForm({client,user,account,accounts:existingAccounts,categories,allUsers,onClose,onSaved,currentBiz}){
  const toast=useToast();
  const isEdit=!!account?.id;
  const[name,setName]=useState(account?.name||"");
  const[website,setWebsite]=useState(account?.website||"");
  const[country,setCountry]=useState(account?.country||"");
  const[addrBill,setAddrBill]=useState(account?.address_billing||"");
  const[shippingAddrs,setShippingAddrs]=useState(Array.isArray(account?.address_shipping)?account.address_shipping:(account?.address_shipping?[account.address_shipping]:[]))
  const PAY_PRESETS=["前払い100%","前払い50%","前払い30%"];
  const initPT=account?.payment_terms||"";
  const[payTermsMode,setPayTermsMode]=useState(PAY_PRESETS.includes(initPT)?initPT:initPT?"other":"");
  const[payTermsCustom,setPayTermsCustom]=useState(PAY_PRESETS.includes(initPT)?"":initPT);
  const payTerms=payTermsMode==="other"?payTermsCustom:payTermsMode;
  const[notes,setNotes]=useState(account?.notes||"");
  const[categoryIds,setCategoryIds]=useState(account?.category_ids||[]);
  const[ownerId,setOwnerId]=useState(account?.owner_id||user.id);
  const[leadSource,setLeadSource]=useState(account?.lead_source||"");
  const[leadSourceOther,setLeadSourceOther]=useState(account?.lead_source&&!["JBW","LinkedIn","WhatsApp","メール"].includes(account?.lead_source)?account.lead_source:"");
  const[saving,setSaving]=useState(false);const[err,setErr]=useState("");
  const[ctName,setCtName]=useState("");
  const[ctRole,setCtRole]=useState("");
  const[ctEmail,setCtEmail]=useState("");
  const[ctPhone,setCtPhone]=useState("");
  const[ctPhoneCountry,setCtPhoneCountry]=useState("");
  const[ctWhatsapp,setCtWhatsapp]=useState("");
  const[ctLinkedin,setCtLinkedin]=useState("");
  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};
  const L={display:"block",fontSize:10.5,fontWeight:600,color:"#999",marginBottom:3,marginTop:8};

  const toggleCategory=(catId)=>{
    setCategoryIds(prev=>prev.includes(catId)?prev.filter(c=>c!==catId):[...prev,catId]);
  };

  const addShippingAddr=()=>{
    setShippingAddrs([...shippingAddrs,""]);
  };

  const removeShippingAddr=(idx)=>{
    setShippingAddrs(shippingAddrs.filter((_,i)=>i!==idx));
  };

  const save=async()=>{
    if(!name.trim()){setErr("会社名を入力");return}
    if(!isEdit){
      setSaving(true);setErr("");
      try{
        const{data:dupes}=await client.rpc("check_duplicate_account",{p_name:name.trim(),p_country:country||null});
        if(dupes&&dupes.length>0){
          const msg=dupes.map(d=>d.name+(d.country?" ("+d.country+")":"")).join("\n");
          if(!confirm("類似の取引先が見つかりました:\n"+msg+"\n\nそれでも追加しますか？")){setSaving(false);return}
        }
      }catch(e){
        // Fallback: local exact match check
        const dup=existingAccounts?.find(a=>a.name.toLowerCase().trim()===name.trim().toLowerCase());
        if(dup&&!confirm(`「${dup.name}」は既に登録されています。それでも追加しますか？`)){setSaving(false);return}
      }
    }else{
      setSaving(true);setErr("");
    }
    try{
      const finalLeadSource=leadSource==="その他"?leadSourceOther:leadSource;
      const row={name:stripCorp(name.trim()),business_id:currentBiz||"jbeauty",website:website||null,country:country||null,address_billing:addrBill||null,address_shipping:shippingAddrs.length>0?shippingAddrs:null,payment_terms:payTerms||null,notes:notes||null,owner_id:ownerId||null,lead_source:finalLeadSource||null,updated_at:new Date().toISOString()};
      if(isEdit){const{error:ue}=await client.from("sales_accounts").update(row).eq("id",account.id);if(ue)throw ue;const changedAcct=diffFields(account,row,["name","country","website","address_billing","address_shipping","payment_terms","notes","lead_source","owner_id"]);if(changedAcct.length>0){try{await client.from("sales_activities").insert({account_id:account.id,user_id:user.id,type:"note",content:"取引先を編集: "+changedAcct.join(", ")})}catch(e){}}}
      else{row.created_by=user.id;const{data:ins,error:ie}=await client.from("sales_accounts").insert(row).select();if(ie)throw ie;
        if(ins&&ins[0]&&ctName.trim()){try{await client.from("sales_contacts").insert({account_id:ins[0].id,name:ctName.trim(),role:ctRole.trim()||null,email:ctEmail.trim()||null,phone:ctPhone.trim()||null,whatsapp:ctWhatsapp.trim()||null,linkedin:ctLinkedin.trim()?normLinkedIn(ctLinkedin.trim()):null,business_id:currentBiz||"jbeauty",owner_id:user.id,created_by:user.id,updated_at:new Date().toISOString()})}catch(ce){console.warn("contact create err",ce);toast("コンタクト登録に失敗しました")}}}
      onSaved();onClose();
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",...getModalContainerStyle(),padding:"18px 20px",boxShadow:"0 12px 40px rgba(0,0,0,.12)",overflowY:"auto"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.primary}}>{isEdit?"取引先を編集":"新規取引先"}</div>
        <label style={L}>会社名 *</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Sleek Shop" style={I}/>
        <label style={L}>国</label><CountryInput value={country} onChange={v=>setCountry(v)} style={I}/>


        <label style={L}>流入経路</label>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {LEAD_SOURCES.map(ls=>(<button key={ls} onClick={()=>{setLeadSource(ls);if(ls!=="その他")setLeadSourceOther("")}} style={{padding:"5px 10px",borderRadius:5,border:leadSource===ls?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:leadSource===ls?700:400,cursor:"pointer",background:leadSource===ls?T.primary:"#fff",color:leadSource===ls?"#fff":T.sub,fontFamily:"inherit"}}>{ls}</button>))}
        </div>
        {leadSource==="その他"&&<input type="text" value={leadSourceOther} onChange={e=>setLeadSourceOther(e.target.value)} placeholder="その他の流入経路..." style={{...I,marginTop:4}}/>}

        {isEdit&&(<>
        <label style={L}>Webサイト</label><input value={website} onChange={e=>setWebsite(e.target.value)} placeholder="https://..." style={I}/>
        <label style={L}>住所（請求先）</label><input value={addrBill} onChange={e=>setAddrBill(e.target.value)} placeholder="14251 Chambers Rd, Tustin CA" style={I}/>

        <label style={L}>納入先住所</label>
        <div style={{marginBottom:8}}>
          {shippingAddrs.map((addr,idx)=>(<div key={idx} style={{display:"flex",gap:4,marginBottom:4,alignItems:"center"}}>
            <input value={addr} onChange={e=>{const newAddrs=[...shippingAddrs];newAddrs[idx]=e.target.value;setShippingAddrs(newAddrs)}} style={{...I,flex:1}} placeholder="住所"/>
            <button onClick={()=>removeShippingAddr(idx)} style={{padding:"5px 8px",borderRadius:4,border:`1px solid ${T.border}`,background:"#fff",color:T.red,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:11}}>×</button>
          </div>))}
          <button onClick={()=>addShippingAddr("")} style={{padding:"5px 10px",borderRadius:4,border:`1px solid ${T.border}`,background:"#fff",color:T.accent,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,width:"100%"}}>+ 追加</button>
        </div>

        <label style={L}>入金ターム</label>
        <div style={{display:"flex",gap:4,marginTop:2}}>
          {PAY_PRESETS.map(pt=>(<button key={pt} onClick={()=>{setPayTermsMode(pt);setPayTermsCustom("")}} style={{padding:"4px 8px",borderRadius:10,border:payTermsMode===pt?"none":`1px solid ${T.border}`,fontSize:10.5,fontWeight:payTermsMode===pt?600:400,cursor:"pointer",background:payTermsMode===pt?T.primary:"#fff",color:payTermsMode===pt?"#fff":T.sub,fontFamily:"inherit"}}>{pt}</button>))}
          <button onClick={()=>setPayTermsMode("other")} style={{padding:"4px 8px",borderRadius:10,border:payTermsMode==="other"?"none":`1px solid ${T.border}`,fontSize:10.5,fontWeight:payTermsMode==="other"?600:400,cursor:"pointer",background:payTermsMode==="other"?T.primary:"#fff",color:payTermsMode==="other"?"#fff":T.sub,fontFamily:"inherit"}}>その他</button>
        </div>
        {payTermsMode==="other"&&<input value={payTermsCustom} onChange={e=>setPayTermsCustom(e.target.value)} placeholder="カスタム入金条件..." style={{...I,marginTop:4}}/>}

        <label style={L}>GS責任者</label>
        <select value={ownerId} onChange={e=>setOwnerId(e.target.value)} style={{...I,background:"#fff"}}>
          {(allUsers||[]).map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
        </select>
        </>)}

        {!isEdit&&(
          <div style={{marginTop:12,paddingTop:10,borderTop:`1px dashed ${T.border}`}}>
            <div style={{fontSize:11.5,fontWeight:700,color:T.sub,marginBottom:6}}>担当者（任意）</div>
            <label style={{...L,marginTop:0}}>担当者名</label>
            <input value={ctName} onChange={e=>setCtName(e.target.value)} placeholder="担当者名" style={I}/>
            <label style={L}>役職</label>
            <input value={ctRole} onChange={e=>setCtRole(e.target.value)} placeholder="役職" style={I}/>
            <label style={L}>メールアドレス</label>
            <input value={ctEmail} onChange={e=>setCtEmail(e.target.value)} placeholder="メールアドレス" style={I}/>
            <label style={L}>電話番号</label>

// LinkedIn URL正規化
const normLinkedIn=(v)=>{if(!v)return'';v=v.trim();if(v.startsWith('http'))return v;if(v.startsWith('linkedin.com'))return'https://'+v;if(v.startsWith('www.linkedin.com'))return'https://'+v;return'https://linkedin.com/in/'+v.replace(/^@/,'')};

function ContactFormModal({client,user,accounts,contact,onClose,onSaved,currentBiz}){
  const toast=useToast();
  const isEdit=!!contact?.id;
  const[accountId,setAccountId]=useState(contact?.account_id||"");
  const[cName,setCName]=useState(contact?.name||"");
  const[cRole,setCRole]=useState(contact?.role||"");
  const[cEmail,setCEmail]=useState(contact?.email||"");
  const[cPhone,setCPhone]=useState(contact?.phone||"");
  const[cWhatsapp,setCWhatsapp]=useState(contact?.whatsapp||"");
  const[cLinkedin,setCLinkedin]=useState(contact?.linkedin||"");
  const[cNotes,setCNotes]=useState(contact?.notes||"");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");

  const I={width:"100%",padding:"6px 10px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:12,fontFamily:"inherit",outline:"none",background:"#fff"};

  const selAcct=accounts.find(a=>a.id===accountId);
  const acctCountry=selAcct?.country||"";

  const save=async()=>{
    if(!cName.trim()){setErr("氏名を入力してください");return}
    if(!accountId){setErr("取引先を選択してください");return}
    if(cPhone){const{valid,error:phoneErr}=validatePhoneDigits(cPhone);if(!valid){setErr(phoneErr);return}}
    setSaving(true);setErr("");
    const fLinkedin=cLinkedin?normLinkedIn(cLinkedin):null;
    const row={account_id:accountId||null,name:cName.trim(),role:cRole||null,email:cEmail||null,phone:cPhone||null,whatsapp:cWhatsapp||null,linkedin:fLinkedin||null,notes:cNotes||null,business_id:selAcct?.business_id||currentBiz||"jbeauty"};
    if(selAcct?.owner_id)row.owner_id=selAcct.owner_id;
    const tryOp=async(op)=>{
      let res=await op(row);
      if(res.error&&res.error.message){
        const badCols=["owner_id","notes"];
        for(const col of badCols){if(res.error.message.includes(col)){delete row[col];res=await op(row);if(!res.error)break;}}
      }
      return res;
    };
    if(isEdit){
      const{error:ue}=await tryOp(r=>client.from("sales_contacts").update(r).eq("id",contact.id));
      if(ue){setErr(ue.message);setSaving(false);return}
      const changedContact=diffFields(contact,row,["name","role","email","phone","whatsapp","linkedin","notes"]);
      if(changedContact.length>0){try{await client.from("sales_activities").insert({account_id:contact.account_id,user_id:user.id,type:"note",content:"コンタクトを編集: "+changedContact.join(", ")})}catch(e){}}
    }else{
      const{error:ie}=await tryOp(r=>client.from("sales_contacts").insert(r));
      if(ie){setErr(ie.message);setSaving(false);return}
    }
    onSaved();onClose();
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",borderRadius:12,padding:"20px 24px",width:420,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.15)"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:T.primary}}>{isEdit?"コンタクトを編集":"新規コンタクト"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>取引先 *</label>
            <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{...I,background:"#fff"}}>
              <option value="">選択してください</option>
              {accounts.map(a=>(<option key={a.id} value={a.id}>{countryToFlag(a.country)} {a.name}</option>))}
            </select>
            {selAcct&&<div style={{fontSize:10,color:T.muted,marginTop:2}}>{[selAcct.country,selAcct.website].filter(Boolean).join(" · ")}</div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>氏名 *</label><input value={cName} onChange={e=>setCName(e.target.value)} style={I} placeholder="山田太郎"/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>役職</label><input value={cRole} onChange={e=>setCRole(e.target.value)} style={I} placeholder="CEO, 購買担当 etc."/></div>
          </div>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>メール</label><input value={cEmail} onChange={e=>setCEmail(e.target.value)} style={I} placeholder="info@example.com"/></div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>電話</label><PhoneInput value={cPhone} onChange={e=>{const v=e.target.value;setCPhone(v);if(!cWhatsapp||cWhatsapp===cPhone)setCWhatsapp(v)}} country={acctCountry} style={I} placeholder="電話番号（数字のみ）"/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>WhatsApp</label><PhoneInput value={cWhatsapp} onChange={e=>setCWhatsapp(e.target.value)} country={acctCountry} style={I} placeholder="WhatsApp番号"/></div>
          </div>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>LinkedIn</label><input value={cLinkedin} onChange={e=>setCLinkedin(e.target.value)} style={I} placeholder="https://linkedin.com/in/... またはユーザー名"/></div>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>メモ/備考</label><textarea value={cNotes} onChange={e=>setCNotes(e.target.value)} style={{...I,minHeight:50,resize:"vertical"}} placeholder="連絡時の注意点、紹介経緯など..."/></div>
        </div>
        {err&&<div style={{fontSize:11,color:T.red,marginTop:8}}>{err}</div>}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
          <button onClick={onClose} style={{padding:"6px 16px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:12,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
          <button onClick={save} disabled={saving} style={{padding:"6px 16px",borderRadius:6,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving?0.5:1}}>{saving?"保存中...":isEdit?"更新":"保存"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Activity Timeline ──
function ActivityTimeline({deal,client,user,allUsers,onUpdated,leadActions:inheritedActions}){
  const toast=useToast();
  const[activities,setActivities]=useState([]);
  const[newType,setNewType]=useState((deal.stage==="negotiation"||deal.stage==="invoice_sent")?"action":"report");
  const[newContent,setNewContent]=useState("");
  const[newDueDate,setNewDueDate]=useState("");
  const[newAssignedTo,setNewAssignedTo]=useState(user.id);
  const[showForm,setShowForm]=useState(true);
  const[actionType,setActionType]=useState("電話");
  const[actionMemo,setActionMemo]=useState("");
  const canAddAction=deal.stage==="negotiation"||deal.stage==="invoice_sent";
  const[confirmDeleteId,setConfirmDeleteId]=useState(null);
  const[weeklyDeleteTarget,setWeeklyDeleteTarget]=useState(null);
  const[editingId,setEditingId]=useState(null);
  const[editContent,setEditContent]=useState("");
  const[editDueDate,setEditDueDate]=useState("");
  const[editAssignedTo,setEditAssignedTo]=useState("");
  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};

  useEffect(()=>{loadAct()},[deal.id]);
  const VALID_ACT_TYPES=["report","note","stage_change","weekly_report","todo","action"];
  const loadAct=async()=>{const{data}=await client.from("sales_activities").select("*").eq("deal_id",deal.id).is("deleted_at",null).order("created_at",{ascending:false});if(data)setActivities(data.filter(a=>VALID_ACT_TYPES.includes(a.type)||a.is_todo))};

  const addAct=async()=>{
    if(newType==="action"){
      if(!actionMemo.trim())return;
      const{error:ie}=await client.from("sales_activities").insert({
        deal_id:deal.id,account_id:deal.account_id,user_id:user.id,
        type:"action",content:actionType+": "+actionMemo.trim(),
        action_type:actionType
      });
      if(ie){toast(ie.message,"error");return}
      setActionMemo("");
      loadAct();if(onUpdated)onUpdated();
      return;
    }
    if(!newContent.trim())return;
    const{error:ie}=await client.from("sales_activities").insert({
      deal_id:deal.id,account_id:deal.account_id,user_id:user.id,
      type:newType,content:newContent.trim(),
      is_todo:newType==="todo",
      due_date:newType==="todo"&&newDueDate?newDueDate:null,
      assigned_to:newType==="todo"?newAssignedTo:null
    });
    if(ie){toast(ie.message,"error");return}
    setNewContent("");setNewDueDate("");
    loadAct();if(onUpdated)onUpdated();
  };

  const toggleTodo=async(id,cur)=>{
    const{error:ue}=await client.from("sales_activities").update({is_completed:!cur}).eq("id",id);
    if(!ue)loadAct();
  };

  const deleteAct=async(id)=>{
    const act=activities.find(a=>a.id===id);
    if(act&&act.type==="weekly_report"){
      setWeeklyDeleteTarget(act);return;
    }
    if(confirmDeleteId===id){
      await client.from("sales_activities").update({deleted_at:new Date().toISOString()}).eq("id",id);
      setConfirmDeleteId(null);loadAct();if(onUpdated)onUpdated();
    }else{
      setConfirmDeleteId(id);
      setTimeout(()=>setConfirmDeleteId(prev=>prev===id?null:prev),3000);
    }
  };

  const confirmWeeklyDelete=async()=>{
    if(!weeklyDeleteTarget)return;
    await client.from("sales_activities").update({deleted_at:new Date().toISOString()}).eq("id",weeklyDeleteTarget.id);
    setWeeklyDeleteTarget(null);loadAct();if(onUpdated)onUpdated();
  };

  const startEdit=(a)=>{
    setEditingId(a.id);
    setEditContent(a.content||"");
    setEditDueDate(a.due_date||"");
    setEditAssignedTo(a.assigned_to||user.id);
  };

  const cancelEdit=()=>{setEditingId(null);setEditContent("");setEditDueDate("");setEditAssignedTo("")};

  const saveEdit=async(a)=>{
    if(!editContent.trim())return;
    const updateData={content:editContent.trim()};
    if(a.is_todo){
      updateData.due_date=editDueDate||null;
      updateData.assigned_to=editAssignedTo||null;
    }
    const{error}=await client.from("sales_activities").update(updateData).eq("id",a.id);
    if(error){toast(error.message,"error");return}
    cancelEdit();loadAct();if(onUpdated)onUpdated();
  };

  const grouped={};
  activities.forEach(a=>{const d=new Date(a.created_at);const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const label=`${d.getMonth()+1}月・${d.getFullYear()}`;if(!grouped[key])grouped[key]={label,items:[]};grouped[key].items.push(a)});
  const sortedGroups=Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0]));

  const typeIcon=(a)=>{
    if(a.type==="stage_change")return{color:T.muted,icon:"↗"};
    if(a.type==="weekly_report")return{color:T.green,icon:"📋"};
    if(a.type==="action"){const actColors={"電話":"#2d8cf0","メール":"#f59e0b","WhatsApp":"#22c55e","LinkedIn":"#0077B5","ミーティング":"#8b5cf6","サンプル送付":"#ec4899","見積送付":"#06b6d4","その他":"#999"};return{color:actColors[a.action_type]||T.orange,icon:"⚡"}}
    if(a.type==="report"||a.type==="note")return{color:T.sub,icon:"•"};
    if(a.is_todo)return{color:T.accent,icon:a.is_completed?"☑":"☐"};
    return{color:T.muted,icon:"•"};
  };

  const canEditDelete=(a)=>a.type==="report"||a.type==="note"||a.type==="weekly_report"||a.is_todo||a.type==="action";

  // Stale action warning for negotiation/invoice_sent
  const actionActivities=activities.filter(a=>a.type==="action");
  const lastActionAct=actionActivities.length>0?actionActivities[0]:null;
  const inheritedList=inheritedActions||[];
  const lastInherited=inheritedList.length>0?inheritedList[0]:null;
  const latestActionDate=lastActionAct?new Date(lastActionAct.created_at):lastInherited?new Date(lastInherited.action_date):null;
  const daysSinceAction=latestActionDate?Math.floor((Date.now()-latestActionDate.getTime())/(1000*60*60*24)):null;
  const isActionStale=canAddAction&&(daysSinceAction===null||(daysSinceAction!==null&&daysSinceAction>=7));

  return(
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",height:"100%",display:"flex",flexDirection:"column"}}>
      {isActionStale&&(
        <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:6,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>

          <div style={{flex:1}}>

          </div>

      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:T.primary}}>活動タイムライン</div>
        <button onClick={()=>setShowForm(!showForm)} style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:10,fontWeight:600,cursor:"pointer",background:showForm?"#f3f3f3":"#fff",color:T.sub,fontFamily:"inherit"}}>{showForm?"×":"+ 追加"}</button>
      </div>

      {showForm&&(
        <div style={{padding:10,background:T.bg,borderRadius:6,marginBottom:10}}>
          <div style={{display:"flex",gap:4,marginBottom:8}}>
            {canAddAction&&<button onClick={()=>setNewType("action")} style={{flex:1,padding:"5px",borderRadius:4,border:newType==="action"?`2px solid ${T.orange}`:`1px solid ${T.border}`,fontSize:10.5,fontWeight:newType==="action"?700:400,cursor:"pointer",background:newType==="action"?T.orange+"10":"#fff",color:newType==="action"?T.orange:T.sub,fontFamily:"inherit"}}>📞 アクション</button>}
            <button onClick={()=>setNewType("report")} style={{flex:1,padding:"5px",borderRadius:4,border:newType==="report"?`2px solid ${T.green}`:`1px solid ${T.border}`,fontSize:10.5,fontWeight:newType==="report"?700:400,cursor:"pointer",background:newType==="report"?T.green+"10":"#fff",color:newType==="report"?T.green:T.sub,fontFamily:"inherit"}}>📝 レポート</button>
            <button onClick={()=>setNewType("todo")} style={{flex:1,padding:"5px",borderRadius:4,border:newType==="todo"?`2px solid ${T.accent}`:`1px solid ${T.border}`,fontSize:10.5,fontWeight:newType==="todo"?700:400,cursor:"pointer",background:newType==="todo"?T.accent+"10":"#fff",color:newType==="todo"?T.accent:T.sub,fontFamily:"inherit"}}>☐ ToDo</button>
          </div>
          {newType==="action"?(
            <div>
              <div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}}>
                {ACTION_TYPES.map(t=>(
                  <button key={t} onClick={()=>setActionType(t)} style={{padding:"3px 8px",borderRadius:4,border:actionType===t?"1px solid "+T.accent:"1px solid "+T.border,fontSize:10,fontWeight:actionType===t?700:400,cursor:"pointer",background:actionType===t?T.accent+"15":"#fff",color:actionType===t?T.accent:T.sub,fontFamily:"inherit"}}>{t}</button>
