            {items.map(a=>{const ti=typeIcon(a);const au=allUsers.find(u=>u.id===a.user_id);const assignee=a.assigned_to?allUsers.find(u=>u.id===a.assigned_to):null;const isEditing=editingId===a.id;return(
              <div key={a.id} style={{display:"flex",gap:8,marginBottom:8,paddingLeft:4}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:18}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:ti.color+"20",color:ti.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,cursor:a.is_todo?"pointer":"default",flexShrink:0}}
                    onClick={()=>{if(a.is_todo)toggleTodo(a.id,a.is_completed)}}>
                    {ti.icon}
                  </div>
                  <div style={{flex:1,width:1,background:T.borderLight,marginTop:2}}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  {isEditing?(<div style={{background:T.bg,borderRadius:6,padding:8,marginBottom:2}}>
                    <textarea value={editContent} onChange={e=>setEditContent(e.target.value)} rows={2} style={{...I,marginBottom:4,lineHeight:1.4,fontSize:11}}/>
                    {a.is_todo&&(<div style={{display:"flex",gap:4,marginBottom:4}}>
                      <input type="date" value={editDueDate} onChange={e=>setEditDueDate(e.target.value)} style={{...I,flex:1,fontSize:10}}/>
                      <select value={editAssignedTo} onChange={e=>setEditAssignedTo(e.target.value)} style={{...I,flex:1,background:"#fff",fontSize:10}}>
                        {(allUsers||[]).map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
                      </select>
                    </div>)}
                    <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                      <button onClick={cancelEdit} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,fontSize:9.5,fontWeight:500,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
                      <button onClick={()=>saveEdit(a)} style={{padding:"3px 8px",borderRadius:3,border:"none",fontSize:9.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>保存</button>
                    </div>
                  </div>):(<>
                    {a.type==="weekly_report"&&<div style={{fontSize:9,fontWeight:700,color:T.green,marginBottom:1}}>週次レポート</div>}
                    {a.type==="action"&&<div style={{fontSize:9,fontWeight:700,color:T.orange,marginBottom:1}}>アクション: {a.action_type||""}</div>}
                    <div style={{fontSize:11.5,color:a.is_completed?T.muted:T.primary,fontWeight:a.type==="stage_change"?400:500,textDecoration:a.is_completed?"line-through":"none",lineHeight:1.4,whiteSpace:"pre-wrap"}}>{a.content}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>
                      <span style={{fontSize:9.5,color:T.muted}}>{shortName(au)}</span>
                      <span style={{fontSize:9,color:T.muted}}>{fmt(a.created_at)}</span>
                      {a.due_date&&<span style={{fontSize:9,color:new Date(a.due_date)<new Date()&&!a.is_completed?T.red:T.muted}}>期限: {fmt(a.due_date)}</span>}
                      {assignee&&<span style={{fontSize:9,color:T.accent}}>→ {shortName(assignee)}</span>}
                      {canEditDelete(a)&&<>
                        <span onClick={()=>startEdit(a)} style={{fontSize:9,color:T.accent,cursor:"pointer",padding:"1px 5px",borderRadius:3,fontWeight:500,transition:"all 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background=T.accent+"15"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>編集</span>
                        <span onClick={()=>deleteAct(a.id)} style={{fontSize:9,color:confirmDeleteId===a.id?"#fff":T.muted,cursor:"pointer",padding:"1px 5px",borderRadius:3,background:confirmDeleteId===a.id?T.red:"transparent",fontWeight:confirmDeleteId===a.id?600:400,transition:"all 0.15s"}}>{confirmDeleteId===a.id?"削除する":"削除"}</span>
                      </>}

                  </>)}
                </div>

            )})}
          </div>
        ))}
        {activities.length===0&&<div style={{fontSize:11,color:"#ccc",textAlign:"center",padding:"20px 0"}}>活動履歴なし</div>}
        {inheritedList.length>0&&(
          <div style={{marginTop:8,paddingTop:8,borderTop:`1px dashed ${T.border}`}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:6}}>📌 リード時のアクション履歴</div>
            {inheritedList.map(a=>{const aUser=allUsers.find(u=>u.id===a.created_by);const aDate=new Date(a.action_date);const typeColors={"電話":"#2d8cf0","メール":"#f59e0b","WhatsApp":"#22c55e","LinkedIn":"#0077B5","ミーティング":"#8b5cf6","サンプル送付":"#ec4899","見積送付":"#06b6d4","その他":"#999"};const tc=typeColors[a.action_type]||"#999";return(
              <div key={a.id} style={{display:"flex",gap:8,marginBottom:6,paddingLeft:4,opacity:0.7}}>
                <div style={{width:8,height:8,borderRadius:4,background:tc,marginTop:4,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:1}}>
                    <span style={{fontSize:9.5,fontWeight:700,color:tc,background:tc+"12",padding:"1px 5px",borderRadius:3}}>{a.action_type}</span>
                    <span style={{fontSize:9,color:T.muted}}>{aDate.toLocaleDateString("ja-JP")}</span>
                    <span style={{fontSize:9,color:T.muted,marginLeft:"auto"}}>{shortName(aUser)}</span>

      </div>
      {weeklyDeleteTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget)setWeeklyDeleteTarget(null)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:360,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:20}}>⚠️</span>
              <div style={{fontSize:13,fontWeight:700,color:T.primary}}>週次レポートの削除</div>
            </div>
            <div style={{fontSize:11.5,color:T.sub,lineHeight:1.6,marginBottom:8}}>以下の週次レポートを削除しますか？この操作は取り消せません。</div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,border:`1px solid ${T.borderLight}`}}>
              <div style={{fontSize:10,color:T.muted,marginBottom:4}}>📋 {fmt(weeklyDeleteTarget.created_at)} · {shortName(allUsers.find(u=>u.id===weeklyDeleteTarget.user_id))}</div>
              <div style={{fontSize:11.5,color:T.primary,lineHeight:1.4,whiteSpace:"pre-wrap",maxHeight:120,overflowY:"auto"}}>{weeklyDeleteTarget.content}</div>

              <button onClick={()=>setWeeklyDeleteTarget(null)} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={confirmWeeklyDelete} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit"}}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Chat Panel ──
function ChatPanel({deal,client,user,allUsers,accounts,onUpdated}){
  const toast=useToast();
  const[messages,setMessages]=useState([]);
  const[newMsg,setNewMsg]=useState("");
  const[sending,setSending]=useState(false);

  // チャットルームのメンバーシップを自動保証（チャットタブとの同期に必須）
  useEffect(()=>{
    if(!deal.chat_room_id)return;
    (async()=>{
      const{data:mem}=await client.from("chat_room_members").select("id").eq("room_id",deal.chat_room_id).eq("user_id",user.id).limit(1);
      if(!mem||mem.length===0){
        await client.from("chat_room_members").insert({room_id:deal.chat_room_id,user_id:user.id,role:"member"});
      }
    })();
    loadMsgs();
    const ch=client.channel("sales-chat-"+deal.chat_room_id)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"chat_messages",filter:`room_id=eq.${deal.chat_room_id}`},()=>loadMsgs())
      .subscribe();
    return()=>{client.removeChannel(ch)};
  },[deal.chat_room_id]);

  const loadMsgs=async()=>{
    if(!deal.chat_room_id)return;
    const{data}=await client.from("chat_messages").select("*").eq("room_id",deal.chat_room_id).order("created_at",{ascending:false}).limit(30);
    if(data)setMessages(data.reverse());
  };

  const send=async()=>{
    if(sending||!newMsg.trim()||!deal.chat_room_id)return;
    setSending(true);
    try{const{error:ie}=await client.from("chat_messages").insert({room_id:deal.chat_room_id,user_id:user.id,content:newMsg.trim(),type:"text"});
    if(!ie){setNewMsg("");loadMsgs();try{window._gsChatLastRoomId=deal.chat_room_id}catch(ex){}}}finally{setSending(false)}
  };

  if(!deal.chat_room_id){
    const createRoom=async()=>{
      try{
        const acct=accounts?.find(a=>a.id===deal.account_id);
        const roomName=deal.name||(acct?.name+" 商談");
        const{data:room,error:re}=await client.from("chat_rooms").insert({name:roomName,type:"group",created_by:user.id}).select().single();
        if(re)throw re;
        // 作成者をメンバーに追加＋商談オーナーも追加
        const members=[{room_id:room.id,user_id:user.id,role:"admin"}];
        if(deal.owner_id&&deal.owner_id!==user.id){members.push({room_id:room.id,user_id:deal.owner_id,role:"member"})}
        await client.from("chat_room_members").insert(members);
        const{error:de}=await client.from("sales_deals").update({chat_room_id:room.id,updated_at:new Date().toISOString()}).eq("id",deal.id);
        if(de)throw de;
        if(onUpdated)onUpdated();
      }catch(e){toast("チャットルーム作成エラー: "+e.message,"error")}
    };
    return(
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px"}}>
        <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>GS-Chat</div>
        <div style={{fontSize:11,color:"#ccc",textAlign:"center",padding:"8px 0",marginBottom:8}}>チャンネル未連携</div>
        <button onClick={createRoom} style={{width:"100%",padding:"6px",borderRadius:5,border:`1px dashed ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:T.bg,color:T.sub,fontFamily:"inherit"}}>+ チャットルームを作成</button>
      </div>
    );
  }

  return(
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px"}}>
      <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>GS-Chat</div>
      <div style={{maxHeight:320,overflowY:"auto",marginBottom:8}}>
        {messages.map(m=>{const s=allUsers.find(u=>u.id===m.user_id);return(
          <div key={m.id} style={{marginBottom:8,padding:"6px 8px",background:m.user_id===user.id?"#e8f4fd":"#f4f5f7",borderRadius:8}}>
            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
              <span style={{fontSize:10,fontWeight:600,color:T.primary}}>{shortName(s)}</span>
              <span style={{fontSize:9,color:T.muted}}>{new Date(m.created_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            <div style={{fontSize:11.5,color:T.sub,lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word",maxWidth:"100%"}}>{m.content}</div>
          </div>
        )})}
        {messages.length===0&&<div style={{fontSize:11,color:"#ccc",textAlign:"center"}}>メッセージなし</div>}
      </div>
      <div style={{display:"flex",gap:4}}>
        <textarea value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}} placeholder="メッセージ...（Shift+Enterで改行）" rows={1} style={{flex:1,border:`1px solid ${T.border}`,borderRadius:5,padding:"5px 8px",fontSize:11,outline:"none",fontFamily:"inherit",resize:"none",minHeight:28,maxHeight:80,overflowY:"auto",lineHeight:1.4}}/>
        <button onClick={send} disabled={sending} style={{padding:"5px 10px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,cursor:sending?"default":"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:sending?0.5:1}}>送信</button>
      </div>
    </div>
  );
}

// ── Deal Detail View ──
function DealDetail({deal,accounts,contacts,client,user,allUsers,onBack,onUpdated,onStageChange,onEdit,onOpenAcct,onOpenContact,leadActions}){
  const acct=accounts.find(a=>a.id===deal.account_id);
  const dealContacts=contacts.filter(c=>c.account_id===deal.account_id);
  const stageObj=STAGES.find(s=>s.id===deal.stage);
  const stageIdx=STAGES.findIndex(s=>s.id===deal.stage);
  const owner=allUsers.find(u=>u.id===deal.owner_id);
  const[editField,setEditField]=useState(null);const[editVal,setEditVal]=useState("");
  const[files,setFiles]=useState([]);const fileRef=useRef(null);
  const[showInvoiceModal,setShowInvoiceModal]=useState(false);
  const[deleteConfirm,setDeleteConfirm]=useState(false);
  const[confirmFileDeleteId,setConfirmFileDeleteId]=useState(null);
  const[orderItems,setOrderItems]=useState([]);
  const[orderStatuses,setOrderStatuses]=useState([]);

  useEffect(()=>{
    (async()=>{
      const[{data:oi},{data:os}]=await Promise.all([
        client.from("order_items").select("*").eq("deal_id",deal.id).order("created_at"),
        client.from("order_statuses").select("*").order("sort_order")
      ]);
      setOrderItems(oi||[]);setOrderStatuses(os||[]);
    })();
  },[deal.id]);

  useEffect(()=>{loadFiles()},[deal.id]);
  const loadFiles=async()=>{const{data}=await client.from("sales_deal_files").select("*").eq("deal_id",deal.id).is("deleted_at",null).order("created_at",{ascending:false});if(data)setFiles(data)};

  const quickUpdate=async(field,value)=>{
    try{
      const updateData={[field]:value,updated_at:new Date().toISOString(),updated_by:user.id};
      if(onStageChange)onStageChange(deal.id,updateData);
      const{error:ue}=await client.from("sales_deals").update(updateData).eq("id",deal.id);
      if(ue){onUpdated();throw ue;}
    }catch(e){console.error(e);toast("更新エラー: "+e.message,"error")}
    setEditField(null);
  };

  const moveSta=async(newStage)=>{
    const currentPhase=STAGES.find(s=>s.id===deal.stage)?.phase||"pre";
    const targetPhase=STAGES.find(s=>s.id===newStage)?.phase;
    const now=new Date().toISOString();
    const updateData={stage:newStage,updated_at:now,updated_by:user.id};
    if(currentPhase==="pre"&&(targetPhase==="post"||targetPhase==="done")&&!deal.payment_confirmed_date){
      updateData.payment_confirmed_date=now.split('T')[0];
    }
    // Optimistic update
    if(onStageChange)onStageChange(deal.id,updateData);
    const{error:ue}=await client.from("sales_deals").update(updateData).eq("id",deal.id);
    if(ue){toast("ステージ更新エラー: "+ue.message,"error");onUpdated();return}
    await client.from("sales_activities").insert({deal_id:deal.id,account_id:deal.account_id,user_id:user.id,type:"stage_change",content:`${stageObj?.ja} → ${STAGES.find(s=>s.id===newStage)?.ja}`});
  };

  const handleFileUpload=async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    try{
      const ext=file.name.includes(".")?"."+file.name.split(".").pop().toLowerCase():"";
      const safeName=Date.now()+"_"+Math.random().toString(36).slice(2,8)+(ext?"."+ext.replace(/^\./,""):"");
      const fp="sales/"+deal.id+"/"+safeName;
      const ct=file.type||"application/octet-stream";
      const{error:ue}=await client.storage.from("chat-files").upload(fp,file,{cacheControl:"3600",upsert:true,contentType:ct});
      if(ue)throw ue;
      const{data:ud}=client.storage.from("chat-files").getPublicUrl(fp);
      await client.from("sales_deal_files").insert({deal_id:deal.id,name:file.name,url:ud?.publicUrl||"",file_type:ct,size:file.size,uploaded_by:user.id});
      loadFiles();
    }catch(err){toast("アップロードエラー: "+(err.message||err),"error")}
    e.target.value="";
  };

  const deleteFile=async(fileId)=>{
    if(confirmFileDeleteId===fileId){
      const{error}=await client.from("sales_deal_files").update({deleted_at:new Date().toISOString()}).eq("id",fileId);
      if(!error)loadFiles();
      setConfirmFileDeleteId(null);
    }else{
      setConfirmFileDeleteId(fileId);
      setTimeout(()=>setConfirmFileDeleteId(prev=>prev===fileId?null:prev),3000);
    }
  };

  const deleteDeal=async()=>{
    try{
      const now=new Date().toISOString();
      const{error:e1}=await client.from("sales_activities").update({deleted_at:now}).eq("deal_id",deal.id);
      if(e1)throw e1;
      const{error:e2}=await client.from("sales_deal_files").update({deleted_at:now}).eq("deal_id",deal.id);
      if(e2)throw e2;
      const{error:e3}=await client.from("sales_deals").update({deleted_at:now}).eq("id",deal.id);
      if(e3)throw e3;
      onUpdated();
      onBack();
    }catch(err){console.error("Delete failed:",err);toast("削除に失敗しました: "+err.message);return}
  };

  return(
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      {/* Back + Title + Edit Button */}
      <div style={{display:"flex",alignItems:"center",gap:14,padding:"10px 0",borderBottom:`1px solid ${T.border}`,marginBottom:12}}>
        <button onClick={onBack} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>← 戻る</button>
        <div style={{flex:1}}>
          <div style={{fontSize:9.5,color:T.muted}}>商談</div>
          <div style={{fontSize:15,fontWeight:700,color:T.primary}}>{deal.name}</div>
        </div>
        <ShipBadge type={deal.shipping_type}/>
        <button onClick={onEdit} style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff",color:T.primary,fontFamily:"inherit"}}>編集</button>
      </div>

      {/* Stage Status */}
      <div style={{display:"flex",flexDirection:IS_MOBILE?"column":"row",alignItems:IS_MOBILE?"flex-start":"center",justifyContent:"space-between",marginBottom:16,gap:IS_MOBILE?8:0}}>
        {/* Left: dot + phase text + progress */}
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div style={{width:9,height:9,borderRadius:5,background:stageObj?.phase==="pre"?"#3b82f6":stageObj?.phase==="post"?"#f59e0b":deal.stage==="lost"?T.red:T.green,flexShrink:0}}/>
          <span style={{fontSize:14,fontWeight:700,color:T.primary}}>{stageObj?.ja||deal.stage}</span>
          <span style={{fontSize:10,color:T.muted,marginLeft:2}}>{stageObj?.phase==="pre"?"入金前":stageObj?.phase==="post"?"発注〜発送":stageObj?.phase==="done"?"完了":""}</span>
          <div style={{width:60,height:4,background:"#f0f0f0",borderRadius:2,overflow:"hidden",marginLeft:4}}>
            <div style={{width:Math.round((stageIdx+1)/STAGES.length*100)+"%",height:"100%",background:stageObj?.phase==="pre"?"#3b82f6":stageObj?.phase==="post"?"#f59e0b":deal.stage==="lost"?T.red:T.green,borderRadius:2,transition:"width .3s"}}/>
          </div>
          <span style={{fontSize:9,color:T.muted}}>{stageIdx+1}/{STAGES.length}</span>
        </div>
        {/* Right: dropdown + supplier paid */}
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <select value={deal.stage} onChange={e=>moveSta(e.target.value)}
            style={{fontSize:10,color:T.sub,background:"#fafafa",border:"1px solid "+T.border,borderRadius:5,padding:"4px 22px 4px 8px",cursor:"pointer",fontFamily:"inherit",appearance:"none",WebkitAppearance:"none",backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\")",backgroundRepeat:"no-repeat",backgroundPosition:"right 6px center"}}>
            {STAGES.map(s=><option key={s.id} value={s.id}>{s.ja}</option>)}
          </select>
          {(()=>{const sp=stageObj?.phase;if(sp!=="post"&&sp!=="done")return null;return(
            <label style={{display:"flex",alignItems:"center",gap:3,fontSize:9.5,color:T.muted,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
              <input type="checkbox" checked={!!deal.supplier_paid} onChange={async(e)=>{
                const val=e.target.checked;
                const{error:se}=await client.from("sales_deals").update({supplier_paid:val,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",deal.id);
                if(!se)onUpdated();
              }} style={{width:12,height:12,accentColor:T.primary,cursor:"pointer"}}/>
              仕入入金済
            </label>
          )})()}
        </div>
      </div>

      <div style={{display:"flex",flexDirection:IS_MOBILE?"column":"row",gap:12,flex:1,minHeight:0}}>
        {/* Left: Deal Info + Spreadsheet */}
        <div style={{width:IS_MOBILE?"auto":280,minWidth:IS_MOBILE?0:280,overflowY:"auto"}}>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:10}}>商談情報</div>
            <div style={{display:"grid",gridTemplateColumns:IS_MOBILE?"80px 1fr":"90px 1fr",gap:"5px 6px",fontSize:11.5}}>
              <span style={{color:T.muted}}>取引先</span><span style={{color:acct?T.accent:T.primary,fontWeight:500,cursor:acct?"pointer":"default",textDecoration:acct?"none":"none"}} onClick={()=>{if(acct&&onOpenAcct)onOpenAcct(acct)}} onMouseEnter={e=>{if(acct)e.currentTarget.style.textDecoration="underline"}} onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>{acct?.name||"-"}</span>
              <span style={{color:T.muted}}>金額</span><span style={{fontWeight:700,fontSize:14}}>{fmtDealAmt(deal.amount)}</span>
              {(()=>{const sp=STAGES.find(s=>s.id===deal.stage)?.phase;const isPost=sp==="post"||sp==="done";if(!isPost)return null;return(<>
                <span style={{color:T.muted}}>入金状況</span>
                <span style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:60,height:5,background:"#e5e5e5",borderRadius:3,overflow:"hidden"}}>
                    <div style={{width:(deal.prepayment_percent||0)+"%",height:"100%",background:T.primary,transition:"width .3s"}}/>
                  </div>
                  <span style={{fontSize:10,color:T.sub,fontWeight:500}}>{deal.prepayment_percent||0}%</span>
                  {deal.prepayment_percent>0&&deal.prepayment_percent<100&&<PayBadge status="partial"/>}
                  {deal.prepayment_percent>=100&&<PayBadge status="full"/>}
                </span>
              </>)})()}
              {(()=>{const sp=STAGES.find(s=>s.id===deal.stage)?.phase;if(sp!=="pre")return null;return(<>
                <span style={{color:T.muted}}>確度</span><span style={{fontWeight:600,color:T.primary}}>{deal.confidence||50}%</span>
              </>)})()}
              {(deal.shipping_type||deal.incoterms)&&<><span style={{color:T.muted}}>配送</span><span style={{display:"flex",gap:4,alignItems:"center"}}><ShipBadge type={deal.shipping_type}/><IncoBadge incoterms={deal.incoterms}/></span></>}
              <span style={{color:T.muted}}>商談開始日</span><span>{fmt(deal.deal_date)}</span>
              {(()=>{const sp=STAGES.find(s=>s.id===deal.stage)?.phase;const isPost=sp==="post"||sp==="done";if(!isPost)return null;return(<>
                <span style={{color:T.muted}}>入金日</span><span>{fmt(deal.payment_confirmed_date||deal.payment_date)}</span>
              </>)})()}
              <span style={{color:T.muted}}>GS責任者</span><span>{shortName(owner)}</span>
              {deal.payment_terms&&<><span style={{color:T.muted}}>支払い条件</span><span>{deal.payment_terms}</span></>}
              <span style={{color:T.muted}}>請求書</span><span style={{display:"flex",flexDirection:"column",gap:4}}>{(()=>{
                const invFiles=getInvoiceFiles(deal);
                return invFiles.length>0?(<>
                  {invFiles.map((f,i)=>(<a key={i} href={f.url} target="_blank" rel="noopener" style={{fontSize:11,color:T.accent,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4}}>📄 {f.name||"請求書"}{f.date?` (${f.date})`:""}</a>))}
                  <button onClick={()=>setShowInvoiceModal(true)} style={{fontSize:10,padding:"2px 8px",borderRadius:4,border:`1px solid ${T.border}`,background:"#fff",cursor:"pointer",color:T.sub,fontFamily:"inherit",alignSelf:"flex-start"}}>+ 追加・編集</button>
                </>):(<div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:11,color:T.muted}}>未添付</span><button onClick={()=>setShowInvoiceModal(true)} style={{fontSize:10,padding:"2px 8px",borderRadius:4,border:`1px solid ${T.border}`,background:"#fff",cursor:"pointer",color:T.sub,fontFamily:"inherit"}}>添付</button></div>)
              })()}</span>
            </div>
          </div>

          {deal.spreadsheet_url&&(
            <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}
              onClick={()=>window.open(deal.spreadsheet_url,"_blank")}>
              <span style={{fontSize:16}}>📊</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:600,color:T.accent}}>スプレッドシートを開く</div>
                <div style={{fontSize:9,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{deal.spreadsheet_url}</div>
              </div>
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 3h7v7M13 3L6 10" stroke={T.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          )}

          {/* Contacts */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>コンタクト ({dealContacts.length})</div>
            {dealContacts.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:`1px solid ${T.borderLight}`}}>
              <span style={{fontSize:16,flexShrink:0}}>{countryToFlag(accounts.find(a=>a.id===c.account_id)?.country)}</span>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:600,color:T.accent,cursor:"pointer"}} onClick={()=>{if(onOpenContact)onOpenContact(c)}} onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"} onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>{c.name}</div><div style={{fontSize:9.5,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{[c.role,c.email,c.phone,c.whatsapp,c.linkedin].filter(Boolean).join(" · ")}</div></div>
            </div>))}
            {dealContacts.length===0&&<div style={{fontSize:11,color:"#ccc"}}>コンタクトなし</div>}
          </div>

          {/* Order Items Section */}
          {orderItems.length>0&&(
            <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",marginTop:12}}>
              <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>発注品目 ({orderItems.length})</span>
                <span style={{fontSize:10,color:T.muted,fontWeight:400}}>¥{orderItems.reduce((s,it)=>s+Math.round((it.cost_price||0)*1.1*it.quantity),0).toLocaleString()}</span>
              </div>
              {orderItems.map(it=>{
                const st=orderStatuses.find(s=>s.id===it.status);
                return React.createElement("div",{key:it.id,style:{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:`1px solid ${T.borderLight}`,fontSize:11}},
                  React.createElement("div",{style:{flex:1,minWidth:0}},
                    React.createElement("div",{style:{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:10.5}},it.name_en||it.name_ja),
                    React.createElement("div",{style:{fontSize:9,color:T.muted}},it.quantity+"pcs · "+(it.supplier||""))
                  ),
                  React.createElement("select",{value:it.status,onChange:async(e)=>{
                    const ns=e.target.value;
                    await client.from("order_items").update({status:ns}).eq("id",it.id);
                    setOrderItems(prev=>prev.map(x=>x.id===it.id?{...x,status:ns}:x));
                  },style:{padding:"1px 4px",border:"none",borderRadius:4,fontSize:9,fontWeight:600,fontFamily:"inherit",cursor:"pointer",background:st?st.color+"25":"#eee",color:st?st.color:T.sub}},
                    orderStatuses.map(s=>React.createElement("option",{key:s.id,value:s.id},s.label))
                  )
                );
              })}
            </div>
          )}
        </div>

        {/* Center: Timeline */}
        <div style={{flex:1,minWidth:0}}>
          <ActivityTimeline deal={deal} client={client} user={user} allUsers={allUsers} onUpdated={onUpdated} leadActions={deal.lead_id?(leadActions||[]).filter(a=>a.lead_id===deal.lead_id):[]}/>
        </div>

        {/* Right: Chat + Notes + Files */}
        <div style={{width:IS_MOBILE?"auto":320,minWidth:IS_MOBILE?0:320,overflowY:"auto"}}>
          <ChatPanel deal={deal} client={client} user={user} allUsers={allUsers} accounts={accounts} onUpdated={onUpdated}/>

          {/* Notes */}
          <MemoCard label="メモ" value={deal.notes} placeholder="商談の詳細・備考を記入..." onSave={async(v)=>{
            const{error:ne}=await client.from("sales_deals").update({notes:v,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",deal.id);
            if(!ne)onUpdated();
          }}/>

          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>ファイル ({files.length})</div>
            <input type="file" ref={fileRef} style={{display:"none"}} onChange={handleFileUpload}/>
            <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"6px",borderRadius:5,border:`1px dashed ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:T.bg,color:T.sub,fontFamily:"inherit",marginBottom:8}}>+ アップロード</button>
            {files.map(f=>(<div key={f.id} style={{padding:"4px 0",borderBottom:`1px solid ${T.borderLight}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <a href={f.url} target="_blank" rel="noopener" style={{fontSize:11,color:T.accent,textDecoration:"none",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</a>
              <span onClick={()=>deleteFile(f.id)} style={{fontSize:9,color:confirmFileDeleteId===f.id?"#fff":T.muted,cursor:"pointer",padding:"1px 5px",borderRadius:3,background:confirmFileDeleteId===f.id?T.red:"transparent",fontWeight:confirmFileDeleteId===f.id?600:400,transition:"all 0.15s",flexShrink:0,marginLeft:6}}>{confirmFileDeleteId===f.id?"削除する":"削除"}</span>
            </div>))}
            {files.length===0&&<div style={{fontSize:11,color:"#ccc"}}>ファイルなし</div>}
          </div>
        </div>
      </div>

      {/* Delete button */}
      <div style={{marginTop:20,paddingTop:12,borderTop:`1px solid ${T.border}`,textAlign:"center"}}>
        {!deleteConfirm?
          <button onClick={()=>setDeleteConfirm(true)} style={{fontSize:10.5,color:T.muted,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>削除</button>
          :
          <div style={{display:"flex",gap:6,justifyContent:"center",alignItems:"center"}}>
            <span style={{fontSize:10.5,color:T.primary}}>本当に削除しますか？</span>
            <button onClick={deleteDeal} style={{padding:"3px 8px",borderRadius:3,border:"none",fontSize:10,fontWeight:600,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit"}}>削除する</button>
            <button onClick={()=>setDeleteConfirm(false)} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,fontSize:10,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
          </div>
        }
      </div>

      {showInvoiceModal&&<InvoiceUploadModal deal={deal} client={client} user={user} mode={deal.stage==="negotiation"?"full":"add_file"} onClose={()=>setShowInvoiceModal(false)} onSaved={()=>{try{setShowInvoiceModal(false);const PRE_INV=["negotiation"];if(PRE_INV.includes(deal.stage))moveSta("invoice_sent");onUpdated()}catch(ex){console.error("onSaved error:",ex)}}}/>}
    </div>
  );
}

// ── Account Detail View ──
function AccountDetail({account,deals,contacts,client,user,allUsers,onBack,onUpdated,onEditAcct,onEditContact,onOpenContact,onOpenDeal,currentBiz}){
  const acctDeals=deals.filter(d=>d.account_id===account.id);
  const acctContacts=contacts.filter(c=>c.account_id===account.id);
  const owner=allUsers.find(u=>u.id===account.owner_id);
  const[showContactForm,setShowContactForm]=useState(false);
  const[editingContactId,setEditingContactId]=useState(null);
  const[cName,setCName]=useState("");const[cRole,setCRole]=useState("");const[cEmail,setCEmail]=useState("");const[cPhone,setCPhone]=useState("");const[cWhatsapp,setCWhatsapp]=useState("");const[cLinkedin,setCLinkedin]=useState("");
  const[deleteConfirm,setDeleteConfirm]=useState(false);
  const[contactDeleteConfirm,setContactDeleteConfirm]=useState(null);
  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};
  const acctCountry=account?.country||"";
  const autoFmtPhone=(val,setter)=>{const f=fmtPhone(val,acctCountry);if(f&&f!==val)setter(f)};

  const startEditContact=(contact)=>{
    setEditingContactId(contact.id);
    setCName(contact.name);
    setCRole(contact.role||"");
    setCEmail(contact.email||"");
    setCPhone(contact.phone||"");
    setCWhatsapp(contact.whatsapp||"");
    setCLinkedin(contact.linkedin||"");
  };

  const cancelEditContact=()=>{
    setEditingContactId(null);
    setCName("");setCRole("");setCEmail("");setCPhone("");setCWhatsapp("");setCLinkedin("");
  };

  const saveContact=async()=>{
    if(!cName.trim())return;
    try{
      if(editingContactId){
        const fPhone=cPhone||null;
        const fWhatsapp=cWhatsapp||null;
        const{error:ue}=await client.from("sales_contacts").update({name:cName.trim(),role:cRole||null,email:cEmail||null,phone:fPhone||null,whatsapp:fWhatsapp||null,linkedin:cLinkedin||null,updated_by:user.id}).eq("id",editingContactId);
        if(ue)throw ue;
        cancelEditContact();
      }else{
        const acctOwner=account.owner_id||null;
        const fPhone2=cPhone||null;
        const fWhatsapp2=cWhatsapp||null;
        const insertRow={account_id:account.id,name:cName.trim(),role:cRole||null,email:cEmail||null,phone:fPhone2||null,whatsapp:fWhatsapp2||null,linkedin:cLinkedin||null,business_id:account.business_id||currentBiz||"jbeauty"};
        if(acctOwner)insertRow.owner_id=acctOwner;
        let{error:ie}=await client.from("sales_contacts").insert(insertRow);
        if(ie&&ie.message&&ie.message.includes("owner_id")){delete insertRow.owner_id;const r2=await client.from("sales_contacts").insert(insertRow);ie=r2.error}
        if(ie)throw ie;
        setCName("");setCRole("");setCEmail("");setCPhone("");setCWhatsapp("");setCLinkedin("");setShowContactForm(false);
      }
      onUpdated();
    }catch(e){toast(e.message,"error")}
  };

  const deleteContact=async(cId)=>{
    try{
      await client.from("sales_contacts").update({deleted_at:new Date().toISOString()}).eq("id",cId);
      onUpdated();
    }catch(e){toast(e.message,"error")}
  };

  const deleteAccount=async()=>{
    try{
      // データ整合性チェック: 紐づく商談があれば確認
      const linkedDeals=deals.filter(d=>d.account_id===account.id);
      const linkedContacts=contacts.filter(c=>c.account_id===account.id);
      if(linkedDeals.length>0||linkedContacts.length>0){
        const msg=`この取引先には${linkedDeals.length}件の商談と${linkedContacts.length}件のコンタクトが紐づいています。\n\n削除すると商談・コンタクトの取引先が空になります。\n本当に削除しますか？`;
        if(!confirm(msg))return;
        // 紐づくコンタクトのaccount_idをnullに（孤立防止）
        for(const c of linkedContacts){
          await client.from("sales_contacts").update({account_id:null}).eq("id",c.id);
        }
        // 紐づく商談のaccount_idをnullに
        for(const d of linkedDeals){
          await client.from("sales_deals").update({account_id:null,updated_at:new Date().toISOString()}).eq("id",d.id);
        }
      }
      await client.from("sales_contacts").update({deleted_at:new Date().toISOString()}).eq("account_id",account.id);
      await client.from("sales_accounts").update({deleted_at:new Date().toISOString()}).eq("id",account.id);
      onUpdated();
      onBack();
    }catch(e){toast(e.message,"error")}
  };

  const shippingAddrs=Array.isArray(account.address_shipping)?account.address_shipping:(account.address_shipping?[account.address_shipping]:[]);

  return(
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",borderBottom:`1px solid ${T.border}`,marginBottom:12}}>
        <button onClick={onBack} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>← 戻る</button>
        <div style={{flex:1}}>
          <div style={{fontSize:9.5,color:T.muted}}>取引先</div>
          <div style={{fontSize:15,fontWeight:700,color:T.primary}}>{account.name}</div>
        </div>
        <span style={{fontSize:18}}>{countryToFlag(account.country)}</span>
        <button onClick={onEditAcct} style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff",color:T.primary,fontFamily:"inherit"}}>編集</button>
      </div>

      <div style={{display:"flex",flexDirection:IS_MOBILE?"column":"row",gap:16}}>
        <div style={{flex:1}}>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:10}}>会社情報</div>
            <div style={{display:"grid",gridTemplateColumns:IS_MOBILE?"80px 1fr":"90px 1fr",gap:"6px 8px",fontSize:12}}>
              <span style={{color:T.muted}}>国</span><span>{account.country||"-"}</span>
              <span style={{color:T.muted}}>Webサイト</span>{account.website?<a href={account.website} target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"none"}}>{account.website}</a>:<span>-</span>}
              <span style={{color:T.muted}}>流入経路</span><span style={{fontWeight:500}}>{account.lead_source||"-"}</span>
              <span style={{color:T.muted}}>入金ターム</span><span style={{fontWeight:600}}>{account.payment_terms||"-"}</span>
              <span style={{color:T.muted}}>請求先住所</span><span>{account.address_billing||"-"}</span>
              {shippingAddrs.length>0&&<><span style={{color:T.muted}}>納入先住所</span><span>{shippingAddrs.join(" / ")}</span></>}
              <span style={{color:T.muted}}>GS責任者</span><span>{shortName(owner)}</span>
            </div>
          </div>

          {/* メモ */}
          <MemoCard label="メモ" value={account.notes} placeholder="取引先に関するメモ..." onSave={async(v)=>{
            const{error:ne}=await client.from("sales_accounts").update({notes:v,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",account.id);
            if(!ne)onUpdated();
          }}/>

          {/* LTV / 取引実績 */}
          {(()=>{
            const closedDeals=acctDeals.filter(d=>d.stage==="closed");
            const allAmt=acctDeals.reduce((s,d)=>s+(Number(d.amount)||0),0);
            const closedAmt=closedDeals.reduce((s,d)=>s+(Number(d.amount)||0),0);
            const avgAmt=acctDeals.length>0?Math.round(allAmt/acctDeals.length):0;
            const completionRate=acctDeals.length>0?Math.round(closedDeals.length/acctDeals.length*100):0;
            return(
              <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:10}}>取引実績</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div style={{padding:"8px 10px",background:T.bg,borderRadius:6,textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.muted,marginBottom:2}}>累計取引額</div>
                    <div style={{fontSize:14,fontWeight:700,color:T.primary}}>{fmtYen(allAmt)}</div>
                  </div>
                  <div style={{padding:"8px 10px",background:T.bg,borderRadius:6,textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.muted,marginBottom:2}}>完了済み</div>
                    <div style={{fontSize:14,fontWeight:700,color:T.green}}>{fmtYen(closedAmt)}</div>
                  </div>
                  <div style={{padding:"8px 10px",background:T.bg,borderRadius:6,textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.muted,marginBottom:2}}>平均取引額</div>
                    <div style={{fontSize:14,fontWeight:700,color:T.accent}}>{fmtYen(avgAmt)}</div>
                  </div>
                  <div style={{padding:"8px 10px",background:T.bg,borderRadius:6,textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.muted,marginBottom:2}}>成約率</div>
                    <div style={{fontSize:14,fontWeight:700,color:completionRate>=50?T.green:completionRate>=25?T.orange:T.muted}}>{completionRate}%</div>
                    <div style={{fontSize:9,color:T.muted}}>{closedDeals.length}/{acctDeals.length}件</div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>

        <div style={{width:320,minWidth:320}}>
          {/* Contacts */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{fontSize:12,fontWeight:700,color:T.primary}}>コンタクト ({acctContacts.length})</div>
              <button onClick={()=>setShowContactForm(!showContactForm)} style={{padding:"2px 6px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:10,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>{showContactForm?"×":"+ 追加"}</button>
            </div>
            {showContactForm&&<div style={{padding:8,background:T.bg,borderRadius:6,marginBottom:8}}>
              <input value={cName} onChange={e=>setCName(e.target.value)} placeholder="氏名 *" style={{...I,marginBottom:4}}/>
              <div style={{display:"flex",gap:4,marginBottom:4}}><input value={cRole} onChange={e=>setCRole(e.target.value)} placeholder="役職" style={I}/><input value={cEmail} onChange={e=>setCEmail(e.target.value)} placeholder="メール" style={I}/></div>
              <div style={{display:"flex",gap:4,marginBottom:4}}><PhoneInput value={cPhone} onChange={e=>{setCPhone(e.target.value);if(!cWhatsapp||cWhatsapp===cPhone)setCWhatsapp(e.target.value)}} country={acctCountry} placeholder="電話" style={I}/><input value={cLinkedin} onChange={e=>setCLinkedin(e.target.value)} placeholder="LinkedIn" style={I}/></div>
              <div style={{display:"flex",gap:4,marginBottom:4}}><PhoneInput value={cWhatsapp} onChange={e=>setCWhatsapp(e.target.value)} country={acctCountry} placeholder="WhatsApp" style={{...I,flex:1}}/></div>
              <div style={{display:"flex",justifyContent:"flex-end"}}><button onClick={saveContact} style={{padding:"4px 10px",borderRadius:4,border:"none",fontSize:10.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>追加</button></div>
            </div>}
            {acctContacts.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:`1px solid ${T.borderLight}`,justifyContent:"space-between"}}>
              {editingContactId===c.id?(
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:4}}>
                  <input value={cName} onChange={e=>setCName(e.target.value)} placeholder="氏名" style={{...I,fontSize:11}}/>
                  <div style={{display:"flex",gap:4}}><input value={cRole} onChange={e=>setCRole(e.target.value)} placeholder="役職" style={{...I,fontSize:11,flex:1}}/><input value={cEmail} onChange={e=>setCEmail(e.target.value)} placeholder="メール" style={{...I,fontSize:11,flex:1}}/></div>
                  <div style={{display:"flex",gap:4}}><PhoneInput value={cPhone} onChange={e=>{setCPhone(e.target.value);if(!cWhatsapp||cWhatsapp===cPhone)setCWhatsapp(e.target.value)}} country={acctCountry} placeholder="電話" style={{...I,fontSize:11,flex:1}}/><input value={cLinkedin} onChange={e=>setCLinkedin(e.target.value)} placeholder="LinkedIn" style={{...I,fontSize:11,flex:1}}/></div>
                  <div style={{display:"flex",gap:4}}><PhoneInput value={cWhatsapp} onChange={e=>setCWhatsapp(e.target.value)} country={acctCountry} placeholder="WhatsApp" style={{...I,fontSize:11,flex:1}}/></div>
                  <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}><button onClick={cancelEditContact} style={{padding:"3px 8px",borderRadius:3,border:"none",fontSize:9.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:T.sub,fontFamily:"inherit"}}>中止</button><button onClick={saveContact} style={{padding:"3px 8px",borderRadius:3,border:"none",fontSize:9.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>保存</button></div>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:6,flex:1,cursor:"pointer"}} onClick={()=>onOpenContact&&onOpenContact(c)}>
                  <div style={{width:26,height:26,borderRadius:5,background:"#e8e8e8",color:T.sub,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{ini(c.name)}</div>
                  <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:T.accent}}>{c.name}{hasInvalidPhoneChars(c.phone)&&<span title="電話番号にハイフンや括弧が含まれています" style={{cursor:"help",marginLeft:3,fontSize:10}}>⚠️</span>}</div><div style={{fontSize:10,color:T.muted}}>{[c.role,c.email,c.phone,c.whatsapp&&("WA:"+c.whatsapp),c.linkedin&&("LI:"+c.linkedin)].filter(Boolean).join(" · ")}</div></div>
                </div>
              )}
              {editingContactId!==c.id&&(
                <>
                  {contactDeleteConfirm!==c.id?
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>startEditContact(c)} style={{padding:"2px 4px",background:"none",border:"none",cursor:"pointer",color:T.accent,fontSize:12,fontFamily:"inherit"}}>✎</button>
                      <button onClick={()=>setContactDeleteConfirm(c.id)} style={{padding:"2px 4px",background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14,fontFamily:"inherit"}}>×</button>
                    </div>
                    :
                    <div style={{display:"flex",gap:2,alignItems:"center"}}>
                      <span style={{fontSize:9,color:T.primary}}>削除?</span>
                      <button onClick={()=>{deleteContact(c.id);setContactDeleteConfirm(null)}} style={{padding:"2px 4px",background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:12,fontFamily:"inherit",fontWeight:600}}>✓</button>
                    </div>
                  }
                </>
              )}
            </div>))}
          </div>

          {/* Deals */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>商談 ({acctDeals.length})</div>
            {acctDeals.map(d=>{const s=STAGES.find(st=>st.id===d.stage);return(
              <div key={d.id} onClick={()=>onOpenDeal&&onOpenDeal(d)} style={{padding:"5px 0",borderBottom:`1px solid ${T.borderLight}`,fontSize:12,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{fontWeight:600,color:T.accent}}>{d.name}</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                  <span style={{fontSize:10,color:T.muted}}>{s?.ja}</span>
                  <span style={{fontSize:11,fontWeight:600}}>{fmtDealAmt(d.amount)}</span>
                  <ShipBadge type={d.shipping_type}/>
                </div>
              </div>);
            })}
            {acctDeals.length===0&&<div style={{fontSize:11,color:"#ccc"}}>商談なし</div>}
          </div>
        </div>
      </div>

      {/* Delete button */}
      <div style={{marginTop:20,paddingTop:12,borderTop:`1px solid ${T.border}`,textAlign:"center"}}>
        {!deleteConfirm?
          <button onClick={()=>setDeleteConfirm(true)} style={{fontSize:10.5,color:T.muted,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>削除</button>
          :
          <div style={{display:"flex",gap:6,justifyContent:"center",alignItems:"center"}}>
            <span style={{fontSize:10.5,color:T.primary}}>本当に削除しますか？</span>
            <button onClick={deleteAccount} style={{padding:"3px 8px",borderRadius:3,border:"none",fontSize:10,fontWeight:600,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit"}}>削除する</button>
            <button onClick={()=>setDeleteConfirm(false)} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,fontSize:10,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
          </div>
        }
      </div>
    </div>
  );
}

// ── Settings Management Modal (Category + Supabase) ──
function CSVImporter({client,user,allUsers,accounts,onDone,currentBiz}){
  const[step,setStep]=useState("select"); // select, preview, importing, done
  const[importType,setImportType]=useState("");
  const[rows,setRows]=useState([]);
  const[log,setLog]=useState([]);
  const[progress,setProgress]=useState(0);
  const fileRef=useRef(null);

  const parseCSVLine=(line)=>{
    const result=[];let current="";let inQuotes=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(inQuotes){
        if(c==="\""&&line[i+1]==="\""){ current+="\"";i++}
        else if(c==="\""){ inQuotes=false}
        else{current+=c}
      }else{
        if(c==="\""){ inQuotes=true}
        else if(c===","){result.push(current.trim());current=""}
        else{current+=c}
      }
    }
    result.push(current.trim());
    return result;
  };

  const parseCSV=(text)=>{
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    return lines.map(line=>parseCSVLine(line)).filter(r=>r.length>0);
  };

  const handleFile=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const text=ev.target.result;
      const parsed=parseCSV(text);
      if(parsed.length<2){setLog(["CSVにデータがありません"]);return}
      // カラムバリデーション
      if(importType){
        const header=parsed[0].map(h=>h.trim().toLowerCase());
        const REQUIRED={
          accounts:{any:["取引先名","account","name"],label:"取引先名"},
          contacts:{any:["氏名","name","名","姓","first","last"],label:"氏名 or 名/姓"},
          deals:{any:["商談名","clean_name","deal","name"],label:"商談名"}
        };
        const req=REQUIRED[importType];
        if(req&&!req.any.some(k=>header.some(h=>h.includes(k)))){
          setLog(["⚠ 必須カラム「"+req.label+"」が見つかりません。ヘッダ行を確認してください。","検出されたヘッダ: "+parsed[0].join(", ")]);return;
        }
        // 列数不一致チェック
        const hLen=parsed[0].length;
        const badRows=parsed.slice(1).filter((r,i)=>r.length!==hLen);
        if(badRows.length>0){
          setLog(["⚠ "+badRows.length+"行の列数がヘッダ("+hLen+"列)と一致しません。CSVの書式を確認してください。"]);return;
        }
      }
      setRows(parsed);setStep("preview");
    };
    reader.readAsText(file,"UTF-8");
  };

  const OWNER_MAP={"Lamichhane Amon":"Amon","Yuki Nakagawa":"Yuki","Ito Yuta":"Yuta","Chikaki Kosuke":"Chikaki","Martirossian Mark":"Mark","Tsumura Kota":"Tsumura"};
  const STAGE_MAP={"Under Negotiation":"negotiation","Invoice Sent":"invoice_sent","Order Pending":"order_pending","Order Completed":"order_completed","Goods Received":"goods_received","Shipped – Tracking Shared":"shipped","Shipped - Tracking Shared":"shipped","Order Lost":"lost"};

  const cleanEmoji=(t)=>{
    if(!t)return t;
    return t.replace(/[🔥🚢✈️✈⭕️⭕🔺❌✅🇯🇵🌐\ufe0f]/gu,"").replace(/\s+/g," ").trim();
  };

  const findOwner=(ownerName)=>{
    const mapped=OWNER_MAP[ownerName]||ownerName;
    return allUsers?.find(u=>u.name?.includes(mapped)||u.email?.includes(mapped.toLowerCase()));
  };

  const importAccounts=async()=>{
    setStep("importing");const header=rows[0];const data=rows.slice(1);
    const nameIdx=header.findIndex(h=>h.includes("取引先名"));
    const ownerIdx=header.findIndex(h=>h.includes("所有者"));
    const stateIdx=header.findIndex(h=>h.includes("都道府県"));
    const sourceIdx=header.findIndex(h=>h.includes("流入")||h.includes("source"));
    const countryIdx=header.findIndex(h=>h.includes("country")||h.includes("国"));
    const newLog=[];let done=0;
    // Build bulk rows
    const bulkRows=[];
    for(const row of data){
      const name=cleanEmoji(row[nameIdx]||"").trim();
      if(!name){done++;continue}
      const ownerUser=findOwner(row[ownerIdx]||"");
      const isJBW=(row[nameIdx]||"").includes("🌐");
      const ins={name,owner_id:ownerUser?.id||user.id};
      if(stateIdx>=0&&row[stateIdx])ins.address_billing=row[stateIdx].trim();
      if(countryIdx>=0&&row[countryIdx])ins.country=row[countryIdx].trim();
      if(isJBW)ins.lead_source="JBW";
      if(sourceIdx>=0&&row[sourceIdx])ins.lead_source=row[sourceIdx].trim();
      bulkRows.push(ins);
    }
    // Try bulk RPC first, fallback to individual inserts
    try{
      const{data:result,error:rpcErr}=await client.rpc("bulk_import_accounts",{p_rows:bulkRows});
      if(!rpcErr&&result){
        newLog.push(`✓ ${result.inserted}件インポート完了`+(result.skipped>0?` (${result.skipped}件重複スキップ)`:""));
        done=data.length;setProgress(100);setLog(newLog);setStep("done");return;
      }
    }catch(e){}
    // Fallback: individual inserts
    for(const ins of bulkRows){
      const{error:ie}=await client.from("sales_accounts").insert({business_id:currentBiz||"jbeauty",...ins,updated_at:new Date().toISOString()});
      if(ie)newLog.push("⚠ "+ins.name+": "+ie.message);
      else newLog.push("✓ "+ins.name);
      done++;setProgress(Math.round(done/data.length*100));
    }
    setLog(newLog);setStep("done");
  };

  const importContacts=async()=>{
    setStep("importing");const header=rows[0];const data=rows.slice(1);
    const nameIdx=header.findIndex(h=>h.includes("name")||h.includes("氏名"));
    const firstIdx=header.findIndex(h=>h==="名"||h.includes("first"));
    const lastIdx=header.findIndex(h=>h==="姓"||h.includes("last"));
    const roleIdx=header.findIndex(h=>h.includes("役職")||h.includes("role"));
    const acctIdx=header.findIndex(h=>h.includes("取引先名")||h.includes("account"));
    const emailIdx=header.findIndex(h=>h.includes("メール")||h.includes("email"));
    const phoneIdx=header.findIndex(h=>h.includes("電話")||h.includes("phone"));
    const newLog=[];let done=0;
    const accts=accounts||[];
    for(const row of data){
      let fullName=nameIdx>=0?cleanEmoji(row[nameIdx]||""):"";
      if(!fullName&&(firstIdx>=0||lastIdx>=0)){
        fullName=cleanEmoji([row[firstIdx],row[lastIdx]].filter(Boolean).join(" "));
      }
      if(!fullName){done++;continue}
      const acctName=cleanEmoji(row[acctIdx]||"");
      const matchAcct=accts.find(a=>a.name===acctName);
      const ins={name:fullName.trim(),account_id:matchAcct?.id||null,business_id:currentBiz||"jbeauty"};
      if(roleIdx>=0&&row[roleIdx])ins.role=row[roleIdx].trim();
      if(emailIdx>=0&&row[emailIdx])ins.email=row[emailIdx].trim();
      if(phoneIdx>=0&&row[phoneIdx])ins.phone=row[phoneIdx].trim();
      const{error:ie}=await client.from("sales_contacts").insert(ins);
      if(ie)newLog.push("⚠ "+fullName+": "+ie.message);
      else newLog.push("✓ "+fullName+(matchAcct?" ("+acctName+")":""));
      done++;setProgress(Math.round(done/data.length*100));
    }
    setLog(newLog);setStep("done");
  };

  const importDeals=async()=>{
    setStep("importing");const header=rows[0];const data=rows.slice(1);
    const nameIdx=header.findIndex(h=>h.includes("商談名")||h.includes("clean_name"));
    const acctIdx=header.findIndex(h=>h.includes("取引先名")||h.includes("account"));
    const ownerIdx=header.findIndex(h=>h.includes("所有者")||h.includes("owner"));
    const stageIdx=header.findIndex(h=>h.includes("フェーズ")||h.includes("stage"));
    const amountIdx=header.findIndex(h=>h.includes("金額")||h.includes("amount"));
    const confIdx=header.findIndex(h=>h.includes("確度")||h.includes("confidence"));
    const shipIdx=header.findIndex(h=>h.includes("shipping"));
    const prepayIdx=header.findIndex(h=>h.includes("prepayment"));
    const supPaidIdx=header.findIndex(h=>h.includes("supplier_paid"));
    const incoIdx=header.findIndex(h=>h.includes("incoterms")||h.includes("インコタームズ"));
    const sourceIdx=header.findIndex(h=>h.includes("source")||h.includes("流入"));
    const createIdx=header.findIndex(h=>h.includes("作成日")||h.includes("created"));
    const closeIdx=header.findIndex(h=>h.includes("完了予定日")||h.includes("close"));
    const notesIdx=header.findIndex(h=>h.includes("説明")||h.includes("notes")||h.includes("メモ"));
    const newLog=[];let done=0;
    const accts=accounts||[];
    for(const row of data){
      const rawName=row[nameIdx]||"";
      const dealName=cleanEmoji(rawName).trim();
      if(!dealName){done++;continue}
      const acctName=cleanEmoji(row[acctIdx]||"");
      const matchAcct=accts.find(a=>a.name===acctName);
      const ownerUser=findOwner(row[ownerIdx]||"");
      let stage=row[stageIdx]||"";
      stage=STAGE_MAP[stage]||stage;
      if(!STAGE_MAP[row[stageIdx]]&&stageIdx>=0){
        const stgMatch=["negotiation","invoice_sent","order_pending","order_completed","goods_received","shipped","closed","lost"].find(s=>s===stage);
        if(!stgMatch)stage="negotiation";
      }
      const amount=amountIdx>=0?Number((row[amountIdx]||"").replace(/[^0-9.]/g,""))||null:null;
      const confidence=confIdx>=0?Number(row[confIdx])||50:50;
      const shipType=shipIdx>=0?row[shipIdx]||null:null;
      const shippingFromEmoji=rawName.includes("✈")||rawName.includes("✈️")?"air":rawName.includes("🚢")?"sea":rawName.includes("🇯🇵")?"domestic":null;
      const shipping=shipType||shippingFromEmoji;
      let prepay=prepayIdx>=0?Number(row[prepayIdx])||0:0;
      if(!prepay&&rawName){
        if(rawName.includes("⭕"))prepay=100;
        else if(rawName.includes("🔺"))prepay=50;
      }
      const supPaid=supPaidIdx>=0?(row[supPaidIdx]==="True"||row[supPaidIdx]==="true"||row[supPaidIdx]==="1"):rawName.includes("✅");
      const incoterms=incoIdx>=0?row[incoIdx]||null:null;
      const notes=notesIdx>=0?row[notesIdx]||"":"";
      const created=createIdx>=0?row[createIdx]||null:null;
      const close=closeIdx>=0?row[closeIdx]||null:null;

      const ins={
        name:dealName,
        account_id:matchAcct?.id||null,
        owner_id:ownerUser?.id||user.id,
        stage,
        amount,
        confidence,
        shipping_type:shipping,
        prepayment_percent:prepay,
        payment_status:prepay>=100?"full":prepay>0?"partial":"none",
        supplier_paid:supPaid,
        notes:notes||null,
        updated_at:new Date().toISOString(),
        business_id:currentBiz||"jbeauty"
      };
      if(incoterms)ins.incoterms=incoterms;
      if(created){const d=created.replace(/\//g,"-");ins.deal_date=d}
      if(close){const d=close.replace(/\//g,"-");ins.close_date=d}
      const isJBW=rawName.includes("🌐")||(row[acctIdx]||"").includes("🌐");
      if(isJBW)ins.lead_source="JBW";
      if(sourceIdx>=0&&row[sourceIdx])ins.lead_source=row[sourceIdx];

      const{error:ie}=await client.from("sales_deals").insert(ins);
      if(ie)newLog.push("⚠ "+dealName+": "+ie.message);
      else newLog.push("✓ "+dealName);
      done++;setProgress(Math.round(done/data.length*100));
    }
    setLog(newLog);setStep("done");
  };

  const startImport=()=>{
    if(importType==="accounts")importAccounts();
    else if(importType==="contacts")importContacts();
    else if(importType==="deals")importDeals();
  };

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};

  return(
    <div>
      {step==="select"&&<div>
        <div style={{fontSize:11.5,fontWeight:600,color:T.primary,marginBottom:8}}>データインポート</div>
        <div style={{display:"flex",gap:4,marginBottom:8}}>
          {[{id:"accounts",label:"取引先"},{id:"contacts",label:"コンタクト"},{id:"deals",label:"商談"}].map(t=>(
            <button key={t.id} onClick={()=>setImportType(t.id)} style={{flex:1,padding:"6px",borderRadius:6,border:importType===t.id?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:importType===t.id?700:400,cursor:"pointer",background:importType===t.id?T.primary+"10":"#fff",color:importType===t.id?T.primary:T.sub,fontFamily:"inherit"}}>{t.label}</button>
          ))}
        </div>
        {importType&&<div>
          <div style={{fontSize:10.5,color:T.muted,marginBottom:6}}>
            {importType==="accounts"?"取引先のCSVを選択（取引先名, 所有者, 国 等）":
             importType==="contacts"?"コンタクトのCSVを選択（名/姓, 取引先名, メール 等）":
             "商談のCSVを選択（商談名, 取引先名, フェーズ, 金額 等）"}
          </div>
          <div style={{fontSize:10,color:T.orange,marginBottom:6}}>⚠ インポート順序: 取引先 → コンタクト → 商談</div>
          <input type="file" accept=".csv" ref={fileRef} style={{display:"none"}} onChange={handleFile}/>
          <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"10px",borderRadius:6,border:`2px dashed ${T.border}`,fontSize:12,cursor:"pointer",background:"#fafafa",color:T.sub,fontFamily:"inherit"}}>CSVファイルを選択</button>
        </div>}
      </div>}

      {step==="preview"&&<div>
        <div style={{fontSize:11.5,fontWeight:600,color:T.primary,marginBottom:8}}>プレビュー — {importType} ({rows.length-1}件)</div>
        <div style={{maxHeight:200,overflowY:"auto",border:`1px solid ${T.border}`,borderRadius:6,marginBottom:8}}>
          <table style={{width:"100%",fontSize:10,borderCollapse:"collapse"}}>
            <thead><tr>{rows[0]?.map((h,i)=><th key={i} style={{padding:"4px 6px",background:"#f5f5f5",borderBottom:`1px solid ${T.border}`,textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>{rows.slice(1,6).map((r,ri)=><tr key={ri}>{r.map((c,ci)=><td key={ci} style={{padding:"3px 6px",borderBottom:`1px solid ${T.borderLight}`,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c}</td>)}</tr>)}</tbody>
          </table>
          {rows.length>6&&<div style={{padding:6,textAlign:"center",fontSize:10,color:T.muted}}>... 他 {rows.length-6} 件</div>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{setStep("select");setRows([])}} style={{flex:1,padding:"6px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>戻る</button>
          <button onClick={startImport} style={{flex:1,padding:"6px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>インポート開始</button>
        </div>
      </div>}

      {step==="importing"&&<div style={{textAlign:"center",padding:20}}>
        <div style={{fontSize:12,fontWeight:600,color:T.primary,marginBottom:8}}>インポート中... {progress}%</div>
        <div style={{width:"100%",height:4,background:T.borderLight,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:progress+"%",height:"100%",background:T.primary,borderRadius:2,transition:"width 0.3s"}}/>
        </div>
      </div>}

      {step==="done"&&<div>
        <div style={{fontSize:11.5,fontWeight:600,color:T.green,marginBottom:8}}>インポート完了</div>
        <div style={{maxHeight:200,overflowY:"auto",fontSize:10,lineHeight:1.6}}>
          {log.map((l,i)=><div key={i} style={{color:l.startsWith("⚠")?T.red:T.sub}}>{l}</div>)}
        </div>
        <button onClick={()=>{setStep("select");setRows([]);setLog([]);setProgress(0);onDone()}} style={{width:"100%",marginTop:8,padding:"6px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>完了</button>
      </div>}
    </div>
  );
}

// ── Quotation / Invoice Builder ──
function QuotationInvoiceBuilder({mode,client,user,accounts,contacts,deals,onBack,initialDoc}){

  const filteredDeals=useMemo(()=>{

  // Close dropdowns on outside click

      if(acctDropRef.current&&!acctDropRef.current.contains(e.target))setAcctDropOpen(false);

    };
    document.addEventListener("mousedown",handler);return()=>document.removeEventListener("mousedown",handler);
  },[]);

  // State: Shipping
  const[incoterm,setIncoterm]=useState("DAP");
  const[carrier,setCarrier]=useState("UPS");

  const[shippingCountry,setShippingCountry]=useState("");

  const[countrySearch,setCountrySearch]=useState("");

  const[fobRate,setFobRate]=useState(0.08);

  // State: Invoice specifics
  const[currency,setCurrency]=useState("USD");

  const[docDate,setDocDate]=useState(new Date().toISOString().split("T")[0]);

  const[notes,setNotes]=useState("");
  const[bankDetails,setBankDetails]=useState(null);
  const[currencyRate,setCurrencyRate]=useState(1);

  // Successor chain resolver: follows successor_jan links up to 5 hops
  const resolveSuccessor=async(prod)=>{
    if(!prod.is_discontinued||!prod.successor_jan)return null;
    let current=prod;const visited=new Set([prod.jan]);
    for(let i=0;i<5;i++){
      if(!current.successor_jan)break;
      if(visited.has(current.successor_jan))break;
      visited.add(current.successor_jan);
      const{data}=await client.from("product_master").select("*").eq("jan",current.successor_jan).limit(1);
      if(!data||!data[0])break;
      current=data[0];
      if(!current.is_discontinued)return current; // found active successor
    }
    return current.jan!==prod.jan?current:null;
  };

  // Load unique country list from shipping_zones
  useEffect(()=>{
    if(!client)return;
    client.from("shipping_zones").select("country").then(({data})=>{
      if(data){const unique=[...new Set(data.map(r=>r.country).filter(Boolean))].sort();setCountryList(unique)}
    });
  },[client]);

  // Close country dropdown on outside click
  useEffect(()=>{
    const handler=(e)=>{if(countryRef.current&&!countryRef.current.contains(e.target))setShowCountryDropdown(false)};
    document.addEventListener("mousedown",handler);return()=>document.removeEventListener("mousedown",handler);
  },[]);

  const filteredCountries=useMemo(()=>{
    if(!countrySearch)return countryList;
    const q=countrySearch.toLowerCase();
    return countryList.filter(c=>c.toLowerCase().includes(q));
  },[countryList,countrySearch]);

  const[currencyRateEditable,setCurrencyRateEditable]=useState("");

  // State: UI
  const[step,_setStep]=useState(1);
  const[saving,setSaving]=useState(false);
  const[saveErr,setSaveErr]=useState("");

  const pricesInitialized=useRef(false);
  // Browser back support: push history on step change, pop to go back
  const setStep=(newStep)=>{
    // Auto-calc prices at 25% margin when first entering summary step
    const summaryStep=mode==="invoice"?5:4;
    if(newStep===summaryStep&&!pricesInitialized.current){
      pricesInitialized.current=true;
      setDocItems(prev=>prev.map(item=>{
        if(item.selling_price>0)return item; // keep if already set
        const costTaxIncl=Math.round((item.cost_price||0)*1.1);
        const costUsd=costTaxIncl/jpy_rate;
        const sp=costUsd>0?parseFloat((costUsd/(1-25/100)).toFixed(2)):0;
        return{...item,selling_price:sp};
      }));
    }
    _setStep(newStep);
    window.history.pushState({_gs:true,view:"docBuilder",mode,step:newStep},"");
  };
  useEffect(()=>{
    // Push initial state
    window.history.pushState({_gs:true,view:"docBuilder",mode,step:1},"");
    const handlePop=(e)=>{
      const st=e.state;
      if(st&&st._gs&&st.view==="docBuilder"){
        _setStep(st.step);
      }else if(st&&st._gs&&st.view==="docPage"){
        // Going back to document menu
        onBack?.();
      }else if(!st||!st._gs){
        // Leaving GS Sales territory — stay on builder step 1
        window.history.pushState({_gs:true,view:"docBuilder",mode,step:1},"");
        _setStep(1);
      }
    };
    window.addEventListener("popstate",handlePop);
    return()=>window.removeEventListener("popstate",handlePop);
  },[]);

  // Pre-fill from initialDoc (e.g. creating invoice from quotation)
  useEffect(()=>{
    if(!initialDoc)return;
    // Restore client info
    if(initialDoc.client_info){
      const ci=initialDoc.client_info;
      setClientInfo({companyName:ci.companyName||"",address:ci.address||"",city:ci.city||"",country:ci.country||"",phone:ci.phone||"",contactPerson:ci.contactPerson||"",email:ci.email||""});
      if(ci.shipping_country)setShippingCountry(ci.shipping_country);
      if(ci.exchange_rate)setCurrencyRate(ci.exchange_rate);
      if(ci.shipping_breakdown)setShippingBreakdown(ci.shipping_breakdown);
    }
    // Restore account/deal/contact
    if(initialDoc.account_id){
      const acct=(accounts||[]).find(a=>a.id===initialDoc.account_id);
      if(acct)setSelectedAccount(acct);
    }
    if(initialDoc.deal_id){
      const d=(deals||[]).find(d=>d.id===initialDoc.deal_id);
      if(d)setSelectedDeal(d);
    }
    if(initialDoc.contact_id){
      const ct=(contacts||[]).find(c=>c.id===initialDoc.contact_id);
      if(ct)setSelectedContact(ct);
    }
    // Restore items
    if(initialDoc.items&&initialDoc.items.length>0){
      setDocItems(initialDoc.items.map(item=>({...item})));

  const filteredContacts=useMemo(()=>{

  const servicesByCarrier={
    UPS:["Expedited","Saver"],
    FedEx:["Economy","Priority"]
  };

  // Handle account selection
  const handleSelectAccount=(acc)=>{

    setClientInfo({
      companyName:acc.name||"",
      address:acc.address||"",
      city:"",
      country:"",
      phone:acc.phone||"",

  // Handle contact selection
  const handleSelectContact=(contact)=>{

    setClientInfo(prev=>({...prev,contactPerson:contact.name||"",email:contact.email||""}));

  // GS-AI: Call order-parse Edge Function
  const callOrderParse=async(text,fileBase64,fileType)=>{
    // Get API key from company_settings (same as receipt OCR)
    let apiKey="";

      const{data}=await client.from("company_settings").select("value").eq("key","receipt_ocr_config").limit(1);

    }catch(e){}
    if(!apiKey){
      setAiMessages(prev=>[...prev,{role:"ai",text:"⚠️ Anthropic APIキーが設定されていません。設定 → レシートOCR設定でAPIキーを入力してください。"}]);
      return null;
    }

    }catch(e){}

    const edgeUrl="https://yzwrumeukjidsguixqxr.supabase.co/functions/v1/order-parse";
    const ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6d3J1bWV1a2ppZHNndWl4cXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTcyMzAsImV4cCI6MjA4OTYzMzIzMH0.8KxvbsRnTXJsfB81PSfvszF6RMS5_S_9GoWkV10_41g";
    const resp=await fetch(edgeUrl,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON_KEY,"apikey":ANON_KEY},
      body:JSON.stringify({text:text||null,file_base64:fileBase64||null,file_type:fileType||null,api_key:apiKey,product_hints:hints})
    });
    const result=await resp.json();
    if(!resp.ok)throw new Error(result.error||"API Error");
    return result;
  };

  // GS-AI: Process text or file input
  const handleAiSubmit=async(inputText,fileBase64,fileType)=>{
    if(!inputText&&!fileBase64)return;
    setAiProcessing(true);

    // Add user message
    if(inputText)setAiMessages(prev=>[...prev,{role:"user",text:inputText}]);
    if(fileBase64)setAiMessages(prev=>[...prev,{role:"user",text:`📎 ファイルをアップロードしました (${fileType})`}]);

    try{
      const result=await callOrderParse(inputText,fileBase64,fileType);
      if(!result)return;

      const{items,warnings,notes,summary}=result;

      if(!items||items.length===0){
        setAiMessages(prev=>[...prev,{role:"ai",text:`商品を検出できませんでした。\n${summary||""}\n\n別の形式で入力するか、もう少し詳しい情報を入力してください。`}]);
        return;
      }

      // Look up items in product_master
      const resolvedItems=[];
      const unresolvedItems=[];

      for(const item of items){
        let prod=null;
        // Clean JAN: remove ".0" suffix (Excel numeric), spaces, non-digits
        const cleanJan=item.jan?String(item.jan).replace(/\.0$/,"").replace(/[^\d]/g,"").trim():"";
        // Try JAN match first
        if(cleanJan&&cleanJan.length>=8){
          const{data}=await client.from("product_master").select("*").eq("jan",cleanJan).limit(1);
          if(data&&data.length>0)prod=data[0];
        }
        // Fallback to name search (try multiple strategies)
        if(!prod&&item.name_guess){
          const guess=item.name_guess.trim();
          // Strategy 1: exact ilike
          const q=`%${guess}%`;
          let{data}=await client.from("product_master").select("*").or(`name_en.ilike.${q},name_ja.ilike.${q}`).limit(1);
          if(data&&data.length>0){prod=data[0]}
          else{
            // Strategy 2: use first significant words (brand + key product name)
            const words=guess.split(/\s+/).filter(w=>w.length>2).slice(0,3);
            if(words.length>=2){
              const q2=`%${words.join("%")}%`;
              const r2=await client.from("product_master").select("*").or(`name_en.ilike.${q2},name_ja.ilike.${q2}`).limit(1);
              if(r2.data&&r2.data.length>0)prod=r2.data[0];
            }
          }
        }

        if(prod){
          // Check if discontinued and has successor
          if(prod.is_discontinued&&prod.successor_jan){
            const succ=await resolveSuccessor(prod);
            if(succ){
              resolvedItems.push({
                product_id:succ.id,jan:succ.jan,
                name_en:succ.name_en||succ.name_ja||"",
                name_ja:succ.name_ja||succ.name_en||"",
                quantity:item.quantity||1,
                cost_price:succ.cost_price||0,
                selling_price:succ.selling_price||0,
                weight_g:succ.weight_g||0,
                case_quantity:succ.case_quantity||0,
                supplier:succ.supplier||"",
                price_break_qty:succ.price_break_qty||0,
                confidence:item.confidence||"high",
                _replacedFrom:prod.jan,_replacedName:prod.name_en||prod.name_ja||""
              });
              continue;
            }
          }
          resolvedItems.push({
            product_id:prod.id,jan:prod.jan,
            name_en:prod.name_en||prod.name_ja||"",
            name_ja:prod.name_ja||prod.name_en||"",
            quantity:item.quantity||1,
            cost_price:prod.cost_price||0,
            selling_price:prod.selling_price||0,
            weight_g:prod.weight_g||0,
            case_quantity:prod.case_quantity||0,
            supplier:prod.supplier||"",
            price_break_qty:prod.price_break_qty||0,
            confidence:item.confidence||"high",
            _isDiscontinued:prod.is_discontinued||false
          });
        }else{
          unresolvedItems.push(item);
        }
      }

      // Build AI response
      let aiReply=`${summary||`${items.length}件の商品を検出しました`}\n\n`;

      if(resolvedItems.length>0){
        aiReply+=`✅ **マッチした商品 (${resolvedItems.length}件):**\n`;
        resolvedItems.forEach(r=>{
          const conf=r.confidence==="high"?"🟢":r.confidence==="medium"?"🟡":"🔴";
          if(r._replacedFrom){
            aiReply+=`${conf} 🔄 ${r.name_en} (${r.jan}) × ${r.quantity}\n   └ 廃盤品 ${r._replacedFrom} (${r._replacedName}) → 後継品に自動置換\n`;
          }else if(r._isDiscontinued){
            aiReply+=`${conf} ⚠️ ${r.name_en} (${r.jan}) × ${r.quantity} 【廃盤・後継品未登録】\n`;
          }else{
            aiReply+=`${conf} ${r.name_en} (${r.jan}) × ${r.quantity}\n`;
          }
        });
      }

      if(unresolvedItems.length>0){
        aiReply+=`\n❌ **見つからなかった商品 (${unresolvedItems.length}件):**\n`;
        unresolvedItems.forEach(u=>{
          aiReply+=`・${u.name_guess||u.jan||"不明"} × ${u.quantity||1}\n`;
        });
      }

      if(warnings&&warnings.length>0){
        aiReply+=`\n⚠️ 注意:\n`;
        warnings.forEach(w=>{aiReply+=`・${w}\n`});
      }

      if(notes&&notes.length>0){
        aiReply+=`\n📋 特記事項（要確認）:\n`;
        notes.forEach(n=>{aiReply+=`・${n}\n`});
      }

      if(resolvedItems.length>0){
        aiReply+=`\nこの内容で追加しますか？`;
        setAiPendingItems(resolvedItems);
      }

      setAiMessages(prev=>[...prev,{role:"ai",text:aiReply}]);
    }catch(e){
      setAiMessages(prev=>[...prev,{role:"ai",text:`❌ エラーが発生しました: ${e.message}`}]);

      setAiProcessing(false);
      setAiInput("");
