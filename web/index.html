// 電話番号フォーマット
const fmtPhone=(raw,country)=>{
  if(!raw||raw==='-'||raw==='不明')return'';
  let d=raw.replace(/[^0-9+]/g,'');
  if(!d||d.replace(/\+/g,'').length<5)return raw;
  const cc=getDialCode(country);
  if(d.startsWith('+'))return fmtPhoneDash(d);
  if(d.startsWith('00'))return fmtPhoneDash('+'+d.slice(2));
  if(d.startsWith('0')&&cc){return fmtPhoneDash(cc+d.slice(1))}
  if(d.startsWith('0'))return fmtPhoneDash('+81'+d.slice(1));
  if(cc)return fmtPhoneDash(cc+d);
  return fmtPhoneDash('+'+d);
};
const fmtPhoneDash=(phone)=>{
  const m=phone.match(/^(\+\d{1,4})(\d+)$/);
  if(!m)return phone;
  const[,cc,num]=m;
  if(cc==='+81'){
    if(num.length===10&&num[0]==='9')return`${cc} ${num.slice(0,2)}-${num.slice(2,6)}-${num.slice(6)}`;
    if(num.length===10&&num[0]==='3')return`${cc} ${num.slice(0,1)}-${num.slice(1,5)}-${num.slice(5)}`;
    if(num.length===9)return`${cc} ${num.slice(0,1)}-${num.slice(1,5)}-${num.slice(5)}`;
    return`${cc} ${num}`;
  }
  if(cc==='+1'&&num.length===10)return`${cc} ${num.slice(0,3)}-${num.slice(3,6)}-${num.slice(6)}`;
  if(num.length>6){const p=[];for(let i=0;i<num.length;i+=4)p.push(num.slice(i,i+4));return`${cc} ${p.join('-')}`}
  return`${cc} ${num}`;
};

// 国入力コンポーネント（サジェスト式）
function CountryInput({value,onChange,style}){
  const[query,setQuery]=useState(value||"");
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setQuery(value||"")},[value]);
  useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const q=query.toLowerCase();
  const filtered=q?COUNTRIES.filter(c=>c.en.toLowerCase().includes(q)||c.ja.includes(q)||c.flag.includes(q)).slice(0,10):COUNTRIES.slice(0,15);
  const select=(c)=>{setQuery(c.en);onChange(c.en);setOpen(false)};
  return(
    <div ref={ref} style={{position:"relative"}}>
      <input value={query} onChange={e=>{setQuery(e.target.value);setOpen(true);if(!e.target.value)onChange("")}}
        onFocus={()=>setOpen(true)} placeholder="国名を検索（日本語/英語）" style={style}/>
      {open&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #ddd",borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,.12)",zIndex:100,maxHeight:180,overflowY:"auto",marginTop:2}}>
          {filtered.map(c=>(
            <div key={c.en} onClick={()=>select(c)} style={{padding:"5px 10px",fontSize:11.5,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}
              onMouseEnter={e=>e.currentTarget.style.background="#f5f5f5"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>

}

// 電話番号フォーマット警告チェック（既存データ用）
const hasInvalidPhoneChars=(phone)=>{
  if(!phone)return false;
  const cleaned=phone.replace(/^\+/,'');
  return /[\-\(\)\s]/.test(cleaned);
};

// 電話番号バリデーション（数字のみ許可）
const validatePhoneDigits=(val)=>{
  if(!val)return{valid:true,cleaned:val};
  // Allow + at start and digits only
  const cleaned=val.replace(/^\+/,'');
  if(/[\-\(\)\s]/.test(cleaned))return{valid:false,cleaned:val,error:"ハイフン・括弧・スペースは使用できません。数字のみ入力してください"};
  if(/[^0-9]/.test(cleaned))return{valid:false,cleaned:val,error:"数字のみ入力してください"};
  return{valid:true,cleaned:val};
};

function PhoneInput({value,onChange,onBlur,country,placeholder,style,showError,onDialChange}){
  const defaultCc=getDialCode(country)||'+81';
  const[selectedDial,setSelectedDial]=useState(defaultCc);

  useEffect(()=>{
    const h=(e)=>{if(dialRef.current&&!dialRef.current.contains(e.target)){setShowDial(false);setDialSearch("")}};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  useEffect(()=>{if(showDial&&searchInputRef.current)searchInputRef.current.focus()},[showDial]);

    if(!dialSearch.trim())return DIAL_OPTIONS;

    return DIAL_OPTIONS.filter(d=>(d.search||"").toLowerCase().includes(q)||d.label.toLowerCase().includes(q)||d.code.includes(q));
  },[dialSearch]);
  const cur=DIAL_OPTIONS.find(d=>d.code===selectedDial)||{code:selectedDial,flag:countryToFlag(country),label:selectedDial};
  const cleanPhone=(raw)=>{
    let v=raw.replace(/[\s\u3000\u00A0\-\.\(\)]/g,"");
    // Remove leading country code if it matches selected dial (e.g. +81809... -> 809...)
    if(v.startsWith(selectedDial))v=v.slice(selectedDial.length);
    else if(v.startsWith("+")){const m=v.match(/^\+\d{1,4}/);if(m){const code=m[0];const opt=DIAL_OPTIONS.find(d=>d.code===code);if(opt){setSelectedDial(code);if(onDialChange)onDialChange(code);v=v.slice(code.length)}}}
    // Remove leading 0 for domestic format (e.g. 090... -> 90...)
    if(v.startsWith("0")&&selectedDial)v=v.slice(1);
    return v;
  };
  const handlePhoneChange=(e)=>{
    const val=cleanPhone(e.target.value);
    e={...e,target:{...e.target,value:val?selectedDial+val:""}};
    const{valid,error}=validatePhoneDigits(val);
    if(!valid){setPhoneError(error)}else{setPhoneError("")}
    onChange(e);

const fmt=(d)=>{if(!d||d==="")return"-";try{const dt=new Date(d);if(isNaN(dt.getTime()))return"-";return dt.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone})}catch(e){return"-"}};
const fmtYen=(n)=>"¥"+Number(n||0).toLocaleString();
const fmtDealAmt=(n)=>(!n||Number(n)===0)?"未定":fmtYen(n);
const shortName=(u)=>{if(!u)return"-";if(u.display_name)return u.display_name;const n=u.name||"";if(n){const parts=n.split(" ");if(parts.length>=2)return parts[0];return n;}const e=u.email||"";return e?e.split("@")[0]:"-";};
const ini=(n)=>(n||'?')[0].toUpperCase();
const stripCorp=(name)=>{if(!name)return name;return name.replace(/\s*,?\s*\b(LLC|Inc\.?|Corp\.?|Co\.?\s*,?\s*Ltd\.?|Ltd\.?|GmbH|S\.?A\.?|PLC|Pty\.?\s*Ltd\.?|Pte\.?\s*Ltd\.?|L\.?L\.?C\.?|Incorporated|Limited|Corporation)\b\.?\s*/gi,"").trim();};

// ── CSVエクスポート（グローバルユーティリティ） ──
const exportCSV=(filename,headers,rows)=>{
  const bom="\uFEFF";
  const esc=(v)=>{const s=String(v??"");return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s};
  const csv=bom+headers.map(esc).join(",")+"\n"+rows.map(r=>r.map(esc).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
};

// ── Error Boundary（ホワイトアウト防止） ──
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null,errorInfo:null}}
  static getDerivedStateFromError(error){return{hasError:true,error}}
  componentDidCatch(error,errorInfo){this.setState({errorInfo});console.error("ErrorBoundary caught:",error,errorInfo)}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{padding:40,textAlign:"center",fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif"}},
        React.createElement("div",{style:{fontSize:40,marginBottom:16}},"⚠️"),
        React.createElement("h2",{style:{fontSize:16,fontWeight:700,color:"#dc2626",marginBottom:8}},"エラーが発生しました"),
        React.createElement("p",{style:{fontSize:13,color:"#666",marginBottom:16,maxWidth:500,margin:"0 auto 16px"}},
          this.state.error?.message||"予期しないエラー"),
        React.createElement("details",{style:{textAlign:"left",maxWidth:500,margin:"0 auto 16px",fontSize:11,color:"#999"}},
          React.createElement("summary",{style:{cursor:"pointer",marginBottom:4}},"詳細"),
          React.createElement("pre",{style:{whiteSpace:"pre-wrap",wordBreak:"break-all",background:"#f5f5f5",padding:10,borderRadius:6,maxHeight:200,overflow:"auto"}},
            this.state.error?.stack||"","\n",this.state.errorInfo?.componentStack||"")),
        React.createElement("button",{onClick:()=>{this.setState({hasError:false,error:null,errorInfo:null})},
          style:{padding:"8px 20px",borderRadius:6,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",background:"#1a1a1a",color:"#fff",marginRight:8}},"再試行"),
        React.createElement("button",{onClick:()=>location.reload(),
          style:{padding:"8px 20px",borderRadius:6,border:"1px solid #ddd",fontSize:13,fontWeight:600,cursor:"pointer",background:"#fff",color:"#333"}},"ページを再読み込み")
      );
    }
    return this.props.children;
  }
}

// ── Toast通知システム ──
const ToastCtx=React.createContext();
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  const show=useCallback((msg,type="success")=>{
    const id=Date.now();
    const dur=type==="success"?3500:type==="error"?5000:3000;
    setToasts(prev=>[...prev,{id,msg,type}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),dur);
  },[]);
  return React.createElement(ToastCtx.Provider,{value:show},
    children,
    React.createElement("div",{style:{position:"fixed",bottom:20,right:20,zIndex:9999,display:"flex",flexDirection:"column",gap:8}},
      toasts.map(t=>React.createElement("div",{key:t.id,style:{
        padding:"10px 16px",borderRadius:8,fontSize:12,fontWeight:600,fontFamily:"inherit",
        color:"#fff",boxShadow:"0 4px 12px rgba(0,0,0,0.15)",
        animation:"fadeIn .2s",maxWidth:320,
        background:t.type==="error"?"#ef4444":t.type==="warn"?"#f59e0b":"#22c55e"
      }},t.msg))
    )
  );
}
const useToast=()=>React.useContext(ToastCtx);

// ── Weekly Report Page ──
function WeeklyReportPage({deals,accounts,client,user,allUsers,onOpenDeal}){
  const toast=useToast();
  const[pendingDeals,setPendingDeals]=useState([]);
  const[reportTexts,setReportTexts]=useState({});
  const[submitting,setSubmitting]=useState({});
  const[loaded,setLoaded]=useState(false);

  const getWeekStart=()=>{
    const now=new Date();
    const day=now.getDay();
    const diff=now.getDate()-day+(day===0?-6:1);
    const monday=new Date(now.setDate(diff));
    monday.setHours(0,0,0,0);
    return monday.toISOString();
  };

  useEffect(()=>{
    (async()=>{
      const weekStart=getWeekStart();
      const myDeals=deals.filter(d=>d.owner_id===user.id&&d.stage!=="closed"&&d.stage!=="lost");
      const{data:reports}=await client.from("sales_activities").select("deal_id").eq("type","weekly_report").eq("user_id",user.id).gte("created_at",weekStart);
      const reportedDealIds=new Set((reports||[]).map(r=>r.deal_id));
      setPendingDeals(myDeals.filter(d=>!reportedDealIds.has(d.id)));
      setLoaded(true);
    })();
  },[deals,user.id]);

  const submitReport=async(dealId)=>{
    const text=reportTexts[dealId]?.trim();
    if(!text)return;
    setSubmitting(s=>({...s,[dealId]:true}));
    try{
      const deal=deals.find(d=>d.id===dealId);
      await client.from("sales_activities").insert({
        deal_id:dealId,account_id:deal?.account_id,user_id:user.id,
        type:"weekly_report",subject:"週次レポートを提出しました",content:text
      });
      // Auto-post to GS-Chat
      if(deal?.chat_room_id){
        const acct=accounts.find(a=>a.id===deal.account_id);
        const chatMsg=`📋 週次レポート\n${text}`;
        await client.from("chat_messages").insert({room_id:deal.chat_room_id,user_id:user.id,content:chatMsg,type:"text"});
      }
      setPendingDeals(prev=>prev.filter(d=>d.id!==dealId));
      setReportTexts(prev=>{const n={...prev};delete n[dealId];return n});
      // 最近のアクティビティを即時リロード
      try{const{data:ra}=await client.from("sales_activities").select("*").order("created_at",{ascending:false}).limit(20);if(ra)setRecentActivities(ra.filter(a=>!a.deleted_at&&!a.is_todo))}catch(ex){}
      toast("週次レポートを提出しました");
    }catch(e){toast("送信エラー: "+e.message,"error")}
    setSubmitting(s=>({...s,[dealId]:false}));
  };

  if(!loaded)return <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,color:T.muted}}>読み込み中...</span></div>;

  return(
    <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
      <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:4}}>週次レポート</div>
      <div style={{fontSize:11,color:T.muted,marginBottom:16}}>担当商談の週次報告を入力してください（{pendingDeals.length}件未提出）</div>
      {pendingDeals.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#ccc",fontSize:12}}>全レポート提出済み</div>}
      {pendingDeals.map(d=>{
        const acct=accounts.find(a=>a.id===d.account_id);
        return(
          <div key={d.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:T.accent,cursor:"pointer"}} onClick={e=>{e.stopPropagation();if(onOpenDeal)onOpenDeal(d)}} onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"} onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>{d.name}</div>
                <div style={{fontSize:10,color:T.muted}}>{acct?.name||"-"} · {STAGES.find(s=>s.id===d.stage)?.ja} · {fmtDealAmt(d.amount)}</div>
              </div>
            </div>
            <textarea value={reportTexts[d.id]||""} onChange={e=>setReportTexts(prev=>({...prev,[d.id]:e.target.value}))}
              placeholder="今週の進捗・課題・来週の予定..."
              style={{width:"100%",minHeight:70,padding:"8px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11.5,outline:"none",fontFamily:"inherit",lineHeight:1.5,resize:"vertical",marginBottom:8}}/>
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <button onClick={()=>submitReport(d.id)} disabled={submitting[d.id]||!reportTexts[d.id]?.trim()}
                style={{padding:"5px 14px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:submitting[d.id]||!reportTexts[d.id]?.trim()?0.4:1}}>
                {submitting[d.id]?"送信中...":"提出"}
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Dashboard ──
function Dashboard({deals,accounts,contacts,allUsers,client,user,leads,leadActions,fyStartMonth,companySettings,setCompanySettings,onOpenDeal,onOpenAcct,onOpenLead}){
  const[unreported,setUnreported]=useState([]);
  const[animPct,setAnimPct]=useState(0);
  // ── アクティビティフィード ──
  const[recentActivities,setRecentActivities]=useState([]);
  useEffect(()=>{
    if(!client)return;
    (async()=>{
      const{data}=await client.from("sales_activities").select("*").order("created_at",{ascending:false}).limit(20);
      if(data)setRecentActivities(data.filter(a=>!a.deleted_at&&!a.is_todo));
    })();
  },[client,deals]);
  // ひとこと — company_settings の hitokoto_<uid> キーで個別保存（JSON: {text,updated_at}）
  // 毎朝6時(JST)にリセット
  const _today6am=useMemo(()=>{
    const now=new Date();
    const jstOff=9*60*60*1000;
    const jstNow=new Date(now.getTime()+jstOff);
    const jst6am=new Date(Date.UTC(jstNow.getUTCFullYear(),jstNow.getUTCMonth(),jstNow.getUTCDate(),6,0,0)-jstOff);
    if(now<jst6am){jst6am.setTime(jst6am.getTime()-86400000)}
    return jst6am;
  },[]);
  const _parseHitokoto=(v)=>{
    if(!v)return null;
    try{const j=JSON.parse(v);if(j&&j.text)return j}catch(e){}
    return{text:String(v),updated_at:null};
  };
  // 起動時にリセット対象を自動アーカイブ＆クリア
  const _hitokotoResetDone=useRef(false);
  useEffect(()=>{
    if(!client||!companySettings||_hitokotoResetDone.current)return;
    _hitokotoResetDone.current=true;
    (async()=>{
      const keys=Object.entries(companySettings).filter(([k,v])=>k.startsWith("hitokoto_")&&v);
      for(const[k,v]of keys){
        const parsed=_parseHitokoto(v);
        if(!parsed||!parsed.text)continue;
        const updAt=parsed.updated_at?new Date(parsed.updated_at):null;
        if(!updAt||updAt<_today6am){
          // Archive to hitokoto_history
          const uid=k.replace("hitokoto_","");
          try{await client.from("hitokoto_history").insert({user_id:uid,message:parsed.text,posted_at:parsed.updated_at||new Date().toISOString()})}catch(e){console.warn("hitokoto archive:",e)}
          // Delete from company_settings
          try{
            const{data:existing}=await client.from("company_settings").select("id").eq("key",k).limit(1);
            if(existing&&existing.length>0)await client.from("company_settings").update({value:null,updated_at:new Date().toISOString()}).eq("id",existing[0].id);
          }catch(e){console.warn("hitokoto reset:",e)}
          if(setCompanySettings)setCompanySettings(prev=>{const next={...prev};delete next[k];return next});
        }
      }
    })();
  },[client,companySettings]);
  const hitokotoEntries=useMemo(()=>{
    if(!companySettings)return[];
    return Object.entries(companySettings)
      .filter(([k,v])=>k.startsWith("hitokoto_")&&v)
      .map(([k,v])=>{
        const uid=k.replace("hitokoto_","");
        const u=allUsers.find(x=>x.id===uid);
        const parsed=_parseHitokoto(v);
        return{uid,name:shortName(u),initial:(shortName(u)||"?").charAt(0).toUpperCase(),msg:parsed?.text||""};
      })
      .filter(e=>e.msg);
  },[companySettings,allUsers]);
  const myHitokoto=(()=>{const p=_parseHitokoto(companySettings?.["hitokoto_"+user?.id]);return p?.text||""})();
  const[hitokotoEdit,setHitokotoEdit]=useState(false);
  const[hitokotoDraft,setHitokotoDraft]=useState("");
  const[hitokotoSaving,setHitokotoSaving]=useState(false);
  const _myProfile=allUsers.find(u=>u.id===user?.id);
  const _myEmail=user?.email||_myProfile?.email||"";
  const isAdmin=_myProfile?.role==="admin";
  const saveHitokoto=async()=>{
    if(!client||!user?.id)return;setHitokotoSaving(true);
    try{
      const val=hitokotoDraft.trim();
      const myKey="hitokoto_"+user.id;
      const jsonVal=val?JSON.stringify({text:val,updated_at:new Date().toISOString()}):null;
      // Archive old hitokoto to history before overwriting
      const oldParsed=_parseHitokoto(companySettings?.[myKey]);
      if(oldParsed&&oldParsed.text){
        try{await client.from("hitokoto_history").insert({user_id:user.id,message:oldParsed.text,posted_at:oldParsed.updated_at||new Date().toISOString()})}catch(e){console.warn("hitokoto archive:",e)}
      }
      // Check if row exists for this key
      const{data:existing}=await client.from("company_settings").select("id").eq("key",myKey).limit(1);
      if(existing&&existing.length>0){
        if(jsonVal){
          await client.from("company_settings").update({value:jsonVal}).eq("id",existing[0].id);
        }else{
          await client.from("company_settings").update({value:null,updated_at:new Date().toISOString()}).eq("id",existing[0].id);
        }
      }else if(jsonVal){
        await client.from("company_settings").insert({key:myKey,value:jsonVal});
      }
      // Update local state
      if(setCompanySettings)setCompanySettings(prev=>{
        const next={...prev};
        if(jsonVal)next[myKey]=jsonVal;else delete next[myKey];
        return next;
      });
    }catch(e){console.error("saveHitokoto error:",e)}
    setHitokotoEdit(false);setHitokotoSaving(false);
  };
  const REV_STAGES=['order_pending','order_completed','goods_received','shipped','closed'];
  const now=new Date();
  const thisMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastD=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lastMonth=`${lastD.getFullYear()}-${String(lastD.getMonth()+1).padStart(2,'0')}`;
  const getRevDate=(deal)=>deal.payment_confirmed_date||deal.payment_date||null;
  const getRevMonth=(deal)=>{const d=getRevDate(deal);return d?d.substring(0,7):null};

  const acctMap=useMemo(()=>{const m={};accounts.forEach(a=>{m[a.id]=a});return m},[accounts]);
  const isJBW=(deal)=>{const acct=acctMap[deal.account_id];return acct&&acct.lead_source==="JBW"};

  const revDeals=deals.filter(d=>REV_STAGES.includes(d.stage)&&getRevDate(d));
  const thisRev=revDeals.filter(d=>getRevMonth(d)===thisMonth).reduce((s,d)=>s+(Number(d.amount)||0),0);
  const lastRev=revDeals.filter(d=>getRevMonth(d)===lastMonth).reduce((s,d)=>s+(Number(d.amount)||0),0);
  const changePct=lastRev>0?Math.round((thisRev-lastRev)/lastRev*100):0;

  // Fiscal year: configurable start month (human: 1=Jan,2=Feb → JS 0-indexed)
  const fyStartMonthIdx=(fyStartMonth||2)-1;
  const fyStartYear=now.getMonth()>=fyStartMonthIdx?now.getFullYear():now.getFullYear()-1;
  const fyMonths=[];for(let i=0;i<12;i++){const md=new Date(fyStartYear,fyStartMonthIdx+i,1);fyMonths.push(`${md.getFullYear()}-${String(md.getMonth()+1).padStart(2,'0')}`);}
  const fyRev=revDeals.filter(d=>{const mk=getRevMonth(d);return mk&&fyMonths.includes(mk)}).reduce((s,d)=>s+(Number(d.amount)||0),0);
  const FY_TARGET=1000000000;
  const fyPct=Math.min(100,fyRev/FY_TARGET*100);
  const fyMonthlyRevs=fyMonths.map(mk=>({key:mk,label:mk.split("-")[1]+"月",rev:revDeals.filter(d=>getRevMonth(d)===mk).reduce((s,d)=>s+(Number(d.amount)||0),0)}));
  const fyMonthsLeft=fyMonths.filter(m=>m>thisMonth).length;
  const fyElapsedMonths=fyMonths.filter(m=>m<=thisMonth).length;
  const fyPaceYearly=fyElapsedMonths>0?Math.round(fyRev/fyElapsedMonths*12):0;
  const fyRemaining=FY_TARGET-fyRev;

  const lastRevSameDay=revDeals.filter(d=>{

  const maxMRev=Math.max(...mRevEntries.map(e=>e.rev),1);
  const fyRevEntries=allMemberIds.map(id=>({id,rev:fyRevMap[id]||0})).sort((a,b)=>b.rev-a.rev);
  const maxFyRev=Math.max(...fyRevEntries.map(e=>e.rev),1);

  const ACCT_FIELDS=['name','country','industry','lead_source','owner_id','phone','website'];
  const CONTACT_FIELDS=['name','account_id','email','phone','role'];
  const calcPct=(items,fields)=>{
    if(items.length===0)return 0;
    let filled=0,total=0;
    items.forEach(item=>{fields.forEach(f=>{total++;if(item[f]&&String(item[f]).trim()&&String(item[f]).trim()!=="0")filled++})});

                  <div style={{width:24,height:24,borderRadius:"50%",background:T.primary,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{(shortName(u)||"?")[0]}</div>

                      {acct&&<span style={{color:T.accent,marginLeft:4,fontWeight:500,cursor:"pointer"}} onClick={e=>{e.stopPropagation();if(onOpenAcct)onOpenAcct(acct)}} onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"} onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>{acct.name}</span>}
                    </div>
                    {(a.subject||a.content)&&<div style={{fontSize:10.5,color:T.sub,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.subject?a.subject:(a.type==="audit_update"||a.type==="audit_insert")?a.content.replace("sales_deals update","商談を更新").replace("sales_accounts update","取引先を更新").replace("sales_contacts update","コンタクトを更新").replace("sales_leads update","リードを更新").replace("sales_deals insert","商談を作成").replace("sales_accounts insert","取引先を作成").replace("sales_contacts insert","コンタクトを作成").replace("sales_leads insert","リードを作成"):a.content}</div>}
                  </div>
                  <span style={{fontSize:9,color:T.muted,whiteSpace:"nowrap",flexShrink:0}}>{timeStr}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── 今期 月別売上チャート ── */}
        <div style={{...card,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <span style={sectionTitle}>今期 月別売上</span>

          </div>
          {(()=>{
            const maxBar=Math.max(...fyMonthlyRevs.map(x=>x.rev),1);
            const chartH=100;
            return(
              <div style={{display:"flex",alignItems:"flex-end",gap:IS_MOBILE?3:6,height:chartH+24}}>
                {fyMonthlyRevs.map((m)=>{
                  const h=m.rev>0?Math.max(4,Math.round(m.rev/maxBar*chartH)):0;
                  const isCurrent=m.key===thisMonth;
                  const isPast=m.key<thisMonth;
                  const isFuture=m.key>thisMonth;
                  return(
                    <div key={m.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:chartH+24}}>
                      {m.rev>0&&<div style={{fontSize:8,fontWeight:700,color:isCurrent?"#1a1a1a":"#bbb",marginBottom:3,fontFeatureSettings:"'tnum'"}}>{fmtAxis(m.rev)}</div>}
                      <div style={{
                        width:"100%",maxWidth:40,height:isFuture&&!m.rev?0:Math.max(h,isFuture?0:2),
                        background:isCurrent?"#1a1a1a":isPast?"#d0d0d0":"transparent",
                        border:isFuture?"1.5px dashed #ddd":"none",
                        borderRadius:3,
                        transition:"height .6s cubic-bezier(.4,0,.2,1)"
                      }}/>
                      <div style={{fontSize:9,color:isCurrent?"#1a1a1a":"#bbb",marginTop:4,fontWeight:isCurrent?700:400}}>{m.label}</div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>

        {/* ── 今月売上ランキング + 今期売上 ── */}
        <div style={{display:"flex",flexDirection:IS_MOBILE?"column":"row",gap:14,marginBottom:14}}>
          <div style={{...card,flex:1}}>

            {mRevEntries.map((e,i)=>{
              const isJ=e.id===JBW_ID;const pct=maxMRev>0?Math.round(e.rev/maxMRev*100):0;
              return(
                <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:24,height:24,borderRadius:12,background:isJ?"#fce4ec":i===0?"#1a1a1a":"#ddd",color:isJ?"#e91e63":i===0?"#fff":"#666",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,fontStyle:isJ?"italic":"normal",flexShrink:0}}>{memberIni(e.id)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                      <span style={{fontSize:11.5,fontWeight:600,color:isJ?"#e91e63":"#1a1a1a",fontStyle:isJ?"italic":"normal"}}>{memberName(e.id)}</span>
                      <span style={{fontSize:11.5,fontWeight:800,color:"#1a1a1a",fontFeatureSettings:"'tnum'"}}>{fmtYen(e.rev)}</span>
                    </div>
                    <div style={{width:"100%",height:4,background:"#f2f2f2",borderRadius:2,overflow:"hidden"}}>
                      <div style={{width:(animPct>0?pct:0)+"%",height:"100%",background:isJ?"#f48fb1":i===0?"#1a1a1a":i===1?"#666":"#aaa",borderRadius:2,transition:"width .8s cubic-bezier(.4,0,.2,1)"}}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{...card,flex:1}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <span style={sectionTitle}>今期売上ランキング</span>
              <span style={{fontSize:12,fontWeight:800,color:"#1a1a1a",fontFeatureSettings:"'tnum'"}}>{fmtYen(fyRev)}</span>
            </div>
            {fyRevEntries.map((e,i)=>{
              const isJ=e.id===JBW_ID;const pct=maxFyRev>0?Math.round(e.rev/maxFyRev*100):0;
              return(
                <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:24,height:24,borderRadius:12,background:isJ?"#fce4ec":i===0?"#1a1a1a":"#ddd",color:isJ?"#e91e63":i===0?"#fff":"#666",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,fontStyle:isJ?"italic":"normal",flexShrink:0}}>{memberIni(e.id)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                      <span style={{fontSize:11.5,fontWeight:600,color:isJ?"#e91e63":"#1a1a1a",fontStyle:isJ?"italic":"normal"}}>{memberName(e.id)}</span>
                      <span style={{fontSize:11.5,fontWeight:800,color:"#1a1a1a",fontFeatureSettings:"'tnum'"}}>{fmtYen(e.rev)}</span>
                    </div>
                    <div style={{width:"100%",height:4,background:"#f2f2f2",borderRadius:2,overflow:"hidden"}}>
                      <div style={{width:(animPct>0?pct:0)+"%",height:"100%",background:isJ?"#f48fb1":i===0?"#1a1a1a":i===1?"#666":"#aaa",borderRadius:2,transition:"width .8s cubic-bezier(.4,0,.2,1)"}}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── 今月リード獲得 ── */}
        {(()=>{
          const thisM=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
          const monthLeads=(leads||[]).filter(l=>{const d=l.created_at||l.deal_date;return d&&d.substring(0,7)===thisM});
          const byOwner={};
          realMembers.forEach(u=>{byOwner[u.id]=0});
          monthLeads.forEach(l=>{const o=l.owner_id;if(o&&byOwner[o]!==undefined)byOwner[o]++});
          const entries=allMemberIds.filter(id=>id!==JBW_ID).map(id=>({id,count:byOwner[id]||0})).sort((a,b)=>b.count-a.count);
          const maxC=Math.max(...entries.map(e=>e.count),1);
          const total=entries.reduce((s,e)=>s+e.count,0);
          return(
            <div style={{...card,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <span style={sectionTitle}>今月のリード獲得</span>
                <span style={{fontSize:12,fontWeight:800,color:"#1a1a1a",fontFeatureSettings:"'tnum'"}}>{total}件</span>
              </div>
              <div style={{display:"flex",alignItems:"flex-end",gap:10,height:120}}>
                {entries.map((e,i)=>{
                  const h=maxC>0?Math.max(4,Math.round(e.count/maxC*100)):0;
                  return(
                    <div key={e.id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
                      {e.count>0&&<div style={{fontSize:10,fontWeight:800,color:"#1a1a1a",marginBottom:4,fontFeatureSettings:"'tnum'"}}>{e.count}</div>}
                      <div style={{width:"100%",maxWidth:36,height:(animPct>0?h:0),background:i===0?"#1a1a1a":i===1?"#666":"#bbb",borderRadius:4,transition:"height .8s cubic-bezier(.4,0,.2,1)"}}/>
                      <div style={{marginTop:6,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        <div style={{fontSize:9,fontWeight:600,color:i===0?"#1a1a1a":"#999",whiteSpace:"nowrap"}}>{memberName(e.id)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* ── 直近の成約 + 成約間近 ── */}
        <div style={{display:"flex",flexDirection:IS_MOBILE?"column":"row",gap:14,marginBottom:14}}>
          <div style={{...card,flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
              <div style={{width:6,height:6,borderRadius:3,background:"#34c759"}}/>
              <span style={sectionTitle}>直近の成約</span>
            </div>
            {recentWins.length===0&&<div style={{fontSize:11,color:"#ccc",padding:"8px 0"}}>まだ成約がありません</div>}
            {recentWins.map((d,i)=>{
              const acct=accounts.find(a=>a.id===d.account_id);
              const ow=allUsers.find(u=>u.id===d.owner_id);
              return(
                <div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<recentWins.length-1?"1px solid #f7f7f7":"none"}}>
                  <span style={{fontSize:12,flexShrink:0}}>{countryToFlag(acct?.country)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#1a1a1a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{acct?.name||d.name}</div>
                    <div style={{fontSize:9,color:"#bbb"}}>{getRevDate(d)} · {shortName(ow)}</div>
                  </div>
                  <span style={{fontSize:11,fontWeight:800,color:"#1a1a1a",fontFeatureSettings:"'tnum'",flexShrink:0}}>{fmtYen(Number(d.amount)||0)}</span>
                </div>
              );
            })}
          </div>
          <div style={{...card,flex:1}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:6,height:6,borderRadius:3,background:"#f5a623"}}/>
                <span style={sectionTitle}>成約間近の案件</span>
                {!IS_MOBILE&&<span style={subLabel}>{CLOSE_STAGES.map(s=>STAGES.find(x=>x.id===s)?.ja).filter(Boolean).join(" · ")}</span>}
              </div>
              {hotTotal>0&&<span style={{fontSize:10,fontWeight:700,color:"#666",background:"#f5f5f5",padding:"2px 8px",borderRadius:10,fontFeatureSettings:"'tnum'"}}>{fmtYen(hotTotal)}</span>}
            </div>
            {hotDeals.length===0&&<div style={{fontSize:11,color:"#ccc",padding:"8px 0"}}>該当案件なし</div>}
            {hotDeals.map((d,i)=>{
              const acct=accounts.find(a=>a.id===d.account_id);
              const stg=STAGES.find(s=>s.id===d.stage);
              return(
                <div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<hotDeals.length-1?"1px solid #f7f7f7":"none"}}>
                  <span style={{fontSize:12,flexShrink:0}}>{countryToFlag(acct?.country)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#1a1a1a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{acct?.name||d.name}</div>
                    <div style={{fontSize:9,color:"#bbb"}}>{stg?.ja||d.stage}</div>
                  </div>
                  <span style={{fontSize:11,fontWeight:800,color:"#1a1a1a",fontFeatureSettings:"'tnum'",flexShrink:0}}>{fmtYen(Number(d.amount)||0)}</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── 未提出レポート + 放置商談 ── */}
        <div style={{display:"flex",flexDirection:IS_MOBILE?"column":"row",gap:14,marginBottom:14}}>
          {unreported.length>0&&(
            <div style={{...card,flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
                <div style={{width:5,height:5,borderRadius:3,background:"#e53935"}}/>
                <span style={sectionTitle}>未提出レポート</span>
                <span style={subLabel}>今週</span>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {unreported.sort((a,b)=>b.deals.length-a.deals.length).map((u,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"#fafafa",borderRadius:8,border:"1px solid #f0f0f0"}}>
                    <div style={{width:22,height:22,borderRadius:11,background:"#eee",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#888"}}>{ini(shortName(u.user))}</div>
                    <span style={{fontSize:11,fontWeight:600,color:"#1a1a1a"}}>{shortName(u.user)}</span>
                    <span style={{fontSize:10,fontWeight:700,color:"#e53935"}}>{u.deals.length}件</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {(()=>{
            const STALE_DAYS=14;const nowMs=Date.now();
            const staleDeals=deals.filter(d=>{
              if(d.stage==="closed"||d.stage==="lost")return false;
              const lastDate=d.updated_at||d.deal_date;if(!lastDate)return true;
              return Math.floor((nowMs-new Date(lastDate).getTime())/(1000*60*60*24))>=STALE_DAYS;
            }).sort((a,b)=>(new Date(a.updated_at||a.deal_date||0).getTime())-(new Date(b.updated_at||b.deal_date||0).getTime())).slice(0,8);
            if(staleDeals.length===0)return null;
            return(
              <div style={{...card,flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
                  <div style={{width:5,height:5,borderRadius:3,background:"#e53935"}}/>
                  <span style={sectionTitle}>放置商談</span>
                  <span style={subLabel}>{STALE_DAYS}日以上</span>
                </div>
                {staleDeals.map((d,i)=>{
                  const acct=accounts.find(a=>a.id===d.account_id);
                  const ow=allUsers.find(u=>u.id===d.owner_id);
                  const lastDate=d.updated_at||d.deal_date;
                  const days=lastDate?Math.floor((nowMs-new Date(lastDate).getTime())/(1000*60*60*24)):"?";
                  return(
                    <div key={d.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:i<staleDeals.length-1?"1px solid #f7f7f7":"none"}}>
                      <span style={{fontSize:10,flexShrink:0}}>{countryToFlag(acct?.country)}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10.5,fontWeight:600,color:"#1a1a1a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{acct?.name||d.name}</div>
                      </div>
                      <span style={{fontSize:9,color:"#aaa",flexShrink:0}}>{shortName(ow)}</span>
                      <span style={{fontSize:9,fontWeight:800,color:days>=30?"#e53935":"#888",background:days>=30?"#fef2f2":"#f5f5f5",padding:"2px 7px",borderRadius:10,flexShrink:0}}>{days}日</span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>

        {/* ── 放置リード ── */}
        {(()=>{
          const STALE_DAYS_LEAD=7;const nowMs2=Date.now();
          const staleLeads=leads.filter(l=>{
            if(l.status==="converted"||l.status==="lost")return false;
            const acts=(leadActions||[]).filter(a=>a.lead_id===l.id);
            if(acts.length===0){
              const created=new Date(l.created_at).getTime();
              return Math.floor((nowMs2-created)/(1000*60*60*24))>=STALE_DAYS_LEAD;
            }
            const lastAct=new Date(acts[0].action_date).getTime();
            return Math.floor((nowMs2-lastAct)/(1000*60*60*24))>=STALE_DAYS_LEAD;
          }).sort((a,b)=>{
            const aActs=(leadActions||[]).filter(x=>x.lead_id===a.id);
            const bActs=(leadActions||[]).filter(x=>x.lead_id===b.id);
            const aLast=aActs.length>0?new Date(aActs[0].action_date).getTime():new Date(a.created_at).getTime();
            const bLast=bActs.length>0?new Date(bActs[0].action_date).getTime():new Date(b.created_at).getTime();
            return aLast-bLast;
          }).slice(0,8);
          if(staleLeads.length===0)return null;
          return(
            <div style={{...card,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
                <div style={{width:5,height:5,borderRadius:3,background:T.orange}}/>
                <span style={sectionTitle}>要フォローリード</span>
                <span style={subLabel}>{STALE_DAYS_LEAD}日以上放置</span>
                <span style={{fontSize:10,fontWeight:800,color:T.orange,marginLeft:"auto"}}>{staleLeads.length}件</span>
              </div>
              {staleLeads.map((l,i)=>{
                const acts=(leadActions||[]).filter(a=>a.lead_id===l.id);
                const lastDate=acts.length>0?new Date(acts[0].action_date):new Date(l.created_at);
                const days=Math.floor((nowMs2-lastDate.getTime())/(1000*60*60*24));
                const ow=allUsers.find(u=>u.id===l.owner_id);
                return(
                  <div key={l.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:i<staleLeads.length-1?"1px solid #f7f7f7":"none"}}>
                    <span style={{fontSize:10,flexShrink:0}}>{countryToFlag(l.country)}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10.5,fontWeight:600,color:T.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.company_name}</div>
                      <div style={{fontSize:9,color:T.muted}}>{acts.length>0?acts[0].action_type:"アクションなし"}</div>
                    </div>
                    <span style={{fontSize:9,color:"#aaa",flexShrink:0}}>{shortName(ow)}</span>
                    <span style={{fontSize:9,fontWeight:800,color:days>=14?T.red:T.orange,background:days>=14?"#fef2f2":"#fffbeb",padding:"2px 7px",borderRadius:10,flexShrink:0}}>{days}日</span>
                  </div>
                );
              })}
            </div>
          );
        })()}

        {/* ── データ入力充実度 ── */}
        <div style={{...card,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <span style={sectionTitle}>データ入力充実度</span>
            <span style={subLabel}>取引先 · コンタクト</span>
          </div>
          {completionEntries.map((e,i)=>{
            const avgColor=e.avg>=80?"#1a1a1a":e.avg>=60?"#888":"#ccc";
            const barItems=[
              {label:"取引先",pct:e.acctPct,count:e.acctCount,unit:"社",color:"#1a1a1a"},
              {label:"コンタクト",pct:e.ctPct,count:e.ctCount,unit:"人",color:"#22c55e"}
            ];
            return(
              <div key={e.id} style={{marginBottom:16,paddingBottom:i<completionEntries.length-1?14:0,borderBottom:i<completionEntries.length-1?"1px solid #f5f5f5":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{width:22,height:22,borderRadius:11,background:e.avg>=80?"#1a1a1a":"#eee",color:e.avg>=80?"#fff":"#666",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,flexShrink:0}}>{memberIni(e.id)}</div>
                  <span style={{fontSize:11,fontWeight:700,color:"#1a1a1a"}}>{memberName(e.id)}</span>
                  <span style={{marginLeft:"auto",fontSize:13,fontWeight:800,color:avgColor,fontFeatureSettings:"'tnum'"}}>{e.avg}%</span>
                </div>
                <div style={{display:"flex",gap:6,marginLeft:30}}>
                  {barItems.map(b=>(
                    <div key={b.label} style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:9,fontWeight:600,color:"#999"}}>{b.label} ({b.count}{b.unit})</span>
                        <span style={{fontSize:10,fontWeight:700,color:b.pct>=80?b.color:b.pct>=60?"#999":"#ccc",fontFeatureSettings:"'tnum'"}}>{b.pct}%</span>
                      </div>
                      <div style={{width:"100%",height:4,background:"#f2f2f2",borderRadius:2,overflow:"hidden"}}>
                        <div style={{width:(animPct>0?b.pct:0)+"%",height:"100%",background:b.color,borderRadius:2,transition:"width 1s cubic-bezier(.4,0,.2,1)",opacity:b.pct>=60?1:0.4}}/>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

      </div>
    </div>
  );
}
// ── WinControls ──
function WinControls(){

// ── Helper: get invoice files list (supports legacy single url + new array) ──
const getInvoiceFiles=(deal)=>{
  const files=[];
  if(deal.invoice_files&&Array.isArray(deal.invoice_files)){
    files.push(...deal.invoice_files);
  }else if(deal.invoice_file_url){
    files.push({url:deal.invoice_file_url,name:"請求書",date:deal.invoice_date||""});
  }
  return files;
};

// ── Invoice Upload Modal ──
function InvoiceUploadModal({deal,client,user,onClose,onSaved,mode}){
  const toast=useToast();
  const fileOnly=mode==="add_file";
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");
  const[fileUpload,setFileUpload]=useState(null);
  const[dragOver,setDragOver]=useState(false);
  const[invoiceAmount,setInvoiceAmount]=useState(deal?.amount?String(Math.round(Number(deal.amount))):"");
  const[invoiceAmountDisplay,setInvoiceAmountDisplay]=useState(deal?.amount?Number(deal.amount).toLocaleString():"");
  const[incoterms,setIncoterms]=useState(deal?.incoterms||"");
  const[incotermsOther,setIncotermsOther]=useState("");
  const[shipping,setShipping]=useState(deal?.shipping_type||"");
  const[prepaymentPercent,setPrepaymentPercent]=useState(deal?.prepayment_percent||0);
  const[paymentTerms,setPaymentTerms]=useState(deal?.payment_terms||"");

  const fileRef=useRef(null);
  const existingFiles=getInvoiceFiles(deal);

  const handleAmountChange=(val)=>{
    const num=val.replace(/[^0-9]/g,"");
    setInvoiceAmount(num);
    setInvoiceAmountDisplay(num?Number(num).toLocaleString():"");
  };

  const save=async()=>{
    if(!fileOnly&&!invoiceAmount){setErr("確定金額を入力してください");return}
    if(fileOnly&&!fileUpload){setErr("ファイルを選択してください");return}
    setSaving(true);setErr("");
    try{
      let newInvoiceFiles=[...existingFiles];
      if(fileUpload){
        const ext=fileUpload.name.includes(".")?fileUpload.name.split(".").pop().toLowerCase():"";
        const safeName=Date.now()+"_"+Math.random().toString(36).slice(2,8)+(ext?"."+ext:"");
        const fp="invoices/"+deal.id+"/"+safeName;
        const ct=fileUpload.type||"application/octet-stream";
        const{error:ue}=await client.storage.from("chat-files").upload(fp,fileUpload,{cacheControl:"3600",upsert:true,contentType:ct});
        if(ue)throw ue;
        const{data:ud}=client.storage.from("chat-files").getPublicUrl(fp);
        const invoiceUrl=ud?.publicUrl||"";
        if(invoiceUrl){
          newInvoiceFiles.push({url:invoiceUrl,name:fileUpload.name,date:new Date().toISOString().split('T')[0]});
        }
      }
      let updateData;
      if(fileOnly){
        updateData={invoice_files:newInvoiceFiles.length>0?newInvoiceFiles:null,invoice_file_url:newInvoiceFiles.length>0?newInvoiceFiles[0].url:null,updated_at:new Date().toISOString()};
      }else{
        const finalIncoterms=incoterms==="Other"?incotermsOther:incoterms;
        updateData={
          invoice_amount:Number(invoiceAmount)||0,
          amount:Number(invoiceAmount)||0,
          invoice_date:new Date().toISOString().split('T')[0],
          payment_terms:paymentTerms,
          invoice_files:newInvoiceFiles.length>0?newInvoiceFiles:null,
          invoice_file_url:newInvoiceFiles.length>0?newInvoiceFiles[0].url:null,
          updated_at:new Date().toISOString()
        };
        if(finalIncoterms)updateData.incoterms=finalIncoterms;
        if(shipping)updateData.shipping_type=shipping;
        updateData.prepayment_percent=Number(prepaymentPercent)||0;
        updateData.payment_status=Number(prepaymentPercent)>=100?"full":Number(prepaymentPercent)>0?"partial":"none";
      }
      const{error:de}=await client.from("sales_deals").update(updateData).eq("id",deal.id);
      if(de)throw de;
      toast("請求情報を更新しました！");if(onSaved)onSaved();
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  };

  const removeInvoice=async(idx)=>{
    setSaving(true);setErr("");
    try{
      const updated=[...existingFiles];updated.splice(idx,1);
      const updateData={invoice_files:updated.length>0?updated:null,invoice_file_url:updated.length>0?updated[0].url:null,updated_at:new Date().toISOString()};
      const{error}=await client.from("sales_deals").update(updateData).eq("id",deal.id);
      if(error)throw error;
      toast("請求書を削除しました");if(onSaved)onSaved();
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  };

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};
  const L={display:"block",fontSize:10.5,fontWeight:600,color:"#999",marginBottom:3,marginTop:8};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",borderRadius:10,padding:"18px 20px",width:"90%",maxWidth:400,boxShadow:"0 12px 40px rgba(0,0,0,.12)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.primary}}>{fileOnly?"請求書ファイル追加":"請求情報"}</div>

        {existingFiles.length>0&&(<>
          <label style={L}>添付済み請求書 ({existingFiles.length})</label>
          <div style={{marginBottom:8}}>
            {existingFiles.map((f,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",background:"#f8f9fa",borderRadius:5,marginBottom:3,fontSize:11}}>
              <span style={{fontSize:13}}>📄</span>
              <a href={f.url} target="_blank" rel="noopener" style={{flex:1,color:T.accent,textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name||"請求書"}</a>
              {f.date&&<span style={{color:T.muted,fontSize:10,flexShrink:0}}>{f.date}</span>}
              <button onClick={()=>removeInvoice(i)} style={{padding:"1px 5px",borderRadius:3,border:`1px solid ${T.border}`,background:"#fff",color:T.red,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:10}}>×</button>
            </div>))}
          </div>
        </>)}

        <label style={L}>{existingFiles.length>0?"追加の請求書ファイル":"請求書ファイル（任意）"}</label>
        <input type="file" ref={fileRef} style={{display:"none"}} onChange={e=>{if(e.target.files?.[0])setFileUpload(e.target.files[0])}}/>
        <div
          onClick={()=>fileRef.current?.click()}
          onDragOver={e=>{e.preventDefault();e.stopPropagation();setDragOver(true)}}
          onDragLeave={e=>{e.preventDefault();e.stopPropagation();setDragOver(false)}}
          onDrop={e=>{e.preventDefault();e.stopPropagation();setDragOver(false);if(e.dataTransfer.files?.[0])setFileUpload(e.dataTransfer.files[0])}}
          style={{width:"100%",padding:fileUpload?"8px":"16px 8px",borderRadius:5,border:`2px dashed ${dragOver?T.accent:T.border}`,fontSize:12,fontWeight:500,cursor:"pointer",background:dragOver?"#e8f4fd":"#fafafa",color:dragOver?T.accent:T.sub,fontFamily:"inherit",textAlign:"center",transition:"all .2s",boxSizing:"border-box"}}>
          {fileUpload?(<div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}><span>📄</span><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fileUpload.name}</span><button onClick={e=>{e.stopPropagation();setFileUpload(null)}} style={{padding:"1px 5px",borderRadius:3,border:`1px solid ${T.border}`,background:"#fff",color:T.red,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:10}}>×</button></div>):(<><div style={{fontSize:18,marginBottom:4}}>📂</div><div>ファイルをドラッグ&ドロップ</div><div style={{fontSize:10,color:T.muted,marginTop:2}}>またはクリックして選択</div></>)}
        </div>
        {!fileOnly&&(<>
        <label style={L}>確定金額 *</label>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:T.muted}}>¥</span>
          <input type="text" value={invoiceAmountDisplay} onChange={e=>handleAmountChange(e.target.value)} placeholder="0" style={{...I,fontSize:13,fontWeight:600,paddingLeft:20}}/>
        </div>
        <label style={L}>インコタームズ *</label>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={()=>{setIncoterms("");setIncotermsOther("")}} style={{padding:"5px 10px",borderRadius:5,border:!incoterms?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:!incoterms?700:400,cursor:"pointer",background:!incoterms?T.primary:"#fff",color:!incoterms?"#fff":T.sub,fontFamily:"inherit"}}>なし</button>
          {INCOTERMS_OPTIONS.map(opt=>(<button key={opt} onClick={()=>{setIncoterms(opt);if(opt!=="Other")setIncotermsOther("")}} style={{padding:"5px 10px",borderRadius:5,border:incoterms===opt?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:incoterms===opt?700:400,cursor:"pointer",background:incoterms===opt?T.primary:"#fff",color:incoterms===opt?"#fff":T.sub,fontFamily:"inherit"}}>{opt}</button>))}
        </div>
        {incoterms==="Other"&&<input type="text" value={incotermsOther} onChange={e=>setIncotermsOther(e.target.value)} placeholder="カスタムインコタームズ" style={{...I,marginTop:4}}/>}
        <label style={L}>配送種別 *</label>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setShipping("")} style={{flex:1,padding:"6px",borderRadius:6,border:!shipping?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:!shipping?700:400,cursor:"pointer",background:!shipping?T.primary+"10":"#fff",color:!shipping?T.primary:T.sub,fontFamily:"inherit",textAlign:"center"}}>なし</button>
          {Object.entries(SHIPPING).map(([k,v])=>(<button key={k} onClick={()=>setShipping(k)} style={{flex:1,padding:"6px",borderRadius:6,border:shipping===k?`2px solid ${v.color}`:`1px solid ${T.border}`,fontSize:11,fontWeight:shipping===k?700:400,cursor:"pointer",background:shipping===k?v.color+"10":"#fff",color:shipping===k?v.color:T.sub,fontFamily:"inherit",textAlign:"center"}}>{v.label}</button>))}
        </div>
        <label style={L}>前払い入金% *</label>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
          <input type="range" min="0" max="100" step="10" value={prepaymentPercent} onChange={e=>setPrepaymentPercent(Number(e.target.value))} style={{flex:1,cursor:"pointer"}}/>
          <span style={{fontSize:12,fontWeight:700,color:T.primary,minWidth:30}}>{prepaymentPercent}%</span>
        </div>
        <div style={{width:"100%",height:4,background:"#e5e5e5",borderRadius:2,overflow:"hidden",marginBottom:8}}>
          <div style={{width:prepaymentPercent+"%",height:"100%",background:prepaymentPercent>=100?T.green:prepaymentPercent>0?T.orange:T.muted,transition:"width .3s"}}/>
        </div>
        <label style={L}>支払い条件</label>
        <input type="text" value={paymentTerms} onChange={e=>setPaymentTerms(e.target.value)} placeholder="例: 通関時に残り50%支払い" style={I}/>
        </>)}
        {err&&<div style={{fontSize:11,color:T.red,marginTop:6}}>{err}</div>}
        <div style={{display:"flex",gap:6,marginTop:14,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>キャンセル</button>
          <button onClick={save} disabled={saving} style={{padding:"5px 14px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving?0.5:1}}>{saving?"保存中...":fileOnly?"追加":"確定"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Deal Card (Kanban) ──
const DEAL_CARD_FX=true;
function DealCard({deal,accounts,allUsers,onDragStart,onClick,seqLabel}){
  const acct=accounts.find(a=>a.id===deal.account_id);
  const owner=allUsers?.find(u=>u.id===deal.owner_id);
  const stageObj=STAGES.find(s=>s.id===deal.stage);
  const phase=stageObj?.phase||'pre';
  const isPost=phase==="post"||phase==="done";
  const revD=deal.payment_confirmed_date||deal.payment_date||null;
  const displayDate=isPost&&revD?revD:deal.deal_date;
  const isClosed=deal.stage==="closed";
  const isLost=deal.stage==="lost";
  const fx=DEAL_CARD_FX;
  const cardBg=fx&&isClosed?"linear-gradient(135deg,#fffdf5 0%,#fef9e7 50%,#fdf6d8 100%)":(fx&&isLost?"#f9f9f9":T.card);
  const cardBorder=fx&&isClosed?"1px solid #e8d9a0":(fx&&isLost?"1px solid #eee":`1px solid ${T.borderLight}`);
  const cardOpacity=fx&&isLost?0.55:1;
  const pct=phase==='pre'?(deal.confidence||50):(deal.prepayment_percent||0);
  const pctColor=phase==='pre'?T.accent:(pct>=100?T.green:T.orange);
  const isJBW=acct?.lead_source==="JBW";
  const isPaid=isPost&&deal.supplier_paid;
  return(
    <div draggable onDragStart={e=>{e.dataTransfer.setData("dealId",deal.id);onDragStart&&onDragStart(deal.id)}}
      onClick={()=>onClick(deal)}
      style={{background:isClosed&&fx?undefined:cardBg,backgroundImage:isClosed&&fx?cardBg:undefined,border:cardBorder,borderRadius:8,padding:"10px 12px",cursor:"pointer",animation:"fadeIn .2s ease-out",marginBottom:6,transition:"box-shadow .15s",opacity:cardOpacity,position:"relative",overflow:"hidden"}}
      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,.07)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
      {isJBW&&<div style={{position:"absolute",top:0,left:0,width:20,height:20,background:"radial-gradient(circle at 0% 0%,rgba(232,145,168,0.35) 0%,transparent 70%)",pointerEvents:"none"}}/>}
      {isPaid&&<div style={{position:"absolute",bottom:0,right:0,width:20,height:20,background:"radial-gradient(circle at 100% 100%,rgba(34,197,94,0.3) 0%,transparent 70%)",pointerEvents:"none"}}/>}
      {/* Row 1: Account name + flag */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4,marginBottom:3}}>
        <div style={{fontSize:12,fontWeight:600,color:T.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{seqLabel&&<span style={{color:T.accent,marginRight:3}}>{seqLabel}</span>}{acct?.name||deal.name}</div>
        <span style={{fontSize:14}}>{countryToFlag(acct?.country)}</span>
      </div>
      {/* Row 2: Amount + mini progress bar */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
        <div style={{fontSize:14,fontWeight:700,color:T.primary}}>{fmtDealAmt(deal.amount)}</div>
        {phase!=='done'&&<div style={{width:30,height:3,background:"#ebebeb",borderRadius:2,overflow:"hidden",flexShrink:0}}><div style={{width:pct+"%",height:"100%",background:pctColor,borderRadius:2}}/></div>}
      </div>
      {/* Row 3: Badges */}
      {(deal.shipping_type||deal.incoterms)&&<div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
          <ShipBadge type={deal.shipping_type}/>
          <IncoBadge incoterms={deal.incoterms}/>
      </div>}
      {/* Row 4: Date + Owner */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
        <span style={{fontSize:10,color:T.muted}}>{isPost&&revD?"入金 ":"開始 "}{fmt(displayDate)}</span>
        {owner&&<span style={{fontSize:9,color:"#fff",background:T.muted,borderRadius:3,padding:"0px 4px",fontWeight:600,whiteSpace:"nowrap",lineHeight:"15px"}}>{shortName(owner)}</span>}
      </div>
    </div>
  );
}

// ── Kanban Column ──
function KanbanCol({stage,deals,accounts,allUsers,total,onDrop,onDealClick,sortKey,dealSeqLabels}){
  const[dragOver,setDragOver]=useState(false);
  const handleDragOver=e=>{e.preventDefault();setDragOver(true)};
  const handleDragLeave=()=>setDragOver(false);
  const handleDrop=e=>{e.preventDefault();setDragOver(false);const id=e.dataTransfer.getData("dealId");if(id)onDrop(id,stage.id)};
  const sorted=[...deals].sort((a,b)=>{
    if(sortKey==="amount")return(Number(b.amount)||0)-(Number(a.amount)||0);
    const da=a.payment_confirmed_date||a.payment_date||a.deal_date||"";const db=b.payment_confirmed_date||b.payment_date||b.deal_date||"";return db.localeCompare(da);
  });
  return(
    <div onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
      style={{minWidth:220,width:220,display:"flex",flexDirection:"column",background:dragOver?"rgba(45,140,240,0.04)":"transparent",borderRadius:8,transition:"background .15s"}}>
      <div style={{padding:"8px 8px 4px",position:"sticky",top:0,background:T.bg,zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:11,fontWeight:700,color:T.primary}}>{stage.ja}</span>
            <span style={{fontSize:9.5,color:T.muted,fontWeight:500}}>({deals.length})</span>
          </div>
        </div>
        <div style={{fontSize:9,color:T.muted,marginBottom:4}}>{stage.en}</div>
        <div style={{fontSize:13,fontWeight:700,color:stage.phase==="pre"?T.accent:stage.phase==="post"?T.orange:T.green}}>{fmtYen(total)}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"4px 6px"}}>
        {sorted.map(d=>(<DealCard key={d.id} deal={d} accounts={accounts} allUsers={allUsers} onClick={onDealClick} seqLabel={dealSeqLabels&&dealSeqLabels[d.id]}/>))}
      </div>
    </div>
  );
}
