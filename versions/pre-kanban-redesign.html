// 電話番号フォーマット
const fmtPhone=(raw,country)=>{
  if(!raw||raw==='-'||raw==='不明')return'';
  let d=raw.replace(/[^0-9+]/g,'');
  if(!d||d.replace(/\+/g,'').length<5)return raw;
  const cc=getDialCode(country);
  if(d.startsWith('+'))return fmtPhoneDash(d);
  if(d.startsWith('00'))return fmtPhoneDash('+'+d.slice(2));
  if(d.startsWith('0')&&cc){return fmtPhoneDash(cc+d.slice(1))}
  if(d.startsWith('0'))return fmtPhoneDash('+81'+d.slice(1));
  if(cc)return fmtPhoneDash(cc+d);
  return fmtPhoneDash('+'+d);
};
const fmtPhoneDash=(phone)=>{
  const m=phone.match(/^(\+\d{1,4})(\d+)$/);
  if(!m)return phone;
  const[,cc,num]=m;
  if(cc==='+81'){
    if(num.length===10&&num[0]==='9')return`${cc} ${num.slice(0,2)}-${num.slice(2,6)}-${num.slice(6)}`;
    if(num.length===10&&num[0]==='3')return`${cc} ${num.slice(0,1)}-${num.slice(1,5)}-${num.slice(5)}`;
    if(num.length===9)return`${cc} ${num.slice(0,1)}-${num.slice(1,5)}-${num.slice(5)}`;
    return`${cc} ${num}`;
  }
  if(cc==='+1'&&num.length===10)return`${cc} ${num.slice(0,3)}-${num.slice(3,6)}-${num.slice(6)}`;
  if(num.length>6){const p=[];for(let i=0;i<num.length;i+=4)p.push(num.slice(i,i+4));return`${cc} ${p.join('-')}`}
  return`${cc} ${num}`;
};

// 国入力コンポーネント（サジェスト式）
function CountryInput({value,onChange,style}){
  const[query,setQuery]=useState(value||"");
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setQuery(value||"")},[value]);
  useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const q=query.toLowerCase();
  const filtered=q?COUNTRIES.filter(c=>c.en.toLowerCase().includes(q)||c.ja.includes(q)||c.flag.includes(q)).slice(0,10):COUNTRIES.slice(0,15);
  const select=(c)=>{setQuery(c.en);onChange(c.en);setOpen(false)};
  return(
    <div ref={ref} style={{position:"relative"}}>
      <input value={query} onChange={e=>{setQuery(e.target.value);setOpen(true);if(!e.target.value)onChange("")}}
        onFocus={()=>setOpen(true)} placeholder="国名を検索（日本語/英語）" style={style}/>
      {open&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #ddd",borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,.12)",zIndex:100,maxHeight:180,overflowY:"auto",marginTop:2}}>
          {filtered.map(c=>(
            <div key={c.en} onClick={()=>select(c)} style={{padding:"5px 10px",fontSize:11.5,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}
              onMouseEnter={e=>e.currentTarget.style.background="#f5f5f5"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
              <span>{c.flag}</span><span style={{fontWeight:500}}>{c.en}</span><span style={{color:"#999",fontSize:10}}>{c.ja}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// 電話番号フォーマット警告チェック（既存データ用）
const hasInvalidPhoneChars=(phone)=>{
  if(!phone)return false;
  const cleaned=phone.replace(/^\+/,'');
  return /[\-\(\)\s]/.test(cleaned);
};

// 電話番号バリデーション（数字のみ許可）
const validatePhoneDigits=(val)=>{
  if(!val)return{valid:true,cleaned:val};
  // Allow + at start and digits only
  const cleaned=val.replace(/^\+/,'');
  if(/[\-\(\)\s]/.test(cleaned))return{valid:false,cleaned:val,error:"ハイフン・括弧・スペースは使用できません。数字のみ入力してください"};
  if(/[^0-9]/.test(cleaned))return{valid:false,cleaned:val,error:"数字のみ入力してください"};
  return{valid:true,cleaned:val};
};

// PhoneInput コンポーネント（国番号変更可能・検索付き）
function PhoneInput({value,onChange,onBlur,country,placeholder,style,showError,onDialChange}){
  const defaultCc=getDialCode(country)||'+81';
  const[selectedDial,setSelectedDial]=useState(defaultCc);
  const[showDial,setShowDial]=useState(false);
  const[dialSearch,setDialSearch]=useState("");
  const[phoneError,setPhoneError]=useState("");
  const dialRef=useRef(null);
  const searchInputRef=useRef(null);
  useEffect(()=>{const cc=getDialCode(country);if(cc)setSelectedDial(cc)},[country]);
  useEffect(()=>{
    const h=(e)=>{if(dialRef.current&&!dialRef.current.contains(e.target)){setShowDial(false);setDialSearch("")}};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  useEffect(()=>{if(showDial&&searchInputRef.current)searchInputRef.current.focus()},[showDial]);
  const filteredDial=useMemo(()=>{
    if(!dialSearch.trim())return DIAL_OPTIONS;
    const q=dialSearch.toLowerCase();
    return DIAL_OPTIONS.filter(d=>(d.search||"").toLowerCase().includes(q)||d.label.toLowerCase().includes(q)||d.code.includes(q));
  },[dialSearch]);
  const cur=DIAL_OPTIONS.find(d=>d.code===selectedDial)||{code:selectedDial,flag:countryToFlag(country),label:selectedDial};
  const handlePhoneChange=(e)=>{
    const val=e.target.value;
    const{valid,error}=validatePhoneDigits(val);
    if(!valid){setPhoneError(error)}else{setPhoneError("")}
    onChange(e);
  };
  return(
    <div style={{position:"relative",display:"flex",flexDirection:"column"}} ref={dialRef}>
      <div style={{position:"relative",display:"flex",alignItems:"center"}}>
        <span onClick={()=>{setShowDial(!showDial);setDialSearch("")}} style={{position:"absolute",left:4,fontSize:10.5,color:"#666",cursor:"pointer",whiteSpace:"nowrap",zIndex:2,display:"flex",alignItems:"center",gap:2,padding:"2px 2px",borderRadius:3,background:showDial?"#f0f0f0":"transparent"}} title="国番号を変更">
          {cur.flag} {selectedDial} <span style={{fontSize:7,color:"#bbb"}}>▼</span>
        </span>
        {showDial&&(
          <div style={{position:"absolute",top:"100%",left:0,background:"#fff",border:"1px solid #ddd",borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,.12)",zIndex:100,maxHeight:240,minWidth:200,marginTop:2,display:"flex",flexDirection:"column"}}>
            <div style={{padding:"4px 6px",borderBottom:"1px solid #eee",flexShrink:0}}>
              <input ref={searchInputRef} value={dialSearch} onChange={e=>setDialSearch(e.target.value)} placeholder="国名で検索..." style={{width:"100%",padding:"4px 8px",border:"1px solid #ddd",borderRadius:4,fontSize:11,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
            </div>
            <div style={{overflowY:"auto",maxHeight:190}}>
              {filteredDial.length===0&&<div style={{padding:"8px",fontSize:11,color:"#999",textAlign:"center"}}>該当なし</div>}
              {filteredDial.map((d,i)=>(
                <div key={d.code+d.flag+i} onClick={()=>{setSelectedDial(d.code);setShowDial(false);setDialSearch("");if(onDialChange)onDialChange(d.code)}}
                  style={{padding:"4px 8px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:4,background:selectedDial===d.code?"#f0f0f0":"#fff"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f5f5f5"} onMouseLeave={e=>e.currentTarget.style.background=selectedDial===d.code?"#f0f0f0":"#fff"}>
                  <span>{d.flag}</span><span>{d.label}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <input
          value={value}
          onChange={handlePhoneChange}
          onBlur={onBlur}
          placeholder={placeholder||(selectedDial?`${selectedDial} ...`:"+XX ...")}
          style={{...style,paddingLeft:selectedDial.length>3?62:54,borderColor:phoneError?"#ef4444":undefined}}
        />
      </div>
      {phoneError&&<div style={{fontSize:10,color:"#ef4444",marginTop:2}}>{phoneError}</div>}
    </div>
  );
}

// ── Toast通知システム ──
const ToastCtx=React.createContext();
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  const show=useCallback((msg,type="success")=>{
    const id=Date.now();
    setToasts(prev=>[...prev,{id,msg,type}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),3000);
  },[]);
  return React.createElement(ToastCtx.Provider,{value:show},
    children,
    React.createElement("div",{style:{position:"fixed",bottom:20,right:20,zIndex:9999,display:"flex",flexDirection:"column",gap:8}},
      toasts.map(t=>React.createElement("div",{key:t.id,style:{
        padding:"10px 16px",borderRadius:8,fontSize:12,fontWeight:600,fontFamily:"inherit",
        color:"#fff",boxShadow:"0 4px 12px rgba(0,0,0,0.15)",
        animation:"fadeIn .2s",maxWidth:320,
        background:t.type==="error"?"#ef4444":t.type==="warn"?"#f59e0b":"#22c55e"
      }},t.msg))
    )
  );
}
const useToast=()=>React.useContext(ToastCtx);

// ── Weekly Report Page ──
function WeeklyReportPage({deals,accounts,client,user,allUsers}){
  const[pendingDeals,setPendingDeals]=useState([]);
  const[reportTexts,setReportTexts]=useState({});
  const[submitting,setSubmitting]=useState({});
  const[loaded,setLoaded]=useState(false);

  const getWeekStart=()=>{
    const now=new Date();
    const day=now.getDay();
    const diff=now.getDate()-day+(day===0?-6:1);
    const monday=new Date(now.setDate(diff));
    monday.setHours(0,0,0,0);
    return monday.toISOString();
  };

  useEffect(()=>{
    (async()=>{
      const weekStart=getWeekStart();
      const myDeals=deals.filter(d=>d.owner_id===user.id&&d.stage!=="closed"&&d.stage!=="lost");
      const{data:reports}=await client.from("sales_activities").select("deal_id").eq("type","weekly_report").eq("user_id",user.id).gte("created_at",weekStart);
      const reportedDealIds=new Set((reports||[]).map(r=>r.deal_id));
      setPendingDeals(myDeals.filter(d=>!reportedDealIds.has(d.id)));
      setLoaded(true);
    })();
  },[deals,user.id]);

  const submitReport=async(dealId)=>{
    const text=reportTexts[dealId]?.trim();
    if(!text)return;
    setSubmitting(s=>({...s,[dealId]:true}));
    try{
      const deal=deals.find(d=>d.id===dealId);
      await client.from("sales_activities").insert({
        deal_id:dealId,account_id:deal?.account_id,user_id:user.id,
        type:"weekly_report",content:text
      });
      // Auto-post to GS-Chat
      if(deal?.chat_room_id){
        const acct=accounts.find(a=>a.id===deal.account_id);
        const chatMsg=`📋 週次レポート\n${text}`;
        await client.from("messages").insert({room_id:deal.chat_room_id,user_id:user.id,content:chatMsg});
      }
      setPendingDeals(prev=>prev.filter(d=>d.id!==dealId));
      setReportTexts(prev=>{const n={...prev};delete n[dealId];return n});
    }catch(e){alert("送信エラー: "+e.message)}
    setSubmitting(s=>({...s,[dealId]:false}));
  };

  if(!loaded)return <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,color:T.muted}}>読み込み中...</span></div>;

  return(
    <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
      <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:4}}>週次レポート</div>
      <div style={{fontSize:11,color:T.muted,marginBottom:16}}>担当商談の週次報告を入力してください（{pendingDeals.length}件未提出）</div>
      {pendingDeals.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#ccc",fontSize:12}}>全レポート提出済み</div>}
      {pendingDeals.map(d=>{
        const acct=accounts.find(a=>a.id===d.account_id);
        return(
          <div key={d.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:T.primary}}>{d.name}</div>
                <div style={{fontSize:10,color:T.muted}}>{acct?.name||"-"} · {STAGES.find(s=>s.id===d.stage)?.ja} · {fmtDealAmt(d.amount)}</div>
              </div>
            </div>
            <textarea value={reportTexts[d.id]||""} onChange={e=>setReportTexts(prev=>({...prev,[d.id]:e.target.value}))}
              placeholder="今週の進捗・課題・来週の予定..."
              style={{width:"100%",minHeight:70,padding:"8px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11.5,outline:"none",fontFamily:"inherit",lineHeight:1.5,resize:"vertical",marginBottom:8}}/>
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <button onClick={()=>submitReport(d.id)} disabled={submitting[d.id]||!reportTexts[d.id]?.trim()}
                style={{padding:"5px 14px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:submitting[d.id]||!reportTexts[d.id]?.trim()?0.4:1}}>
                {submitting[d.id]?"送信中...":"提出"}
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Helper: get invoice files list (supports legacy single url + new array) ──
const getInvoiceFiles=(deal)=>{
  const files=[];
  if(deal.invoice_files&&Array.isArray(deal.invoice_files)){
    files.push(...deal.invoice_files);
  }else if(deal.invoice_file_url){
    files.push({url:deal.invoice_file_url,name:"請求書",date:deal.invoice_date||""});
  }
  return files;
};

// ── Invoice Upload Modal ──
function InvoiceUploadModal({deal,client,user,onClose,onSaved,mode}){
  const fileOnly=mode==="add_file";
  const[fileUpload,setFileUpload]=useState(null);
  const[dragOver,setDragOver]=useState(false);
  const[invoiceAmount,setInvoiceAmount]=useState(deal?.amount?String(Math.round(Number(deal.amount))):"");
  const[invoiceAmountDisplay,setInvoiceAmountDisplay]=useState(deal?.amount?Number(deal.amount).toLocaleString():"");
  const[incoterms,setIncoterms]=useState(deal?.incoterms||"");
  const[incotermsOther,setIncotermsOther]=useState("");
  const[shipping,setShipping]=useState(deal?.shipping_type||"");
  const[prepaymentPercent,setPrepaymentPercent]=useState(deal?.prepayment_percent||0);
  const[paymentTerms,setPaymentTerms]=useState(deal?.payment_terms||"");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");
  const fileRef=useRef(null);
  const existingFiles=getInvoiceFiles(deal);

  const handleAmountChange=(val)=>{
    const num=val.replace(/[^0-9]/g,"");
    setInvoiceAmount(num);
    setInvoiceAmountDisplay(num?Number(num).toLocaleString():"");
  };

  const save=async()=>{
    if(!fileOnly&&!invoiceAmount){setErr("確定金額を入力してください");return}
    if(fileOnly&&!fileUpload){setErr("ファイルを選択してください");return}
    setSaving(true);setErr("");
    try{
      let newInvoiceFiles=[...existingFiles];
      if(fileUpload){
        const ext=fileUpload.name.includes(".")?fileUpload.name.split(".").pop().toLowerCase():"";
        const safeName=Date.now()+"_"+Math.random().toString(36).slice(2,8)+(ext?"."+ext:"");
        const fp="invoices/"+deal.id+"/"+safeName;
        const ct=fileUpload.type||"application/octet-stream";
        const{error:ue}=await client.storage.from("chat-files").upload(fp,fileUpload,{cacheControl:"3600",upsert:true,contentType:ct});
        if(ue)throw ue;
        const{data:ud}=client.storage.from("chat-files").getPublicUrl(fp);
        const invoiceUrl=ud?.publicUrl||"";
        if(invoiceUrl){
          newInvoiceFiles.push({url:invoiceUrl,name:fileUpload.name,date:new Date().toISOString().split('T')[0]});
        }
      }
      let updateData;
      if(fileOnly){
        updateData={invoice_files:newInvoiceFiles.length>0?newInvoiceFiles:null,invoice_file_url:newInvoiceFiles.length>0?newInvoiceFiles[0].url:null,updated_at:new Date().toISOString()};
      }else{
        const finalIncoterms=incoterms==="Other"?incotermsOther:incoterms;
        updateData={
          invoice_amount:Number(invoiceAmount)||0,
          amount:Number(invoiceAmount)||0,
          invoice_date:new Date().toISOString().split('T')[0],
          payment_terms:paymentTerms,
          invoice_files:newInvoiceFiles.length>0?newInvoiceFiles:null,
          invoice_file_url:newInvoiceFiles.length>0?newInvoiceFiles[0].url:null,
          updated_at:new Date().toISOString()
        };
        if(finalIncoterms)updateData.incoterms=finalIncoterms;
        if(shipping)updateData.shipping_type=shipping;
        updateData.prepayment_percent=Number(prepaymentPercent)||0;
        updateData.payment_status=Number(prepaymentPercent)>=100?"full":Number(prepaymentPercent)>0?"partial":"none";
      }
      const{error:de}=await client.from("sales_deals").update(updateData).eq("id",deal.id);
      if(de)throw de;
      onSaved();onClose();
    }catch(e){setErr(e.message);setSaving(false)}
  };

    setSaving(true);setErr("");
    try{
      const updated=[...existingFiles];updated.splice(idx,1);
      const updateData={invoice_files:updated.length>0?updated:null,invoice_file_url:updated.length>0?updated[0].url:null,updated_at:new Date().toISOString()};
      const{error}=await client.from("sales_deals").update(updateData).eq("id",deal.id);

      onSaved();onClose();
    }catch(e){setErr(e.message);setSaving(false)}
  };

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};

              <span style={{fontSize:13}}>📄</span>
              <a href={f.url} target="_blank" rel="noopener" style={{flex:1,color:T.accent,textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name||"請求書"}</a>
              {f.date&&<span style={{color:T.muted,fontSize:10,flexShrink:0}}>{f.date}</span>}
              <button onClick={()=>removeInvoice(i)} style={{padding:"1px 5px",borderRadius:3,border:`1px solid ${T.border}`,background:"#fff",color:T.red,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:10}}>×</button>
            </div>))}
          </div>
        </>)}

        <label style={L}>{existingFiles.length>0?"追加の請求書ファイル":"請求書ファイル（任意）"}</label>
        <input type="file" ref={fileRef} style={{display:"none"}} onChange={e=>{if(e.target.files?.[0])setFileUpload(e.target.files[0])}}/>
        <div
          onClick={()=>fileRef.current?.click()}
          onDragOver={e=>{e.preventDefault();e.stopPropagation();setDragOver(true)}}
          onDragLeave={e=>{e.preventDefault();e.stopPropagation();setDragOver(false)}}
          onDrop={e=>{e.preventDefault();e.stopPropagation();setDragOver(false);if(e.dataTransfer.files?.[0])setFileUpload(e.dataTransfer.files[0])}}
          style={{width:"100%",padding:fileUpload?"8px":"16px 8px",borderRadius:5,border:`2px dashed ${dragOver?T.accent:T.border}`,fontSize:12,fontWeight:500,cursor:"pointer",background:dragOver?"#e8f4fd":"#fafafa",color:dragOver?T.accent:T.sub,fontFamily:"inherit",textAlign:"center",transition:"all .2s",boxSizing:"border-box"}}>
          {fileUpload?(<div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}><span>📄</span><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fileUpload.name}</span><button onClick={e=>{e.stopPropagation();setFileUpload(null)}} style={{padding:"1px 5px",borderRadius:3,border:`1px solid ${T.border}`,background:"#fff",color:T.red,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:10}}>×</button></div>):(<><div style={{fontSize:18,marginBottom:4}}>📂</div><div>ファイルをドラッグ&ドロップ</div><div style={{fontSize:10,color:T.muted,marginTop:2}}>またはクリックして選択</div></>)}
        </div>
        {!fileOnly&&(<>

        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:T.muted}}>¥</span>
          <input type="text" value={invoiceAmountDisplay} onChange={e=>handleAmountChange(e.target.value)} placeholder="0" style={{...I,fontSize:13,fontWeight:600,paddingLeft:20}}/>
        </div>

        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>

        <div style={{display:"flex",gap:6,marginTop:14,justifyContent:"flex-end"}}>

const DEAL_CARD_FX=(()=>{try{return localStorage.getItem("gs_card_fx")!=="off"}catch(e){return true}})();
function DealCard({deal,accounts,allUsers,onDragStart,onClick}){
  const acct=accounts.find(a=>a.id===deal.account_id);
  const owner=allUsers?.find(u=>u.id===deal.owner_id);
  const stageObj=STAGES.find(s=>s.id===deal.stage);
  const phase=stageObj?.phase||'pre';
  const isPost=phase==="post"||phase==="done";
  const revD=deal.payment_confirmed_date||deal.payment_date||null;
  const displayDate=isPost&&revD?revD:deal.deal_date;
  const dateLabel=isPost&&revD?"入金日":"商談開始日";
  const isClosed=deal.stage==="closed";
  const isLost=deal.stage==="lost";
  const fx=DEAL_CARD_FX;
  const cardBg=fx&&isClosed?"linear-gradient(135deg,#fffdf5 0%,#fef9e7 50%,#fdf6d8 100%)":(fx&&isLost?"#f9f9f9":T.card);
  const cardBorder=fx&&isClosed?"1px solid #e8d9a0":(fx&&isLost?"1px solid #eee":`1px solid ${T.border}`);
  const cardOpacity=fx&&isLost?0.6:1;
  return(
    <div draggable onDragStart={e=>{e.dataTransfer.setData("dealId",deal.id);onDragStart&&onDragStart(deal.id)}}
      onClick={()=>onClick(deal)}
      style={{background:isClosed&&fx?undefined:cardBg,backgroundImage:isClosed&&fx?cardBg:undefined,border:cardBorder,borderRadius:8,padding:"8px 10px",cursor:"pointer",animation:"fadeIn .2s ease-out",marginBottom:5,transition:"box-shadow .15s",opacity:cardOpacity}}
      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
      {/* Header: deal name + country flag */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4,marginBottom:4}}>
        <div style={{fontSize:12,fontWeight:600,color:T.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{deal.name}</div>
        <span style={{fontSize:14,fontWeight:700}}>{countryToFlag(acct?.country)}</span>
      </div>
      {/* Amount + badges + slider */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,marginBottom:3}}>
        <div style={{fontSize:14,fontWeight:700,color:T.primary}}>{fmtDealAmt(deal.amount)}</div>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          <ShipBadge type={deal.shipping_type}/>
          <IncoBadge incoterms={deal.incoterms}/>
          {phase!=='done'&&<div style={{width:28,height:4,background:"#e5e5e5",borderRadius:2,overflow:"hidden"}}><div style={{width:(phase==='pre'?(deal.confidence||50):(deal.prepayment_percent||0))+"%",height:"100%",background:phase==='pre'?T.primary:(deal.prepayment_percent>=100?T.green:T.orange),transition:"width .3s"}}/></div>}
        </div>
      </div>
      {/* Date + Owner (left) + supplier paid dot (right) */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:10,color:T.muted}}>{isPost&&revD?"入金 ":"開始 "}{fmt(displayDate)}</span>
          {owner&&<span style={{fontSize:9,color:"#fff",background:T.muted,borderRadius:3,padding:"0px 4px",fontWeight:600,whiteSpace:"nowrap",lineHeight:"15px"}}>{shortName(owner)}</span>}
        </div>
        {isPost&&deal.supplier_paid?<div style={{width:7,height:7,borderRadius:"50%",background:T.green,flexShrink:0}} title="仕入入金済"/>:null}
      </div>
    </div>
  );
}

// ── Kanban Column ──
function KanbanCol({stage,deals,accounts,allUsers,total,onDrop,onDealClick,sortKey}){
  const[dragOver,setDragOver]=useState(false);
  const handleDragOver=e=>{e.preventDefault();setDragOver(true)};
  const handleDragLeave=()=>setDragOver(false);
  const handleDrop=e=>{e.preventDefault();setDragOver(false);const id=e.dataTransfer.getData("dealId");if(id)onDrop(id,stage.id)};
  const sorted=[...deals].sort((a,b)=>{
    if(sortKey==="amount")return(Number(b.amount)||0)-(Number(a.amount)||0);
    const da=a.payment_confirmed_date||a.payment_date||a.deal_date||"";const db=b.payment_confirmed_date||b.payment_date||b.deal_date||"";return db.localeCompare(da);
  });
  return(
    <div onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
      style={{minWidth:220,width:220,display:"flex",flexDirection:"column",background:dragOver?"rgba(45,140,240,0.04)":"transparent",borderRadius:8,transition:"background .15s"}}>
      <div style={{padding:"8px 8px 4px",position:"sticky",top:0,background:T.bg,zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:11,fontWeight:700,color:T.primary}}>{stage.ja}</span>
            <span style={{fontSize:9.5,color:T.muted,fontWeight:500}}>({deals.length})</span>
          </div>
        </div>
        <div style={{fontSize:9,color:T.muted,marginBottom:4}}>{stage.en}</div>
        <div style={{fontSize:13,fontWeight:700,color:stage.phase==="pre"?T.accent:stage.phase==="post"?T.orange:T.green}}>{fmtYen(total)}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"4px 4px"}}>
        {sorted.map(d=>(<DealCard key={d.id} deal={d} accounts={accounts} allUsers={allUsers} onClick={onDealClick}/>))}
      </div>
    </div>
  );
}

// ── Category Management Modal ──
function CategoryModal({categories,client,user,onClose,onUpdated}){
  const[newCat,setNewCat]=useState("");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");

  const addCategory=async()=>{
    if(!newCat.trim()){setErr("カテゴリ名を入力");return}

    const{error:ie}=await client.from("sales_categories").insert({name:newCat.trim()});

    if(!confirm("削除しますか？"))return;
    const{error:de}=await client.from("sales_categories").update({deleted_at:new Date().toISOString()}).eq("id",catId);
    if(de){alert(de.message);return}
    onUpdated();

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",borderRadius:10,padding:"18px 20px",width:"90%",maxWidth:340,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(0,0,0,.12)"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.primary}}>カテゴリ管理</div>
        <div style={{display:"flex",gap:4,marginBottom:12}}>
          <input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyPress={e=>{if(e.key==="Enter")addCategory()}} placeholder="新規カテゴリ名" style={{...I,flex:1}}/>
          <button onClick={addCategory} disabled={saving} style={{padding:"6px 10px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>追加</button>
        </div>

    </div>
  );
}

// ── Expense Page (独立経費タブ) ──
const EXPENSE_CATEGORIES_DEFAULT=["BtoB","Amazon","Shopee","Coffee","その他"];
function ExpensePage({client,user,allUsers}){
  const[expenses,setExpenses]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[filterUser,setFilterUser]=useState("all");
  const[filterCategory,setFilterCategory]=useState("all");
  const[filterMonth,setFilterMonth]=useState(()=>{const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")});
  const[categories,setCategories]=useState(EXPENSE_CATEGORIES_DEFAULT);
  const[deleteTarget,setDeleteTarget]=useState(null);

  // Form state
  const[fCategory,setFCategory]=useState("BtoB");
  const[fVendor,setFVendor]=useState("");
  const[fProduct,setFProduct]=useState("");
  const[fMethod,setFMethod]=useState("Amex");
  const[fCustomMethod,setFCustomMethod]=useState("");
  const[fAmount,setFAmount]=useState("");
  const[fAmountDisplay,setFAmountDisplay]=useState("");
  const[fReceipt,setFReceipt]=useState(null);
  const[fReceiptPreview,setFReceiptPreview]=useState(null);
  const[fMemo,setFMemo]=useState("");
  const[fErr,setFErr]=useState("");
  const[saving,setSaving]=useState(false);
  const[dragOver,setDragOver]=useState(false);
  const[fNewCat,setFNewCat]=useState("");
  const receiptRef=useRef(null);

  const METHODS=["Amex","マネフォ","JCB","現金","現金建て替え","その他"];

  const loadExpenses=useCallback(async()=>{
    if(!client)return;
    const{data}=await client.from("expenses").select("*").order("created_at",{ascending:false});
    if(data)setExpenses(data);
    // Load custom categories
    const{data:cs}=await client.from("company_settings").select("*").eq("key","expense_categories");
    if(cs&&cs[0]&&cs[0].value){try{const arr=JSON.parse(cs[0].value);if(Array.isArray(arr))setCategories(arr)}catch(e){}}
    setLoading(false);
  },[client]);

  useEffect(()=>{loadExpenses()},[loadExpenses]);

  const saveCategories=async(cats)=>{
    setCategories(cats);
    const val=JSON.stringify(cats);
    const{data:existing}=await client.from("company_settings").select("id").eq("key","expense_categories").limit(1);
    if(existing&&existing.length>0){await client.from("company_settings").update({value:val}).eq("id",existing[0].id)}
    else{await client.from("company_settings").insert({key:"expense_categories",value:val})}
  };

  const formatAmt=(val)=>{const num=val.replace(/[^0-9]/g,"");setFAmount(num);setFAmountDisplay(num?Number(num).toLocaleString():"")};

  const handleReceipt=(file)=>{
    if(!file)return;setFReceipt(file);
    if(file.type?.startsWith("image/")){const r=new FileReader();r.onload=e=>setFReceiptPreview(e.target.result);r.readAsDataURL(file)}
    else{setFReceiptPreview(null)}
  };

  const submit=async()=>{
    if(!fVendor.trim()){setFErr("購入先を入力してください");return}
    if(!fProduct.trim()){setFErr("商品を入力してください");return}
    if(!fAmount||Number(fAmount)<=0){setFErr("金額を正しく入力してください");return}
    setSaving(true);setFErr("");
    try{
      let receiptUrl=null,receiptName=null;
      if(fReceipt){
        const ext=fReceipt.name.split(".").pop();
        const fp="receipts/expenses/"+Date.now()+"_"+Math.random().toString(36).slice(2)+"."+ext;
        const{error:upErr}=await client.storage.from("chat-files").upload(fp,fReceipt);
        if(!upErr){const{data:u}=client.storage.from("chat-files").getPublicUrl(fp);receiptUrl=u?.publicUrl||null;receiptName=fReceipt.name}
      }
      const finalMethod=fMethod==="その他"?(fCustomMethod.trim()||"その他"):fMethod;
      await client.from("expenses").insert({
        user_id:user.id,category:fCategory,vendor:fVendor.trim(),product:fProduct.trim(),
        method:finalMethod,amount:Number(fAmount),memo:fMemo.trim()||null,
        receipt_url:receiptUrl,receipt_name:receiptName
      });
      setShowForm(false);setFCategory("BtoB");setFVendor("");setFProduct("");setFMethod("Amex");setFCustomMethod("");setFAmount("");setFAmountDisplay("");setFReceipt(null);setFReceiptPreview(null);setFMemo("");
      loadExpenses();
    }catch(e){setFErr(e.message)}
    setSaving(false);
  };

  const deleteExpense=async(id)=>{
    await client.from("expenses").update({deleted_at:new Date().toISOString()}).eq("id",id);
    setDeleteTarget(null);loadExpenses();
  };

  const filtered=useMemo(()=>{
    return expenses.filter(e=>{
      if(e.deleted_at)return false;
      if(filterUser!=="all"&&e.user_id!==filterUser)return false;
      if(filterCategory!=="all"&&e.category!==filterCategory)return false;
      if(filterMonth){const d=new Date(e.created_at);const ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");if(ym!==filterMonth)return false}
      return true;
    });
  },[expenses,filterUser,filterCategory,filterMonth]);

  const totalAmount=filtered.reduce((s,e)=>s+(e.amount||0),0);
  const shortName=(u)=>{if(!u)return"?";return u.display_name||u.full_name||u.email?.split("@")[0]||"?"};
  const getUserName=(uid)=>{const u=allUsers.find(x=>x.id===uid);return shortName(u)};
  const getUserInitial=(uid)=>{const n=getUserName(uid);return(n||"?").charAt(0).toUpperCase()};

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:6,padding:"8px 10px",fontSize:IS_MOBILE?16:13,outline:"none",fontFamily:"inherit",background:"#fff"};
  const L={display:"block",fontSize:10.5,fontWeight:600,color:T.muted,marginBottom:3,marginTop:10};

  return(<div style={{flex:1,display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    {/* Header */}
    <div style={{padding:"10px 16px",borderBottom:`1px solid ${T.border}`,background:T.card,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:14,fontWeight:700,color:T.primary}}>経費管理</span>
        <span style={{fontSize:11,color:T.muted}}>{filtered.length}件</span>
        <span style={{fontSize:12,fontWeight:700,color:T.primary}}>¥{totalAmount.toLocaleString()}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit"}}/>
        <select value={filterUser} onChange={e=>setFilterUser(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit",background:"#fff"}}>
          <option value="all">全員</option>
          {allUsers.map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
        </select>
        <select value={filterCategory} onChange={e=>setFilterCategory(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,fontFamily:"inherit",background:"#fff"}}>
          <option value="all">全カテゴリ</option>
          {categories.map(c=>(<option key={c} value={c}>{c}</option>))}
        </select>
        <button onClick={()=>setShowForm(true)} style={{padding:"5px 12px",borderRadius:6,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>+ 経費報告</button>
      </div>
    </div>

    {/* Expense List */}
    <div style={{flex:1,overflowY:"auto",padding:"8px 16px"}}>
      {loading&&<div style={{padding:40,textAlign:"center",color:T.muted}}>読み込み中...</div>}
      {!loading&&filtered.length===0&&<div style={{padding:40,textAlign:"center",color:T.muted,fontSize:12}}>経費報告がありません</div>}
      {filtered.map(e=>{
        const d=new Date(e.created_at);
        const dateStr=(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
        const isOwn=e.user_id===user.id;
        return(<div key={e.id} style={{padding:"12px 14px",marginBottom:6,background:T.card,borderRadius:8,border:`1px solid ${T.borderLight}`,display:"flex",gap:10,alignItems:"flex-start"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:T.primary,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{getUserInitial(e.user_id)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
              <span style={{fontSize:12,fontWeight:600,color:T.primary}}>{getUserName(e.user_id)}</span>
              <span style={{fontSize:10,color:T.muted}}>{dateStr}</span>
              <span style={{padding:"1px 6px",borderRadius:8,fontSize:9.5,fontWeight:600,background:"#f3f3f3",color:T.sub}}>{e.category||"その他"}</span>
            </div>
            <div style={{fontSize:12,color:T.sub,marginBottom:2}}><span style={{fontWeight:600}}>{e.vendor}</span> — {e.product}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:15,fontWeight:700,color:T.primary}}>¥{(e.amount||0).toLocaleString()}</span>
              <span style={{fontSize:10,color:T.muted,background:"#f3f3f3",padding:"1px 6px",borderRadius:4}}>{e.method}</span>
              {e.receipt_url&&<a href={e.receipt_url} target="_blank" rel="noopener" style={{fontSize:10,color:T.accent,textDecoration:"none",display:"flex",alignItems:"center",gap:3}}>
                {e.receipt_url.match(/\.(jpg|jpeg|png|gif|webp)$/i)?<img src={e.receipt_url} style={{width:20,height:20,objectFit:"cover",borderRadius:3}}/>:null}
                レシート
              </a>}
            </div>
            {e.memo&&<div style={{fontSize:11,color:T.muted,marginTop:3}}>{e.memo}</div>}
          </div>
          {isOwn&&<button onClick={()=>setDeleteTarget(e)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:11,fontFamily:"inherit",padding:"2px 6px",borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color=T.red} onMouseLeave={e=>e.currentTarget.style.color=T.muted}>削除</button>}
        </div>);
      })}
    </div>

    {/* Form Modal */}
    {showForm&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:IS_MOBILE?"flex-end":"center",justifyContent:"center",zIndex:200}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowForm(false)}}>
      <div style={{background:"#fff",borderRadius:IS_MOBILE?"16px 16px 0 0":10,padding:IS_MOBILE?"20px 20px 28px":"20px 24px",width:IS_MOBILE?"100%":"90%",maxWidth:IS_MOBILE?"none":420,maxHeight:IS_MOBILE?"90vh":"85vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(0,0,0,.12)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:14,fontWeight:700,color:T.primary}}>経費報告</span>
          <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:T.muted}}>×</button>
        </div>

        <label style={{...L,marginTop:0}}>レシート添付（任意）</label>
        <input type="file" ref={receiptRef} accept="image/*,.pdf" capture={IS_MOBILE?"environment":undefined} style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(f)handleReceipt(f);e.target.value=""}}/>
        {!fReceipt?<div style={{border:`2px dashed ${dragOver?"#f59e0b":T.border}`,borderRadius:8,padding:IS_MOBILE?"14px":"10px",textAlign:"center",cursor:"pointer",background:dragOver?"#fffbeb":"#fafafa"}}
          onClick={()=>receiptRef.current?.click()}
          onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files?.[0];if(f)handleReceipt(f)}}>
          <div style={{fontSize:IS_MOBILE?13:11,color:T.muted}}>{IS_MOBILE?"タップして撮影 or 選択":"クリック or ドラッグ&ドロップ"}</div>
        </div>
        :<div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:8}}>
          {fReceiptPreview?<img src={fReceiptPreview} style={{width:36,height:36,objectFit:"cover",borderRadius:4}}/>:null}
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:600,color:T.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fReceipt.name}</div><div style={{fontSize:10,color:T.muted}}>{(fReceipt.size/1024).toFixed(0)} KB</div></div>
          <button onClick={()=>{setFReceipt(null);setFReceiptPreview(null)}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14}}>×</button>
        </div>}

        <label style={L}>カテゴリ *</label>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {categories.map(c=>(<button key={c} onClick={()=>setFCategory(c)} style={{padding:"4px 10px",borderRadius:12,border:fCategory===c?`1.5px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:fCategory===c?600:400,cursor:"pointer",background:fCategory===c?T.primary:"#fff",color:fCategory===c?"#fff":T.sub,fontFamily:"inherit"}}>{c}</button>))}
        </div>
        <div style={{display:"flex",gap:4,marginTop:4}}>
          <input value={fNewCat} onChange={e=>setFNewCat(e.target.value)} placeholder="カテゴリ追加..." style={{...I,flex:1,fontSize:11,padding:"4px 8px"}}/>
          <button onClick={()=>{if(fNewCat.trim()&&!categories.includes(fNewCat.trim())){const nc=[...categories.filter(c=>c!=="その他"),fNewCat.trim(),"その他"];saveCategories(nc);setFCategory(fNewCat.trim());setFNewCat("")}}} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff",color:T.accent,fontFamily:"inherit"}}>追加</button>
        </div>

        <label style={L}>購入先 *</label>
        <input value={fVendor} onChange={e=>setFVendor(e.target.value)} placeholder="Amazon, コンビニ etc." style={I}/>

        <label style={L}>商品 *</label>
        <input value={fProduct} onChange={e=>setFProduct(e.target.value)} placeholder="備品、交通費 etc." style={I}/>

        <label style={L}>支払方法</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {METHODS.map(m=>(<button key={m} onClick={()=>setFMethod(m)} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:fMethod===m?600:400,border:fMethod===m?`1.5px solid ${T.primary}`:`1px solid ${T.border}`,background:fMethod===m?T.primary+"10":"#fff",color:fMethod===m?T.primary:T.sub,cursor:"pointer",fontFamily:"inherit"}}>{m}</button>))}
        </div>
        {fMethod==="その他"&&<input value={fCustomMethod} onChange={e=>setFCustomMethod(e.target.value)} placeholder="支払方法を入力..." style={{...I,marginTop:4}}/>}

        <label style={L}>金額 (円) *</label>
        <input value={fAmountDisplay} onChange={e=>formatAmt(e.target.value)} placeholder="1,000" style={{...I,fontSize:IS_MOBILE?18:15,fontWeight:700}} inputMode="numeric"/>

        <label style={L}>メモ（任意）</label>
        <input value={fMemo} onChange={e=>setFMemo(e.target.value)} placeholder="補足メモ..." style={I}/>

        {fErr&&<div style={{fontSize:11,color:T.red,marginTop:6}}>{fErr}</div>}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={()=>setShowForm(false)} style={{flex:1,padding:IS_MOBILE?"12px":"8px",border:"none",borderRadius:6,fontSize:IS_MOBILE?14:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:"#f3f3f3",color:T.sub}}>キャンセル</button>
          <button onClick={submit} disabled={saving} style={{flex:1,padding:IS_MOBILE?"12px":"8px",border:"none",borderRadius:6,fontSize:IS_MOBILE?14:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:T.primary,color:"#fff",opacity:saving?0.5:1}}>{saving?"送信中...":"報告する"}</button>
        </div>
      </div>
    </div>)}

    {/* Delete confirm */}
    {deleteTarget&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
      <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:340,boxShadow:"0 12px 40px rgba(0,0,0,.12)"}}>
        <div style={{fontSize:13,fontWeight:700,color:T.primary,marginBottom:8}}>経費報告を削除しますか？</div>
        <div style={{fontSize:12,color:T.sub,marginBottom:4}}>{deleteTarget.vendor} — {deleteTarget.product}</div>
        <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:12}}>¥{(deleteTarget.amount||0).toLocaleString()}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setDeleteTarget(null)} style={{flex:1,padding:"7px",border:"none",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:"#f3f3f3",color:T.sub}}>キャンセル</button>
          <button onClick={()=>deleteExpense(deleteTarget.id)} style={{flex:1,padding:"7px",border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:T.red,color:"#fff"}}>削除</button>
        </div>
      </div>
    </div>)}
  </div>);
}

function DealForm({client,user,accounts,deal,allUsers,deals,categories,onClose,onSaved}){
  const isEdit=!!deal?.id;
  const[accountId,setAccountId]=useState(deal?.account_id||"");
  const[amount,setAmount]=useState(deal?.amount||"");
  const[amountDisplay,setAmountDisplay]=useState(deal?.amount?Number(deal.amount).toLocaleString():"");
  const[confidence,setConfidence]=useState(deal?.confidence||50);
  const[shipping,setShipping]=useState(deal?.shipping_type||"");
  const[incoterms,setIncoterms]=useState(deal?.incoterms||"");
  const[incotermsOther,setIncotermsOther]=useState("");
  const[paymentStatus,setPaymentStatus]=useState(deal?.payment_status||"none");
  // supplier_paid is managed only in deal detail view
  const[notes,setNotes]=useState(deal?.notes||"");
  const[shippingDate,setShippingDate]=useState(deal?.shipping_date||"");
  const[stage,setStage]=useState(deal?.stage||"negotiation");
  const[ownerId,setOwnerId]=useState(deal?.owner_id||user.id);
  const[prepaymentPercent,setPrepaymentPercent]=useState(deal?.prepayment_percent||0);
  const[paymentConfirmedDate,setPaymentConfirmedDate]=useState(deal?.payment_confirmed_date||"");
  const[spreadsheetUrl,setSpreadsheetUrl]=useState(deal?.spreadsheet_url||"");
  const[paymentTerms,setPaymentTerms]=useState(deal?.payment_terms||"");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");
  const[acctSearch,setAcctSearch]=useState(deal?.account_id?accounts.find(a=>a.id===deal.account_id)?.name||"":"");
  const[showAcctDropdown,setShowAcctDropdown]=useState(false);
  const acctDropdownRef=useRef(null);
  const filteredAccts=accounts.filter(a=>!acctSearch||a.name.toLowerCase().includes(acctSearch.toLowerCase()));
  const[showInlineAcct,setShowInlineAcct]=useState(false);
  const[newAcctName,setNewAcctName]=useState("");
  const[newAcctCountry,setNewAcctCountry]=useState("");
  const[newAcctCategoryIds,setNewAcctCategoryIds]=useState([]);
  const[newAcctWebsite,setNewAcctWebsite]=useState("");
  const[savingAcct,setSavingAcct]=useState(false);
  const[acctErr,setAcctErr]=useState("");
  const saveNewAcct=async()=>{
    if(!newAcctName.trim()){setAcctErr("会社名を入力してください");return}
    setSavingAcct(true);setAcctErr("");
    try{
      const row={name:stripCorp(newAcctName.trim()),country:newAcctCountry||null,website:newAcctWebsite||null,category_ids:newAcctCategoryIds.length>0?newAcctCategoryIds:null,owner_id:user.id,created_by:user.id,updated_at:new Date().toISOString()};
      const{data:ins,error:ie}=await client.from("sales_accounts").insert(row).select();
      if(ie)throw ie;
      if(ins&&ins[0]){setAccountId(ins[0].id);setAcctSearch(ins[0].name);accounts.push(ins[0])}
      setShowInlineAcct(false);setNewAcctName("");setNewAcctCountry("");setNewAcctCategoryIds([]);setNewAcctWebsite("");
    }catch(e){setAcctErr(e.message)}
    setSavingAcct(false);
  };
  useEffect(()=>{
    const handler=(e)=>{if(acctDropdownRef.current&&!acctDropdownRef.current.contains(e.target))setShowAcctDropdown(false)};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};
  const L={display:"block",fontSize:10.5,fontWeight:600,color:"#999",marginBottom:3,marginTop:8};

  const handleAmountChange=(val)=>{
    const num=val.replace(/[^0-9]/g,"");
    setAmount(num);
    setAmountDisplay(num?Number(num).toLocaleString():"");
  };

  const save=async()=>{
    if(!accountId){setErr("取引先を選択してください");return}
    setSaving(true);setErr("");
    try{
      const acct=accounts.find(a=>a.id===accountId);
      const shipLabel=SHIPPING[shipping]?.label||"";
      const finalIncoterms=incoterms==="Other"?incotermsOther:incoterms;

      if(isEdit){
        const{error:ue}=await client.from("sales_deals").update({
          account_id:accountId,amount:Number(amount)||0,confidence:Number(confidence)||50,
          shipping_type:shipping||null,incoterms:finalIncoterms||null,payment_status:Number(prepaymentPercent)>=100?"full":Number(prepaymentPercent)>0?"partial":"none",
          notes,shipping_date:shippingDate||null,stage,owner_id:ownerId,prepayment_percent:Number(prepaymentPercent)||0,
          payment_confirmed_date:paymentConfirmedDate||null,spreadsheet_url:spreadsheetUrl,payment_terms:paymentTerms||null,
          updated_at:new Date().toISOString(),updated_by:user.id
        }).eq("id",deal.id);
        if(ue)throw ue;
        // 責任者変更時: 紐づくコンタクトのowner_idも自動更新
        if(deal.owner_id!==ownerId&&accountId){
          await client.from("sales_contacts").update({owner_id:ownerId,updated_by:user.id}).eq("account_id",accountId);
          // 取引先のowner_idも更新
          await client.from("sales_accounts").update({owner_id:ownerId,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",accountId);
        }
      }else{
        const now=new Date();
        const ym=`${String(now.getFullYear()).slice(2)}${String(now.getMonth()+1).padStart(2,'0')}`;
        const existingCount=deals?.filter(d=>d.account_id===accountId&&d.name?.includes(ym)).length||0;
        const seq=String(existingCount+1).padStart(2,'0');
        const dealName=`${stripCorp(acct?.name||"")} ${ym}-${seq}`;
        const today=new Date().toISOString().split('T')[0];
        const{error:ie}=await client.from("sales_deals").insert({
          deal_number:0,account_id:accountId,name:dealName,amount:Number(amount)||0,confidence:Number(confidence)||50,
          shipping_type:shipping||null,incoterms:finalIncoterms||null,stage:"negotiation",owner_id:user.id,created_by:user.id,
          deal_date:today,prepayment_percent:Number(prepaymentPercent)||0,
          created_at:new Date().toISOString(),updated_at:new Date().toISOString()
        });
        if(ie)throw ie;
      }
      onSaved();onClose();
    }catch(e){setErr(e.message);setSaving(false)}
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",...getModalContainerStyle(),padding:"18px 20px",boxShadow:"0 12px 40px rgba(0,0,0,.12)",overflowY:"auto"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:4,color:T.primary}}>{isEdit?"商談を編集":"新規商談"}</div>
        {!isEdit&&<div style={{fontSize:10.5,color:T.muted,marginBottom:8}}>取引先を選ぶだけで基本情報が自動入力されます</div>}

        <label style={L}>取引先 *</label>
        <div ref={acctDropdownRef} style={{position:"relative"}}>
          <input type="text" value={acctSearch} 
            onChange={e=>{setAcctSearch(e.target.value);setShowAcctDropdown(true);if(!e.target.value)setAccountId("")}} 
            onFocus={()=>setShowAcctDropdown(true)}
            placeholder="取引先名を検索..." style={I}/>
          {showAcctDropdown&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,maxHeight:220,overflowY:"auto",background:"#fff",border:`1px solid ${T.border}`,borderRadius:5,boxShadow:"0 4px 12px rgba(0,0,0,.1)",zIndex:10,marginTop:2}}>
              {filteredAccts.map(a=>(
                <div key={a.id} onClick={()=>{setAccountId(a.id);setAcctSearch(a.name);setShowAcctDropdown(false);if(!isEdit&&a.owner_id)setOwnerId(a.owner_id)}}
                  style={{padding:"6px 10px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6,borderBottom:`1px solid ${T.borderLight}`}}
                  onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <span>{countryToFlag(a.country)}</span>
                  <span style={{fontWeight:accountId===a.id?700:400,color:T.primary}}>{a.name}</span>
                </div>
              ))}
              {!isEdit&&<div onClick={()=>{setShowAcctDropdown(false);setShowInlineAcct(true);setNewAcctName(acctSearch)}}
                style={{padding:"8px 10px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6,color:T.accent,fontWeight:600,borderTop:`1px solid ${T.border}`,background:"#fafafa",position:"sticky",bottom:0}}
                onMouseEnter={e=>e.currentTarget.style.background="#f0f7ff"} onMouseLeave={e=>e.currentTarget.style.background="#fafafa"}>
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" strokeWidth="1.3"/><path d="M8 5v6M5 8h6" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
                <span>新規取引先を作成</span>
              </div>}
            </div>
          )}
        </div>
        {showInlineAcct&&!isEdit&&(
          <div style={{marginTop:8,padding:12,background:"#f8f9fa",borderRadius:8,border:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:11.5,fontWeight:700,color:T.primary}}>新規取引先</span>
              <button onClick={()=>setShowInlineAcct(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:T.muted,fontFamily:"inherit"}}>×</button>
            </div>
            <label style={{...L,marginTop:0}}>会社名 *</label>
            <input value={newAcctName} onChange={e=>setNewAcctName(e.target.value)} placeholder="会社名を入力" style={I}/>
            <label style={L}>国</label>
            <CountryInput value={newAcctCountry} onChange={v=>setNewAcctCountry(v)} style={I}/>
            <label style={L}>Webサイト</label>
            <input value={newAcctWebsite} onChange={e=>setNewAcctWebsite(e.target.value)} placeholder="https://..." style={I}/>
            {categories&&categories.length>0&&(<>
              <label style={L}>カテゴリ</label>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {categories.map(cat=>(<button key={cat.id} onClick={()=>setNewAcctCategoryIds(prev=>prev.includes(cat.id)?prev.filter(c=>c!==cat.id):[...prev,cat.id])} style={{padding:"3px 8px",borderRadius:12,border:newAcctCategoryIds.includes(cat.id)?`1.5px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:10,fontWeight:newAcctCategoryIds.includes(cat.id)?600:400,cursor:"pointer",background:newAcctCategoryIds.includes(cat.id)?T.primary:"#fff",color:newAcctCategoryIds.includes(cat.id)?"#fff":T.sub,fontFamily:"inherit"}}>{cat.name}</button>))}
              </div>
            </>)}
            {acctErr&&<div style={{fontSize:10.5,color:T.red,marginTop:4}}>{acctErr}</div>}
            <button onClick={saveNewAcct} disabled={savingAcct} style={{marginTop:10,width:"100%",padding:"7px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:savingAcct?0.5:1}}>{savingAcct?"作成中...":"取引先を作成"}</button>
          </div>
        )}

        <label style={L}>予想取引金額</label>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:T.muted}}>¥</span>

        </div>

        {(()=>{const sp=STAGES.find(s=>s.id===stage)?.phase;const isPost=sp==="post"||sp==="done";
          if(isPost){return(<>
            <label style={L}>入金状況</label>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <input type="range" min="0" max="100" step="10" value={prepaymentPercent} onChange={e=>setPrepaymentPercent(Number(e.target.value))} style={{flex:1,cursor:"pointer"}}/>
              <span style={{fontSize:12,fontWeight:700,color:T.primary,minWidth:30}}>{prepaymentPercent}%</span>
            </div>
            <div style={{width:"100%",height:4,background:"#e5e5e5",borderRadius:2,overflow:"hidden",marginBottom:8}}>
              <div style={{width:prepaymentPercent+"%",height:"100%",background:T.primary,transition:"width .3s"}}/>
            </div>
          </>)}
          return(<>
            <label style={L}>確度</label>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <input type="range" min="0" max="100" step="10" value={confidence} onChange={e=>setConfidence(Number(e.target.value))} style={{flex:1,cursor:"pointer"}}/>
              <span style={{fontSize:12,fontWeight:700,color:T.primary,minWidth:30}}>{confidence}%</span>
            </div>
            <div style={{width:"100%",height:4,background:"#e5e5e5",borderRadius:2,overflow:"hidden",marginBottom:8}}>
              <div style={{width:confidence+"%",height:"100%",background:T.primary,transition:"width .3s"}}/>
            </div>
          </>)
        })()}

        {isEdit&&(<>
        <label style={L}>配送種別（オプション）</label>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setShipping("")} style={{flex:1,padding:"6px",borderRadius:6,border:!shipping?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:!shipping?700:400,cursor:"pointer",background:!shipping?T.primary+"10":"#fff",color:!shipping?T.primary:T.sub,fontFamily:"inherit",textAlign:"center"}}>なし</button>
          {Object.entries(SHIPPING).map(([k,v])=>(<button key={k} onClick={()=>setShipping(k)} style={{flex:1,padding:"6px",borderRadius:6,border:shipping===k?`2px solid ${v.color}`:`1px solid ${T.border}`,fontSize:11,fontWeight:shipping===k?700:400,cursor:"pointer",background:shipping===k?v.color+"10":"#fff",color:shipping===k?v.color:T.sub,fontFamily:"inherit",textAlign:"center"}}>{v.label}</button>))}
        </div>

        <label style={L}>インコタームズ（オプション）</label>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={()=>{setIncoterms("");setIncotermsOther("")}} style={{padding:"5px 10px",borderRadius:5,border:!incoterms?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:!incoterms?700:400,cursor:"pointer",background:!incoterms?T.primary:"#fff",color:!incoterms?"#fff":T.sub,fontFamily:"inherit"}}>なし</button>
          {INCOTERMS_OPTIONS.map(opt=>(<button key={opt} onClick={()=>{setIncoterms(opt);if(opt!=="Other")setIncotermsOther("")}} style={{padding:"5px 10px",borderRadius:5,border:incoterms===opt?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:incoterms===opt?700:400,cursor:"pointer",background:incoterms===opt?T.primary:"#fff",color:incoterms===opt?"#fff":T.sub,fontFamily:"inherit"}}>{opt}</button>))}
        </div>
        {incoterms==="Other"&&<input type="text" value={incotermsOther} onChange={e=>setIncotermsOther(e.target.value)} placeholder="カスタムインコタームズ" style={{...I,marginTop:4}}/>}
          <label style={L}>入金日</label>
          <input type="date" value={paymentConfirmedDate} onChange={e=>setPaymentConfirmedDate(e.target.value)} style={I}/>

          <label style={L}>配送日</label>
          <input type="date" value={shippingDate} onChange={e=>setShippingDate(e.target.value)} style={I}/>

          <label style={L}>ステージ</label>
          <select value={stage} onChange={e=>setStage(e.target.value)} style={{...I,background:"#fff"}}>
            {STAGES.map(s=>(<option key={s.id} value={s.id}>{s.ja}</option>))}
          </select>

          <label style={L}>商談担当者</label>
          <select value={ownerId} onChange={e=>setOwnerId(e.target.value)} style={{...I,background:"#fff"}}>
            {(allUsers||[]).map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
          </select>

          <label style={L}>スプレッドシートURL</label>
          <input type="text" value={spreadsheetUrl} onChange={e=>setSpreadsheetUrl(e.target.value)} placeholder="https://docs.google.com/spreadsheets/..." style={I}/>

          <label style={L}>支払い条件</label>
          <input type="text" value={paymentTerms} onChange={e=>setPaymentTerms(e.target.value)} placeholder="例: 納品前に写真を提供して振り込み" style={I}/>

          <label style={L}>メモ</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} placeholder="特記事項..." style={{...I,lineHeight:1.4}}/>
        </>)}

        {err&&<div style={{fontSize:11,color:T.red,marginTop:6}}>{err}</div>}
        <div style={{display:"flex",gap:6,marginTop:14,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>キャンセル</button>
          <button onClick={save} disabled={saving} style={{padding:"5px 14px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving?0.5:1}}>{saving?"保存中...":isEdit?"更新":"作成"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Account Form Modal ──
function AccountForm({client,user,account,accounts:existingAccounts,categories,allUsers,onClose,onSaved}){
  const isEdit=!!account?.id;
  const[name,setName]=useState(account?.name||"");
  const[website,setWebsite]=useState(account?.website||"");
  const[country,setCountry]=useState(account?.country||"");
  const[addrBill,setAddrBill]=useState(account?.address_billing||"");
  const[shippingAddrs,setShippingAddrs]=useState(Array.isArray(account?.address_shipping)?account.address_shipping:(account?.address_shipping?[account.address_shipping]:[]))
  const PAY_PRESETS=["前払い100%","前払い50%","前払い30%"];
  const initPT=account?.payment_terms||"";
  const[payTermsMode,setPayTermsMode]=useState(PAY_PRESETS.includes(initPT)?initPT:initPT?"other":"");
  const[payTermsCustom,setPayTermsCustom]=useState(PAY_PRESETS.includes(initPT)?"":initPT);
  const payTerms=payTermsMode==="other"?payTermsCustom:payTermsMode;
  const[notes,setNotes]=useState(account?.notes||"");
  const[categoryIds,setCategoryIds]=useState(account?.category_ids||[]);
  const[ownerId,setOwnerId]=useState(account?.owner_id||user.id);
  const[leadSource,setLeadSource]=useState(account?.lead_source||"");
  const[leadSourceOther,setLeadSourceOther]=useState(account?.lead_source&&!["JBW","LinkedIn","WhatsApp","メール"].includes(account?.lead_source)?account.lead_source:"");
  const[saving,setSaving]=useState(false);const[err,setErr]=useState("");
  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};
  const L={display:"block",fontSize:10.5,fontWeight:600,color:"#999",marginBottom:3,marginTop:8};

  const toggleCategory=(catId)=>{
    setCategoryIds(prev=>prev.includes(catId)?prev.filter(c=>c!==catId):[...prev,catId]);
  };

  const addShippingAddr=()=>{
    setShippingAddrs([...shippingAddrs,""]);
  };

  const removeShippingAddr=(idx)=>{
    setShippingAddrs(shippingAddrs.filter((_,i)=>i!==idx));
  };

  const save=async()=>{
    if(!name.trim()){setErr("会社名を入力");return}
    if(!isEdit){
      setSaving(true);setErr("");
      try{
        const{data:dupes}=await client.rpc("check_duplicate_account",{p_name:name.trim(),p_country:country||null});
        if(dupes&&dupes.length>0){
          const msg=dupes.map(d=>d.name+(d.country?" ("+d.country+")":"")).join("\n");
          if(!confirm("類似の取引先が見つかりました:\n"+msg+"\n\nそれでも追加しますか？")){setSaving(false);return}
        }
      }catch(e){
        // Fallback: local exact match check
        const dup=existingAccounts?.find(a=>a.name.toLowerCase().trim()===name.trim().toLowerCase());
        if(dup&&!confirm(`「${dup.name}」は既に登録されています。それでも追加しますか？`)){setSaving(false);return}
      }
    }else{
      setSaving(true);setErr("");
    }
    try{
      const finalLeadSource=leadSource==="その他"?leadSourceOther:leadSource;
      const row={name:stripCorp(name.trim()),website:website||null,country:country||null,address_billing:addrBill||null,address_shipping:shippingAddrs.length>0?shippingAddrs:null,payment_terms:payTerms||null,notes:notes||null,category_ids:categoryIds.length>0?categoryIds:null,owner_id:ownerId||null,lead_source:finalLeadSource||null,updated_at:new Date().toISOString()};
      if(isEdit){const{error:ue}=await client.from("sales_accounts").update(row).eq("id",account.id);if(ue)throw ue}
      else{row.created_by=user.id;const{error:ie}=await client.from("sales_accounts").insert(row);if(ie)throw ie}
      onSaved();onClose();
    }catch(e){setErr(e.message);setSaving(false)}
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",...getModalContainerStyle(),padding:"18px 20px",boxShadow:"0 12px 40px rgba(0,0,0,.12)",overflowY:"auto"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.primary}}>{isEdit?"取引先を編集":"新規取引先"}</div>
        <label style={L}>会社名 *</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Sleek Shop" style={I}/>
        <label style={L}>国</label><CountryInput value={country} onChange={v=>setCountry(v)} style={I}/>

        <label style={L}>カテゴリ</label>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
          {categories.map(cat=>(<button key={cat.id} onClick={()=>toggleCategory(cat.id)} style={{padding:"4px 10px",borderRadius:16,border:categoryIds.includes(cat.id)?`1.5px solid ${T.primary}`:` 1px solid ${T.border}`,fontSize:11,fontWeight:categoryIds.includes(cat.id)?600:400,cursor:"pointer",background:categoryIds.includes(cat.id)?T.primary:"#fff",color:categoryIds.includes(cat.id)?"#fff":T.sub,fontFamily:"inherit"}}>{cat.name}</button>))}
        </div>

        <label style={L}>流入経路</label>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {LEAD_SOURCES.map(ls=>(<button key={ls} onClick={()=>{setLeadSource(ls);if(ls!=="その他")setLeadSourceOther("")}} style={{padding:"5px 10px",borderRadius:5,border:leadSource===ls?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:leadSource===ls?700:400,cursor:"pointer",background:leadSource===ls?T.primary:"#fff",color:leadSource===ls?"#fff":T.sub,fontFamily:"inherit"}}>{ls}</button>))}
        </div>
        {leadSource==="その他"&&<input type="text" value={leadSourceOther} onChange={e=>setLeadSourceOther(e.target.value)} placeholder="その他の流入経路..." style={{...I,marginTop:4}}/>}

        {isEdit&&(<>
        <label style={L}>Webサイト</label><input value={website} onChange={e=>setWebsite(e.target.value)} placeholder="https://..." style={I}/>
        <label style={L}>住所（請求先）</label><input value={addrBill} onChange={e=>setAddrBill(e.target.value)} placeholder="14251 Chambers Rd, Tustin CA" style={I}/>

        <label style={L}>納入先住所</label>
        <div style={{marginBottom:8}}>
          {shippingAddrs.map((addr,idx)=>(<div key={idx} style={{display:"flex",gap:4,marginBottom:4,alignItems:"center"}}>
            <input value={addr} onChange={e=>{const newAddrs=[...shippingAddrs];newAddrs[idx]=e.target.value;setShippingAddrs(newAddrs)}} style={{...I,flex:1}} placeholder="住所"/>
            <button onClick={()=>removeShippingAddr(idx)} style={{padding:"5px 8px",borderRadius:4,border:`1px solid ${T.border}`,background:"#fff",color:T.red,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:11}}>×</button>
          </div>))}
          <button onClick={()=>addShippingAddr("")} style={{padding:"5px 10px",borderRadius:4,border:`1px solid ${T.border}`,background:"#fff",color:T.accent,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,width:"100%"}}>+ 追加</button>
        </div>

        <label style={L}>入金ターム</label>
        <div style={{display:"flex",gap:4,marginTop:2}}>
          {PAY_PRESETS.map(pt=>(<button key={pt} onClick={()=>{setPayTermsMode(pt);setPayTermsCustom("")}} style={{padding:"4px 8px",borderRadius:10,border:payTermsMode===pt?"none":`1px solid ${T.border}`,fontSize:10.5,fontWeight:payTermsMode===pt?600:400,cursor:"pointer",background:payTermsMode===pt?T.primary:"#fff",color:payTermsMode===pt?"#fff":T.sub,fontFamily:"inherit"}}>{pt}</button>))}
          <button onClick={()=>setPayTermsMode("other")} style={{padding:"4px 8px",borderRadius:10,border:payTermsMode==="other"?"none":`1px solid ${T.border}`,fontSize:10.5,fontWeight:payTermsMode==="other"?600:400,cursor:"pointer",background:payTermsMode==="other"?T.primary:"#fff",color:payTermsMode==="other"?"#fff":T.sub,fontFamily:"inherit"}}>その他</button>
        </div>
        {payTermsMode==="other"&&<input value={payTermsCustom} onChange={e=>setPayTermsCustom(e.target.value)} placeholder="カスタム入金条件..." style={{...I,marginTop:4}}/>}

        <label style={L}>GS責任者</label>
        <select value={ownerId} onChange={e=>setOwnerId(e.target.value)} style={{...I,background:"#fff"}}>
          {(allUsers||[]).map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
        </select>
        </>)}

        <label style={L}>メモ</label><textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} placeholder="特記事項..." style={{...I,lineHeight:1.4}}/>
        {err&&<div style={{fontSize:11,color:T.red,marginTop:6}}>{err}</div>}
        <div style={{display:"flex",gap:6,marginTop:14,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>キャンセル</button>
          <button onClick={save} disabled={saving} style={{padding:"5px 14px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving?0.5:1}}>{saving?"...":isEdit?"更新":"作成"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Contact Form Modal (standalone) ──
// LinkedIn URL正規化
const normLinkedIn=(v)=>{if(!v)return'';v=v.trim();if(v.startsWith('http'))return v;if(v.startsWith('linkedin.com'))return'https://'+v;if(v.startsWith('www.linkedin.com'))return'https://'+v;return'https://linkedin.com/in/'+v.replace(/^@/,'')};

function ContactFormModal({client,user,accounts,contact,onClose,onSaved}){
  const isEdit=!!contact?.id;
  const[accountId,setAccountId]=useState(contact?.account_id||"");
  const[cName,setCName]=useState(contact?.name||"");
  const[cRole,setCRole]=useState(contact?.role||"");
  const[cEmail,setCEmail]=useState(contact?.email||"");
  const[cPhone,setCPhone]=useState(contact?.phone||"");
  const[cWhatsapp,setCWhatsapp]=useState(contact?.whatsapp||"");
  const[cLinkedin,setCLinkedin]=useState(contact?.linkedin||"");
  const[cNotes,setCNotes]=useState(contact?.notes||"");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");
  const I={width:"100%",padding:"6px 10px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:12,fontFamily:"inherit",outline:"none",background:"#fff"};

  const selAcct=accounts.find(a=>a.id===accountId);
  const acctCountry=selAcct?.country||"";

  const save=async()=>{
    if(!cName.trim()){setErr("氏名を入力してください");return}
    if(!accountId){setErr("取引先を選択してください");return}
    if(cPhone){const{valid,error:phoneErr}=validatePhoneDigits(cPhone);if(!valid){setErr(phoneErr);return}}
    setSaving(true);setErr("");
    const fLinkedin=cLinkedin?normLinkedIn(cLinkedin):null;
    const row={account_id:accountId||null,name:cName.trim(),role:cRole||null,email:cEmail||null,phone:cPhone||null,whatsapp:cWhatsapp||null,linkedin:fLinkedin||null,notes:cNotes||null};
    if(selAcct?.owner_id)row.owner_id=selAcct.owner_id;
    const tryOp=async(op)=>{
      let res=await op(row);
      if(res.error&&res.error.message){
        const badCols=["owner_id","notes"];
        for(const col of badCols){if(res.error.message.includes(col)){delete row[col];res=await op(row);if(!res.error)break;}}
      }
      return res;
    };
    if(isEdit){
      const{error:ue}=await tryOp(r=>client.from("sales_contacts").update(r).eq("id",contact.id));
      if(ue){setErr(ue.message);setSaving(false);return}
    }else{
      const{error:ie}=await tryOp(r=>client.from("sales_contacts").insert(r));
      if(ie){setErr(ie.message);setSaving(false);return}
    }
    onSaved();onClose();
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",borderRadius:12,padding:"20px 24px",width:420,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.15)"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:T.primary}}>{isEdit?"コンタクトを編集":"新規コンタクト"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>取引先 *</label>
            <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{...I,background:"#fff"}}>
              <option value="">選択してください</option>
              {accounts.map(a=>(<option key={a.id} value={a.id}>{countryToFlag(a.country)} {a.name}</option>))}
            </select>
            {selAcct&&<div style={{fontSize:10,color:T.muted,marginTop:2}}>{[selAcct.country,selAcct.website].filter(Boolean).join(" · ")}</div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>氏名 *</label><input value={cName} onChange={e=>setCName(e.target.value)} style={I} placeholder="山田太郎"/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>役職</label><input value={cRole} onChange={e=>setCRole(e.target.value)} style={I} placeholder="CEO, 購買担当 etc."/></div>
          </div>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>メール</label><input value={cEmail} onChange={e=>setCEmail(e.target.value)} style={I} placeholder="info@example.com"/></div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>電話</label><PhoneInput value={cPhone} onChange={e=>{const v=e.target.value;setCPhone(v);if(!cWhatsapp||cWhatsapp===cPhone)setCWhatsapp(v)}} country={acctCountry} style={I} placeholder="電話番号（数字のみ）"/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>WhatsApp（電話番号から自動設定）</label><input value={cWhatsapp} readOnly style={{...I,background:"#f5f5f5",color:T.sub}} placeholder="電話番号から自動設定"/></div>
          </div>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>LinkedIn</label><input value={cLinkedin} onChange={e=>setCLinkedin(e.target.value)} style={I} placeholder="https://linkedin.com/in/... またはユーザー名"/></div>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>メモ/備考</label><textarea value={cNotes} onChange={e=>setCNotes(e.target.value)} style={{...I,minHeight:50,resize:"vertical"}} placeholder="連絡時の注意点、紹介経緯など..."/></div>
        </div>
        {err&&<div style={{fontSize:11,color:T.red,marginTop:8}}>{err}</div>}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
          <button onClick={onClose} style={{padding:"6px 16px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:12,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
          <button onClick={save} disabled={saving} style={{padding:"6px 16px",borderRadius:6,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving?0.5:1}}>{saving?"保存中...":isEdit?"更新":"保存"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Contact Detail View ──

        <button onClick={()=>setDeleteConfirm(true)} style={{padding:"4px 8px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,cursor:"pointer",background:"#fff",color:T.red,fontFamily:"inherit",fontWeight:600}}>削除</button>

          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:360,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>

            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>クイックアクション</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {contact.email&&<a href={`https://app.frontapp.com/compose?to=${encodeURIComponent(contact.email)}`} target="_blank" rel="noopener" style={{padding:"5px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:10.5,fontWeight:600,textDecoration:"none",color:T.sub,background:T.card,fontFamily:"inherit",cursor:"pointer"}}>✉ メール</a>}
              {contact.phone&&<a href={`tel:${contact.phone}`} style={{padding:"5px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:10.5,fontWeight:600,textDecoration:"none",color:T.sub,background:T.card,fontFamily:"inherit",cursor:"pointer"}}>📞 電話</a>}
              {contact.whatsapp&&<a href={`https://wa.me/${(contact.whatsapp||'').replace(/[^0-9+]/g,'').replace('+','')}`} target="_blank" rel="noopener" style={{padding:"5px 10px",borderRadius:5,border:"1px solid #25D366",fontSize:10.5,fontWeight:600,textDecoration:"none",color:"#25D366",background:T.card,fontFamily:"inherit",cursor:"pointer"}}>💬 WhatsApp</a>}
              {contact.linkedin&&<a href={contact.linkedin.startsWith("http")?contact.linkedin:normLinkedIn(contact.linkedin)} target="_blank" rel="noopener" style={{padding:"5px 10px",borderRadius:5,border:`1px solid ${T.accent}`,fontSize:10.5,fontWeight:600,textDecoration:"none",color:T.accent,background:T.card,fontFamily:"inherit",cursor:"pointer"}}>in LinkedIn</a>}
            </div>
          </div>

          {/* Related Deals */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>関連商談 ({contactDeals.length})</div>
            {contactDeals.map(d=>{
              const s=STAGES.find(st=>st.id===d.stage);
              return(<div key={d.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.borderLight}`,cursor:"pointer"}} onClick={()=>onOpenDeal&&onOpenDeal(d)}>
                <div>

              </div>);
            })}
            {contactDeals.length===0&&<div style={{fontSize:11,color:"#ccc",textAlign:"center",padding:"12px 0"}}>関連商談なし</div>}
          </div>

          {/* Other contacts at same account */}
          {acct&&(()=>{
