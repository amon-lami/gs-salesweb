            <InfoRow label="Webサイト" value={lead.website?<a href={lead.website} target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"none"}}>{lead.website}</a>:null} field="website"/>
            <InfoRow label="ソース" value={lead.source} field="source" type="select-source"/>
            <InfoRow label="ステータス" value={st?.label} field="status" type="select-status"/>
            <InfoRow label="GS担当" value={shortName(owner)} field="owner_id" type="select-owner"/>
            {catNames&&<InfoRow label="カテゴリ" value={catNames}/>}
          </div>

          {/* Contact Info */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>担当者情報</div>
            <InfoRow label="担当者名" value={lead.contact_name} field="contact_name"/>
            <InfoRow label="メール" value={lead.contact_email?<a href={"mailto:"+lead.contact_email} style={{color:T.accent,textDecoration:"none"}}>{lead.contact_email}</a>:null} field="contact_email"/>
            <InfoRow label="電話" value={lead.phone} field="phone" type="phone"/>
            <InfoRow label="WhatsApp" value={lead.whatsapp||lead.phone||"-"}/>
          </div>

          {/* Notes */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>メモ</div>
            {editing?(
              <textarea value={form.notes||""} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={4} style={{...I,resize:"vertical",lineHeight:1.5}} placeholder="メモ（任意）"/>
            ):(
              <div style={{fontSize:12,color:lead.notes?T.primary:T.muted,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{lead.notes||"メモなし"}</div>
            )}
          </div>
        </div>
      </div>

      {/* Delete Confirmation Modal */}
      {showDeleteConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowDeleteConfirm(false)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:360,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:20}}>⚠️</span>
              <div style={{fontSize:13,fontWeight:700,color:T.primary}}>リードの削除</div>
            </div>
            <div style={{fontSize:11.5,color:T.sub,lineHeight:1.6,marginBottom:8}}>
              <span style={{fontWeight:700,color:T.primary}}>「{lead.company_name}」</span>を本当に削除しますか？<br/>この操作は取り消せません。
            </div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11,color:T.sub,lineHeight:1.6,border:`1px solid ${T.borderLight}`}}>
              {lead.contact_name&&<div>担当者: {lead.contact_name}</div>}
              <div>ソース: {lead.source}</div>
              <div>登録日: {fmt(lead.created_at)}</div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowDeleteConfirm(false)} disabled={deleting} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={deleteLead} disabled={deleting} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit",opacity:deleting?0.5:1}}>{deleting?"削除中...":"削除する"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Convert Confirmation Modal */}
      {showConvertConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget&&!converting)setShowConvertConfirm(false)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:12}}>商談化の確認</div>
            <div style={{fontSize:12,color:T.sub,lineHeight:1.6,marginBottom:14}}>
              <span style={{fontWeight:700,color:T.primary}}>「{lead.company_name}」</span>を商談化しますか？
            </div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11,color:T.sub,lineHeight:1.8}}>
              以下が自動作成されます：<br/>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ 取引先 <span style={{fontWeight:600,color:T.primary}}>{stripCorp(lead.company_name)}</span></span><br/>
              {(lead.contact_name||lead.contact_email||lead.phone)?(<><span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ コンタクト <span style={{fontWeight:600,color:T.primary}}>{lead.contact_name||lead.company_name}</span></span><br/></>):(<><span style={{display:"inline-flex",alignItems:"center",gap:4,color:T.muted}}>— コンタクト（担当者情報なし）</span><br/></>)}
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ 商談 <span style={{fontWeight:600,color:T.primary}}>{stripCorp(lead.company_name)} - 新規商談</span></span>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowConvertConfirm(false)} disabled={converting} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={executeConvertFromDetail} disabled={converting} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.green,color:"#fff",fontFamily:"inherit",opacity:converting?0.5:1}}>{converting?"変換中...":"商談化する"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Convert Result Modal */}
      {convertResult&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget){setConvertResult(null);onBack()}}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:convertResult.errors?.length>0?T.orange:T.green,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>{convertResult.errors?.length>0?"⚠️ 商談化完了（一部エラー）":"✅ 商談化完了"}</div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11.5,color:T.sub,lineHeight:2}}>
              <div>{convertResult.acct?"✅":"❌"} <span style={{fontWeight:600,color:T.primary}}>取引先:</span> {convertResult.acct?.name||"作成失敗"}</div>
              <div>{convertResult.contact?"✅":convertResult.errors?.some(e=>e.startsWith("Contact"))?"❌":"➖"} <span style={{fontWeight:600,color:T.primary}}>コンタクト:</span> {convertResult.contact?convertResult.contact.name:convertResult.errors?.some(e=>e.startsWith("Contact"))?"作成失敗":"担当者情報なし"}</div>
              <div>{convertResult.deal?"✅":"❌"} <span style={{fontWeight:600,color:T.primary}}>商談:</span> {convertResult.deal?convertResult.deal.name:"作成失敗"}</div>
            </div>
            {convertResult.errors?.length>0&&<div style={{background:"#fef2f2",borderRadius:6,padding:"8px 10px",marginBottom:12,fontSize:10,color:T.red,lineHeight:1.6}}>{convertResult.errors.map((e,i)=><div key={i}>{e}</div>)}</div>}
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <button onClick={()=>{setConvertResult(null);onBack()}} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>OK</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Lead Page ──
function LeadPage({leads,categories,allUsers,client,user,onReload,onOpenLead}){
  const[statusFilter,setStatusFilter]=useState("all");
  const[sourceFilter,setSourceFilter]=useState("all");
  const[categoryFilter,setCategoryFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[showForm,setShowForm]=useState(false);
  const[editLead,setEditLead]=useState(null);
  const filtered=leads.filter(l=>{
    if(statusFilter!=="all"&&l.status!==statusFilter)return false;
    if(sourceFilter!=="all"&&l.source!==sourceFilter)return false;
    if(categoryFilter!=="all"&&!(l.category_ids||[]).includes(categoryFilter))return false;
    if(search){const q=search.toLowerCase();if(!(l.company_name||"").toLowerCase().includes(q)&&!(l.contact_name||"").toLowerCase().includes(q)&&!(l.contact_email||"").toLowerCase().includes(q))return false}
    return true;
  });
  const[convertTarget,setConvertTarget]=useState(null);
  const[convertResult,setConvertResult]=useState(null);
  const[converting,setConverting]=useState(false);

  const handleConvert=(lead)=>{setConvertTarget(lead)};

  const executeConvert=async()=>{
    const lead=convertTarget;
    if(!lead)return;
    setConverting(true);
    const errors=[];
    try{
      // 1. Account
      const acctRow={name:stripCorp(lead.company_name),country:lead.country||null,website:lead.website||null,lead_source:lead.source||null,owner_id:lead.owner_id||user.id,notes:lead.notes||null,category_ids:lead.category_ids||null,created_by:user.id};
      const{data:newAcct,error:ae}=await client.from("sales_accounts").insert(acctRow).select().single();
      if(ae)throw ae;
      // 2. Contact
      let newContact=null;
      if(lead.contact_name||lead.contact_email||lead.phone){
        const baseCt={name:lead.contact_name||lead.company_name,email:lead.contact_email||null,phone:lead.phone||null,whatsapp:lead.whatsapp||lead.phone||null,account_id:newAcct.id};
        let{data:ctData,error:ce}=await client.from("sales_contacts").insert(baseCt).select().single();
        if(ce){errors.push("Contact: "+ce.message)}else{newContact=ctData}
      }
      // 3. Deal
      const _now2=new Date();const _ym2=`${String(_now2.getFullYear()).slice(2)}${String(_now2.getMonth()+1).padStart(2,'0')}`;
      const _existing2=deals?.filter(d=>d.account_id===newAcct.id&&d.name?.includes(_ym2)).length||0;
      const _seq2=String(_existing2+1).padStart(2,'0');
      const _dealName2=`${stripCorp(lead.company_name)} ${_ym2}-${_seq2}`;
      const dealRow={name:_dealName2,account_id:newAcct.id,deal_number:0,stage:"negotiation",amount:0,confidence:50,owner_id:lead.owner_id||user.id,notes:lead.notes||null,created_by:user.id,deal_date:_now2.toISOString().split('T')[0],created_at:_now2.toISOString(),updated_at:_now2.toISOString()};
      let{data:newDeal,error:de}=await client.from("sales_deals").insert(dealRow).select().single();
      if(de){
        errors.push("Deal(1): "+de.message);
        const minDeal={name:_dealName2,account_id:newAcct.id,stage:"negotiation",owner_id:lead.owner_id||user.id,deal_date:_now2.toISOString().split('T')[0]};
        const r2=await client.from("sales_deals").insert(minDeal).select().single();
        if(r2.error){errors.push("Deal(2): "+r2.error.message)}else{newDeal=r2.data}
      }
      // 4. Mark converted
      await client.from("sales_leads").update({status:"converted",updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",lead.id);
      if(errors.length>0)console.warn("Convert warnings:",errors);
      setConvertTarget(null);setConverting(false);
      setConvertResult({acct:newAcct,contact:newContact,deal:newDeal,errors});
      onReload();
    }catch(e){setConverting(false);setConvertTarget(null);alert("変換エラー: "+e.message+(errors.length>0?"\n"+errors.join("\n"):""))}
  };
  const FS={padding:"4px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:10.5,fontWeight:500,cursor:"pointer",background:T.card,color:T.sub,fontFamily:"inherit",outline:"none"};
  return(
    <>
      <div style={{padding:"7px 14px",borderBottom:`1px solid ${T.border}`,background:T.card,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="検索..." style={{...FS,width:140,fontWeight:400}}/>
          <select value={categoryFilter} onChange={e=>setCategoryFilter(e.target.value)} style={FS}><option value="all">カテゴリ</option>{categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={FS}><option value="all">ステータス</option>{LEAD_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select>
          <select value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)} style={FS}><option value="all">ソース</option>{LEAD_SOURCES.map(s=><option key={s} value={s}>{s}</option>)}</select>
          <span style={{fontSize:11,fontWeight:600,color:T.sub,marginLeft:4}}>{filtered.length}件</span>
        </div>
        <button onClick={()=>{setEditLead(null);setShowForm(true)}} style={{padding:"4px 12px",borderRadius:5,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>+ 新規リード</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"8px 12px"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:`2px solid ${T.border}`}}>{["ステータス","会社名","担当者","ソース","カテゴリ","GS担当","登録日",""].map(h=><th key={h} style={{padding:"6px 8px",textAlign:"left",fontSize:10.5,fontWeight:700,color:T.muted}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map(l=>{
              const st=LEAD_STATUSES.find(s=>s.id===l.status);
              const catNames=(l.category_ids||[]).map(cid=>categories.find(c=>c.id===cid)?.name).filter(Boolean).join(", ");
              return(
                <tr key={l.id} onClick={()=>onOpenLead&&onOpenLead(l)} style={{cursor:"pointer",borderBottom:`1px solid ${T.borderLight}`}} onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{padding:"6px 8px"}}><span style={{fontSize:10,fontWeight:700,color:st?.color||T.muted,background:(st?.color||"#999")+"15",padding:"2px 8px",borderRadius:10}}>{st?.label||l.status}</span></td>
                  <td style={{padding:"6px 8px",fontWeight:600,color:T.primary}}>{countryToFlag(l.country)} {l.company_name}</td>
                  <td style={{padding:"6px 8px",color:T.sub}}>{l.contact_name||"-"}</td>
                  <td style={{padding:"6px 8px",color:T.sub,fontSize:11}}>{l.source}</td>
                  <td style={{padding:"6px 8px",fontSize:10,color:T.sub}}>{catNames||"-"}</td>
                  <td style={{padding:"6px 8px",color:T.sub,fontSize:11}}>{shortName(allUsers.find(u=>u.id===l.owner_id))}</td>
                  <td style={{padding:"6px 8px",color:T.muted,fontSize:11}}>{fmt(l.created_at)}</td>
                  <td style={{padding:"6px 8px"}}><div style={{display:"flex",gap:4}}>
                    <button onClick={e=>{e.stopPropagation();setEditLead(l);setShowForm(true)}} style={{padding:"2px 8px",borderRadius:3,border:`1px solid ${T.border}`,fontSize:10,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>編集</button>
                    {l.status!=="converted"&&l.status!=="lost"&&<button onClick={e=>{e.stopPropagation();handleConvert(l)}} style={{padding:"2px 8px",borderRadius:3,border:"none",fontSize:10,fontWeight:700,cursor:"pointer",background:T.green,color:"#fff",fontFamily:"inherit"}}>商談化</button>}
                  </div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:"#ccc",fontSize:12}}>リードがありません。「+ 新規リード」で追加してください。</div>}
      </div>
      {showForm&&<LeadFormModal client={client} user={user} lead={editLead} categories={categories} onClose={()=>{setShowForm(false);setEditLead(null)}} onSaved={onReload}/>}

      {convertTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget&&!converting)setConvertTarget(null)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:12}}>商談化の確認</div>
            <div style={{fontSize:12,color:T.sub,lineHeight:1.6,marginBottom:14}}>
              <span style={{fontWeight:700,color:T.primary}}>「{convertTarget.company_name}」</span>を商談化しますか？
            </div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11,color:T.sub,lineHeight:1.8}}>
              以下が自動作成されます：<br/>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ 取引先 <span style={{fontWeight:600,color:T.primary}}>{stripCorp(convertTarget.company_name)}</span></span><br/>
              {(convertTarget.contact_name||convertTarget.contact_email||convertTarget.phone)?(<><span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ コンタクト <span style={{fontWeight:600,color:T.primary}}>{convertTarget.contact_name||convertTarget.company_name}</span></span><br/></>):(<><span style={{display:"inline-flex",alignItems:"center",gap:4,color:T.muted}}>— コンタクト（担当者情報なし）</span><br/></>)}
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}>✅ 商談 <span style={{fontWeight:600,color:T.primary}}>{stripCorp(convertTarget.company_name)} - 新規商談</span></span>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setConvertTarget(null)} disabled={converting} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={executeConvert} disabled={converting} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.green,color:"#fff",fontFamily:"inherit",opacity:converting?0.5:1}}>{converting?"変換中...":"商談化する"}</button>
            </div>
          </div>
        </div>
      )}

      {convertResult&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget)setConvertResult(null)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:14,fontWeight:700,color:convertResult.errors?.length>0?T.orange:T.green,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>{convertResult.errors?.length>0?"⚠️ 商談化完了（一部エラー）":"✅ 商談化完了"}</div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11.5,color:T.sub,lineHeight:2}}>
              <div>{convertResult.acct?"✅":"❌"} <span style={{fontWeight:600,color:T.primary}}>取引先:</span> {convertResult.acct?.name||"作成失敗"}</div>
              <div>{convertResult.contact?"✅":convertResult.errors?.some(e=>e.startsWith("Contact"))?"❌":"➖"} <span style={{fontWeight:600,color:T.primary}}>コンタクト:</span> {convertResult.contact?convertResult.contact.name:convertResult.errors?.some(e=>e.startsWith("Contact"))?"作成失敗":"担当者情報なし"}</div>
              <div>{convertResult.deal?"✅":"❌"} <span style={{fontWeight:600,color:T.primary}}>商談:</span> {convertResult.deal?convertResult.deal.name:"作成失敗"}</div>
            </div>
            {convertResult.errors?.length>0&&<div style={{background:"#fef2f2",borderRadius:6,padding:"8px 10px",marginBottom:12,fontSize:10,color:T.red,lineHeight:1.6}}>{convertResult.errors.map((e,i)=><div key={i}>{e}</div>)}</div>}
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <button onClick={()=>setConvertResult(null)} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>OK</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}


// ── Login Screen (Web版) ──
function LoginScreen({onLogin}){
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");

  const handleLogin=async(e)=>{
    e.preventDefault();
    if(!email||!password){setError("メールとパスワードを入力してください");return}

                          <div><div style={{color:T.muted,fontSize:10}}>商談数</div><div style={{color:T.primary,fontWeight:600}}>{a._dealCount}</div></div>
                          <div><div style={{color:T.muted,fontSize:10}}>合計金額</div><div style={{color:T.primary,fontWeight:600}}>{fmtYen(a._totalAmt)}</div></div>
                        </div>
                      </div>))}
                    </div>
                    </>
                  );
                }
                return(<>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:`2px solid ${T.border}`}}>
                  <th style={{padding:"6px 8px",textAlign:"left",fontSize:10.5,fontWeight:700,color:T.muted}}>国</th>
                  {th("name","会社名")}{th("owner","GS責任者")}{th("source","流入経路")}{th("terms","入金ターム")}{th("deals","商談数")}{th("amount","合計金額")}
                </tr></thead>
                <tbody>{sorted.map(a=>(<tr key={a.id} onClick={()=>openAcctDetail(a)} style={{cursor:"pointer",borderBottom:`1px solid ${T.borderLight}`}}
                    onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"6px 8px",fontSize:14}}>{countryToFlag(a.country)}</td>
                    <td style={{padding:"6px 8px",fontWeight:600,color:T.primary}}><div style={{display:"flex",alignItems:"center",gap:4}}>{a.name}{a._contactCount===0&&<span title="コンタクト未登録" style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:16,height:16,borderRadius:"50%",background:T.orange+"20",color:T.orange,fontSize:9,fontWeight:800,flexShrink:0}}>!</span>}</div></td>
                    <td style={{padding:"6px 8px",fontSize:11,color:T.sub,fontWeight:500}}>{a._owner}</td>
                    <td style={{padding:"6px 8px",fontSize:11,color:T.sub}}>{a.lead_source||"-"}</td>
                    <td style={{padding:"6px 8px",color:T.sub}}>{a.payment_terms||"-"}</td>
                    <td style={{padding:"6px 8px",fontWeight:600}}>{a._dealCount}</td>
                    <td style={{padding:"6px 8px",fontWeight:600}}>{fmtYen(a._totalAmt)}</td>
                  </tr>))}</tbody>
                <tfoot><tr style={{borderTop:`2px solid ${T.border}`,background:"#f9f9f9"}}>
                  <td colSpan={5} style={{padding:"8px",fontSize:11,fontWeight:700,color:T.primary}}>合計 {sorted.length}社</td>
                  <td style={{padding:"8px",fontSize:11,fontWeight:700,color:T.primary}}>{totalDeals}件</td>
                  <td style={{padding:"8px",fontSize:12,fontWeight:700,color:T.primary}}>{fmtYen(grandTotal)}</td>
                </tr></tfoot>
              </table>
                </>);
              })()}
              {filteredAccounts.length===0&&<div style={{padding:40,textAlign:"center",color:"#ccc",fontSize:12}}>取引先がありません。「+ 新規取引先」で追加してください。</div>}
            </div>
          </>)}
        </div>
      </div>

      {showSettings&&<Settings config={config||{}} onSave={handleSaveSettings} onClose={()=>setShowSettings(false)}/>}
      {showSettingsManager&&<SettingsManager categories={categories} client={client} user={user} allUsers={allUsers} accounts={accounts} onClose={()=>setShowSettingsManager(false)} onUpdated={reload} onOpenSupabaseSettings={()=>{setShowSettingsManager(false);setShowSettings(true)}}/>}
      {showDealForm&&<DealForm client={client} user={user} accounts={accounts} deal={editDeal} allUsers={allUsers} deals={deals} categories={categories} onClose={()=>setShowDealForm(false)} onSaved={reload}/>}
      {showAcctForm&&<AccountForm client={client} user={user} account={editAcct} accounts={accounts} categories={categories} allUsers={allUsers} onClose={()=>setShowAcctForm(false)} onSaved={reload}/>}
      {showContactForm&&<ContactFormModal client={client} user={user} accounts={accounts} contact={editContact} onClose={()=>{setShowContactForm(false);setEditContact(null)}} onSaved={reload}/>}
      {/* Global Search Overlay */}
      {showGlobalSearch&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:300,paddingTop:80,}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowGlobalSearch(false)}}>
          <div style={{background:"#fff",borderRadius:12,padding:0,width:"90%",maxWidth:500,boxShadow:"0 20px 60px rgba(0,0,0,.2)",overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",borderBottom:`1px solid ${T.border}`}}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#999" strokeWidth="1.5"/><path d="M11 11l3.5 3.5" stroke="#999" strokeWidth="1.5" strokeLinecap="round"/></svg>
              <input ref={globalSearchRef} value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)} placeholder="商談・取引先・コンタクトを検索..." style={{flex:1,border:"none",outline:"none",fontSize:13,fontFamily:"inherit",background:"transparent",color:T.primary}} autoFocus/>
              <span style={{fontSize:9,color:"#ccc",padding:"2px 6px",background:"#f5f5f5",borderRadius:3}}>ESC</span>
            </div>
            {globalSearch.trim()&&(()=>{
              const res=searchResults;
              const hasResults=res.deals.length+res.accounts.length+res.contacts.length>0;
              return(
                <div style={{maxHeight:400,overflowY:"auto",padding:"8px 0"}}>
                  {!hasResults&&<div style={{padding:"20px",textAlign:"center",color:"#ccc",fontSize:12}}>該当なし</div>}
                  {res.deals.length>0&&<div>
                    <div style={{padding:"6px 16px",fontSize:9.5,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>商談</div>
                    {res.deals.map(d=>{const acct=accounts.find(a=>a.id===d.account_id);return(
                      <div key={d.id} onClick={()=>{setShowGlobalSearch(false);setGlobalSearch("");openDealDetail(d)}} style={{padding:"8px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}
                        onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <span style={{fontSize:12}}>{countryToFlag(acct?.country)}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:600,color:T.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</div>
                          <div style={{fontSize:10,color:T.muted}}>{acct?.name||"-"} · {STAGES.find(s=>s.id===d.stage)?.ja}</div>
                        </div>
                        <span style={{fontSize:11,fontWeight:600,color:T.primary,flexShrink:0}}>{fmtDealAmt(d.amount)}</span>
                      </div>);
                    })}
                  </div>}
                  {res.accounts.length>0&&<div>
                    <div style={{padding:"6px 16px",fontSize:9.5,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.05em",borderTop:res.deals.length>0?`1px solid ${T.borderLight}`:"none"}}>取引先</div>
                    {res.accounts.map(a=>(
                      <div key={a.id} onClick={()=>{setShowGlobalSearch(false);setGlobalSearch("");openAcctDetail(a)}} style={{padding:"8px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}
                        onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <span style={{fontSize:12}}>{countryToFlag(a.country)}</span>
                        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:T.primary}}>{a.name}</div><div style={{fontSize:10,color:T.muted}}>{a.country||"-"} · {shortName(allUsers.find(u=>u.id===a.owner_id))}</div></div>
                      </div>))}
                  </div>}
                  {res.contacts.length>0&&<div>
                    <div style={{padding:"6px 16px",fontSize:9.5,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.05em",borderTop:(res.deals.length+res.accounts.length)>0?`1px solid ${T.borderLight}`:"none"}}>コンタクト</div>
                    {res.contacts.map(c=>{const acct=accounts.find(a=>a.id===c.account_id);return(
                      <div key={c.id} onClick={()=>{setShowGlobalSearch(false);setGlobalSearch("");openContactDetail(c)}} style={{padding:"8px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}
                        onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <div style={{width:24,height:24,borderRadius:5,background:"#e8e8e8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:T.sub}}>{ini(c.name)}</div>
                        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:T.primary}}>{c.name}</div><div style={{fontSize:10,color:T.muted}}>{c.role||"-"} · {acct?.name||"-"}</div></div>
                      </div>);
                    })}
                  </div>}
                </div>
              );
            })()}
          </div>
        </div>
      )}
      {pendingDrop&&<InvoiceUploadModal deal={pendingDrop.deal} client={client} user={user} onClose={()=>setPendingDrop(null)} onSaved={async()=>{
        const currentPhase=STAGES.find(s=>s.id===pendingDrop.deal.stage)?.phase||"pre";
        const targetPhase=STAGES.find(s=>s.id===pendingDrop.newStage)?.phase;
        const now=new Date().toISOString();
        const updateData={stage:pendingDrop.newStage,updated_at:now,updated_by:user.id};
        if(currentPhase==="pre"&&(targetPhase==="post"||targetPhase==="done")&&!pendingDrop.deal.payment_confirmed_date){
          updateData.payment_confirmed_date=now.split('T')[0];
        }
        // Optimistic update
        setDeals(prev=>prev.map(d=>d.id===pendingDrop.deal.id?{...d,...updateData}:d));
        await client.from("sales_deals").update(updateData).eq("id",pendingDrop.deal.id);
        const oldStage=STAGES.find(s=>s.id===pendingDrop.deal.stage);const newStageObj=STAGES.find(s=>s.id===pendingDrop.newStage);
        await client.from("sales_activities").insert({deal_id:pendingDrop.deal.id,account_id:pendingDrop.deal.account_id,user_id:user.id,type:"stage_change",content:`${oldStage?.ja} → ${newStageObj?.ja}`});
        setPendingDrop(null);
      }}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<ToastProvider><App/></ToastProvider>);
</script>
</body>
</html>
