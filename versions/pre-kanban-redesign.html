      </div>
    </div>
  );
}

// ── Activity Timeline ──
function ActivityTimeline({deal,client,user,allUsers,onUpdated}){
  const[activities,setActivities]=useState([]);
  const[newType,setNewType]=useState("report");
  const[newContent,setNewContent]=useState("");
  const[newDueDate,setNewDueDate]=useState("");
  const[newAssignedTo,setNewAssignedTo]=useState(user.id);
  const[showForm,setShowForm]=useState(false);
  const[confirmDeleteId,setConfirmDeleteId]=useState(null);
  const[weeklyDeleteTarget,setWeeklyDeleteTarget]=useState(null);
  const[editingId,setEditingId]=useState(null);
  const[editContent,setEditContent]=useState("");
  const[editDueDate,setEditDueDate]=useState("");
  const[editAssignedTo,setEditAssignedTo]=useState("");
  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};

  useEffect(()=>{loadAct()},[deal.id]);
  const VALID_ACT_TYPES=["report","note","stage_change","weekly_report","todo"];
  const loadAct=async()=>{const{data}=await client.from("sales_activities").select("*").eq("deal_id",deal.id).is("deleted_at",null).order("created_at",{ascending:false});if(data)setActivities(data.filter(a=>VALID_ACT_TYPES.includes(a.type)||a.is_todo))};

  const addAct=async()=>{
    if(!newContent.trim())return;
    const{error:ie}=await client.from("sales_activities").insert({
      deal_id:deal.id,account_id:deal.account_id,user_id:user.id,
      type:newType,content:newContent.trim(),
      is_todo:newType==="todo",
      due_date:newType==="todo"&&newDueDate?newDueDate:null,
      assigned_to:newType==="todo"?newAssignedTo:null
    });
    if(ie){alert(ie.message);return}
    setNewContent("");setNewDueDate("");setShowForm(false);
    loadAct();if(onUpdated)onUpdated();
  };

  const toggleTodo=async(id,cur)=>{
    const{error:ue}=await client.from("sales_activities").update({is_completed:!cur}).eq("id",id);
    if(!ue)loadAct();
  };

  const deleteAct=async(id)=>{
    const act=activities.find(a=>a.id===id);
    if(act&&act.type==="weekly_report"){
      setWeeklyDeleteTarget(act);return;
    }
    if(confirmDeleteId===id){
      await client.from("sales_activities").update({deleted_at:new Date().toISOString()}).eq("id",id);
      setConfirmDeleteId(null);loadAct();if(onUpdated)onUpdated();
    }else{
      setConfirmDeleteId(id);
      setTimeout(()=>setConfirmDeleteId(prev=>prev===id?null:prev),3000);
    }
  };

  const confirmWeeklyDelete=async()=>{
    if(!weeklyDeleteTarget)return;
    await client.from("sales_activities").update({deleted_at:new Date().toISOString()}).eq("id",weeklyDeleteTarget.id);
    setWeeklyDeleteTarget(null);loadAct();if(onUpdated)onUpdated();
  };

  const startEdit=(a)=>{
    setEditingId(a.id);
    setEditContent(a.content||"");
    setEditDueDate(a.due_date||"");
    setEditAssignedTo(a.assigned_to||user.id);
  };

  const cancelEdit=()=>{setEditingId(null);setEditContent("");setEditDueDate("");setEditAssignedTo("")};

  const saveEdit=async(a)=>{
    if(!editContent.trim())return;
    const updateData={content:editContent.trim()};
    if(a.is_todo){
      updateData.due_date=editDueDate||null;
      updateData.assigned_to=editAssignedTo||null;
    }
    const{error}=await client.from("sales_activities").update(updateData).eq("id",a.id);
    if(error){alert(error.message);return}
    cancelEdit();loadAct();if(onUpdated)onUpdated();
  };

  const grouped={};
  activities.forEach(a=>{const d=new Date(a.created_at);const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const label=`${d.getMonth()+1}月・${d.getFullYear()}`;if(!grouped[key])grouped[key]={label,items:[]};grouped[key].items.push(a)});
  const sortedGroups=Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0]));

  const typeIcon=(a)=>{
    if(a.type==="stage_change")return{color:T.muted,icon:"↗"};
    if(a.type==="weekly_report")return{color:T.green,icon:"📋"};
    if(a.type==="report"||a.type==="note")return{color:T.sub,icon:"•"};
    if(a.is_todo)return{color:T.accent,icon:a.is_completed?"☑":"☐"};
    return{color:T.muted,icon:"•"};
  };

  const canEditDelete=(a)=>a.type==="report"||a.type==="note"||a.type==="weekly_report"||a.is_todo;

  return(
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",height:"100%",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:T.primary}}>活動タイムライン</div>
        <button onClick={()=>setShowForm(!showForm)} style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:10,fontWeight:600,cursor:"pointer",background:showForm?"#f3f3f3":"#fff",color:T.sub,fontFamily:"inherit"}}>{showForm?"×":"+ 追加"}</button>
      </div>

      {showForm&&(
        <div style={{padding:10,background:T.bg,borderRadius:6,marginBottom:10}}>
          <div style={{display:"flex",gap:4,marginBottom:8}}>
            <button onClick={()=>setNewType("report")} style={{flex:1,padding:"5px",borderRadius:4,border:newType==="report"?`2px solid ${T.green}`:`1px solid ${T.border}`,fontSize:10.5,fontWeight:newType==="report"?700:400,cursor:"pointer",background:newType==="report"?T.green+"10":"#fff",color:newType==="report"?T.green:T.sub,fontFamily:"inherit"}}>📝 レポート</button>
            <button onClick={()=>setNewType("todo")} style={{flex:1,padding:"5px",borderRadius:4,border:newType==="todo"?`2px solid ${T.accent}`:`1px solid ${T.border}`,fontSize:10.5,fontWeight:newType==="todo"?700:400,cursor:"pointer",background:newType==="todo"?T.accent+"10":"#fff",color:newType==="todo"?T.accent:T.sub,fontFamily:"inherit"}}>☐ ToDo</button>
          </div>
          <textarea value={newContent} onChange={e=>setNewContent(e.target.value)} rows={2} placeholder={newType==="report"?"活動内容を記録...":"タスク内容..."} style={{...I,marginBottom:6,lineHeight:1.4}}/>
          {newType==="todo"&&(
            <div style={{display:"flex",gap:4,marginBottom:6}}>
              <input type="date" value={newDueDate} onChange={e=>setNewDueDate(e.target.value)} style={{...I,flex:1}}/>
              <select value={newAssignedTo} onChange={e=>setNewAssignedTo(e.target.value)} style={{...I,flex:1,background:"#fff"}}>
                {(allUsers||[]).map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
              </select>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <button onClick={addAct} style={{padding:"5px 12px",borderRadius:4,border:"none",fontSize:10.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>追加</button>
          </div>
        </div>
      )}

      <div style={{flex:1,overflowY:"auto"}}>
        {sortedGroups.map(([key,{label,items}])=>(
          <div key={key} style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,padding:"4px 0",borderBottom:`1px solid ${T.borderLight}`,marginBottom:6}}>{label}</div>
            {items.map(a=>{const ti=typeIcon(a);const au=allUsers.find(u=>u.id===a.user_id);const assignee=a.assigned_to?allUsers.find(u=>u.id===a.assigned_to):null;const isEditing=editingId===a.id;return(
              <div key={a.id} style={{display:"flex",gap:8,marginBottom:8,paddingLeft:4}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:18}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:ti.color+"20",color:ti.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,cursor:a.is_todo?"pointer":"default",flexShrink:0}}
                    onClick={()=>{if(a.is_todo)toggleTodo(a.id,a.is_completed)}}>
                    {ti.icon}
                  </div>
                  <div style={{flex:1,width:1,background:T.borderLight,marginTop:2}}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  {isEditing?(<div style={{background:T.bg,borderRadius:6,padding:8,marginBottom:2}}>
                    <textarea value={editContent} onChange={e=>setEditContent(e.target.value)} rows={2} style={{...I,marginBottom:4,lineHeight:1.4,fontSize:11}}/>
                    {a.is_todo&&(<div style={{display:"flex",gap:4,marginBottom:4}}>
                      <input type="date" value={editDueDate} onChange={e=>setEditDueDate(e.target.value)} style={{...I,flex:1,fontSize:10}}/>
                      <select value={editAssignedTo} onChange={e=>setEditAssignedTo(e.target.value)} style={{...I,flex:1,background:"#fff",fontSize:10}}>
                        {(allUsers||[]).map(u=>(<option key={u.id} value={u.id}>{shortName(u)}</option>))}
                      </select>
                    </div>)}
                    <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                      <button onClick={cancelEdit} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,fontSize:9.5,fontWeight:500,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
                      <button onClick={()=>saveEdit(a)} style={{padding:"3px 8px",borderRadius:3,border:"none",fontSize:9.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>保存</button>
                    </div>
                  </div>):(<>
                    {a.type==="weekly_report"&&<div style={{fontSize:9,fontWeight:700,color:T.green,marginBottom:1}}>週次レポート</div>}
                    <div style={{fontSize:11.5,color:a.is_completed?T.muted:T.primary,fontWeight:a.type==="stage_change"?400:500,textDecoration:a.is_completed?"line-through":"none",lineHeight:1.4,whiteSpace:"pre-wrap"}}>{a.content}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>
                      <span style={{fontSize:9.5,color:T.muted}}>{shortName(au)}</span>
                      <span style={{fontSize:9,color:T.muted}}>{fmt(a.created_at)}</span>
                      {a.due_date&&<span style={{fontSize:9,color:new Date(a.due_date)<new Date()&&!a.is_completed?T.red:T.muted}}>期限: {fmt(a.due_date)}</span>}
                      {assignee&&<span style={{fontSize:9,color:T.accent}}>→ {shortName(assignee)}</span>}
                      {canEditDelete(a)&&<>
                        <span onClick={()=>startEdit(a)} style={{fontSize:9,color:T.accent,cursor:"pointer",padding:"1px 5px",borderRadius:3,fontWeight:500,transition:"all 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background=T.accent+"15"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>編集</span>
                        <span onClick={()=>deleteAct(a.id)} style={{fontSize:9,color:confirmDeleteId===a.id?"#fff":T.muted,cursor:"pointer",padding:"1px 5px",borderRadius:3,background:confirmDeleteId===a.id?T.red:"transparent",fontWeight:confirmDeleteId===a.id?600:400,transition:"all 0.15s"}}>{confirmDeleteId===a.id?"削除する":"削除"}</span>
                      </>}
                    </div>
                  </>)}
                </div>
              </div>
            )})}
          </div>
        ))}
        {activities.length===0&&<div style={{fontSize:11,color:"#ccc",textAlign:"center",padding:"20px 0"}}>活動履歴なし</div>}
      </div>
      {weeklyDeleteTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onMouseDown={e=>{if(e.target===e.currentTarget)setWeeklyDeleteTarget(null)}}>
          <div style={{background:"#fff",borderRadius:10,padding:"20px 24px",width:360,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}}>

            </div>
            <div style={{fontSize:11.5,color:T.sub,lineHeight:1.6,marginBottom:8}}>以下の週次レポートを削除しますか？この操作は取り消せません。</div>
            <div style={{background:T.bg,borderRadius:6,padding:"10px 12px",marginBottom:14,border:`1px solid ${T.borderLight}`}}>
              <div style={{fontSize:10,color:T.muted,marginBottom:4}}>📋 {fmt(weeklyDeleteTarget.created_at)} · {shortName(allUsers.find(u=>u.id===weeklyDeleteTarget.user_id))}</div>
              <div style={{fontSize:11.5,color:T.primary,lineHeight:1.4,whiteSpace:"pre-wrap",maxHeight:120,overflowY:"auto"}}>{weeklyDeleteTarget.content}</div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setWeeklyDeleteTarget(null)} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
              <button onClick={confirmWeeklyDelete} style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11.5,fontWeight:700,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit"}}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Chat Panel ──
function ChatPanel({deal,client,user,allUsers,accounts,onUpdated}){
  const[messages,setMessages]=useState([]);
  const[newMsg,setNewMsg]=useState("");

  useEffect(()=>{
    if(!deal.chat_room_id)return;
    loadMsgs();
    const ch=client.channel("sales-chat-"+deal.chat_room_id)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"chat_messages",filter:`room_id=eq.${deal.chat_room_id}`},()=>loadMsgs())
      .subscribe();
    return()=>{client.removeChannel(ch)};
  },[deal.chat_room_id]);

  const loadMsgs=async()=>{
    if(!deal.chat_room_id)return;
    const{data}=await client.from("chat_messages").select("*").eq("room_id",deal.chat_room_id).order("created_at",{ascending:false}).limit(30);
    if(data)setMessages(data.reverse());
  };

  const send=async()=>{
    if(!newMsg.trim()||!deal.chat_room_id)return;
    const{error:ie}=await client.from("chat_messages").insert({room_id:deal.chat_room_id,user_id:user.id,content:newMsg.trim(),type:"text"});
    if(!ie){setNewMsg("");loadMsgs()}
  };

  if(!deal.chat_room_id){
    const createRoom=async()=>{
      try{
        const acct=accounts?.find(a=>a.id===deal.account_id);
        const roomName=deal.name||(acct?.name+" 商談");
        const{data:room,error:re}=await client.from("chat_rooms").insert({name:roomName,type:"group",created_by:user.id}).select().single();
        if(re)throw re;
        // 作成者をメンバーに追加
        await client.from("chat_room_members").insert({room_id:room.id,user_id:user.id,role:"admin"});
        const{error:de}=await client.from("sales_deals").update({chat_room_id:room.id,updated_at:new Date().toISOString()}).eq("id",deal.id);
        if(de)throw de;
        if(onUpdated)onUpdated();
      }catch(e){alert("チャットルーム作成エラー: "+e.message)}
    };
    return(
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px"}}>
        <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>GS-Chat</div>
        <div style={{fontSize:11,color:"#ccc",textAlign:"center",padding:"8px 0",marginBottom:8}}>チャンネル未連携</div>
        <button onClick={createRoom} style={{width:"100%",padding:"6px",borderRadius:5,border:`1px dashed ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:T.bg,color:T.sub,fontFamily:"inherit"}}>+ チャットルームを作成</button>
      </div>
    );
  }

  return(
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px"}}>
      <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:8}}>GS-Chat</div>
      <div style={{maxHeight:200,overflowY:"auto",marginBottom:8}}>
        {messages.map(m=>{const s=allUsers.find(u=>u.id===m.user_id);return(
          <div key={m.id} style={{marginBottom:6}}>
            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:1}}>
              <span style={{fontSize:10,fontWeight:600,color:T.primary}}>{shortName(s)}</span>
              <span style={{fontSize:9,color:T.muted}}>{new Date(m.created_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            <div style={{fontSize:11.5,color:T.sub,lineHeight:1.4}}>{m.content}</div>
          </div>
        )})}
        {messages.length===0&&<div style={{fontSize:11,color:"#ccc",textAlign:"center"}}>メッセージなし</div>}
      </div>
      <div style={{display:"flex",gap:4}}>
        <input value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyPress={e=>{if(e.key==="Enter")send()}} placeholder="メッセージ..." style={{flex:1,border:`1px solid ${T.border}`,borderRadius:5,padding:"5px 8px",fontSize:11,outline:"none",fontFamily:"inherit"}}/>
        <button onClick={send} style={{padding:"5px 10px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>送信</button>
      </div>
    </div>
  );
}

// ── Deal Detail View ──
function DealDetail({deal,accounts,contacts,client,user,allUsers,onBack,onUpdated,onStageChange,onEdit,onOpenAcct,onOpenContact}){
  const acct=accounts.find(a=>a.id===deal.account_id);
  const dealContacts=contacts.filter(c=>c.account_id===deal.account_id);
  const stageObj=STAGES.find(s=>s.id===deal.stage);
  const stageIdx=STAGES.findIndex(s=>s.id===deal.stage);
  const owner=allUsers.find(u=>u.id===deal.owner_id);
  const[editField,setEditField]=useState(null);const[editVal,setEditVal]=useState("");
  const[files,setFiles]=useState([]);const fileRef=useRef(null);
  const[showInvoiceModal,setShowInvoiceModal]=useState(false);
  const[deleteConfirm,setDeleteConfirm]=useState(false);
  const[confirmFileDeleteId,setConfirmFileDeleteId]=useState(null);

  useEffect(()=>{loadFiles()},[deal.id]);
  const loadFiles=async()=>{const{data}=await client.from("sales_deal_files").select("*").eq("deal_id",deal.id).order("created_at",{ascending:false});if(data)setFiles(data)};

  const quickUpdate=async(field,value)=>{
    try{
      const updateData={[field]:value,updated_at:new Date().toISOString(),updated_by:user.id};
      if(onStageChange)onStageChange(deal.id,updateData);
      const{error:ue}=await client.from("sales_deals").update(updateData).eq("id",deal.id);
      if(ue){onUpdated();throw ue;}
    }catch(e){console.error(e);alert("更新エラー: "+e.message)}
    setEditField(null);
  };

  const moveSta=async(newStage)=>{
    const currentPhase=STAGES.find(s=>s.id===deal.stage)?.phase||"pre";
    const targetPhase=STAGES.find(s=>s.id===newStage)?.phase;
    const now=new Date().toISOString();
    const updateData={stage:newStage,updated_at:now,updated_by:user.id};
    if(currentPhase==="pre"&&(targetPhase==="post"||targetPhase==="done")&&!deal.payment_confirmed_date){
      updateData.payment_confirmed_date=now.split('T')[0];
    }
    // Optimistic update
    if(onStageChange)onStageChange(deal.id,updateData);
    const{error:ue}=await client.from("sales_deals").update(updateData).eq("id",deal.id);
    if(ue){alert("ステージ更新エラー: "+ue.message);onUpdated();return}
    await client.from("sales_activities").insert({deal_id:deal.id,account_id:deal.account_id,user_id:user.id,type:"stage_change",content:`${stageObj?.ja} → ${STAGES.find(s=>s.id===newStage)?.ja}`});
  };

  const handleFileUpload=async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    try{
      const ext=file.name.includes(".")?"."+file.name.split(".").pop().toLowerCase():"";
      const safeName=Date.now()+"_"+Math.random().toString(36).slice(2,8)+(ext?"."+ext.replace(/^\./,""):"");
      const fp="sales/"+deal.id+"/"+safeName;
      const ct=file.type||"application/octet-stream";
      const{error:ue}=await client.storage.from("chat-files").upload(fp,file,{cacheControl:"3600",upsert:true,contentType:ct});
      if(ue)throw ue;
      const{data:ud}=client.storage.from("chat-files").getPublicUrl(fp);
      await client.from("sales_deal_files").insert({deal_id:deal.id,name:file.name,url:ud?.publicUrl||"",file_type:ct,size:file.size,uploaded_by:user.id});
      loadFiles();
    }catch(err){alert("アップロードエラー: "+(err.message||err))}
    e.target.value="";
  };

  const deleteFile=async(fileId)=>{
    if(confirmFileDeleteId===fileId){
      const{error}=await client.from("sales_deal_files").update({deleted_at:new Date().toISOString()}).eq("id",fileId);
      if(!error)loadFiles();
      setConfirmFileDeleteId(null);
    }else{
      setConfirmFileDeleteId(fileId);
      setTimeout(()=>setConfirmFileDeleteId(prev=>prev===fileId?null:prev),3000);
    }
  };

  const deleteDeal=async()=>{
    try{
      // 関連アクティビティを先に削除
      await client.from("sales_activities").update({deleted_at:new Date().toISOString()}).eq("deal_id",deal.id);
      // 関連ファイルを削除
      await client.from("sales_deal_files").update({deleted_at:new Date().toISOString()}).eq("deal_id",deal.id);
      // 商談を削除
      await client.from("sales_deals").update({deleted_at:new Date().toISOString()}).eq("id",deal.id);
      onUpdated();
      onBack();
    }catch(e){alert(e.message)}
  };

  return(
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      {/* Back + Title + Edit Button */}
      <div style={{display:"flex",alignItems:"center",gap:14,padding:"10px 0",borderBottom:`1px solid ${T.border}`,marginBottom:12}}>
        <button onClick={onBack} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.border}`,fontSize:11,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>← 戻る</button>
        <div style={{flex:1}}>
          <div style={{fontSize:9.5,color:T.muted}}>商談</div>
          <div style={{fontSize:15,fontWeight:700,color:T.primary}}>{deal.name}</div>
        </div>
        <ShipBadge type={deal.shipping_type}/>
        <button onClick={onEdit} style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff",color:T.primary,fontFamily:"inherit"}}>編集</button>
      </div>

      {/* Stage Status */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        {/* Left: dot + phase text + progress */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:9,height:9,borderRadius:5,background:stageObj?.phase==="pre"?"#3b82f6":stageObj?.phase==="post"?"#f59e0b":deal.stage==="lost"?T.red:T.green,flexShrink:0}}/>
          <span style={{fontSize:14,fontWeight:700,color:T.primary}}>{stageObj?.ja||deal.stage}</span>
          <span style={{fontSize:10,color:T.muted,marginLeft:2}}>{stageObj?.phase==="pre"?"入金前":stageObj?.phase==="post"?"発注〜発送":stageObj?.phase==="done"?"完了":""}</span>
          <div style={{width:60,height:4,background:"#f0f0f0",borderRadius:2,overflow:"hidden",marginLeft:4}}>
            <div style={{width:Math.round((stageIdx+1)/STAGES.length*100)+"%",height:"100%",background:stageObj?.phase==="pre"?"#3b82f6":stageObj?.phase==="post"?"#f59e0b":deal.stage==="lost"?T.red:T.green,borderRadius:2,transition:"width .3s"}}/>
          </div>
          <span style={{fontSize:9,color:T.muted}}>{stageIdx+1}/{STAGES.length}</span>
        </div>
        {/* Right: dropdown + supplier paid */}
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <select value={deal.stage} onChange={e=>moveSta(e.target.value)}
            style={{fontSize:10,color:T.sub,background:"#fafafa",border:"1px solid "+T.border,borderRadius:5,padding:"4px 22px 4px 8px",cursor:"pointer",fontFamily:"inherit",appearance:"none",WebkitAppearance:"none",backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\")",backgroundRepeat:"no-repeat",backgroundPosition:"right 6px center"}}>
            {STAGES.map(s=><option key={s.id} value={s.id}>{s.ja}</option>)}
          </select>
          {(()=>{const sp=stageObj?.phase;if(sp!=="post"&&sp!=="done")return null;return(
            <label style={{display:"flex",alignItems:"center",gap:3,fontSize:9.5,color:T.muted,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
              <input type="checkbox" checked={!!deal.supplier_paid} onChange={async(e)=>{
                const val=e.target.checked;
                const{error:se}=await client.from("sales_deals").update({supplier_paid:val,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",deal.id);
                if(!se)onUpdated();
              }} style={{width:12,height:12,accentColor:T.primary,cursor:"pointer"}}/>
              仕入入金済
            </label>
          )})()}
        </div>
      </div>

      <div style={{display:"flex",gap:12,flex:1,minHeight:0}}>
        {/* Left: Deal Info + Spreadsheet */}
        <div style={{width:280,minWidth:280,overflowY:"auto"}}>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:T.primary,marginBottom:10}}>商談情報</div>
            <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:"5px 6px",fontSize:11.5}}>
              <span style={{color:T.muted}}>取引先</span><span style={{color:acct?T.accent:T.primary,fontWeight:500,cursor:acct?"pointer":"default",textDecoration:acct?"none":"none"}} onClick={()=>{if(acct&&onOpenAcct)onOpenAcct(acct)}} onMouseEnter={e=>{if(acct)e.currentTarget.style.textDecoration="underline"}} onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>{acct?.name||"-"}</span>
              <span style={{color:T.muted}}>金額</span><span style={{fontWeight:700,fontSize:14}}>{fmtDealAmt(deal.amount)}</span>
              {(()=>{const sp=STAGES.find(s=>s.id===deal.stage)?.phase;const isPost=sp==="post"||sp==="done";if(!isPost)return null;return(<>
                <span style={{color:T.muted}}>入金状況</span>
                <span style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:60,height:5,background:"#e5e5e5",borderRadius:3,overflow:"hidden"}}>
                    <div style={{width:(deal.prepayment_percent||0)+"%",height:"100%",background:T.primary,transition:"width .3s"}}/>
                  </div>
                  <span style={{fontSize:10,color:T.sub,fontWeight:500}}>{deal.prepayment_percent||0}%</span>
                  {deal.prepayment_percent>0&&deal.prepayment_percent<100&&<PayBadge status="partial"/>}
                  {deal.prepayment_percent>=100&&<PayBadge status="full"/>}
                </span>
              </>)})()}
              {(()=>{const sp=STAGES.find(s=>s.id===deal.stage)?.phase;if(sp!=="pre")return null;return(<>
                <span style={{color:T.muted}}>確度</span><span style={{fontWeight:600,color:T.primary}}>{deal.confidence||50}%</span>

              <span style={{color:T.muted}}>商談開始日</span><span>{fmt(deal.deal_date)}</span>

              <a href={f.url} target="_blank" rel="noopener" style={{fontSize:11,color:T.accent,textDecoration:"none",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</a>

            const{error:ne}=await client.from("sales_deals").update({notes:v,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",deal.id);
            if(!ne)onUpdated();
          }}/>

          <ChatPanel deal={deal} client={client} user={user} allUsers={allUsers} accounts={accounts} onUpdated={onUpdated}/>
        </div>
      </div>

      {/* Delete button */}
      <div style={{marginTop:20,paddingTop:12,borderTop:`1px solid ${T.border}`,textAlign:"center"}}>
        {!deleteConfirm?

    </div>
  );
}

// ── Settings Management Modal (Category + Supabase) ──
function CSVImporter({client,user,allUsers,accounts,onDone}){
  const[step,setStep]=useState("select"); // select, preview, importing, done
  const[importType,setImportType]=useState("");
  const[rows,setRows]=useState([]);
  const[log,setLog]=useState([]);
  const[progress,setProgress]=useState(0);
  const fileRef=useRef(null);

  const parseCSV=(text)=>{
    const lines=[];let current="";let inQuote=false;
    for(let i=0;i<text.length;i++){
      const c=text[i];
      if(c==='"'){
        if(inQuote&&text[i+1]==='"'){current+='"';i++}
        else{inQuote=!inQuote}
      }else if(c===','&&!inQuote){lines.length===0?lines.push([current]):lines[lines.length-1].push(current);current=""}
      else if((c==='\n'||c==='\r')&&!inQuote){
        if(current||lines.length>0){lines.length===0?lines.push([current]):lines[lines.length-1].push(current)}
        if(lines[lines.length-1]?.length>1)lines.push([]);
        current="";
        if(c==='\r'&&text[i+1]==='\n')i++
      }else{current+=c}
    }
    if(current)lines.length===0?lines.push([current]):lines[lines.length-1].push(current);
    return lines.filter(r=>r.length>1||r[0]?.trim());
  };

  const handleFile=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const text=ev.target.result;
      const parsed=parseCSV(text);
      if(parsed.length<2){setLog(["CSVにデータがありません"]);return}
      // カラムバリデーション
      if(importType){
        const header=parsed[0].map(h=>h.trim().toLowerCase());
        const REQUIRED={
          accounts:{any:["取引先名","account","name"],label:"取引先名"},
          contacts:{any:["氏名","name","名","姓","first","last"],label:"氏名 or 名/姓"},
          deals:{any:["商談名","clean_name","deal","name"],label:"商談名"}
        };
        const req=REQUIRED[importType];
        if(req&&!req.any.some(k=>header.some(h=>h.includes(k)))){
          setLog(["⚠ 必須カラム「"+req.label+"」が見つかりません。ヘッダ行を確認してください。","検出されたヘッダ: "+parsed[0].join(", ")]);return;
        }
        // 列数不一致チェック
        const hLen=parsed[0].length;
        const badRows=parsed.slice(1).filter((r,i)=>r.length!==hLen);
        if(badRows.length>0){
          setLog(["⚠ "+badRows.length+"行の列数がヘッダ("+hLen+"列)と一致しません。CSVの書式を確認してください。"]);return;
        }
      }
      setRows(parsed);setStep("preview");
    };
    reader.readAsText(file,"UTF-8");
  };

  const OWNER_MAP={"Lamichhane Amon":"Amon","Yuki Nakagawa":"Yuki","Ito Yuta":"Yuta","Chikaki Kosuke":"Chikaki","Martirossian Mark":"Mark","Tsumura Kota":"Tsumura"};
  const STAGE_MAP={"Under Negotiation":"negotiation","Invoice Sent":"invoice_sent","Order Pending":"order_pending","Order Completed":"order_completed","Goods Received":"goods_received","Shipped – Tracking Shared":"shipped","Shipped - Tracking Shared":"shipped","Order Lost":"lost"};

  const cleanEmoji=(t)=>{
    if(!t)return t;
    return t.replace(/[🔥🚢✈️✈⭕️⭕🔺❌✅🇯🇵🌐\ufe0f]/gu,"").replace(/\s+/g," ").trim();
  };

  const findOwner=(ownerName)=>{
    const mapped=OWNER_MAP[ownerName]||ownerName;
    return allUsers?.find(u=>u.name?.includes(mapped)||u.email?.includes(mapped.toLowerCase()));
  };

  const importAccounts=async()=>{
    setStep("importing");const header=rows[0];const data=rows.slice(1);
    const nameIdx=header.findIndex(h=>h.includes("取引先名"));
    const ownerIdx=header.findIndex(h=>h.includes("所有者"));
    const stateIdx=header.findIndex(h=>h.includes("都道府県"));
    const sourceIdx=header.findIndex(h=>h.includes("流入")||h.includes("source"));
    const countryIdx=header.findIndex(h=>h.includes("country")||h.includes("国"));
    const newLog=[];let done=0;
    // Build bulk rows
    const bulkRows=[];
    for(const row of data){
      const name=cleanEmoji(row[nameIdx]||"").trim();
      if(!name){done++;continue}
      const ownerUser=findOwner(row[ownerIdx]||"");
      const isJBW=(row[nameIdx]||"").includes("🌐");
      const ins={name,owner_id:ownerUser?.id||user.id};
      if(stateIdx>=0&&row[stateIdx])ins.address_billing=row[stateIdx].trim();
      if(countryIdx>=0&&row[countryIdx])ins.country=row[countryIdx].trim();
      if(isJBW)ins.lead_source="JBW";
      if(sourceIdx>=0&&row[sourceIdx])ins.lead_source=row[sourceIdx].trim();
      bulkRows.push(ins);
    }
    // Try bulk RPC first, fallback to individual inserts
    try{
      const{data:result,error:rpcErr}=await client.rpc("bulk_import_accounts",{p_rows:bulkRows});
      if(!rpcErr&&result){
        newLog.push(`✓ ${result.inserted}件インポート完了`+(result.skipped>0?` (${result.skipped}件重複スキップ)`:""));
        done=data.length;setProgress(100);setLog(newLog);setStep("done");return;
      }
    }catch(e){}
    // Fallback: individual inserts
    for(const ins of bulkRows){
      const{error:ie}=await client.from("sales_accounts").insert({...ins,updated_at:new Date().toISOString()});
      if(ie)newLog.push("⚠ "+ins.name+": "+ie.message);
      else newLog.push("✓ "+ins.name);
      done++;setProgress(Math.round(done/data.length*100));
    }
    setLog(newLog);setStep("done");
  };

  const importContacts=async()=>{
    setStep("importing");const header=rows[0];const data=rows.slice(1);
    const nameIdx=header.findIndex(h=>h.includes("name")||h.includes("氏名"));
    const firstIdx=header.findIndex(h=>h==="名"||h.includes("first"));
    const lastIdx=header.findIndex(h=>h==="姓"||h.includes("last"));
    const roleIdx=header.findIndex(h=>h.includes("役職")||h.includes("role"));
    const acctIdx=header.findIndex(h=>h.includes("取引先名")||h.includes("account"));
    const emailIdx=header.findIndex(h=>h.includes("メール")||h.includes("email"));
    const phoneIdx=header.findIndex(h=>h.includes("電話")||h.includes("phone"));
    const newLog=[];let done=0;
    const accts=accounts||[];
    for(const row of data){
      let fullName=nameIdx>=0?cleanEmoji(row[nameIdx]||""):"";
      if(!fullName&&(firstIdx>=0||lastIdx>=0)){
        fullName=cleanEmoji([row[firstIdx],row[lastIdx]].filter(Boolean).join(" "));
      }
      if(!fullName){done++;continue}
      const acctName=cleanEmoji(row[acctIdx]||"");
      const matchAcct=accts.find(a=>a.name===acctName);
      const ins={name:fullName.trim(),account_id:matchAcct?.id||null};
      if(roleIdx>=0&&row[roleIdx])ins.role=row[roleIdx].trim();
      if(emailIdx>=0&&row[emailIdx])ins.email=row[emailIdx].trim();
      if(phoneIdx>=0&&row[phoneIdx])ins.phone=row[phoneIdx].trim();
      const{error:ie}=await client.from("sales_contacts").insert(ins);
      if(ie)newLog.push("⚠ "+fullName+": "+ie.message);
      else newLog.push("✓ "+fullName+(matchAcct?" ("+acctName+")":""));
      done++;setProgress(Math.round(done/data.length*100));
    }
    setLog(newLog);setStep("done");
  };

  const importDeals=async()=>{
    setStep("importing");const header=rows[0];const data=rows.slice(1);
    const nameIdx=header.findIndex(h=>h.includes("商談名")||h.includes("clean_name"));
    const acctIdx=header.findIndex(h=>h.includes("取引先名")||h.includes("account"));
    const ownerIdx=header.findIndex(h=>h.includes("所有者")||h.includes("owner"));
    const stageIdx=header.findIndex(h=>h.includes("フェーズ")||h.includes("stage"));
    const amountIdx=header.findIndex(h=>h.includes("金額")||h.includes("amount"));
    const confIdx=header.findIndex(h=>h.includes("確度")||h.includes("confidence"));
    const shipIdx=header.findIndex(h=>h.includes("shipping"));
    const prepayIdx=header.findIndex(h=>h.includes("prepayment"));
    const supPaidIdx=header.findIndex(h=>h.includes("supplier_paid"));
    const incoIdx=header.findIndex(h=>h.includes("incoterms")||h.includes("インコタームズ"));
    const sourceIdx=header.findIndex(h=>h.includes("source")||h.includes("流入"));
    const createIdx=header.findIndex(h=>h.includes("作成日")||h.includes("created"));
    const closeIdx=header.findIndex(h=>h.includes("完了予定日")||h.includes("close"));
    const notesIdx=header.findIndex(h=>h.includes("説明")||h.includes("notes")||h.includes("メモ"));
    const newLog=[];let done=0;
    const accts=accounts||[];
    for(const row of data){
      const rawName=row[nameIdx]||"";
      const dealName=cleanEmoji(rawName).trim();
      if(!dealName){done++;continue}
      const acctName=cleanEmoji(row[acctIdx]||"");
      const matchAcct=accts.find(a=>a.name===acctName);
      const ownerUser=findOwner(row[ownerIdx]||"");
      let stage=row[stageIdx]||"";
      stage=STAGE_MAP[stage]||stage;
      if(!STAGE_MAP[row[stageIdx]]&&stageIdx>=0){
        const stgMatch=["negotiation","invoice_sent","order_pending","order_completed","goods_received","shipped","closed","lost"].find(s=>s===stage);
        if(!stgMatch)stage="negotiation";
      }
      const amount=amountIdx>=0?Number((row[amountIdx]||"").replace(/[^0-9.]/g,""))||null:null;
      const confidence=confIdx>=0?Number(row[confIdx])||50:50;
      const shipType=shipIdx>=0?row[shipIdx]||null:null;
      const shippingFromEmoji=rawName.includes("✈")||rawName.includes("✈️")?"air":rawName.includes("🚢")?"sea":rawName.includes("🇯🇵")?"domestic":null;
      const shipping=shipType||shippingFromEmoji;
      let prepay=prepayIdx>=0?Number(row[prepayIdx])||0:0;
      if(!prepay&&rawName){
        if(rawName.includes("⭕"))prepay=100;
        else if(rawName.includes("🔺"))prepay=50;
      }
      const supPaid=supPaidIdx>=0?(row[supPaidIdx]==="True"||row[supPaidIdx]==="true"||row[supPaidIdx]==="1"):rawName.includes("✅");
      const incoterms=incoIdx>=0?row[incoIdx]||null:null;
      const notes=notesIdx>=0?row[notesIdx]||"":"";
      const created=createIdx>=0?row[createIdx]||null:null;
      const close=closeIdx>=0?row[closeIdx]||null:null;

      const ins={
        name:dealName,
        account_id:matchAcct?.id||null,
        owner_id:ownerUser?.id||user.id,
        stage,
        amount,
        confidence,
        shipping_type:shipping,
        prepayment_percent:prepay,
        payment_status:prepay>=100?"full":prepay>0?"partial":"none",
        supplier_paid:supPaid,
        notes:notes||null,
        updated_at:new Date().toISOString()
      };
      if(incoterms)ins.incoterms=incoterms;
      if(created){const d=created.replace(/\//g,"-");ins.deal_date=d}
      if(close){const d=close.replace(/\//g,"-");ins.close_date=d}
      const isJBW=rawName.includes("🌐")||(row[acctIdx]||"").includes("🌐");
      if(isJBW)ins.lead_source="JBW";
      if(sourceIdx>=0&&row[sourceIdx])ins.lead_source=row[sourceIdx];

      const{error:ie}=await client.from("sales_deals").insert(ins);
      if(ie)newLog.push("⚠ "+dealName+": "+ie.message);
      else newLog.push("✓ "+dealName);
      done++;setProgress(Math.round(done/data.length*100));
    }
    setLog(newLog);setStep("done");
  };

  const startImport=()=>{
    if(importType==="accounts")importAccounts();
    else if(importType==="contacts")importContacts();
    else if(importType==="deals")importDeals();
  };

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};

  return(
    <div>
      {step==="select"&&<div>
        <div style={{fontSize:11.5,fontWeight:600,color:T.primary,marginBottom:8}}>データインポート</div>
        <div style={{display:"flex",gap:4,marginBottom:8}}>
          {[{id:"accounts",label:"取引先"},{id:"contacts",label:"コンタクト"},{id:"deals",label:"商談"}].map(t=>(
            <button key={t.id} onClick={()=>setImportType(t.id)} style={{flex:1,padding:"6px",borderRadius:6,border:importType===t.id?`2px solid ${T.primary}`:`1px solid ${T.border}`,fontSize:11,fontWeight:importType===t.id?700:400,cursor:"pointer",background:importType===t.id?T.primary+"10":"#fff",color:importType===t.id?T.primary:T.sub,fontFamily:"inherit"}}>{t.label}</button>
          ))}
        </div>
        {importType&&<div>
          <div style={{fontSize:10.5,color:T.muted,marginBottom:6}}>
            {importType==="accounts"?"取引先のCSVを選択（取引先名, 所有者, 国 等）":
             importType==="contacts"?"コンタクトのCSVを選択（名/姓, 取引先名, メール 等）":
             "商談のCSVを選択（商談名, 取引先名, フェーズ, 金額 等）"}
          </div>
          <div style={{fontSize:10,color:T.orange,marginBottom:6}}>⚠ インポート順序: 取引先 → コンタクト → 商談</div>
          <input type="file" accept=".csv" ref={fileRef} style={{display:"none"}} onChange={handleFile}/>
          <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"10px",borderRadius:6,border:`2px dashed ${T.border}`,fontSize:12,cursor:"pointer",background:"#fafafa",color:T.sub,fontFamily:"inherit"}}>CSVファイルを選択</button>
        </div>}
      </div>}

      {step==="preview"&&<div>
        <div style={{fontSize:11.5,fontWeight:600,color:T.primary,marginBottom:8}}>プレビュー — {importType} ({rows.length-1}件)</div>
        <div style={{maxHeight:200,overflowY:"auto",border:`1px solid ${T.border}`,borderRadius:6,marginBottom:8}}>
          <table style={{width:"100%",fontSize:10,borderCollapse:"collapse"}}>
            <thead><tr>{rows[0]?.map((h,i)=><th key={i} style={{padding:"4px 6px",background:"#f5f5f5",borderBottom:`1px solid ${T.border}`,textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>{rows.slice(1,6).map((r,ri)=><tr key={ri}>{r.map((c,ci)=><td key={ci} style={{padding:"3px 6px",borderBottom:`1px solid ${T.borderLight}`,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c}</td>)}</tr>)}</tbody>
          </table>
          {rows.length>6&&<div style={{padding:6,textAlign:"center",fontSize:10,color:T.muted}}>... 他 {rows.length-6} 件</div>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{setStep("select");setRows([])}} style={{flex:1,padding:"6px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>戻る</button>
          <button onClick={startImport} style={{flex:1,padding:"6px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>インポート開始</button>
        </div>
      </div>}

      {step==="importing"&&<div style={{textAlign:"center",padding:20}}>
        <div style={{fontSize:12,fontWeight:600,color:T.primary,marginBottom:8}}>インポート中... {progress}%</div>
        <div style={{width:"100%",height:4,background:T.borderLight,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:progress+"%",height:"100%",background:T.primary,borderRadius:2,transition:"width 0.3s"}}/>
        </div>
      </div>}

      {step==="done"&&<div>
        <div style={{fontSize:11.5,fontWeight:600,color:T.green,marginBottom:8}}>インポート完了</div>
        <div style={{maxHeight:200,overflowY:"auto",fontSize:10,lineHeight:1.6}}>
          {log.map((l,i)=><div key={i} style={{color:l.startsWith("⚠")?T.red:T.sub}}>{l}</div>)}
        </div>
        <button onClick={()=>{setStep("select");setRows([]);setLog([]);setProgress(0);onDone()}} style={{width:"100%",marginTop:8,padding:"6px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>完了</button>
      </div>}
    </div>
  );
}

// ── Todo Overview Page ──
function TodoOverviewPage({deals,accounts,client,user,allUsers,onOpenDeal}){
  const[todos,setTodos]=useState([]);
  const[loadingTodos,setLoadingTodos]=useState(true);
  const[filterOwner,setFilterOwner]=useState("all");

  useEffect(()=>{loadTodos()},[]);
  const loadTodos=async()=>{
    setLoadingTodos(true);
    const{data}=await client.from("sales_activities").select("*").eq("is_todo",true).is("deleted_at",null).order("due_date",{ascending:true});
    if(data)setTodos(data);
    setLoadingTodos(false);
  };

  const toggleComplete=async(id,cur)=>{
    await client.from("sales_activities").update({is_completed:!cur}).eq("id",id);
    loadTodos();
  };
  const[deleteConfirmTodo,setDeleteConfirmTodo]=useState(null);
  const deleteTodo=async(id)=>{
    await client.from("sales_activities").update({deleted_at:new Date().toISOString()}).eq("id",id);
    setDeleteConfirmTodo(null);
    loadTodos();
  };

  const today=new Date().toISOString().slice(0,10);

  // Filter: overdue or due today, incomplete
  const overdueTodos=todos.filter(t=>!t.is_completed&&t.due_date&&t.due_date<=today);
  const upcomingTodos=todos.filter(t=>!t.is_completed&&t.due_date&&t.due_date>today);
  const completedTodos=todos.filter(t=>t.is_completed);

  // Group by assigned_to (or owner)
  const groupByOwner=(list)=>{
    const map={};
    list.forEach(t=>{
      const ownerId=t.assigned_to||t.user_id;
      if(!map[ownerId])map[ownerId]=[];
      map[ownerId].push(t);
    });
    return Object.entries(map).sort((a,b)=>{
      const na=shortName(allUsers.find(u=>u.id===a[0]));
      const nb=shortName(allUsers.find(u=>u.id===b[0]));
      return na.localeCompare(nb);
    });
  };

  const filteredOverdue=filterOwner==="all"?overdueTodos:overdueTodos.filter(t=>(t.assigned_to||t.user_id)===filterOwner);
  const filteredUpcoming=filterOwner==="all"?upcomingTodos:upcomingTodos.filter(t=>(t.assigned_to||t.user_id)===filterOwner);
  const filteredCompleted=filterOwner==="all"?completedTodos:completedTodos.filter(t=>(t.assigned_to||t.user_id)===filterOwner);

  const renderTodoRow=(t,showDelete)=>{
    const deal=deals.find(d=>d.id===t.deal_id);
    const acct=deal?accounts.find(a=>a.id===deal.account_id):null;
    const assignee=allUsers.find(u=>u.id===(t.assigned_to||t.user_id));
    const isOverdue=!t.is_completed&&t.due_date&&t.due_date<=today;
    const daysLeft=t.due_date?Math.ceil((new Date(t.due_date)-new Date(today))/(1000*60*60*24)):null;
    return(
      <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:`1px solid ${T.borderLight}`,fontSize:12,background:t.is_completed?"#fafafa":"#fff"}}>
        <button onClick={()=>toggleComplete(t.id,t.is_completed)} style={{width:18,height:18,borderRadius:4,border:t.is_completed?`2px solid ${T.green}`:`2px solid ${T.border}`,background:t.is_completed?T.green+"15":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:T.green,flexShrink:0}}>{t.is_completed?"✓":""}</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:500,color:t.is_completed?T.muted:T.primary,textDecoration:t.is_completed?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.content}</div>
          {deal&&<div style={{fontSize:10,color:T.muted,marginTop:1,cursor:"pointer"}} onClick={()=>onOpenDeal&&onOpenDeal(deal)}>📋 {deal.name}{acct?" · "+acct.name:""}</div>}
        </div>
        <span style={{fontSize:9,fontWeight:600,color:"#fff",background:T.muted,borderRadius:3,padding:"1px 5px",whiteSpace:"nowrap"}}>{shortName(assignee)}</span>
        {t.due_date&&<span style={{fontSize:10,fontWeight:600,color:isOverdue?T.red:daysLeft!==null&&daysLeft<=3?T.orange:T.muted,whiteSpace:"nowrap"}}>{t.due_date.slice(5).replace("-","/")}{isOverdue?" ⚠":""}</span>}
        {showDelete&&<button onClick={e=>{e.stopPropagation();setDeleteConfirmTodo(t)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:T.muted,padding:"2px 4px",borderRadius:4,flexShrink:0}} onMouseEnter={e=>{e.currentTarget.style.color=T.red}} onMouseLeave={e=>{e.currentTarget.style.color=T.muted}} title="削除">✕</button>}
      </div>
    );
  };

  const SectionHeader=({title,count,color})=>(
    <div style={{padding:"10px 12px 6px",display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:color}}/>
      <span style={{fontSize:12,fontWeight:700,color:T.primary}}>{title}</span>
      <span style={{fontSize:10,color:T.muted}}>({count})</span>
    </div>
  );

  if(loadingTodos)return <div style={{padding:40,textAlign:"center",color:T.muted,fontSize:12}}>読み込み中...</div>;

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 14px",borderBottom:`1px solid ${T.border}`,background:T.card,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:14,fontWeight:700,color:T.primary}}>ToDo一覧</span>
        <select value={filterOwner} onChange={e=>setFilterOwner(e.target.value)} style={{padding:"4px 8px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontWeight:500,cursor:"pointer",background:T.card,color:T.sub,fontFamily:"inherit",outline:"none"}}>
          <option value="all">全メンバー</option>
          {(allUsers||[]).map(u=><option key={u.id} value={u.id}>{shortName(u)}</option>)}
        </select>
        <div style={{flex:1}}/>
        <span style={{fontSize:11,color:T.red,fontWeight:700}}>期限切れ: {filteredOverdue.length}件</span>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {filteredOverdue.length>0&&<>
          <SectionHeader title="期限切れ・本日期限" count={filteredOverdue.length} color={T.red}/>
          {filterOwner==="all"?groupByOwner(filteredOverdue).map(([ownerId,items])=>(
            <div key={ownerId}>
              <div style={{padding:"4px 12px",fontSize:10,fontWeight:700,color:T.sub,background:"#fef2f2"}}>{shortName(allUsers.find(u=>u.id===ownerId))}</div>
              {items.map(renderTodoRow)}
            </div>
          )):filteredOverdue.map(renderTodoRow)}
        </>}
        {filteredUpcoming.length>0&&<>
          <SectionHeader title="今後の予定" count={filteredUpcoming.length} color={T.accent}/>
          {filterOwner==="all"?groupByOwner(filteredUpcoming).map(([ownerId,items])=>(
            <div key={ownerId}>
              <div style={{padding:"4px 12px",fontSize:10,fontWeight:700,color:T.sub,background:"#f0f7ff"}}>{shortName(allUsers.find(u=>u.id===ownerId))}</div>
              {items.map(renderTodoRow)}
            </div>
          )):filteredUpcoming.map(renderTodoRow)}
        </>}
        {filteredCompleted.length>0&&<>
          <SectionHeader title="完了済み" count={filteredCompleted.length} color={T.green}/>
          {filteredCompleted.slice(0,20).map(t=>renderTodoRow(t,true))}
          {filteredCompleted.length>20&&<div style={{padding:"8px 12px",fontSize:11,color:T.muted,textAlign:"center"}}>他 {filteredCompleted.length-20}件...</div>}
        </>}
        {filteredOverdue.length===0&&filteredUpcoming.length===0&&filteredCompleted.length===0&&(
          <div style={{padding:40,textAlign:"center",color:T.muted,fontSize:12}}>ToDoがありません</div>
        )}
      </div>
      {deleteConfirmTodo&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100}} onClick={()=>setDeleteConfirmTodo(null)}>
        <div style={{background:"#fff",borderRadius:12,padding:"22px 26px",maxWidth:360,boxShadow:"0 12px 40px rgba(0,0,0,.15)"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:15,fontWeight:700,color:T.primary,marginBottom:8}}>ToDoを削除</div>
          <div style={{fontSize:13,color:T.sub,marginBottom:6,lineHeight:1.6}}>このToDoを削除しますか？</div>
          <div style={{padding:"8px 12px",background:"#f9f9f9",borderRadius:6,fontSize:12,color:T.sub,marginBottom:16,maxHeight:40,overflow:"hidden",lineHeight:1.5}}>{deleteConfirmTodo.content}</div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setDeleteConfirmTodo(null)} style={{padding:"7px 16px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>キャンセル</button>
            <button onClick={()=>deleteTodo(deleteConfirmTodo.id)} style={{padding:"7px 16px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:T.red,color:"#fff",fontFamily:"inherit"}}>削除する</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

function SettingsManager({categories,client,user,allUsers,accounts,onClose,onUpdated,onOpenSupabaseSettings}){
  const[newCat,setNewCat]=useState("");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");

  const addCategory=async()=>{
    if(!newCat.trim()){setErr("カテゴリ名を入力");return}
    setSaving(true);setErr("");
    const{error:ie}=await client.from("sales_categories").insert({name:newCat.trim()});
    if(ie){setErr(ie.message);setSaving(false);return}
    setNewCat("");setSaving(false);onUpdated();
  };

  const deleteCategory=async(catId)=>{
    if(!confirm("削除しますか？"))return;
    const{error:de}=await client.from("sales_categories").update({deleted_at:new Date().toISOString()}).eq("id",catId);
    if(de){alert(de.message);return}
    onUpdated();
  };

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",...getModalContainerStyle(),padding:"18px 20px",boxShadow:"0 12px 40px rgba(0,0,0,.12)",overflowY:"auto"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.primary}}>設定</div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:11.5,fontWeight:600,color:T.primary,marginBottom:8}}>カテゴリ管理</div>
          <div style={{display:"flex",gap:4,marginBottom:12}}>
            <input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyPress={e=>{if(e.key==="Enter")addCategory()}} placeholder="新規カテゴリ名" style={{...I,flex:1}}/>
            <button onClick={addCategory} disabled={saving} style={{padding:"6px 10px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>追加</button>
          </div>
          {err&&<div style={{fontSize:11,color:T.red,marginBottom:8}}>{err}</div>}
          <div style={{maxHeight:250,overflowY:"auto"}}>
            {categories.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px",borderBottom:`1px solid ${T.borderLight}`}}>
              <span style={{fontSize:12,color:T.primary}}>{c.name}</span>
              <button onClick={()=>deleteCategory(c.id)} style={{padding:"2px 6px",borderRadius:3,border:"none",fontSize:10,fontWeight:600,cursor:"pointer",background:T.red+"15",color:T.red,fontFamily:"inherit"}}>削除</button>
            </div>))}
          </div>
        </div>

        <div style={{borderTop:`1px solid ${T.borderLight}`,paddingTop:12,marginBottom:12}}>
          <div style={{fontSize:11.5,fontWeight:600,color:T.primary,marginBottom:8}}>CSVエクスポート</div>
          <div style={{display:"flex",gap:4,marginBottom:12}}>
            {[{id:"deals",label:"商談"},{id:"accounts",label:"取引先"},{id:"contacts",label:"コンタクト"}].map(t=>(
              <button key={t.id} onClick={async()=>{
                let csvContent="";
                if(t.id==="deals"){
                  csvContent="商談名,取引先,責任者,ステージ,金額,入金日,商談開始日,配送種別,インコタームズ,前払い%,メモ\n";
                  const{data:allDeals}=await client.from("sales_deals").select("*");
                  (allDeals||[]).forEach(d=>{
                    const acct=(accounts||[]).find(a=>a.id===d.account_id);
                    const owner=(allUsers||[]).find(u=>u.id===d.owner_id);
                    const st=STAGES.find(s=>s.id===d.stage);
                    csvContent+=`"${(d.name||"").replace(/"/g,'""')}","${acct?.name||""}","${shortName(owner)}","${st?.ja||d.stage}",${d.amount||0},"${d.payment_confirmed_date||""}","${d.deal_date||""}","${SHIPPING[d.shipping_type]?.label||""}","${d.incoterms||""}",${d.prepayment_percent||0},"${(d.notes||"").replace(/"/g,'""').replace(/\n/g,' ')}"\n`;
                  });
                }else if(t.id==="accounts"){
                  csvContent="会社名,国,GS責任者,流入経路,入金ターム,Webサイト,請求先住所\n";
                  (accounts||[]).forEach(a=>{
                    const owner=(allUsers||[]).find(u=>u.id===a.owner_id);
                    csvContent+=`"${(a.name||"").replace(/"/g,'""')}","${a.country||""}","${shortName(owner)}","${a.lead_source||""}","${a.payment_terms||""}","${a.website||""}","${(a.address_billing||"").replace(/"/g,'""')}"\n`;
                  });
                }else{
                  csvContent="氏名,役職,取引先,GS責任者,メール,電話,WhatsApp,LinkedIn\n";
                  const{data:allContacts}=await client.from("sales_contacts").select("*");
                  (allContacts||[]).forEach(c=>{
                    const acct=(accounts||[]).find(a=>a.id===c.account_id);
                    const owner=(allUsers||[]).find(u=>u.id===c.owner_id);
                    csvContent+=`"${(c.name||"").replace(/"/g,'""')}","${c.role||""}","${acct?.name||""}","${shortName(owner)}","${c.email||""}","${c.phone||""}","${c.whatsapp||""}","${c.linkedin||""}"\n`;
                  });
                }
                const BOM="\uFEFF";
                const blob=new Blob([BOM+csvContent],{type:"text/csv;charset=utf-8"});
                const url=URL.createObjectURL(blob);
                const a=document.createElement("a");a.href=url;a.download=`gs-sales-${t.id}-${new Date().toISOString().split("T")[0]}.csv`;
                document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
              }} style={{flex:1,padding:"6px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff",color:T.primary,fontFamily:"inherit"}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{borderTop:`1px solid ${T.borderLight}`,paddingTop:12,marginBottom:12}}>
          <CSVImporter client={client} user={user} allUsers={allUsers} accounts={accounts} onDone={onUpdated}/>
        </div>

        <div style={{borderTop:`1px solid ${T.borderLight}`,paddingTop:12,marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:11.5,fontWeight:600,color:T.primary}}>カード演出</div>
              <div style={{fontSize:10,color:T.muted}}>完了=金色、失注=グレー</div>
            </div>
            <button onClick={()=>{try{const cur=localStorage.getItem("gs_card_fx")!=="off";localStorage.setItem("gs_card_fx",cur?"off":"on");location.reload()}catch(e){}}} style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:10.5,fontWeight:600,cursor:"pointer",background:(()=>{try{return localStorage.getItem("gs_card_fx")!=="off"}catch(e){return true}})()?T.primary:"#f3f3f3",color:(()=>{try{return localStorage.getItem("gs_card_fx")!=="off"}catch(e){return true}})()?"#fff":T.sub,fontFamily:"inherit"}}>
              {(()=>{try{return localStorage.getItem("gs_card_fx")!=="off"}catch(e){return true}})()?'ON':'OFF'}
            </button>
          </div>
        </div>

        <div style={{borderTop:`1px solid ${T.borderLight}`,paddingTop:12}}>
          <button onClick={onOpenSupabaseSettings} style={{width:"100%",padding:"6px 12px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:T.primary,fontFamily:"inherit"}}>Supabase設定を開く</button>
        </div>

        <div style={{display:"flex",gap:6,marginTop:12,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11.5,fontWeight:600,cursor:"pointer",background:"#f3f3f3",color:"#666",fontFamily:"inherit"}}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

// ── Lead Form Modal ──
function LeadFormModal({client,user,lead,categories,onClose,onSaved}){
  const[form,setForm]=useState({company_name:lead?.company_name||"",contact_name:lead?.contact_name||"",contact_email:lead?.contact_email||"",source:lead?.source||"その他",phone:lead?.phone||"",whatsapp:lead?.whatsapp||"",country:lead?.country||"",website:lead?.website||"",notes:lead?.notes||"",status:lead?.status||"new",owner_id:lead?.owner_id||user.id,linkedin_url:lead?.linkedin_url||""});
  const[categoryIds,setCategoryIds]=useState(lead?.category_ids||[]);
  const[saving,setSaving]=useState(false);
  const[phoneCountry,setPhoneCountry]=useState(lead?.country||"");
  const syncedOnceRef=useRef(false);
  const I={width:"100%",padding:"6px 10px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:12,fontFamily:"inherit",outline:"none",background:"#fff"};
  const save=async()=>{
    if(!form.company_name.trim()){alert("会社名は必須です");return}
    if(form.phone){const{valid,error}=validatePhoneDigits(form.phone);if(!valid){alert(error);return}}
    setSaving(true);
    try{
      if(lead){
        const{error}=await client.from("sales_leads").update({...form,category_ids:categoryIds,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",lead.id);
        if(error)throw error;
      }else{
        const{error}=await client.from("sales_leads").insert({...form,category_ids:categoryIds,created_by:user.id,owner_id:form.owner_id||user.id});
        if(error)throw error;
      }
      onSaved();onClose();
    }catch(e){alert("エラー: "+e.message)}
    setSaving(false);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#fff",borderRadius:12,padding:"20px 24px",width:420,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.15)"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:T.primary}}>{lead?"リード編集":"新規リード"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>会社名 *</label><input value={form.company_name} onChange={e=>setForm(f=>({...f,company_name:e.target.value}))} style={I} placeholder="会社名"/></div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>担当者名</label><input value={form.contact_name} onChange={e=>setForm(f=>({...f,contact_name:e.target.value}))} style={I} placeholder="担当者名"/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>メール</label><input value={form.contact_email} onChange={e=>setForm(f=>({...f,contact_email:e.target.value}))} style={I} placeholder="メール"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>ソース</label><select value={form.source} onChange={e=>setForm(f=>({...f,source:e.target.value}))} style={I}>{LEAD_SOURCES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>ステータス</label><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={I}>{LEAD_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
          </div>
          {form.source==="LinkedIn"&&(<div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>LinkedIn URL</label><input value={form.linkedin_url} onChange={e=>setForm(f=>({...f,linkedin_url:e.target.value}))} style={I} placeholder="https://linkedin.com/in/..."/></div>)}
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>電話</label><PhoneInput value={form.phone} onChange={e=>{const v=e.target.value;setForm(f=>({...f,phone:v,whatsapp:v}))}} onDialChange={code=>{setPhoneCountry(DIAL_TO_COUNTRY[code]||"");if(!syncedOnceRef.current){const cn=DIAL_TO_COUNTRY[code];if(cn)setForm(f=>({...f,country:cn}));syncedOnceRef.current=true}}} country={phoneCountry} style={I} placeholder="電話番号（数字のみ）"/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>WhatsApp（電話番号から自動設定）</label><input value={form.whatsapp} readOnly style={{...I,background:"#f5f5f5",color:T.sub}} placeholder="電話番号から自動設定"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>国</label><CountryInput value={form.country} onChange={v=>{setForm(f=>({...f,country:v}));if(!syncedOnceRef.current){setPhoneCountry(v);syncedOnceRef.current=true}}} style={I}/></div>
            <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:T.sub}}>Webサイト</label><input value={form.website} onChange={e=>setForm(f=>({...f,website:e.target.value}))} style={I} placeholder="https://"/></div>
          </div>
          <div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>メモ</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{...I,minHeight:50,resize:"vertical"}} placeholder="メモ（任意）"/></div>
          {categories.length>0&&(<div><label style={{fontSize:10,fontWeight:600,color:T.sub}}>カテゴリ</label><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>{categories.map(c=>{const sel=categoryIds.includes(c.id);return(<button key={c.id} onClick={()=>setCategoryIds(prev=>sel?prev.filter(x=>x!==c.id):[...prev,c.id])} style={{padding:"3px 8px",borderRadius:6,cursor:"pointer",border:`1px solid ${sel?T.primary:T.border}`,background:sel?T.primary+"10":"#fff",color:sel?T.primary:T.sub,fontWeight:sel?700:500,fontSize:11,fontFamily:"inherit"}}>{c.name}</button>)})}</div></div>)}
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
          <button onClick={onClose} style={{padding:"6px 16px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:12,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
          <button onClick={save} disabled={saving} style={{padding:"6px 16px",borderRadius:6,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit",opacity:saving?0.5:1}}>{saving?"保存中...":"保存"}</button>
        </div>
      </div>
    </div>
  );
}


// ── Lead Detail ──
function LeadDetail({lead,categories,allUsers,client,user,onBack,onUpdated,onConvert}){
  const[showDeleteConfirm,setShowDeleteConfirm]=useState(false);
  const[deleting,setDeleting]=useState(false);
  const[editing,setEditing]=useState(false);
  const[form,setForm]=useState({});
  const[showConvertConfirm,setShowConvertConfirm]=useState(false);
  const[converting,setConverting]=useState(false);
  const[convertResult,setConvertResult]=useState(null);

  useEffect(()=>{
    setForm({company_name:lead.company_name||"",contact_name:lead.contact_name||"",contact_email:lead.contact_email||"",phone:lead.phone||"",whatsapp:lead.whatsapp||"",country:lead.country||"",website:lead.website||"",notes:lead.notes||"",source:lead.source||"その他",status:lead.status||"new",owner_id:lead.owner_id||user.id});
  },[lead.id]);

  const st=LEAD_STATUSES.find(s=>s.id===lead.status);
  const catNames=(lead.category_ids||[]).map(cid=>categories.find(c=>c.id===cid)?.name).filter(Boolean).join(", ");
  const owner=allUsers.find(u=>u.id===lead.owner_id);

  const saveEdit=async()=>{
    try{
      const{error}=await client.from("sales_leads").update({...form,updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",lead.id);
      if(error)throw error;
      setEditing(false);onUpdated();
    }catch(e){alert("保存エラー: "+e.message)}
  };

  const deleteLead=async()=>{
    setDeleting(true);
    try{
      await client.from("sales_leads").update({deleted_at:new Date().toISOString()}).eq("id",lead.id);
      setShowDeleteConfirm(false);setDeleting(false);
      onUpdated();onBack();
    }catch(e){alert("削除エラー: "+e.message);setDeleting(false)}
  };

  const executeConvertFromDetail=async()=>{
    setConverting(true);
    const errors=[];
    try{
      // 1. Account
      const acctRow={name:stripCorp(lead.company_name),country:lead.country||null,website:lead.website||null,lead_source:lead.source||null,owner_id:lead.owner_id||user.id,notes:lead.notes||null,category_ids:lead.category_ids||null,created_by:user.id};
      const{data:newAcct,error:ae}=await client.from("sales_accounts").insert(acctRow).select().single();
      if(ae)throw ae;
      // 2. Contact
      let newContact=null;
      if(lead.contact_name||lead.contact_email||lead.phone){
        const baseCt={name:lead.contact_name||lead.company_name,email:lead.contact_email||null,phone:lead.phone||null,whatsapp:lead.whatsapp||lead.phone||null,account_id:newAcct.id};
        let{data:ctData,error:ce}=await client.from("sales_contacts").insert(baseCt).select().single();
        if(ce){errors.push("Contact: "+ce.message)}else{newContact=ctData}
      }
      // 3. Deal
      const _now=new Date();const _ym=`${String(_now.getFullYear()).slice(2)}${String(_now.getMonth()+1).padStart(2,'0')}`;
      const _existing=deals?.filter(d=>d.account_id===newAcct.id&&d.name?.includes(_ym)).length||0;
      const _seq=String(_existing+1).padStart(2,'0');
      const _dealName=`${stripCorp(lead.company_name)} ${_ym}-${_seq}`;
      const dealRow={name:_dealName,account_id:newAcct.id,deal_number:0,stage:"negotiation",amount:0,confidence:50,owner_id:lead.owner_id||user.id,notes:lead.notes||null,created_by:user.id,deal_date:_now.toISOString().split('T')[0],created_at:_now.toISOString(),updated_at:_now.toISOString()};
      let{data:newDeal,error:de}=await client.from("sales_deals").insert(dealRow).select().single();
      if(de){
        errors.push("Deal(1): "+de.message);
        const minDeal={name:_dealName,account_id:newAcct.id,stage:"negotiation",owner_id:lead.owner_id||user.id,deal_date:_now.toISOString().split('T')[0]};
        const r2=await client.from("sales_deals").insert(minDeal).select().single();
        if(r2.error){errors.push("Deal(2): "+r2.error.message)}else{newDeal=r2.data}
      }
      // 4. Mark converted
      await client.from("sales_leads").update({status:"converted",updated_at:new Date().toISOString(),updated_by:user.id}).eq("id",lead.id);
      if(errors.length>0)console.warn("Convert warnings:",errors);
      setShowConvertConfirm(false);setConverting(false);
      setConvertResult({acct:newAcct,contact:newContact,deal:newDeal,errors});
      onUpdated();
    }catch(e){setConverting(false);alert("変換エラー: "+e.message+(errors.length>0?"\n"+errors.join("\n"):""))}
  };

  const I={width:"100%",border:`1px solid ${T.border}`,borderRadius:5,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"};
  const L={fontSize:10.5,fontWeight:600,color:T.muted,minWidth:80};

  const InfoRow=({label,value,field,type})=>(
    <div style={{display:"flex",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${T.borderLight}`,gap:12}}>
      <div style={L}>{label}</div>
      <div style={{flex:1}}>
        {editing&&field?(
          type==="select-status"?<select value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} style={I}>{LEAD_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select>
          :type==="select-source"?<select value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} style={I}>{LEAD_SOURCES.map(s=><option key={s} value={s}>{s}</option>)}</select>
          :type==="select-owner"?<select value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} style={I}>{allUsers.map(u=><option key={u.id} value={u.id}>{shortName(u)}</option>)}</select>
          :type==="country"?<CountryInput value={form[field]} onChange={v=>setForm(f=>({...f,[field]:v}))} style={I}/>
          :type==="phone"?<PhoneInput value={form[field]} onChange={e=>{const v=e.target.value;setForm(f=>({...f,[field]:v,whatsapp:v}))}} country={form.country} style={I}/>
          :type==="textarea"?<textarea value={form[field]||""} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} rows={3} style={{...I,resize:"vertical"}}/>
          :<input value={form[field]||""} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} style={I}/>
        ):(
          <div style={{fontSize:12,color:value?T.primary:T.muted,fontWeight:500}}>{value||"-"}</div>
        )}
      </div>
    </div>
  );

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${T.border}`,background:T.card,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>← 戻る</button>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16}}>{countryToFlag(lead.country)}</span>
              <span style={{fontSize:14,fontWeight:700,color:T.primary}}>{lead.company_name}</span>
              <span style={{fontSize:10,fontWeight:700,color:st?.color||T.muted,background:(st?.color||"#999")+"15",padding:"2px 8px",borderRadius:10}}>{st?.label||lead.status}</span>
            </div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>登録日: {fmt(lead.created_at)} · ソース: {lead.source}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {lead.status!=="converted"&&lead.status!=="lost"&&(
            <button onClick={()=>setShowConvertConfirm(true)} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:T.green,color:"#fff",fontFamily:"inherit"}}>商談化</button>
          )}
          {editing?(
            <><button onClick={()=>setEditing(false)} style={{padding:"5px 12px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>キャンセル</button>
            <button onClick={saveEdit} style={{padding:"5px 12px",borderRadius:5,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:T.primary,color:"#fff",fontFamily:"inherit"}}>保存</button></>
          ):(
            <button onClick={()=>setEditing(true)} style={{padding:"5px 12px",borderRadius:5,border:`1px solid ${T.border}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff",color:T.sub,fontFamily:"inherit"}}>編集</button>

          <button onClick={()=>setShowDeleteConfirm(true)} style={{padding:"5px 12px",borderRadius:5,border:`1px solid ${T.red}30`,fontSize:11,fontWeight:600,cursor:"pointer",background:T.red+"08",color:T.red,fontFamily:"inherit"}}>削除</button>

      {/* Body */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>

          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
